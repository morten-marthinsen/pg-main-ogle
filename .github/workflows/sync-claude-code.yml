name: Sync AI Tool Resources

on:
  schedule:
    # Runs daily at 6:00 AM EST (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      BASE_DIR: _performance-golf/pg-ai
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout pg-main (sparse — only SHA files)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            _performance-golf/pg-ai/_claude-code/repo-shas.txt
            _performance-golf/pg-ai/_codex/repo-shas.txt
            _performance-golf/pg-ai/_gemini-cli/repo-shas.txt
            .github
          sparse-checkout-cone-mode: false

      - name: Check all repos for changes
        id: sync
        run: |
          CLAUDE_UPDATED=""
          CODEX_UPDATED=""
          GEMINI_UPDATED=""
          ALL_SKIPPED=0
          touch /tmp/new-shas.txt

          check_repo() {
            local TOOL="$1"
            local DIR="$2"
            local REPO="$3"

            local SHAS_FILE="${BASE_DIR}/${TOOL}/repo-shas.txt"
            mkdir -p "${BASE_DIR}/${TOOL}"
            touch "$SHAS_FILE"

            local LATEST
            LATEST=$(curl -sf "https://api.github.com/repos/${REPO}/commits?per_page=1" | jq -r '.[0].sha // empty' 2>/dev/null || echo "")

            local STORED
            STORED=$(grep "^${DIR}=" "$SHAS_FILE" 2>/dev/null | cut -d= -f2 || echo "")

            if [ "$LATEST" = "$STORED" ] && [ -n "$STORED" ]; then
              ALL_SKIPPED=$((ALL_SKIPPED + 1))
            else
              echo "CHANGED: ${TOOL}/${DIR}"
              echo "${TOOL}/${DIR}=${LATEST}" >> /tmp/new-shas.txt
              case "$TOOL" in
                "_claude-code")
                  if [ -n "$CLAUDE_UPDATED" ]; then CLAUDE_UPDATED="${CLAUDE_UPDATED}, ${DIR}"; else CLAUDE_UPDATED="${DIR}"; fi
                  ;;
                "_codex")
                  if [ -n "$CODEX_UPDATED" ]; then CODEX_UPDATED="${CODEX_UPDATED}, ${DIR}"; else CODEX_UPDATED="${DIR}"; fi
                  ;;
                "_gemini-cli")
                  if [ -n "$GEMINI_UPDATED" ]; then GEMINI_UPDATED="${GEMINI_UPDATED}, ${DIR}"; else GEMINI_UPDATED="${DIR}"; fi
                  ;;
              esac
            fi
          }

          # ---- Claude Code (12 repos) ----
          check_repo "_claude-code" "claude-code" "anthropics/claude-code"
          check_repo "_claude-code" "skills" "anthropics/skills"
          check_repo "_claude-code" "claude-plugins-official" "anthropics/claude-plugins-official"
          check_repo "_claude-code" "claude-code-action" "anthropics/claude-code-action"
          check_repo "_claude-code" "claude-code-security-review" "anthropics/claude-code-security-review"
          check_repo "_claude-code" "claude-code-monitoring-guide" "anthropics/claude-code-monitoring-guide"
          check_repo "_claude-code" "claude-agent-sdk-python" "anthropics/claude-agent-sdk-python"
          check_repo "_claude-code" "claude-agent-sdk-typescript" "anthropics/claude-agent-sdk-typescript"
          check_repo "_claude-code" "claude-agent-sdk-demos" "anthropics/claude-agent-sdk-demos"
          check_repo "_claude-code" "claude-cookbooks" "anthropics/claude-cookbooks"
          check_repo "_claude-code" "claude-quickstarts" "anthropics/claude-quickstarts"
          check_repo "_claude-code" "courses" "anthropics/courses"

          # ---- Codex (7 repos) ----
          check_repo "_codex" "codex" "openai/codex"
          check_repo "_codex" "skills" "openai/skills"
          check_repo "_codex" "symphony" "openai/symphony"
          check_repo "_codex" "codex-action" "openai/codex-action"
          check_repo "_codex" "codex-universal" "openai/codex-universal"
          check_repo "_codex" "gpt-5-coding-examples" "openai/gpt-5-coding-examples"
          check_repo "_codex" "completions-responses-migration-pack" "openai/completions-responses-migration-pack"

          # ---- Gemini CLI (5 core repos) ----
          check_repo "_gemini-cli" "gemini-cli" "google-gemini/gemini-cli"
          check_repo "_gemini-cli" "gemini-cli-action" "google-gemini/gemini-cli-action"
          check_repo "_gemini-cli" "gemini-skills" "google-gemini/gemini-skills"
          check_repo "_gemini-cli" "cookbook" "google-gemini/cookbook"
          check_repo "_gemini-cli" "api-examples" "google-gemini/api-examples"

          # ---- Gemini CLI Extensions (40 repos) ----
          check_repo "_gemini-cli" "ext-devops" "gemini-cli-extensions/devops"
          check_repo "_gemini-cli" "ext-workspace" "gemini-cli-extensions/workspace"
          check_repo "_gemini-cli" "ext-alloydb-omni" "gemini-cli-extensions/alloydb-omni"
          check_repo "_gemini-cli" "ext-conductor" "gemini-cli-extensions/conductor"
          check_repo "_gemini-cli" "ext-security" "gemini-cli-extensions/security"
          check_repo "_gemini-cli" "ext-mcp-toolbox" "gemini-cli-extensions/mcp-toolbox"
          check_repo "_gemini-cli" "ext-cloud-sql-postgresql" "gemini-cli-extensions/cloud-sql-postgresql"
          check_repo "_gemini-cli" "ext-vertex" "gemini-cli-extensions/vertex"
          check_repo "_gemini-cli" "ext-looker-conversational-analytics" "gemini-cli-extensions/looker-conversational-analytics"
          check_repo "_gemini-cli" "ext-looker" "gemini-cli-extensions/looker"
          check_repo "_gemini-cli" "ext-dataplex" "gemini-cli-extensions/dataplex"
          check_repo "_gemini-cli" "ext-jules" "gemini-cli-extensions/jules"
          check_repo "_gemini-cli" "ext-nanobanana" "gemini-cli-extensions/nanobanana"
          check_repo "_gemini-cli" "ext-cloud-sql-mysql" "gemini-cli-extensions/cloud-sql-mysql"
          check_repo "_gemini-cli" "ext-code-review" "gemini-cli-extensions/code-review"
          check_repo "_gemini-cli" "ext-oracledb" "gemini-cli-extensions/oracledb"
          check_repo "_gemini-cli" "ext-alloydb" "gemini-cli-extensions/alloydb"
          check_repo "_gemini-cli" "ext-firestore-native" "gemini-cli-extensions/firestore-native"
          check_repo "_gemini-cli" "ext-spanner" "gemini-cli-extensions/spanner"
          check_repo "_gemini-cli" "ext-developer-knowledge" "gemini-cli-extensions/developer-knowledge"
          check_repo "_gemini-cli" "ext-bigquery-data-analytics" "gemini-cli-extensions/bigquery-data-analytics"
          check_repo "_gemini-cli" "ext-cloud-sql-sqlserver" "gemini-cli-extensions/cloud-sql-sqlserver"
          check_repo "_gemini-cli" "ext-postgres" "gemini-cli-extensions/postgres"
          check_repo "_gemini-cli" "ext-mysql" "gemini-cli-extensions/mysql"
          check_repo "_gemini-cli" "ext-cloud-sql-mysql-observability" "gemini-cli-extensions/cloud-sql-mysql-observability"
          check_repo "_gemini-cli" "ext-cloud-sql-postgresql-observability" "gemini-cli-extensions/cloud-sql-postgresql-observability"
          check_repo "_gemini-cli" "ext-sql-server" "gemini-cli-extensions/sql-server"
          check_repo "_gemini-cli" "ext-cloud-sql-sqlserver-observability" "gemini-cli-extensions/cloud-sql-sqlserver-observability"
          check_repo "_gemini-cli" "ext-alloydb-observability" "gemini-cli-extensions/alloydb-observability"
          check_repo "_gemini-cli" "ext-bigquery-conversational-analytics" "gemini-cli-extensions/bigquery-conversational-analytics"
          check_repo "_gemini-cli" "ext-flutter" "gemini-cli-extensions/flutter"
          check_repo "_gemini-cli" "ext-genkit" "gemini-cli-extensions/genkit"
          check_repo "_gemini-cli" "ext-web-accessibility" "gemini-cli-extensions/web-accessibility"
          check_repo "_gemini-cli" "ext-firebase" "gemini-cli-extensions/firebase"
          check_repo "_gemini-cli" "ext-datacommons" "gemini-cli-extensions/datacommons"
          check_repo "_gemini-cli" "ext-ralph" "gemini-cli-extensions/ralph"
          check_repo "_gemini-cli" "ext-stitch" "gemini-cli-extensions/stitch"
          check_repo "_gemini-cli" "ext-angular" "gemini-cli-extensions/angular"
          check_repo "_gemini-cli" "ext-gcloud" "gemini-cli-extensions/gcloud"
          check_repo "_gemini-cli" "ext-observability" "gemini-cli-extensions/observability"

          echo "$CLAUDE_UPDATED" > /tmp/claude-updated.txt
          echo "$CODEX_UPDATED" > /tmp/codex-updated.txt
          echo "$GEMINI_UPDATED" > /tmp/gemini-updated.txt
          echo "$ALL_SKIPPED" > /tmp/skipped-count.txt

          if [ -z "$CLAUDE_UPDATED" ] && [ -z "$CODEX_UPDATED" ] && [ -z "$GEMINI_UPDATED" ]; then
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Full checkout
        if: steps.sync.outputs.needs_sync == 'true'
        run: |
          git sparse-checkout disable
          git checkout .

      - name: Download changed repos
        if: steps.sync.outputs.needs_sync == 'true'
        run: |
          sync_repo() {
            local TOOL="$1"
            local DIR="$2"
            local REPO="$3"
            local SYNC_DIR="${BASE_DIR}/${TOOL}"
            local SHAS_FILE="${SYNC_DIR}/repo-shas.txt"
            mkdir -p "$SYNC_DIR"
            touch "$SHAS_FILE"

            if ! grep -q "^${TOOL}/${DIR}=" /tmp/new-shas.txt 2>/dev/null; then
              return
            fi

            echo "Downloading: ${TOOL}/${DIR}"
            rm -rf "${SYNC_DIR}/${DIR}"
            git clone --depth 1 "https://github.com/${REPO}.git" "/tmp/${TOOL}-${DIR}"
            rm -rf "/tmp/${TOOL}-${DIR}/.git"
            mv "/tmp/${TOOL}-${DIR}" "${SYNC_DIR}/${DIR}"

            grep -v "^${DIR}=" "$SHAS_FILE" > "$SHAS_FILE.tmp" 2>/dev/null || true
            local SHA
            SHA=$(grep "^${TOOL}/${DIR}=" /tmp/new-shas.txt | cut -d= -f2)
            echo "${DIR}=${SHA}" >> "$SHAS_FILE.tmp"
            mv "$SHAS_FILE.tmp" "$SHAS_FILE"
          }

          # ---- Claude Code ----
          sync_repo "_claude-code" "claude-code" "anthropics/claude-code"
          sync_repo "_claude-code" "skills" "anthropics/skills"
          sync_repo "_claude-code" "claude-plugins-official" "anthropics/claude-plugins-official"
          sync_repo "_claude-code" "claude-code-action" "anthropics/claude-code-action"
          sync_repo "_claude-code" "claude-code-security-review" "anthropics/claude-code-security-review"
          sync_repo "_claude-code" "claude-code-monitoring-guide" "anthropics/claude-code-monitoring-guide"
          sync_repo "_claude-code" "claude-agent-sdk-python" "anthropics/claude-agent-sdk-python"
          sync_repo "_claude-code" "claude-agent-sdk-typescript" "anthropics/claude-agent-sdk-typescript"
          sync_repo "_claude-code" "claude-agent-sdk-demos" "anthropics/claude-agent-sdk-demos"
          sync_repo "_claude-code" "claude-cookbooks" "anthropics/claude-cookbooks"
          sync_repo "_claude-code" "claude-quickstarts" "anthropics/claude-quickstarts"
          sync_repo "_claude-code" "courses" "anthropics/courses"

          # ---- Codex ----
          sync_repo "_codex" "codex" "openai/codex"
          sync_repo "_codex" "skills" "openai/skills"
          sync_repo "_codex" "symphony" "openai/symphony"
          sync_repo "_codex" "codex-action" "openai/codex-action"
          sync_repo "_codex" "codex-universal" "openai/codex-universal"
          sync_repo "_codex" "gpt-5-coding-examples" "openai/gpt-5-coding-examples"
          sync_repo "_codex" "completions-responses-migration-pack" "openai/completions-responses-migration-pack"

          # ---- Gemini CLI core ----
          sync_repo "_gemini-cli" "gemini-cli" "google-gemini/gemini-cli"
          sync_repo "_gemini-cli" "gemini-cli-action" "google-gemini/gemini-cli-action"
          sync_repo "_gemini-cli" "gemini-skills" "google-gemini/gemini-skills"
          sync_repo "_gemini-cli" "cookbook" "google-gemini/cookbook"
          sync_repo "_gemini-cli" "api-examples" "google-gemini/api-examples"

          # ---- Gemini CLI Extensions ----
          sync_repo "_gemini-cli" "ext-devops" "gemini-cli-extensions/devops"
          sync_repo "_gemini-cli" "ext-workspace" "gemini-cli-extensions/workspace"
          sync_repo "_gemini-cli" "ext-alloydb-omni" "gemini-cli-extensions/alloydb-omni"
          sync_repo "_gemini-cli" "ext-conductor" "gemini-cli-extensions/conductor"
          sync_repo "_gemini-cli" "ext-security" "gemini-cli-extensions/security"
          sync_repo "_gemini-cli" "ext-mcp-toolbox" "gemini-cli-extensions/mcp-toolbox"
          sync_repo "_gemini-cli" "ext-cloud-sql-postgresql" "gemini-cli-extensions/cloud-sql-postgresql"
          sync_repo "_gemini-cli" "ext-vertex" "gemini-cli-extensions/vertex"
          sync_repo "_gemini-cli" "ext-looker-conversational-analytics" "gemini-cli-extensions/looker-conversational-analytics"
          sync_repo "_gemini-cli" "ext-looker" "gemini-cli-extensions/looker"
          sync_repo "_gemini-cli" "ext-dataplex" "gemini-cli-extensions/dataplex"
          sync_repo "_gemini-cli" "ext-jules" "gemini-cli-extensions/jules"
          sync_repo "_gemini-cli" "ext-nanobanana" "gemini-cli-extensions/nanobanana"
          sync_repo "_gemini-cli" "ext-cloud-sql-mysql" "gemini-cli-extensions/cloud-sql-mysql"
          sync_repo "_gemini-cli" "ext-code-review" "gemini-cli-extensions/code-review"
          sync_repo "_gemini-cli" "ext-oracledb" "gemini-cli-extensions/oracledb"
          sync_repo "_gemini-cli" "ext-alloydb" "gemini-cli-extensions/alloydb"
          sync_repo "_gemini-cli" "ext-firestore-native" "gemini-cli-extensions/firestore-native"
          sync_repo "_gemini-cli" "ext-spanner" "gemini-cli-extensions/spanner"
          sync_repo "_gemini-cli" "ext-developer-knowledge" "gemini-cli-extensions/developer-knowledge"
          sync_repo "_gemini-cli" "ext-bigquery-data-analytics" "gemini-cli-extensions/bigquery-data-analytics"
          sync_repo "_gemini-cli" "ext-cloud-sql-sqlserver" "gemini-cli-extensions/cloud-sql-sqlserver"
          sync_repo "_gemini-cli" "ext-postgres" "gemini-cli-extensions/postgres"
          sync_repo "_gemini-cli" "ext-mysql" "gemini-cli-extensions/mysql"
          sync_repo "_gemini-cli" "ext-cloud-sql-mysql-observability" "gemini-cli-extensions/cloud-sql-mysql-observability"
          sync_repo "_gemini-cli" "ext-cloud-sql-postgresql-observability" "gemini-cli-extensions/cloud-sql-postgresql-observability"
          sync_repo "_gemini-cli" "ext-sql-server" "gemini-cli-extensions/sql-server"
          sync_repo "_gemini-cli" "ext-cloud-sql-sqlserver-observability" "gemini-cli-extensions/cloud-sql-sqlserver-observability"
          sync_repo "_gemini-cli" "ext-alloydb-observability" "gemini-cli-extensions/alloydb-observability"
          sync_repo "_gemini-cli" "ext-bigquery-conversational-analytics" "gemini-cli-extensions/bigquery-conversational-analytics"
          sync_repo "_gemini-cli" "ext-flutter" "gemini-cli-extensions/flutter"
          sync_repo "_gemini-cli" "ext-genkit" "gemini-cli-extensions/genkit"
          sync_repo "_gemini-cli" "ext-web-accessibility" "gemini-cli-extensions/web-accessibility"
          sync_repo "_gemini-cli" "ext-firebase" "gemini-cli-extensions/firebase"
          sync_repo "_gemini-cli" "ext-datacommons" "gemini-cli-extensions/datacommons"
          sync_repo "_gemini-cli" "ext-ralph" "gemini-cli-extensions/ralph"
          sync_repo "_gemini-cli" "ext-stitch" "gemini-cli-extensions/stitch"
          sync_repo "_gemini-cli" "ext-angular" "gemini-cli-extensions/angular"
          sync_repo "_gemini-cli" "ext-gcloud" "gemini-cli-extensions/gcloud"
          sync_repo "_gemini-cli" "ext-observability" "gemini-cli-extensions/observability"

          # Sort all SHA files
          for f in "${BASE_DIR}"/_*/repo-shas.txt; do
            sort "$f" -o "$f" 2>/dev/null || true
          done

      - name: Fetch docs and feeds
        if: steps.sync.outputs.needs_sync == 'true'
        run: |
          # Claude Code
          curl -sL "https://code.claude.com/docs/llms-full.txt" -o "${BASE_DIR}/_claude-code/claude-code-docs-full.txt"
          curl -sL "https://platform.claude.com/llms.txt" -o "${BASE_DIR}/_claude-code/platform-docs-index.txt"
          curl -sL "https://github.com/anthropics/claude-code/releases.atom" -o "${BASE_DIR}/_claude-code/releases.atom"
          curl -sL "https://status.claude.com/feed.atom" -o "${BASE_DIR}/_claude-code/status.atom"
          curl -sL "https://www-cdn.anthropic.com/58284b19e702b49db9302d5b6f135ad8871e7658.pdf" -o "${BASE_DIR}/_claude-code/anthropic-whitepaper.pdf"

          # Codex
          curl -sL "https://developers.openai.com/codex/llms-full.txt" -o "${BASE_DIR}/_codex/codex-docs-full.txt"
          curl -sL "https://developers.openai.com/codex/llms.txt" -o "${BASE_DIR}/_codex/codex-docs-index.txt"
          curl -sL "https://developers.openai.com/llms.txt" -o "${BASE_DIR}/_codex/openai-master-docs-index.txt"
          curl -sL "https://developers.openai.com/codex/changelog/rss.xml" -o "${BASE_DIR}/_codex/changelog.rss"
          curl -sL "https://github.com/openai/codex/releases.atom" -o "${BASE_DIR}/_codex/releases.atom"
          curl -sL "https://openai.com/blog/rss.xml" -o "${BASE_DIR}/_codex/openai-blog.rss"

          # Gemini CLI
          curl -sL "https://geminicli.com/llms.txt" -o "${BASE_DIR}/_gemini-cli/gemini-cli-docs-full.txt"
          curl -sL "https://github.com/google-gemini/gemini-cli/releases.atom" -o "${BASE_DIR}/_gemini-cli/releases.atom"

          # Timestamps
          echo "last_sync: $(date -u '+%Y-%m-%dT%H:%M:%SZ')" > "${BASE_DIR}/_claude-code/sync-metadata.yml"
          echo "last_sync: $(date -u '+%Y-%m-%dT%H:%M:%SZ')" > "${BASE_DIR}/_codex/sync-metadata.yml"
          echo "last_sync: $(date -u '+%Y-%m-%dT%H:%M:%SZ')" > "${BASE_DIR}/_gemini-cli/sync-metadata.yml"

      - name: Commit and push
        if: steps.sync.outputs.needs_sync == 'true'
        run: |
          git add -A "${BASE_DIR}/"
          if git diff --cached --quiet; then
            echo "No file changes to commit."
          else
            CHANGE_COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "sync: Update AI tool resources $(date -u '+%Y-%m-%d')

            Automated daily sync. Files changed: $CHANGE_COUNT"
            git push
          fi

      # ============================================================
      # Slack notification
      # ============================================================

      - name: Send Slack notification (changes found)
        if: steps.sync.outputs.needs_sync == 'true' && env.SLACK_WEBHOOK_URL != ''
        run: |
          CLAUDE=$(cat /tmp/claude-updated.txt)
          CODEX=$(cat /tmp/codex-updated.txt)
          GEMINI=$(cat /tmp/gemini-updated.txt)
          SKIPPED=$(cat /tmp/skipped-count.txt)
          DATE_STR=$(date -u '+%b %-d')

          SUMMARY=""
          if [ -n "$CLAUDE" ]; then
            SUMMARY="*Claude Code:* ${CLAUDE}"
          else
            SUMMARY="*Claude Code:* No changes"
          fi
          if [ -n "$CODEX" ]; then
            SUMMARY="${SUMMARY}\n*Codex:* ${CODEX}"
          else
            SUMMARY="${SUMMARY}\n*Codex:* No changes"
          fi
          if [ -n "$GEMINI" ]; then
            SUMMARY="${SUMMARY}\n*Gemini CLI:* ${GEMINI}"
          else
            SUMMARY="${SUMMARY}\n*Gemini CLI:* No changes"
          fi

          cat > /tmp/slack-payload.json << SLACK_EOF
          {
            "link_names": 1,
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "<@U024E2PBFQV>\n\n*AI Tools Sync — ${DATE_STR}*"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*What changed:*\n${SUMMARY}"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Action items:*\n1. [placeholder]\n2. [placeholder]\n3. [placeholder]"
                }
              }
            ]
          }
          SLACK_EOF
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d @/tmp/slack-payload.json

      - name: Send Slack notification (no changes)
        if: steps.sync.outputs.needs_sync == 'false' && env.SLACK_WEBHOOK_URL != ''
        run: |
          DATE_STR=$(date -u '+%b %-d')
          cat > /tmp/slack-payload.json << SLACK_EOF
          {
            "link_names": 1,
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "<@U024E2PBFQV>\n\n*AI Tools Sync — ${DATE_STR}*\n\nNo changes upstream. Everything current."
                }
              }
            ]
          }
          SLACK_EOF
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d @/tmp/slack-payload.json
