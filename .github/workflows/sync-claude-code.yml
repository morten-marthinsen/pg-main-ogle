name: Sync Claude Code Resources

on:
  schedule:
    # Runs daily at 6:00 AM EST (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      SYNC_DIR: _performance-golf/pg-ai/claude-code
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout pg-main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ============================================================
      # STEP 1: Check which repos have changed, only sync those
      # ============================================================

      - name: Check and sync repos
        run: |
          REPOS="anthropics/claude-code:claude-code
          anthropics/skills:skills
          anthropics/claude-plugins-official:claude-plugins-official
          anthropics/claude-code-action:claude-code-action
          anthropics/claude-code-security-review:claude-code-security-review
          anthropics/claude-code-monitoring-guide:claude-code-monitoring-guide
          anthropics/claude-agent-sdk-python:claude-agent-sdk-python
          anthropics/claude-agent-sdk-typescript:claude-agent-sdk-typescript
          anthropics/claude-agent-sdk-demos:claude-agent-sdk-demos
          anthropics/claude-cookbooks:claude-cookbooks
          anthropics/claude-quickstarts:claude-quickstarts
          anthropics/courses:courses"

          SHAS_FILE="$SYNC_DIR/repo-shas.txt"
          UPDATED_REPOS=""
          SKIPPED=0

          # Create SHAs file if it doesn't exist
          touch "$SHAS_FILE"

          for entry in $REPOS; do
            REPO=$(echo "$entry" | cut -d: -f1)
            DIR=$(echo "$entry" | cut -d: -f2)

            # Get latest commit SHA from GitHub API
            LATEST_SHA=$(curl -s "https://api.github.com/repos/${REPO}/commits/main" | jq -r '.sha // empty' 2>/dev/null)

            if [ -z "$LATEST_SHA" ]; then
              # Fallback: try HEAD if main doesn't exist
              LATEST_SHA=$(curl -s "https://api.github.com/repos/${REPO}/commits/HEAD" | jq -r '.sha // empty' 2>/dev/null)
            fi

            # Get previously synced SHA
            PREV_SHA=$(grep "^${REPO}:" "$SHAS_FILE" 2>/dev/null | cut -d: -f3)

            if [ "$LATEST_SHA" = "$PREV_SHA" ] && [ -d "$SYNC_DIR/$DIR" ]; then
              echo "SKIP: $REPO (unchanged at ${LATEST_SHA:0:7})"
              SKIPPED=$((SKIPPED + 1))
            else
              echo "SYNC: $REPO (${PREV_SHA:0:7:-"new"} → ${LATEST_SHA:0:7})"
              rm -rf "$SYNC_DIR/$DIR"
              git clone --depth 1 "https://github.com/${REPO}.git" "/tmp/$DIR"
              rm -rf "/tmp/$DIR/.git"
              mv "/tmp/$DIR" "$SYNC_DIR/$DIR"
              UPDATED_REPOS="${UPDATED_REPOS}${DIR}, "
            fi

            # Update SHA record
            if [ -n "$LATEST_SHA" ]; then
              # Remove old entry and add new one
              grep -v "^${REPO}:" "$SHAS_FILE" > "$SHAS_FILE.tmp" 2>/dev/null || true
              echo "${REPO}:${LATEST_SHA}" >> "$SHAS_FILE.tmp"
              mv "$SHAS_FILE.tmp" "$SHAS_FILE"
            fi
          done

          # Save for later steps
          echo "$UPDATED_REPOS" | sed 's/, $//' > /tmp/updated-repos.txt
          echo "$SKIPPED" > /tmp/skipped-count.txt
          sort "$SHAS_FILE" -o "$SHAS_FILE"

      # ============================================================
      # STEP 2: Fetch docs, feeds, and other resources
      # ============================================================

      - name: Fetch docs and feeds
        run: |
          curl -sL "https://code.claude.com/docs/llms-full.txt" -o "$SYNC_DIR/claude-code-docs-full.txt"
          curl -sL "https://platform.claude.com/llms.txt" -o "$SYNC_DIR/platform-docs-index.txt"
          curl -sL "https://github.com/anthropics/claude-code/releases.atom" -o "$SYNC_DIR/releases.atom"
          curl -sL "https://status.claude.com/feed.atom" -o "$SYNC_DIR/status.atom"
          curl -sL "https://www-cdn.anthropic.com/58284b19e702b49db9302d5b6f135ad8871e7658.pdf" -o "$SYNC_DIR/anthropic-whitepaper.pdf"

      # ============================================================
      # STEP 3: Record sync metadata
      # ============================================================

      - name: Record sync timestamp
        run: |
          cat > "$SYNC_DIR/sync-metadata.yml" << METADATA
          last_sync: $(date -u '+%Y-%m-%dT%H:%M:%SZ')
          METADATA

      # ============================================================
      # STEP 4: Commit and push if there are changes
      # ============================================================

      - name: Check for changes
        id: changes
        run: |
          git add -A "$SYNC_DIR/"
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            CHANGE_COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
            echo "change_count=$CHANGE_COUNT" >> "$GITHUB_OUTPUT"

            # Build summary
            UPDATED_REPOS=$(cat /tmp/updated-repos.txt)
            SKIPPED=$(cat /tmp/skipped-count.txt)

            # Check if docs/feeds changed
            DOCS_CHANGED=""
            if git diff --cached --name-only | grep -q "claude-code-docs-full.txt"; then
              DOCS_CHANGED="${DOCS_CHANGED}docs, "
            fi
            if git diff --cached --name-only | grep -q "releases.atom"; then
              DOCS_CHANGED="${DOCS_CHANGED}release feed, "
            fi
            if git diff --cached --name-only | grep -q "platform-docs-index.txt"; then
              DOCS_CHANGED="${DOCS_CHANGED}platform docs, "
            fi
            DOCS_CHANGED=$(echo "$DOCS_CHANGED" | sed 's/, $//')

            SUMMARY=""
            if [ -n "$UPDATED_REPOS" ]; then
              SUMMARY="Repos updated: ${UPDATED_REPOS}"
            fi
            if [ -n "$DOCS_CHANGED" ]; then
              if [ -n "$SUMMARY" ]; then
                SUMMARY="${SUMMARY}\n"
              fi
              SUMMARY="${SUMMARY}Also updated: ${DOCS_CHANGED}"
            fi
            if [ "$SKIPPED" -gt "0" ]; then
              SUMMARY="${SUMMARY}\n${SKIPPED} repos unchanged, skipped."
            fi

            echo "$SUMMARY" > /tmp/change-summary.txt
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        env:
          CHANGE_COUNT: ${{ steps.changes.outputs.change_count }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "sync: Update Claude Code resources $(date -u '+%Y-%m-%d')

          Automated daily sync of Anthropic/Claude Code official resources.
          Files changed: $CHANGE_COUNT"
          git push

      # ============================================================
      # STEP 5: Slack notification
      # ============================================================

      - name: Send Slack notification (changes found)
        if: steps.changes.outputs.has_changes == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          CHANGE_COUNT: ${{ steps.changes.outputs.change_count }}
        run: |
          CHANGE_SUMMARY=$(cat /tmp/change-summary.txt)
          PAYLOAD=$(jq -n \
            --arg text "<@U024E2PBFQV>\n\n*Claude Code Sync — $(date -u '+%b %-d')*\n\n*What changed:*\n${CHANGE_SUMMARY}\n${CHANGE_COUNT} files total.\n\n*Action items:*\n1. [placeholder]\n2. [placeholder]\n3. [placeholder]" \
            '{text: $text, link_names: 1}')
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "$PAYLOAD"

      - name: Send Slack notification (no changes)
        if: steps.changes.outputs.has_changes == 'false' && env.SLACK_WEBHOOK_URL != ''
        run: |
          PAYLOAD=$(jq -n \
            --arg text "<@U024E2PBFQV>\n\n*Claude Code Sync — $(date -u '+%b %-d')*\n\nNo changes upstream. Everything current." \
            '{text: $text, link_names: 1}')
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "$PAYLOAD"
