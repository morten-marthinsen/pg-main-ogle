name: Sync Claude Code Resources

on:
  schedule:
    # Runs daily at 6:00 AM EST (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      SYNC_DIR: _performance-golf/pg-ai/claude-code
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout pg-main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ============================================================
      # STEP 1: Check which repos changed, only sync those
      # ============================================================

      - name: Check and sync repos
        run: |
          SHAS_FILE="$SYNC_DIR/repo-shas.txt"
          touch "$SHAS_FILE"

          UPDATED=""
          SKIPPED=0
          TOTAL=12

          sync_repo() {
            local REPO="$1"
            local DIR="$2"

            # Get latest SHA from GitHub
            local LATEST
            LATEST=$(curl -sf "https://api.github.com/repos/${REPO}/commits?per_page=1" | jq -r '.[0].sha // empty' 2>/dev/null || echo "")

            if [ -z "$LATEST" ]; then
              echo "WARN: Could not fetch SHA for $REPO, syncing anyway"
              LATEST="unknown"
            fi

            # Get stored SHA
            local STORED
            STORED=$(grep "^${DIR}=" "$SHAS_FILE" 2>/dev/null | cut -d= -f2 || echo "")

            # Compare
            if [ "$LATEST" = "$STORED" ] && [ "$LATEST" != "unknown" ] && [ -d "$SYNC_DIR/$DIR" ]; then
              echo "SKIP: $DIR"
              SKIPPED=$((SKIPPED + 1))
              return
            fi

            echo "SYNC: $DIR"
            rm -rf "$SYNC_DIR/$DIR"
            git clone --depth 1 "https://github.com/${REPO}.git" "/tmp/$DIR"
            rm -rf "/tmp/$DIR/.git"
            mv "/tmp/$DIR" "$SYNC_DIR/$DIR"

            # Store new SHA (replace old entry)
            grep -v "^${DIR}=" "$SHAS_FILE" > "$SHAS_FILE.tmp" 2>/dev/null || true
            echo "${DIR}=${LATEST}" >> "$SHAS_FILE.tmp"
            mv "$SHAS_FILE.tmp" "$SHAS_FILE"

            if [ -n "$UPDATED" ]; then
              UPDATED="${UPDATED}, ${DIR}"
            else
              UPDATED="${DIR}"
            fi
          }

          sync_repo "anthropics/claude-code" "claude-code"
          sync_repo "anthropics/skills" "skills"
          sync_repo "anthropics/claude-plugins-official" "claude-plugins-official"
          sync_repo "anthropics/claude-code-action" "claude-code-action"
          sync_repo "anthropics/claude-code-security-review" "claude-code-security-review"
          sync_repo "anthropics/claude-code-monitoring-guide" "claude-code-monitoring-guide"
          sync_repo "anthropics/claude-agent-sdk-python" "claude-agent-sdk-python"
          sync_repo "anthropics/claude-agent-sdk-typescript" "claude-agent-sdk-typescript"
          sync_repo "anthropics/claude-agent-sdk-demos" "claude-agent-sdk-demos"
          sync_repo "anthropics/claude-cookbooks" "claude-cookbooks"
          sync_repo "anthropics/claude-quickstarts" "claude-quickstarts"
          sync_repo "anthropics/courses" "courses"

          sort "$SHAS_FILE" -o "$SHAS_FILE"

          # Save results for Slack
          echo "$UPDATED" > /tmp/updated-repos.txt
          echo "$SKIPPED" > /tmp/skipped-count.txt

      # ============================================================
      # STEP 2: Fetch docs, feeds, and other resources
      # ============================================================

      - name: Fetch docs and feeds
        run: |
          curl -sL "https://code.claude.com/docs/llms-full.txt" -o "$SYNC_DIR/claude-code-docs-full.txt"
          curl -sL "https://platform.claude.com/llms.txt" -o "$SYNC_DIR/platform-docs-index.txt"
          curl -sL "https://github.com/anthropics/claude-code/releases.atom" -o "$SYNC_DIR/releases.atom"
          curl -sL "https://status.claude.com/feed.atom" -o "$SYNC_DIR/status.atom"
          curl -sL "https://www-cdn.anthropic.com/58284b19e702b49db9302d5b6f135ad8871e7658.pdf" -o "$SYNC_DIR/anthropic-whitepaper.pdf"

      # ============================================================
      # STEP 3: Record sync metadata
      # ============================================================

      - name: Record sync timestamp
        run: |
          echo "last_sync: $(date -u '+%Y-%m-%dT%H:%M:%SZ')" > "$SYNC_DIR/sync-metadata.yml"

      # ============================================================
      # STEP 4: Commit and push if there are changes
      # ============================================================

      - name: Check for changes
        id: changes
        run: |
          git add -A "$SYNC_DIR/"
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            CHANGE_COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
            echo "change_count=$CHANGE_COUNT" >> "$GITHUB_OUTPUT"

            UPDATED_REPOS=$(cat /tmp/updated-repos.txt)
            SKIPPED=$(cat /tmp/skipped-count.txt)

            # Check docs/feeds
            DOCS=""
            git diff --cached --name-only | grep -q "claude-code-docs-full.txt" && DOCS="${DOCS}docs refreshed, " || true
            git diff --cached --name-only | grep -q "releases.atom" && DOCS="${DOCS}release feed updated, " || true
            git diff --cached --name-only | grep -q "platform-docs-index.txt" && DOCS="${DOCS}platform docs refreshed, " || true
            DOCS=$(echo "$DOCS" | sed 's/, $//')

            # Build summary lines
            LINES=""
            if [ -n "$UPDATED_REPOS" ]; then
              LINES="Repos: ${UPDATED_REPOS}"
            fi
            if [ -n "$DOCS" ]; then
              if [ -n "$LINES" ]; then
                LINES="${LINES}\n"
              fi
              LINES="${LINES}${DOCS}"
            fi
            if [ "$SKIPPED" -gt "0" ]; then
              if [ -n "$LINES" ]; then
                LINES="${LINES}\n"
              fi
              LINES="${LINES}${SKIPPED} repos had no changes."
            fi
            # If only metadata changed
            if [ -z "$LINES" ]; then
              LINES="Metadata updated only."
            fi

            printf '%s' "$LINES" > /tmp/change-summary.txt
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        env:
          CHANGE_COUNT: ${{ steps.changes.outputs.change_count }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "sync: Update Claude Code resources $(date -u '+%Y-%m-%d')

          Automated daily sync of Anthropic/Claude Code official resources.
          Files changed: $CHANGE_COUNT"
          git push

      # ============================================================
      # STEP 5: Slack notification
      # ============================================================

      - name: Send Slack notification (changes found)
        if: steps.changes.outputs.has_changes == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          CHANGE_COUNT: ${{ steps.changes.outputs.change_count }}
        run: |
          CHANGE_SUMMARY=$(cat /tmp/change-summary.txt)
          DATE_STR=$(date -u '+%b %-d')
          cat > /tmp/slack-payload.json << SLACK_EOF
          {
            "link_names": 1,
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "<@U024E2PBFQV>\n\n*Claude Code Sync — ${DATE_STR}*"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*What changed:*\n${CHANGE_SUMMARY}\n${CHANGE_COUNT} files total."
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Action items:*\n1. [placeholder]\n2. [placeholder]\n3. [placeholder]"
                }
              }
            ]
          }
          SLACK_EOF
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d @/tmp/slack-payload.json

      - name: Send Slack notification (no changes)
        if: steps.changes.outputs.has_changes == 'false' && env.SLACK_WEBHOOK_URL != ''
        run: |
          DATE_STR=$(date -u '+%b %-d')
          cat > /tmp/slack-payload.json << SLACK_EOF
          {
            "link_names": 1,
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "<@U024E2PBFQV>\n\n*Claude Code Sync — ${DATE_STR}*\n\nNo changes upstream. Everything current."
                }
              }
            ]
          }
          SLACK_EOF
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d @/tmp/slack-payload.json
