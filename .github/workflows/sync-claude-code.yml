name: Sync Claude Code Resources

on:
  schedule:
    # Runs daily at 6:00 AM EST (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      SYNC_DIR: _performance-golf/pg-ai/claude-code
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout pg-main (sparse — only sync metadata)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            _performance-golf/pg-ai/claude-code/repo-shas.txt
            .github
          sparse-checkout-cone-mode: false

      - name: Full checkout if repos need updating
        id: sync
        run: |
          SHAS_FILE="_performance-golf/pg-ai/claude-code/repo-shas.txt"
          mkdir -p "_performance-golf/pg-ai/claude-code"
          touch "$SHAS_FILE"

          UPDATED=""
          SKIPPED=0
          NEEDS_FULL_CHECKOUT=false

          check_repo() {
            local DIR="$1"
            local REPO="$2"

            local LATEST
            LATEST=$(curl -sf "https://api.github.com/repos/${REPO}/commits?per_page=1" | jq -r '.[0].sha // empty' 2>/dev/null || echo "")

            local STORED
            STORED=$(grep "^${DIR}=" "$SHAS_FILE" 2>/dev/null | cut -d= -f2 || echo "")

            if [ "$LATEST" = "$STORED" ] && [ -n "$STORED" ]; then
              echo "SKIP: $DIR"
              SKIPPED=$((SKIPPED + 1))
            else
              echo "CHANGED: $DIR"
              echo "${DIR}=${LATEST}" >> /tmp/new-shas.txt
              NEEDS_FULL_CHECKOUT=true
              if [ -n "$UPDATED" ]; then
                UPDATED="${UPDATED}, ${DIR}"
              else
                UPDATED="${DIR}"
              fi
            fi
          }

          touch /tmp/new-shas.txt

          check_repo "claude-code" "anthropics/claude-code"
          check_repo "skills" "anthropics/skills"
          check_repo "claude-plugins-official" "anthropics/claude-plugins-official"
          check_repo "claude-code-action" "anthropics/claude-code-action"
          check_repo "claude-code-security-review" "anthropics/claude-code-security-review"
          check_repo "claude-code-monitoring-guide" "anthropics/claude-code-monitoring-guide"
          check_repo "claude-agent-sdk-python" "anthropics/claude-agent-sdk-python"
          check_repo "claude-agent-sdk-typescript" "anthropics/claude-agent-sdk-typescript"
          check_repo "claude-agent-sdk-demos" "anthropics/claude-agent-sdk-demos"
          check_repo "claude-cookbooks" "anthropics/claude-cookbooks"
          check_repo "claude-quickstarts" "anthropics/claude-quickstarts"
          check_repo "courses" "anthropics/courses"

          echo "$UPDATED" > /tmp/updated-repos.txt
          echo "$SKIPPED" > /tmp/skipped-count.txt

          if [ -z "$UPDATED" ]; then
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
            echo "No repos changed."
          else
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
            echo "Repos to update: $UPDATED"
          fi

      - name: Full checkout
        if: steps.sync.outputs.needs_sync == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download changed repos only
        if: steps.sync.outputs.needs_sync == 'true'
        run: |
          SHAS_FILE="$SYNC_DIR/repo-shas.txt"

          sync_repo() {
            local DIR="$1"
            local REPO="$2"

            # Check if this repo is in the changed list
            if ! grep -q "^${DIR}=" /tmp/new-shas.txt 2>/dev/null; then
              return
            fi

            echo "Downloading: $DIR"
            rm -rf "$SYNC_DIR/$DIR"
            git clone --depth 1 "https://github.com/${REPO}.git" "/tmp/$DIR"
            rm -rf "/tmp/$DIR/.git"
            mv "/tmp/$DIR" "$SYNC_DIR/$DIR"

            # Update SHA
            grep -v "^${DIR}=" "$SHAS_FILE" > "$SHAS_FILE.tmp" 2>/dev/null || true
            local SHA
            SHA=$(grep "^${DIR}=" /tmp/new-shas.txt | cut -d= -f2)
            echo "${DIR}=${SHA}" >> "$SHAS_FILE.tmp"
            mv "$SHAS_FILE.tmp" "$SHAS_FILE"
          }

          sync_repo "claude-code" "anthropics/claude-code"
          sync_repo "skills" "anthropics/skills"
          sync_repo "claude-plugins-official" "anthropics/claude-plugins-official"
          sync_repo "claude-code-action" "anthropics/claude-code-action"
          sync_repo "claude-code-security-review" "anthropics/claude-code-security-review"
          sync_repo "claude-code-monitoring-guide" "anthropics/claude-code-monitoring-guide"
          sync_repo "claude-agent-sdk-python" "anthropics/claude-agent-sdk-python"
          sync_repo "claude-agent-sdk-typescript" "anthropics/claude-agent-sdk-typescript"
          sync_repo "claude-agent-sdk-demos" "anthropics/claude-agent-sdk-demos"
          sync_repo "claude-cookbooks" "anthropics/claude-cookbooks"
          sync_repo "claude-quickstarts" "anthropics/claude-quickstarts"
          sync_repo "courses" "anthropics/courses"

          sort "$SHAS_FILE" -o "$SHAS_FILE"

      - name: Refresh docs and feeds
        if: steps.sync.outputs.needs_sync == 'true'
        run: |
          curl -sL "https://code.claude.com/docs/llms-full.txt" -o "$SYNC_DIR/claude-code-docs-full.txt"
          curl -sL "https://platform.claude.com/llms.txt" -o "$SYNC_DIR/platform-docs-index.txt"
          curl -sL "https://github.com/anthropics/claude-code/releases.atom" -o "$SYNC_DIR/releases.atom"
          curl -sL "https://status.claude.com/feed.atom" -o "$SYNC_DIR/status.atom"
          curl -sL "https://www-cdn.anthropic.com/58284b19e702b49db9302d5b6f135ad8871e7658.pdf" -o "$SYNC_DIR/anthropic-whitepaper.pdf"
          echo "last_sync: $(date -u '+%Y-%m-%dT%H:%M:%SZ')" > "$SYNC_DIR/sync-metadata.yml"

      - name: Commit and push
        if: steps.sync.outputs.needs_sync == 'true'
        run: |
          git add -A "$SYNC_DIR/"
          if git diff --cached --quiet; then
            echo "No file changes to commit."
          else
            CHANGE_COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "sync: Update Claude Code resources $(date -u '+%Y-%m-%d')

            Automated daily sync. Files changed: $CHANGE_COUNT"
            git push
          fi

      # ============================================================
      # Slack notification
      # ============================================================

      - name: Send Slack notification (changes found)
        if: steps.sync.outputs.needs_sync == 'true' && env.SLACK_WEBHOOK_URL != ''
        run: |
          UPDATED=$(cat /tmp/updated-repos.txt)
          SKIPPED=$(cat /tmp/skipped-count.txt)
          DATE_STR=$(date -u '+%b %-d')

          SUMMARY="Repos: ${UPDATED}"
          if [ "$SKIPPED" -gt "0" ]; then
            SUMMARY="${SUMMARY}\n${SKIPPED} repos had no changes."
          fi

          cat > /tmp/slack-payload.json << SLACK_EOF
          {
            "link_names": 1,
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "<@U024E2PBFQV>\n\n*Claude Code Sync — ${DATE_STR}*"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*What changed:*\n${SUMMARY}"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Action items:*\n1. [placeholder]\n2. [placeholder]\n3. [placeholder]"
                }
              }
            ]
          }
          SLACK_EOF
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d @/tmp/slack-payload.json

      - name: Send Slack notification (no changes)
        if: steps.sync.outputs.needs_sync == 'false' && env.SLACK_WEBHOOK_URL != ''
        run: |
          DATE_STR=$(date -u '+%b %-d')
          cat > /tmp/slack-payload.json << SLACK_EOF
          {
            "link_names": 1,
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "<@U024E2PBFQV>\n\n*Claude Code Sync — ${DATE_STR}*\n\nNo changes upstream. Everything current."
                }
              }
            ]
          }
          SLACK_EOF
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d @/tmp/slack-payload.json
