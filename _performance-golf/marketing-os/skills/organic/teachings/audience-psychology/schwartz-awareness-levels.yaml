# ============================================================================
# CORE THESIS — THE FUNDAMENTAL INSIGHT
# ============================================================================

core_thesis:
  schwartz_primary_insight: |
    You cannot create desire. You can only take the hopes, dreams, fears, and
    desires that already exist in the hearts of millions of people, and focus
    those already-existing desires onto a particular product or piece of content.
    This is the copywriter's task — not to create mass desire, but to CHANNEL
    and DIRECT it.
  schwartz_primary_insight_source_quote:
    text: >
      Copy cannot create desire for a product. It can only take the hopes, dreams,
      fears and desires that already exist in the hearts of millions of people, and
      focus those already-existing desires onto a particular product. This is the
      copy writer's task: not to create this mass desire—but to channel and direct it.
    page: 3
    chapter: 1
  desire_cannot_be_created_source_quote:
    text: >
      You see, people don't change: only the direction of their desires do. They
      cannot be made to want anything, nor is it necessary to create want.
    page: "vi (Preface to the Boardroom Edition)"
    chapter: "Preface"

  the_calibration_problem: |
    The single biggest reason marketing content fails is not bad writing, weak
    offers, or ugly design. It is MISCALIBRATION — writing content for an
    audience at one awareness level when they are actually at another. You
    cannot sell a product by name to someone who doesn't know the product
    exists. You cannot tell a long educational story to someone who already
    knows your product and just needs a deal. The awareness level determines
    EVERYTHING about how you open, what you say, how long you say it, and
    what you ask for.

  the_two_calibration_systems: |
    Schwartz identified two independent axes that must be calibrated simultaneously:
    1. AWARENESS LEVEL — What does the prospect know about YOUR specific solution?
    2. MARKET SOPHISTICATION — How many competing claims has the prospect already seen?
    Getting either one wrong destroys performance. Getting both right creates
    breakthrough results.
  the_two_calibration_systems_source_quote:
    text: >
      There are three questions you must answer before you can determine what goes
      into your headline. These are: 1. What is the mass desire that motivates your
      market? 2. How much does your market know about your product? (Their State of
      Awareness.) 3. How many similar products have they been told about before?
      (Their State of Sophistication.)
    page: 37
    chapter: 3

  organic_content_application: |
    In organic content, every piece you publish is a "headline" — the first frame
    of a reel, the first line of a caption, the cover slide of a carousel. Schwartz's
    framework tells you EXACTLY what that opening must do based on where your
    audience is. This is not abstract theory — it is the operating system for
    every content decision in the engine.
  organic_content_application_source_quote:
    text: >
      Your headline has only one job—to stop your prospect and compel him to read
      the second sentence of your ad.
    page: 14
    chapter: 2

  amplification_effect_source_quote:
    text: >
      This is the Amplification Effect—the reason that $1 spent on such advertising
      can create $50 or even $100 in sales.
    page: 5
    chapter: 1

# ============================================================================
# SECTION 1: THE 5 LEVELS OF MARKET AWARENESS
# ============================================================================
# Schwartz Chapter 1-2: "The Bedrock Upon Which All Advertising Is Built"
# These levels form a spectrum from complete ignorance to ready-to-buy.
# Your job: identify where your audience sits and calibrate accordingly.
# ============================================================================

awareness_levels:
  overview:
    definition: |
      Market awareness is the degree to which your prospect knows about your
      product, understands what it does, and believes it can solve their problem.
      It ranges from total unawareness (they don't even know they have a problem)
      to most aware (they know your product, trust it, and just need a reason to
      act now).
    why_it_matters: |
      The awareness level determines:
      - What your opening line must say
      - How much education is required before the ask
      - Whether you lead with the product, the solution, the problem, or identity
      - How long your content needs to be
      - What call-to-action is appropriate
      - Whether you can sell directly or must nurture first
    the_spectrum:
      - "Level 5: Most Aware (hottest — ready to act)"
      - "Level 4: Product Aware (knows your product, not yet convinced)"
      - "Level 3: Solution Aware (knows solutions exist, doesn't know yours)"
      - "Level 2: Problem Aware (feels the pain, doesn't know solutions exist)"
      - "Level 1: Unaware (doesn't know they have a problem)"
    critical_rule: |
      You must ALWAYS enter the conversation already happening in the prospect's
      mind. Never start the conversation you want to have — start the conversation
      THEY are already having with themselves, then bridge to your message.

  # --------------------------------------------------------------------------
  # LEVEL 5: MOST AWARE
  # --------------------------------------------------------------------------
  level_5_most_aware:
    level_number: 5
    name: "Most Aware"
    temperature: "Hottest — minimal friction to conversion"

    definition: |
      The prospect knows your product, knows what it does, knows they want it,
      and has already decided they will buy. They may have bought before. They
      are simply waiting for the right offer, the right moment, or a reminder
      to take action. This is the easiest audience to convert but the smallest
      segment of any market.
    definition_source_quote:
      text: >
        The customer knows of your product—knows what it does—knows he wants it.
        At this point, he just hasn't gotten around to buying it yet. Your
        headline—in fact, your entire ad—need state little more except the name
        of your product and a bargain price.
      page: 16
      chapter: 2

    psychological_state:
      internal_monologue: "I know this product. I want it. Just give me a reason to act now."
      emotional_drivers:
        - "Confidence in the product (trust is established)"
        - "Desire for a deal or special offer"
        - "Fear of missing out on a limited opportunity"
        - "Loyalty to the brand or creator"
      cognitive_load: "Minimal — decision is already made, just needs activation"
      resistance_points:
        - "Price objection (wants a better deal)"
        - "Timing objection (not the right moment)"
        - "Priority objection (other things competing for attention/budget)"

    what_prospect_knows:
      - "Your product/content/brand by name"
      - "What it does and how it works"
      - "That it solves their specific problem"
      - "Testimonials or social proof confirming it works"
      - "Pricing and how to purchase/access"
    what_prospect_doesnt_know:
      - "That a special offer is available right now"
      - "That the offer has a deadline"
      - "New features, updates, or improvements"
      - "New use cases they haven't considered"

    headline_strategy:
      schwartz_rule: |
        Name the product and the price. Be direct. The headline's only job is
        to remind them of their desire and make the offer irresistible. No story,
        no education, no buildup needed.
      lead_with: "Product name + offer/deal/discount/bonus"
      tone: "Direct, confident, transactional"
      length: "Short — they don't need convincing, they need activating"

      headline_formulas:
        - formula: "[Product Name] — [Discount/Offer] — [Deadline]"
          example: "The Bellringer Blueprint — 50% off this week only"
        - formula: "[Product Name] is back — [New Feature/Bonus]"
          example: "AI Content Factory 2.0 just dropped — now with carousel templates"
        - formula: "Last chance: [Product Name] [Offer Detail]"
          example: "Last chance: Omega Mastermind doors close Friday"
        - formula: "[Product Name] + [Bonus] — [Urgency]"
          example: "Global Launchpad enrollment + 1-on-1 strategy call — 48 hours"

    content_strategy:
      content_types:
        - type: "Flash sale announcements"
          purpose: "Activate existing desire with urgency"
        - type: "Countdown posts"
          purpose: "Create time pressure on known audience"
        - type: "New feature reveals"
          purpose: "Give existing fans a new reason to engage"
        - type: "Customer results/testimonials"
          purpose: "Reinforce decision they've already made"
        - type: "Restock/reopen notifications"
          purpose: "Notify waiting audience that access is available"

      organic_content_formats:
        instagram_story: "Direct CTA with swipe-up link, countdown sticker, 'doors closing' urgency"
        instagram_reel: "Quick product showcase + special offer + link in bio"
        carousel: "2-3 slides max — offer summary + testimonial + CTA"
        thread: "Short thread: announcement + what's included + deadline + link"
        caption: "Short-form. Product name. Offer. Deadline. Link. Done."

      mistakes_at_this_level:
        - mistake: "Over-explaining the product to people who already know it"
          fix: "Skip education. Go straight to the offer."
        - mistake: "Burying the offer in a long story"
          fix: "Lead with the offer. Story is optional and short."
        - mistake: "Weak CTAs ('check it out if you want')"
          fix: "Direct imperative CTAs ('Grab it now. Link in bio.')"
        - mistake: "No urgency or deadline"
          fix: "Always include a reason to act NOW, not later"

    percentage_of_market: "5-10% (smallest but highest-converting segment)"

  # --------------------------------------------------------------------------
  # LEVEL 4: PRODUCT AWARE
  # --------------------------------------------------------------------------
  level_4_product_aware:
    level_number: 4
    name: "Product Aware"
    temperature: "Warm — knows you, not yet convinced"

    definition: |
      The prospect knows your product exists but hasn't yet decided to buy. They
      may know the name, have seen your content, visited a sales page, or heard
      about you from someone else. They understand what you offer in broad terms
      but either don't believe the claims yet, don't think it's for them, or
      haven't seen enough proof. Your job is not to educate — it's to CONVINCE.
    definition_source_quote:
      text: >
        How, then, do you write a headline for a product that is known, that may
        be acknowledged to have certain strengths, but which has not yet produced
        its full desire in the prospect? There are seven different tasks your
        headline can perform here.
      page: 17
      chapter: 2

    psychological_state:
      internal_monologue: "I've seen this product/creator. Seems interesting. But will it work for ME?"
      emotional_drivers:
        - "Curiosity mixed with skepticism"
        - "Desire for proof and specificity"
        - "Need for social proof and credibility indicators"
        - "Comparison shopping mentality"
      cognitive_load: "Moderate — evaluating claims against alternatives"
      resistance_points:
        - "Skepticism about claimed results"
        - "Uncertainty about fit for their specific situation"
        - "Comparison with competitors they also follow"
        - "Risk aversion (what if it doesn't work for me?)"

    what_prospect_knows:
      - "Your product or brand exists"
      - "General idea of what it does"
      - "Some of the claims or promises"
      - "Approximate price range"
    what_prospect_doesnt_know:
      - "Whether the claims are actually true"
      - "Whether it will work for their specific situation"
      - "The mechanism behind WHY it works"
      - "What makes it different from alternatives"
      - "Specific results from real customers"

    headline_strategy:
      schwartz_rule: |
        Don't repeat the claim they've already heard. Instead, SHARPEN it.
        Add specificity. Add proof. Add a mechanism. Show them WHY it works,
        not just THAT it works. The headline must advance their belief, not
        repeat your pitch.
      lead_with: "Sharpened claim + proof + mechanism or unique angle"
      tone: "Authoritative, specific, evidence-based"
      length: "Medium — enough to build belief but not so much you bore them"

      headline_formulas:
        - formula: "How [Product] achieves [Specific Result] by [Mechanism]"
          example: "How the Content Factory generates 30 posts in 2 hours using the 4-Layer System"
        - formula: "[Specific Number] [People/Results] prove [Claim]"
          example: "847 creators used this system to hit 10K followers in 90 days"
        - formula: "The [Unique Mechanism] inside [Product] that [Outcome]"
          example: "The Awareness Calibration Protocol inside the Engine that doubles engagement"
        - formula: "Why [Product] works when [Alternative/Old Way] doesn't"
          example: "Why this content system works when posting more content doesn't"
        - formula: "[Product] vs [Common Alternative]: [Differentiator]"
          example: "AI Content Factory vs. hiring a social media manager — the real math"

    content_strategy:
      content_types:
        - type: "Case studies with specific results"
          purpose: "Bridge the belief gap with evidence"
        - type: "Behind-the-scenes mechanism reveals"
          purpose: "Show WHY it works, not just that it works"
        - type: "Objection-handling content"
          purpose: "Address the specific doubts they have"
        - type: "Comparison content (us vs alternatives)"
          purpose: "Position against what they're already considering"
        - type: "Social proof compilations"
          purpose: "Volume of proof overcomes individual skepticism"
        - type: "Deep-dive feature breakdowns"
          purpose: "Specificity builds belief where generality breeds doubt"

      organic_content_formats:
        instagram_reel: "Specific result + how it happened + mechanism reveal + CTA"
        carousel: "7-10 slides: claim, proof, mechanism, objection handling, testimonials, CTA"
        thread: "Detailed breakdown of HOW the product produces results"
        caption: "Mid-length. Lead with sharpened claim. Proof in body. Soft-to-medium CTA."
        story_sequence: "3-5 story sequence: testimonial, mechanism, FAQ, offer"

      mistakes_at_this_level:
        - mistake: "Repeating the same broad claims they've already heard"
          fix: "Add specificity — numbers, timelines, mechanisms"
        - mistake: "Leading with features instead of outcomes"
          fix: "Lead with the result, then explain the feature that produces it"
        - mistake: "Ignoring objections (hoping they'll go away)"
          fix: "Proactively address the top 3 objections in content"
        - mistake: "Generic testimonials ('Great product!')"
          fix: "Specific testimonials with before/after data and context"

    percentage_of_market: "15-25% (significant segment, high conversion potential)"

  # --------------------------------------------------------------------------
  # LEVEL 3: SOLUTION AWARE
  # --------------------------------------------------------------------------
  level_3_solution_aware:
    level_number: 3
    name: "Solution Aware"
    temperature: "Lukewarm — knows solutions exist, doesn't know yours"

    definition: |
      The prospect knows that solutions to their problem exist. They may have
      tried competitors. They may be researching options. They know the general
      category of solution they need but they don't know YOUR specific product
      or they haven't given it serious consideration. Your job: present your
      product as the SUPERIOR solution and differentiate it from everything
      else they've seen.
    definition_source_quote:
      text: >
        Here your prospect is not aware of your product; but is aware of the
        desire itself, and that it can be satisfied... Your headline starts with
        the desire. And it ends with your product.
      page: 20
      chapter: 2

    psychological_state:
      internal_monologue: "I know I need something to solve this. What's the best option?"
      emotional_drivers:
        - "Active search mode — open to new solutions"
        - "Frustration with current solution or lack thereof"
        - "Comparison and evaluation mindset"
        - "Desire for the 'best' option, not just any option"
        - "Skepticism from past failed attempts with other solutions"
      cognitive_load: "High — actively comparing, evaluating, and filtering options"
      resistance_points:
        - "Information overload (too many options)"
        - "Prior disappointment with similar products"
        - "Difficulty distinguishing between options"
        - "Decision fatigue"
        - "Trust deficit from competitors who over-promised"

    what_prospect_knows:
      - "The general category of solution (coaching, courses, tools, etc.)"
      - "That multiple options exist"
      - "Basic criteria for evaluation"
      - "Some competitor offerings"
      - "What hasn't worked for them before"
    what_prospect_doesnt_know:
      - "That YOUR specific product exists"
      - "What makes your approach fundamentally different"
      - "Your unique mechanism or methodology"
      - "Your track record and proof"
      - "Why their previous solution failed and yours won't"

    headline_strategy:
      schwartz_rule: |
        Name the desire or the result FIRST, then present your product as the
        vehicle. Don't lead with your product name (they don't know it). Don't
        lead with generic claims (they've heard them all). Lead with the outcome
        they want delivered through a mechanism they haven't seen before.
      lead_with: "Desired outcome + unique mechanism/approach"
      tone: "Authoritative, differentiated, outcome-focused"
      length: "Medium to long — needs to establish credibility and differentiation"

      headline_formulas:
        - formula: "The [Unique Method] to [Desired Result] without [Common Pain]"
          example: "The Awareness Calibration Method to double engagement without posting more"
        - formula: "Why [Common Approach] fails and what to do instead"
          example: "Why posting daily doesn't grow your audience and what actually does"
        - formula: "[Desired Result] in [Timeframe] using [Unique Mechanism]"
          example: "100 qualified leads in 30 days using the Organic Engine System"
        - formula: "I tried [Number] [Solutions] — here's the only one that worked"
          example: "I tried 7 content tools — here's the only one that actually saved me time"
        - formula: "The [Niche]-specific [Solution Type] that [Outcome]"
          example: "The creator-specific content system that turns followers into buyers"
        - formula: "Stop [Common Approach]. Start [Unique Approach]. Here's why."
          example: "Stop batching random content. Start calibrating to awareness levels."

    content_strategy:
      content_types:
        - type: "Methodology reveals"
          purpose: "Show your unique approach as fundamentally different"
        - type: "'Why everything else fails' content"
          purpose: "Position against the category, not just competitors"
        - type: "Before/after transformations"
          purpose: "Show the result tied to your specific method"
        - type: "Comparison frameworks"
          purpose: "Help them evaluate (with criteria that favor your approach)"
        - type: "Contrarian takes on industry norms"
          purpose: "Break their existing mental model so your approach feels fresh"
        - type: "Mini-result demonstrations"
          purpose: "Show the mechanism working in real-time"

      organic_content_formats:
        instagram_reel: "Contrarian hook + why common approach fails + mechanism reveal + soft CTA"
        carousel: "8-10 slides: common approach vs your approach, with proof at each step"
        thread: "Thread deconstructing why the obvious solution fails + introducing your framework"
        caption: "Medium-long. Hook on desired outcome. Body reveals unique mechanism. CTA to learn more."
        live_stream: "Live demonstration of method producing results in real-time"

      mistakes_at_this_level:
        - mistake: "Leading with your product name (they don't know or care yet)"
          fix: "Lead with the outcome or the mechanism, introduce name later"
        - mistake: "Making the same claims as competitors"
          fix: "Differentiate on mechanism, not just results"
        - mistake: "Assuming they'll figure out why you're different"
          fix: "Explicitly state what makes your approach unique"
        - mistake: "Ignoring their past failures with other solutions"
          fix: "Acknowledge why other approaches fail, then explain why yours doesn't"

    percentage_of_market: "25-35% (large segment, requires differentiation to convert)"

  # --------------------------------------------------------------------------
  # LEVEL 2: PROBLEM AWARE
  # --------------------------------------------------------------------------
  level_2_problem_aware:
    level_number: 2
    name: "Problem Aware"
    temperature: "Cool — feels the pain, doesn't know solutions exist"

    definition: |
      The prospect knows they have a problem or desire but doesn't know that
      solutions exist — or at least hasn't actively searched for them. They feel
      the pain, frustration, or longing but haven't connected it to a solvable
      category. Your job: CRYSTALLIZE the problem (make them feel it sharply),
      then reveal that a solution exists. Do not pitch the product yet.
    definition_source_quote:
      text: >
        1. Price means nothing to a person who does not know your product, or want
        your product. Therefore, eliminate all mention of price... 2. The name of
        your product means nothing to a person who has never seen it before...
        3. And this is the hardest fact of all to accept. At this stage of your
        market, a direct statement of what your product does, what desire it
        satisfies, or what problem it solves, simply will not work.
      page: 25
      chapter: 2

    psychological_state:
      internal_monologue: "Something is wrong. I'm stuck/frustrated/behind. But I don't know what to do about it."
      emotional_drivers:
        - "Latent frustration that hasn't been articulated"
        - "Vague sense that others are succeeding where they're failing"
        - "Desire for change without a clear path"
        - "Emotional pain that they've normalized (don't realize it's solvable)"
        - "Quiet desperation masked as acceptance"
      cognitive_load: "Low on solutions (haven't started looking), high on emotional processing"
      resistance_points:
        - "Learned helplessness ('this is just how it is')"
        - "Problem feels too big or vague to solve"
        - "Don't believe solutions exist for their specific situation"
        - "Fear of confronting the full scope of the problem"
        - "Pride preventing admission of struggle"

    what_prospect_knows:
      - "That they are experiencing pain, frustration, or unmet desire"
      - "Symptoms of the problem (posting with no engagement, working hard with no results)"
      - "That other people seem to have figured it out"
      - "General dissatisfaction with current state"
    what_prospect_doesnt_know:
      - "The root cause of their problem"
      - "That their problem has a name and is common"
      - "That proven solutions exist"
      - "What category of solution would help"
      - "How to evaluate potential solutions"
      - "That the problem is solvable at all"

    headline_strategy:
      schwartz_rule: |
        Name the problem or desire directly. Do NOT mention your product. Do
        NOT mention that a solution exists. Your headline must make them feel
        SEEN — it must articulate the pain they've been feeling but haven't
        been able to put into words. The goal is resonance, not pitch. Once
        they feel understood, they'll follow you anywhere.
      lead_with: "The pain/problem/desire they feel but haven't articulated"
      tone: "Empathetic, validating, crystallizing"
      length: "Medium to long — must build emotional resonance before bridging to solutions"

      headline_formulas:
        - formula: "If you're [Experiencing Pain], it's not your fault. Here's what's actually happening."
          example: "If you're posting daily and still getting zero engagement, it's not your fault."
        - formula: "[Pain They Feel] — and why [Common Explanation] is wrong"
          example: "Burning out on content creation — and why 'just be consistent' is terrible advice"
        - formula: "The real reason [Their Frustration]"
          example: "The real reason your content gets views but no followers"
        - formula: "You're not [Negative Self-Label]. You're [Reframe]."
          example: "You're not bad at marketing. You're just aiming at the wrong audience."
        - formula: "[Number] signs that [Root Problem] — not [Surface Problem]"
          example: "5 signs your content strategy is broken — not your content quality"
        - formula: "What nobody tells [Their Identity] about [Their Struggle]"
          example: "What nobody tells new creators about the first 1000 followers"

    content_strategy:
      content_types:
        - type: "Problem crystallization content"
          purpose: "Make the vague pain sharp and nameable"
        - type: "'You're not alone' content"
          purpose: "Validate their experience and build trust"
        - type: "Root cause reveals"
          purpose: "Show the real problem behind the symptoms"
        - type: "Story-driven content (your own struggle)"
          purpose: "Build connection through shared experience"
        - type: "Myth-busting content"
          purpose: "Destroy false beliefs that keep them stuck"
        - type: "Problem quantification"
          purpose: "Show the cost of not solving the problem"

      organic_content_formats:
        instagram_reel: "Story hook about the pain + 'I've been there' + root cause reveal + 'there's a way out' (no product mention)"
        carousel: "10 slides: symptom identification, validation, root cause education, hope — no product"
        thread: "Personal story of experiencing the same problem + what you discovered + teaser of solution category"
        caption: "Long-form empathetic writing. Describe their pain in their words. Validate. Educate on root cause. Follow for more."
        story_sequence: "Poll asking 'Do you struggle with X?' + validation + educational content"

      content_funnel_role: |
        Problem-aware content is the TOP OF FUNNEL for organic marketing. This
        is how you reach the largest audience with maximum resonance. These posts
        get the most engagement because they make people feel SEEN. The key is
        to NOT sell at this stage — build trust and move them to solution-aware
        through consistent value.

      mistakes_at_this_level:
        - mistake: "Jumping straight to your product/solution"
          fix: "Sit in the problem. Validate it. Make them feel understood FIRST."
        - mistake: "Intellectual problem description instead of emotional"
          fix: "Use the words THEY use to describe their pain, not industry jargon"
        - mistake: "Making the content about you instead of them"
          fix: "Your story is a bridge, not the destination. They are the hero."
        - mistake: "Offering solutions too quickly"
          fix: "Problem-aware content earns trust. Solution comes in the NEXT piece of content."

    percentage_of_market: "25-35% (large segment, highest engagement potential)"

  # --------------------------------------------------------------------------
  # LEVEL 1: UNAWARE
  # --------------------------------------------------------------------------
  level_1_unaware:
    level_number: 1
    name: "Unaware"
    temperature: "Cold — doesn't know they have a problem"

    definition: |
      The prospect doesn't know they have a problem, doesn't know a solution
      exists, and has zero context for your product. They are not searching.
      They are not in pain (or they've normalized the pain so completely they
      don't register it). This is the hardest audience to reach but also the
      largest potential market. Your job: DISRUPT their worldview. Make them
      see something they've been blind to.
    definition_source_quote:
      text: >
        What you are doing essentially in this fifth stage is calling your market
        together in the headline of your ad. You are writing an identification
        headline. You are selling nothing, promising nothing, satisfying nothing.
        Instead, you are echoing an emotion, an attitude, a satisfaction that picks
        people out from the crowd and binds them together in a single statement.
      page: "25-26"
      chapter: 2
    bridge_strategy_source_quote:
      text: >
        Here, above all, is the type of headline that never attempts to sell a
        product or a performance, but simply tries to sell the remainder of the ad
        itself—the information that follows on the page. The only function of this
        headline is to get the prospect to read the next paragraph.
      page: 26
      chapter: 2

    psychological_state:
      internal_monologue: "(No internal monologue about this problem — it doesn't exist in their awareness)"
      emotional_drivers:
        - "General curiosity (can be triggered)"
        - "Identity aspirations (who they want to become)"
        - "Entertainment seeking (will stop for something interesting)"
        - "Social belonging (will engage with community signals)"
        - "Pattern interruption response (will stop when surprised)"
      cognitive_load: "Zero on this topic — it's not on their radar"
      resistance_points:
        - "No perceived need (why should I care?)"
        - "No search intent (not looking for anything)"
        - "Attention is elsewhere entirely"
        - "Skepticism toward unsolicited messages"
        - "Content blindness (scrolling past everything)"

    what_prospect_knows:
      - "Nothing about the problem, the solution category, or your product"
      - "Their own identity, interests, and aspirations"
      - "What entertains, intrigues, or surprises them"
    what_prospect_doesnt_know:
      - "That they have a problem worth solving"
      - "That a better way exists"
      - "That their current approach has a cost they haven't calculated"
      - "That their identity group has specific challenges they share"
      - "Everything else in the awareness spectrum"

    headline_strategy:
      schwartz_rule: |
        Do NOT mention the product. Do NOT mention the problem. Do NOT mention
        the solution. Instead, open with pure IDENTIFICATION or FASCINATION.
        Connect with who they ARE, not what they need. Use story, spectacle,
        or a bold statement about their identity or world. The goal is to
        capture attention through resonance with their identity, then gradually
        introduce the problem.
      lead_with: "Identity, story, fascination, entertainment, or spectacle"
      tone: "Magnetic, identity-driven, story-first, entertaining"
      length: "Short hook, longer engagement — must earn every second of attention"

      headline_formulas:
        - formula: "I [Identity-Relevant Action/Story that hooks curiosity]"
          example: "I quit my 6-figure job to make content from my phone. Here's what happened."
        - formula: "[Bold identity statement that demands reaction]"
          example: "Most entrepreneurs are working 80 hours a week to build someone else's dream."
        - formula: "[Provocative observation about their world]"
          example: "The creators you admire spend 20% of their time creating and 80% doing this."
        - formula: "[Story that mirrors their hidden aspiration]"
          example: "A year ago I had 200 followers and zero revenue. Last month I made $47K."
        - formula: "[Cultural moment/trend] + [Unexpected angle]"
          example: "Everyone's talking about AI replacing jobs. Nobody's talking about THIS."
        - formula: "[Pattern interrupt that stops the scroll]"
          example: "Delete half your content. Right now. Here's why."

    content_strategy:
      content_types:
        - type: "Identity-driven content"
          purpose: "Connect with who they are, not what they need"
        - type: "Story content (transformation narratives)"
          purpose: "Plant seeds of possibility without pitching"
        - type: "Entertainment-first content"
          purpose: "Earn attention through value, not relevance"
        - type: "Trend commentary"
          purpose: "Meet them where their attention already is"
        - type: "Pattern-interrupt content"
          purpose: "Break through content blindness with surprise"
        - type: "Provocative observations"
          purpose: "Shift worldview to reveal hidden problem"

      organic_content_formats:
        instagram_reel: "Entertaining/surprising hook + story + subtle worldview shift — zero selling"
        carousel: "Shareworthy identity content — 'Tag someone who...' or 'Which type are you?'"
        thread: "Compelling personal story that naturally reveals the problem exists"
        caption: "Short, punchy, provocative — optimized for shares and saves, not conversions"
        tiktok: "Pure entertainment or pattern-interrupt with subtle awareness seeding"

      the_bridge_technique: |
        For unaware audiences, you must build a BRIDGE from their current world
        to the problem you solve. This bridge has 4 steps:
        1. ENTER their world (identity, entertainment, shared experience)
        2. DISRUPT their assumption (something they believe is wrong)
        3. REVEAL the hidden problem (the thing they didn't know was costing them)
        4. OPEN THE DOOR to solutions (tease, don't sell)
        This often takes multiple pieces of content, not a single post.

      mistakes_at_this_level:
        - mistake: "Leading with industry jargon or problem language"
          fix: "They don't know the jargon. Speak in their everyday language."
        - mistake: "Trying to sell or even soft-sell"
          fix: "The ONLY goal is attention and awareness. Selling comes later."
        - mistake: "Creating content only existing audience wants"
          fix: "Unaware content is for reach. It must appeal broadly."
        - mistake: "Being boring in an attempt to be educational"
          fix: "Entertainment and fascination come first. Education is the byproduct."

    percentage_of_market: "30-40% (largest segment, lowest conversion but highest reach potential)"

  # --------------------------------------------------------------------------
  # SCHWARTZ ON STYLE vs STRATEGY (Applies to all awareness levels)
  # --------------------------------------------------------------------------
  style_vs_strategy_source_quote:
    text: >
      In effective advertising, though styles may change, strategy does not. If you
      will study the piano and bridesmaid ads in this chapter, you will notice this:
      That while the narrative style of both is now old-hat, you can still respond
      to their power.
    page: 36
    chapter: 2
    implication: >
      The awareness-level strategies in this YAML are timeless even though the
      specific content formats (reels, carousels, threads) are modern applications.
      The strategy never changes — only the style of execution.

# ============================================================================
# SECTION 2: THE 5 STAGES OF MARKET SOPHISTICATION
# ============================================================================
# Schwartz Chapter 3: "The Forces That Determine What Your Headline Must Do"
# Market sophistication is independent of awareness level.
# It measures how SATURATED the market is with competing claims.
# ============================================================================

market_sophistication:
  overview:
    definition: |
      Market sophistication describes how many competing marketing messages
      your prospect has already been exposed to in your category. It has nothing
      to do with the prospect's intelligence — it's about how TRAINED they are
      to recognize and dismiss marketing claims. Each stage requires a different
      headline strategy because what worked in the previous stage has been
      burned out by overuse.
    why_it_matters: |
      Market sophistication determines:
      - Whether simple claims still work or have been exhausted
      - Whether you need to introduce a mechanism
      - Whether you need to create a new frame entirely
      - How much cynicism and skepticism your audience carries
      - Whether competition is on claims, mechanisms, or identity
    the_progression: |
      Markets move through sophistication stages over time. They never go
      backward. Each stage represents an escalation in what's required to
      break through. Most social media content markets in 2026 are at
      Stage 4-5, which explains why generic advice content fails.

  # --------------------------------------------------------------------------
  # STAGE 1: BE FIRST
  # --------------------------------------------------------------------------
  stage_1_be_first:
    stage_number: 1
    name: "Be First"
    market_condition: "Virgin market — no competitor has made this claim before"

    definition: |
      You are the first to address this desire or problem. No competitor has
      made a similar claim. The market has never heard a promise like yours.
      In this stage, simply stating what your product does is enough. No proof
      required. No differentiation needed. The claim itself is the headline.
    definition_source_quote:
      text: >
        1. Be simple. Be direct. Above all, don't be fancy. State either the need
        or the claim in your headline—nothing more. Dramatize that claim in your
        copy—make it as powerful as possible. And then bring in your product; and
        prove that it works.
      page: 39
      chapter: 3
    stage_1_example_source_quote:
      text: >
        No one knows who was the first man to stumble on the reducing field (though
        it's fairly certain that he must have become a millionaire). But all he had
        to say in his headline was a simple statement of the direct desire of
        millions of women: 'NOW! LOSE UGLY FAT!'
      page: 39
      chapter: 3

    what_works:
      - "Simple, direct claims about what the product does"
      - "Bold promises stated clearly"
      - "Straightforward problem-solution framing"
      - "Basic before/after language"
    what_fails:
      - "Nothing fails at this stage — almost any clear claim works"
      - "The only failure is being too complex when simplicity would win"

    headline_approach: |
      State the claim directly. "This product does X." Nothing more is needed.
      The promise itself is novel enough to capture attention and drive action.

    examples:
      - claim: "Lose weight without dieting"
        context: "First time this claim was made in the weight loss market"
      - claim: "Make money while you sleep"
        context: "First time passive income was framed this way"
      - claim: "Create a month of content in one day"
        context: "First time AI-assisted content batching was presented"

    organic_content_adaptation:
      opportunity: "First-mover advantage in an unclaimed niche or angle"
      strategy: "State your unique angle simply and clearly. Repeat it everywhere."
      example: "If nobody in your niche is talking about awareness-level calibration, simply claiming 'Your content fails because it's aimed at the wrong awareness level' is enough."
      modern_rarity: "Almost no content niches are at Stage 1 anymore. But SUB-NICHES and INTERSECTIONS can be."
      where_to_find_stage_1:
        - "New technology applications (AI + your niche)"
        - "Niche intersections nobody has claimed"
        - "New platforms before they saturate"
        - "Emerging problems that established creators haven't addressed"

  # --------------------------------------------------------------------------
  # STAGE 2: EXPAND THE CLAIM
  # --------------------------------------------------------------------------
  stage_2_expand_claim:
    stage_number: 2
    name: "Expand the Claim"
    market_condition: "Competitors have entered — simple claims are no longer novel"

    definition: |
      Your claim is no longer unique. Competitors are making similar promises.
      The market has heard "lose weight" or "grow your audience" from multiple
      sources. To win, you must EXPAND the claim — make it bigger, bolder,
      more specific, faster, or more extreme. Outperform the competition on
      the promise itself.
    definition_source_quote:
      text: >
        If you're second, and the direct claim is still working—then copy that
        successful claim—but enlarge on it. Drive it to the absolute limit.
        Outbid your competition.
      page: 39
      chapter: 3
    stage_2_examples_source_quote:
      text: >
        'LOSE UP TO 47 POUNDS IN 4 WEEKS—OR RECEIVE $40 BACK!'
        ... 'I AM 61 POUNDS LIGHTER ... NEVER A HUNGRY MINUTE.'
      page: "39-40"
      chapter: 3

    what_works:
      - "Larger numbers (not 10 lbs — 30 lbs)"
      - "Faster timelines (not someday — in 30 days)"
      - "Greater specificity (not 'more followers' — '10,000 followers')"
      - "Stronger guarantees (money-back, results-guaranteed)"
      - "Stacked benefits (primary result + secondary benefits)"
    what_fails:
      - "The same claim competitors are making"
      - "Vague or unquantified promises"
      - "Claims without specificity"
      - "Modest promises that don't differentiate"

    headline_approach: |
      Take the existing claim and AMPLIFY it. Add a number. Add a timeframe.
      Add a guarantee. Make it specific enough that it stands out from the
      noise. "Lose weight" becomes "Lose 30 pounds in 90 days or your money back."

    examples:
      - claim: "10,000 followers in 90 days — guaranteed"
        context: "Expanded from simple 'grow your audience' claims"
      - claim: "Create 30 days of content in 2 hours"
        context: "Expanded from 'save time on content creation'"
      - claim: "$10K/month from organic content within 6 months"
        context: "Expanded from 'make money from social media'"

    organic_content_adaptation:
      opportunity: "Outperform competitors on specificity and boldness of results"
      strategy: "Add numbers, timeframes, and specificity to every claim in your content"
      example_hooks:
        - "I gained 50,000 followers in 6 months without spending a dollar on ads"
        - "This system generates 90 content ideas in 15 minutes"
        - "From 0 to $25K/month in organic revenue — the exact timeline"
      warning: |
        Stage 2 has a shelf life. As competitors match and exceed your expanded
        claims, the market becomes numb to promises. This is when you MUST
        shift to Stage 3 (mechanism) or your content dies.

  # --------------------------------------------------------------------------
  # STAGE 3: MECHANISM
  # --------------------------------------------------------------------------
  stage_3_mechanism:
    stage_number: 3
    name: "Mechanism"
    market_condition: "Claims are exhausted — the market demands to know HOW"

    definition: |
      The market has heard every promise. They've been burned by claims that
      didn't deliver. They no longer trust the WHAT — they want to know the
      HOW. This stage requires introducing a MECHANISM — the unique process,
      system, technology, or method that makes your claim work. The mechanism
      is the reason to believe.
    definition_source_quote:
      text: >
        What this market needs now is A NEW MECHANISM—a new way to making the old
        promise work. A different process—a fresh chance—a brand-new possibility
        of success where only disappointment has resulted before.
      page: 42
      chapter: 3
    mechanism_in_headline_source_quote:
      text: >
        Here the emphasis shifts from what the product does to HOW it works. Not
        accomplishment, but performance becomes dominant. The headline expands. The
        claim remains—but now it is reinforced by the mechanism that accomplishes it.
      page: 42
      chapter: 3
    stage_3_examples_source_quote:
      text: >
        'FLOATS FAT RIGHT OUT OF YOUR BODY!'
        ... 'FIRST WONDER DRUG FOR REDUCING!'
      page: 42
      chapter: 3

    what_works:
      - "Named systems and methodologies"
      - "Process reveals and framework introductions"
      - "Scientific or technical explanations for WHY it works"
      - "Proprietary language that makes your mechanism ownable"
      - "Mechanism-first headlines that lead with the HOW"
    what_fails:
      - "Claims without explanation"
      - "Bigger promises (the market is numb to them)"
      - "Proof without mechanism (testimonials alone won't cut it)"
      - "Generic processes that sound like everyone else's"

    headline_approach: |
      Name the mechanism. Make it proprietary. Lead with HOW the result
      happens, not WHAT the result is. "The 4-Layer Content System that
      generates 30 posts in 2 hours" works because it introduces a
      MECHANISM (the 4-Layer Content System).

    examples:
      - claim: "The Awareness Calibration Protocol — how top creators 3x engagement without posting more"
        mechanism: "Awareness Calibration Protocol"
        why_it_works: "Named system + specific result + counterintuitive angle"
      - claim: "The STEPPS Framework — the 6 viral triggers behind every piece of content that breaks 1M views"
        mechanism: "STEPPS Framework"
        why_it_works: "Named framework + specific number + verifiable claim"
      - claim: "How the 80/20 Content Matrix identifies the 20% of ideas that generate 80% of engagement"
        mechanism: "80/20 Content Matrix"
        why_it_works: "Named tool + familiar principle applied in new way"

    organic_content_adaptation:
      opportunity: "This is where most successful creators in 2026 should be operating"
      strategy: "Name your methodology. Create proprietary language. Teach the mechanism in your content."
      naming_your_mechanism:
        principles:
          - "Use a noun + noun or adjective + noun structure"
          - "Make it sound systematic and proprietary"
          - "It should be Googleable (unique to you)"
          - "It should be intuitively understandable"
        examples:
          - "The Organic Engine System"
          - "The Awareness Calibration Protocol"
          - "The Content Gravity Method"
          - "The 3-Second Hook Architecture"
      content_types_that_work:
        - "Framework reveals: 'Let me show you the system behind...'"
        - "Mechanism breakdowns: 'Here's WHY this works (not just that it does)'"
        - "Process walkthroughs: 'The 5-step system I use every week'"
        - "Behind-the-scenes: 'Here's the actual system running in real-time'"
      warning: |
        Mechanisms get copied. When competitors start using your mechanism
        language (or creating their own named systems), the market moves
        to Stage 4. You must then ENHANCE the mechanism or lose ground.

  # --------------------------------------------------------------------------
  # STAGE 4: ENHANCED MECHANISM
  # --------------------------------------------------------------------------
  stage_4_enhanced_mechanism:
    stage_number: 4
    name: "Enhanced Mechanism"
    market_condition: "Mechanisms are common — the market demands a BETTER mechanism"

    definition: |
      Multiple competitors now have named systems and methodologies. The
      market is flooded with frameworks. To win, you must present an ENHANCED
      mechanism — faster, more refined, more advanced, backed by more proof,
      or specifically calibrated to a sub-audience. The mechanism itself must
      be differentiated.
    definition_source_quote:
      text: >
        If a competitor has just introduced a new mechanism to achieve the same
        claim as that performed by your product, and that new-mechanism announcement
        is producing sales, then you counter in this way. Simply elaborate or enlarge
        upon the successful mechanism. Make it easier, quicker, surer; allow it to
        solve more of the problem; overcome old limitations; promise extra benefits.
      page: 44
      chapter: 3
    stage_4_example_source_quote:
      text: "'FIRST NO-DIET REDUCING WONDER DRUG!'"
      page: 44
      chapter: 3

    what_works:
      - "2.0 versions of existing mechanisms"
      - "Mechanisms calibrated to specific sub-audiences"
      - "Mechanisms with built-in proof (data, case studies, results)"
      - "Mechanisms that address why other mechanisms fail"
      - "Speed/efficiency enhancements on existing approaches"
      - "Combination mechanisms that integrate multiple frameworks"
    what_fails:
      - "Generic mechanisms without differentiation"
      - "Me-too frameworks that sound like competitors"
      - "Mechanisms without proof of superiority"
      - "Overcomplication without clear benefit"

    headline_approach: |
      Present your mechanism as the EVOLVED version. "The AI-Calibrated Content
      System" beats "A Content System" because the enhancement (AI-Calibrated)
      signals evolution and superiority. Add a qualifier that positions your
      mechanism as next-generation.

    examples:
      - claim: "The AI-Calibrated Organic Engine — why traditional content systems miss 70% of your audience"
        enhancement: "AI-Calibrated"
        why_it_works: "Technology qualifier positions as next-gen"
      - claim: "Awareness-Level Content Architecture: The system that writes hooks for the RIGHT audience state"
        enhancement: "Awareness-Level"
        why_it_works: "Specificity of calibration signals sophistication"
      - claim: "The Creator-Specific Growth Protocol — why generic marketing frameworks fail for content creators"
        enhancement: "Creator-Specific"
        why_it_works: "Sub-audience calibration signals precision"

    organic_content_adaptation:
      opportunity: "Differentiate your mechanism from the flood of competing frameworks"
      strategy: "Add qualifiers that signal evolution, specificity, or technological advantage"
      enhancement_strategies:
        speed: "Add speed claims — 'The 15-Minute Content System' vs 'A Content System'"
        specificity: "Narrow the audience — 'For solopreneurs under $100K' vs 'For entrepreneurs'"
        technology: "Add tech layer — 'AI-powered' or 'data-driven' vs generic"
        proof_integration: "Build proof into the name — 'The 847-Creator-Tested Framework'"
        contrarian: "Position against category — 'The Anti-Content-Calendar System'"
      content_approach: |
        At Stage 4, your content must educate on WHY your mechanism is
        different AND better. This requires comparison content, proof
        content, and deep-dive content that competitors can't easily
        replicate. The content itself becomes the mechanism demonstration.

  # --------------------------------------------------------------------------
  # STAGE 5: IDENTIFICATION / CONNECTION
  # --------------------------------------------------------------------------
  stage_5_identification:
    stage_number: 5
    name: "Identification / Connection"
    market_condition: "Claims, mechanisms, and enhanced mechanisms are all exhausted"

    definition: |
      The market is fully saturated. Every claim has been made. Every mechanism
      has been introduced. The audience is cynical, skeptical, and tired of
      being marketed to. At this stage, the only thing that works is IDENTITY
      and CONNECTION. The sale is no longer about the product — it's about
      WHO is selling it and WHETHER the audience identifies with them.
      Trust, personality, values, and belonging become the differentiators.
    definition_source_quote:
      text: >
        In this Final Stage of Sophistication, your market no longer believes in
        your advertising, and therefore no longer wishes to be aware of your
        product... The emphasis shifts from the promise and the mechanism which
        accomplishes it, to identification with the prospect himself. You are
        dealing here with the problem of bringing your prospect into your ad—not
        through desire—but through identification.
      page: 45
      chapter: 3
    cigarette_industry_source_quote:
      text: >
        A new marketing tool—Motivation Research—had shown them how to reach this
        market without mechanisms or claims, without even headlines, simply by
        projecting strong visual identifications with the virility that the public
        had accepted in a cigarette.
      page: 47
      chapter: 3
    full_cycle_examples_source_quote:
      text: >
        First Stage: 'I'D WALK A MILE FOR A CAMEL!' ... Second Stage: 'LIGHT UP
        A LUCKY, AND YOU WON'T MISS THE SWEETS THAT MAKE YOU FAT!' ... Third Stage:
        'LUCKIES—THEY'RE TOASTED!' ... Fourth Stage: 'PHILIP MORRIS—ALL THE HARSHNESS
        BAKED OUT!' ... Fifth Stage: 'BLOW SOME MY WAY.'
      page: "46-48"
      chapter: 3
      note: >
        The cigarette industry's progression through all 5 stages is Schwartz's primary
        case study demonstrating how an entire market evolves through sophistication stages.
        This same progression now applies to digital content markets.

    what_works:
      - "Personal brand and authentic personality"
      - "Values-driven messaging"
      - "Community and belonging signals"
      - "Vulnerability and transparency"
      - "Tribal identification ('people like us do things like this')"
      - "Cultural commentary and shared worldview"
      - "Anti-marketing marketing (raw, unpolished, real)"
    what_fails:
      - "Claims of any size (market is numb)"
      - "New mechanisms (they've seen too many)"
      - "Polished marketing (reads as inauthentic)"
      - "Feature-based messaging"
      - "Traditional persuasion techniques"

    headline_approach: |
      Stop selling the product. Sell the PERSON and the TRIBE. The headline
      should make the audience feel like you understand them, you ARE them,
      and being part of your world is the value. Identity-based content
      doesn't pitch — it attracts through resonance.

    examples:
      - claim: "I'm the guy who burned out at 28 and rebuilt everything from a laptop. This is what I've learned."
        mechanism: "Personal identity and shared experience"
        why_it_works: "No claim, no mechanism — pure identification"
      - claim: "This content is for the creators who are tired of being told to 'just post more.'"
        mechanism: "Tribal identification through shared frustration"
        why_it_works: "Creates in-group/out-group, audience feels seen"
      - claim: "I don't have a '5-step system.' I have a messy process and real results. Here it is."
        mechanism: "Anti-marketing authenticity"
        why_it_works: "Breaks pattern of Stage 3-4 mechanism content"

    organic_content_adaptation:
      opportunity: |
        Most social media content markets in 2026 are at Stage 4-5. This
        means PERSONAL BRAND is the ultimate differentiator. The creator
        IS the product. This is where Marcus's authentic voice, values,
        and life experience become the irreplaceable competitive advantage.
      strategy: "Lead with identity, values, and authentic personality. Let the product emerge naturally."
      content_types_that_work:
        - "Raw, unpolished 'day in the life' content"
        - "Vulnerability posts about real struggles and failures"
        - "Values-driven content ('I believe X and here's why')"
        - "Community-building content ('Who else thinks this?')"
        - "Behind-the-scenes of real process (messy, authentic)"
        - "Contrarian worldview content that filters for tribe"
        - "Direct-to-camera personal stories"
      the_key_insight: |
        At Stage 5, you're not competing on information — you're competing
        on IDENTITY. The audience chooses you because they identify with
        you, not because you have the best framework. This means content
        must reveal WHO you are, not just WHAT you know. The personality
        becomes the proprietary mechanism that can never be copied.

# ============================================================================
# SECTION 3: MASS DESIRE CHANNELING
# ============================================================================
# Schwartz's foundational principle — you cannot create desire,
# only channel existing desire toward your product/content.
# ============================================================================

mass_desire_channeling:
  core_principle:
    schwartz_quote: |
      "Copy cannot create desire for a product. It can only take the hopes,
      dreams, fears, and desires that already exist in the hearts of millions
      of people, and focus those already-existing desires onto a particular
      product. This is the copywriter's task: not to create this mass desire
      — but to direct and channel it."
    schwartz_quote_source_verification:
      text: >
        Copy cannot create desire for a product. It can only take the hopes,
        dreams, fears and desires that already exist in the hearts of millions
        of people, and focus those already-existing desires onto a particular
        product. This is the copy writer's task: not to create this mass
        desire—but to channel and direct it.
      page: 3
      chapter: 1
      note: "This is the exact quote from the opening paragraph of Chapter 1. The paraphrase above is accurate."

    implication_for_creators: |
      You are not inventing problems or creating needs. You are finding the
      desires, frustrations, aspirations, and fears that ALREADY EXIST in
      your audience and connecting them to your content/product. The creator
      who understands existing desires wins. The creator who tries to create
      new desires loses.

  creating_vs_channeling:
    creating_desire:
      definition: "Attempting to make people want something they don't currently want"
      success_rate: "Near zero — you cannot override existing desires with marketing"
      examples:
        - "Trying to convince someone who doesn't care about social media to build a brand"
        - "Marketing productivity tools to people who don't feel unproductive"
        - "Selling weight loss to someone satisfied with their body"
      why_it_fails: |
        Desire comes from identity, lived experience, and environmental pressure.
        No piece of content can implant a desire that has no foundation in the
        prospect's existing psychology. Attempts to create desire feel pushy,
        irrelevant, and manipulative.

    channeling_desire:
      definition: "Identifying existing desires and connecting them to your specific solution"
      success_rate: "Highest conversion approach in all of marketing"
      examples:
        - "Someone already wants to grow their audience — channel that desire toward your method"
        - "Someone already feels overwhelmed by content creation — channel relief-seeking toward your tool"
        - "Someone already aspires to financial freedom — channel that aspiration toward your business model"
      why_it_works: |
        The prospect is already motivated. They are already searching, even
        if unconsciously. Your content simply connects their existing desire
        to your specific solution. There is no resistance to overcome because
        you are pushing in the direction they already want to go.

  identifying_mass_desires:
    three_dimensions_source_quote:
      text: >
        Every mass desire has three vital dimensions. The first is urgency,
        intensity, degree of demand to be satisfied... The second dimension is
        staying power, degree of repetition, the inability to become satiated...
        And the third dimension is scope—the number of people who share this desire.
      page: 7
      chapter: 1
    physical_vs_functional_product_source_quote:
      text: >
        Every product has two separate and distinct identities—each capable of
        satisfying a completely different set of desires... I call these two
        identities of your product its Physical Identity and its Functional Identity.
      page: 9
      chapter: 1
      note: >
        Schwartz distinguishes between WHAT the product IS (physical) and WHAT the
        product DOES for the customer (functional). In organic content, the 'product'
        is your content/offer, and the functional identity is the transformation or
        result it delivers.
    three_dimensions:
      desire_intensity:
        definition: "How strongly the target audience feels this desire"
        high_intensity_signals:
          - "Willing to spend money on solutions"
          - "Actively searching for answers (Google, YouTube, social)"
          - "Emotional language when discussing the topic"
          - "Multiple failed attempts to solve it"
          - "Impacts daily quality of life"
        low_intensity_signals:
          - "Nice to have, not need to have"
          - "Not actively searching"
          - "Casual language when discussing"
          - "No prior purchase attempts"
        content_implication: "High-intensity desires need less education and more activation. Low-intensity desires need more crystallization and urgency."

      desire_urgency:
        definition: "How soon the target audience needs this desire fulfilled"
        high_urgency_signals:
          - "Time-sensitive problem (seasonal, deadline-driven)"
          - "Escalating consequences of inaction"
          - "External pressure to act (boss, market, competition)"
          - "Emotional crisis point"
        low_urgency_signals:
          - "No deadline or timeline pressure"
          - "'Someday' language"
          - "Currently tolerable even if not ideal"
        content_implication: "High urgency allows direct CTAs. Low urgency requires urgency creation through consequence awareness."

      desire_scope:
        definition: "How many people share this desire"
        broad_scope: "Desire shared by millions (making money, losing weight, finding love)"
        narrow_scope: "Desire shared by thousands (specific technical skill, niche problem)"
        content_implication: |
          Broad desires = larger reach but more competition.
          Narrow desires = smaller reach but easier differentiation.
          Best strategy: Broad desire channeled through narrow mechanism.
          Example: "Make money" (broad desire) + "through AI-powered organic content" (narrow mechanism).

  desire_mapping_exercise:
    step_1_identify:
      instruction: "List the top 5-10 desires your target audience already has"
      categories:
        financial: "More money, less financial stress, passive income, pricing confidence"
        status: "Recognition, authority, influence, respect from peers"
        time: "More freedom, less busywork, automation, efficiency"
        belonging: "Community, connection, not feeling alone in their struggle"
        mastery: "Skill development, confidence, competence, expertise"
        security: "Stability, predictability, reduced risk, safety net"
        identity: "Becoming who they want to be, living aligned with values"

    step_2_rank:
      instruction: "Rank desires by intensity x urgency x scope"
      scoring: "High (3) / Medium (2) / Low (1) for each dimension"
      output: "Prioritized desire map — your top 3 desires should drive 80% of content"

    step_3_channel:
      instruction: "For each top desire, define how your content/product channels it"
      template:
        desire: "[What they already want]"
        your_channel: "[How your content/product satisfies that desire]"
        awareness_level_entry: "[Where most prospects sit on the awareness spectrum]"
        hook_angle: "[How to open content that connects desire to your channel]"

# ============================================================================
# SECTION 4: HEADLINE FORMULAS PER AWARENESS LEVEL
# ============================================================================
# Comprehensive hook/headline approaches calibrated to each level.
# These map directly to S05 (Hook Library) and S08/S09 (Script/Caption Writing).
# ============================================================================

headline_formulas_by_awareness:
  overview: |
    The headline (or hook, in organic content) has one job: connect with the
    prospect at their current awareness level and pull them into the content.
    A headline calibrated to the wrong awareness level will fail regardless
    of how well it's written. These formulas are organized by awareness level
    and should be loaded into S05 (Hook Library) for every campaign.

  most_aware_formulas:
    objective: "Activate existing desire with urgency and offer"
    formulas:
      - name: "Direct Offer"
        structure: "[Product] — [Offer] — [Deadline]"
        examples:
          - "Organic Engine Masterclass — 40% off — ends Sunday"
          - "AI Content Factory — lifetime access — this week only"
      - name: "New and Improved"
        structure: "[Product] just got [Upgrade] — [Benefit]"
        examples:
          - "The Hook Library just got 200 new templates — check what's new"
          - "Content Engine 2.0 just dropped — now with awareness calibration"
      - name: "Reminder + Urgency"
        structure: "Still thinking about [Product]? [Urgency Element]"
        examples:
          - "Still thinking about the Mastermind? 3 spots left."
          - "You saved it. You bookmarked it. Now doors are closing."
      - name: "Loyalty Reward"
        structure: "[Audience Label] get [Exclusive Offer]"
        examples:
          - "My Day 1 followers get early access — link in bio"
          - "Email subscribers get $100 off — check your inbox"

  product_aware_formulas:
    objective: "Sharpen claims with proof, specificity, and mechanism"
    formulas:
      - name: "Proof Stack"
        structure: "[Number] [People] achieved [Result] using [Product]"
        examples:
          - "847 creators doubled their engagement using this system"
          - "In 90 days, this framework generated $240K in organic revenue"
      - name: "Mechanism Reveal"
        structure: "The [Mechanism] inside [Product] that [Specific Outcome]"
        examples:
          - "The Awareness Matrix inside the Engine that predicts which content will flop"
          - "The 3-layer hook system inside the library that stops the scroll in 0.8 seconds"
      - name: "Objection Crusher"
        structure: "'[Common Objection]' — here's why that's wrong about [Product]"
        examples:
          - "'I don't have time for another course' — this one takes 15 minutes a day"
          - "'Content systems don't work for my niche' — here's proof from 12 different industries"
      - name: "Comparison"
        structure: "[Product] vs [Alternative] — [Key Differentiator]"
        examples:
          - "This system vs. hiring a social media manager — the real cost comparison"
          - "My organic strategy vs. paid ads — 12-month results breakdown"
      - name: "Specific Result"
        structure: "How [Product] [Specific Measurable Result] in [Timeframe]"
        examples:
          - "How the Content Engine generated 847 leads in 60 days with zero ad spend"
          - "How one carousel template drove 12,000 saves in a week"

  solution_aware_formulas:
    objective: "Present your solution as the superior option through unique mechanism"
    formulas:
      - name: "Unique Method"
        structure: "The [Named Method] to [Result] without [Pain Point]"
        examples:
          - "The Gravity Content Method to grow organically without posting daily"
          - "The Awareness Funnel System to convert followers without being salesy"
      - name: "Category Disruption"
        structure: "Why [Common Approach] doesn't work anymore (and what does)"
        examples:
          - "Why content calendars don't grow your audience anymore (and what replaced them)"
          - "Why hashtag strategies stopped working in 2025 (and what the algorithm actually rewards)"
      - name: "Outcome + Mechanism"
        structure: "[Desired Outcome] — powered by [Your Mechanism]"
        examples:
          - "Predictable content results — powered by the 5-Level Awareness Framework"
          - "Effortless content creation — powered by the AI Content Assembly Line"
      - name: "Failure Analysis"
        structure: "I tried [Number] [Solutions]. [Number] failed. Here's the one that worked."
        examples:
          - "I tried 11 content tools. 10 were garbage. Here's the one that changed everything."
          - "I tested 6 growth strategies for 6 months each. Only one produced lasting results."
      - name: "Contrarian Method"
        structure: "Stop [Common Approach]. Start [Your Approach]. [Proof]."
        examples:
          - "Stop creating more content. Start calibrating existing content. Here's my results."
          - "Stop chasing followers. Start engineering engagement loops. The data proves it."

  problem_aware_formulas:
    objective: "Crystallize the problem and make the prospect feel deeply understood"
    formulas:
      - name: "Empathy Mirror"
        structure: "If you're [Their Pain], it's not [What They Blame]. It's [Root Cause]."
        examples:
          - "If you're posting daily with zero growth, it's not your content quality. It's your awareness calibration."
          - "If you're burning out on content, it's not because you lack discipline. It's because you lack a system."
      - name: "Hidden Cost"
        structure: "[Their Problem] is costing you [Quantified Loss] — here's the math"
        examples:
          - "Your random content strategy is costing you 40 hours a month and $0 in revenue — here's the math"
          - "Every day without a content system costs you 3-5 qualified leads. Here's why."
      - name: "Myth Destruction"
        structure: "The [Common Belief] is a lie. Here's what actually [Causes/Solves] [Problem]."
        examples:
          - "The 'just be consistent' advice is a lie. Here's what actually grows your audience."
          - "'Post at the best time' is a myth. Here's what actually determines reach."
      - name: "Root Cause"
        structure: "The real reason [Symptom They Experience] (it's not what you think)"
        examples:
          - "The real reason your reels get views but zero followers (it's not the algorithm)"
          - "The real reason your audience isn't buying (it's not your price)"
      - name: "Identity Validation"
        structure: "You're not [Negative Label]. You're [Reframe]. Here's proof."
        examples:
          - "You're not bad at marketing. You're just using a strategy designed for a different audience."
          - "You're not lazy. You're burned out from a system that doesn't work."
      - name: "Problem Quantification"
        structure: "[Number] signs your [System/Approach] is broken"
        examples:
          - "7 signs your content strategy is broken (most creators have at least 4)"
          - "5 symptoms of audience mismatch that kill engagement"

  unaware_formulas:
    objective: "Capture attention through identity, story, entertainment, or fascination"
    formulas:
      - name: "Transformation Story"
        structure: "[Before State] → [After State]. Here's what happened."
        examples:
          - "200 followers to 200K in 18 months. No ads. No luck. Here's what happened."
          - "Broke freelancer to $50K/month creator. The story nobody tells you."
      - name: "Provocative Observation"
        structure: "[Bold claim about their world that demands a reaction]"
        examples:
          - "95% of creators will quit within 12 months. The 5% who don't all do this one thing."
          - "Your favorite influencer is lying about how they grew. Here's what actually happened."
      - name: "Identity Hook"
        structure: "This is for the [Identity Description] who [Shared Experience]"
        examples:
          - "This is for the creator who's one viral post away from quitting their day job."
          - "This is for the entrepreneur who's great at their craft but invisible online."
      - name: "Pattern Interrupt"
        structure: "[Unexpected command or statement that breaks the scroll]"
        examples:
          - "Delete your content calendar. Right now. I'll explain."
          - "Stop. Before you post that reel, watch this."
      - name: "Cultural Commentary"
        structure: "[Trend/Cultural Moment] + [Unexpected Insight]"
        examples:
          - "Everyone's talking about AI killing creativity. Nobody's talking about what it's actually killing."
          - "The creator economy is collapsing. But not for the reason you think."
      - name: "Curiosity Gap"
        structure: "[Setup that creates an information gap the viewer must close]"
        examples:
          - "I asked 100 creators making $10K+/month one question. Their answers were identical."
          - "There's one metric that predicts whether your content will go viral. It's not what you think."

# ============================================================================
# SECTION 5: APPLICATION TO ORGANIC MARKETING
# ============================================================================
# How Schwartz's frameworks map to modern organic content strategy,
# platform algorithms, content funnels, and calendar planning.
# ============================================================================

organic_marketing_application:
  awareness_to_content_type_mapping:
    overview: |
      Each awareness level maps to specific content types, formats, and
      platform strategies. Your content calendar should include a deliberate
      mix of awareness levels to serve all segments of your audience
      simultaneously.

    content_format_matrix:
      unaware:
        best_formats:
          - format: "Short-form reels/TikToks"
            reason: "Maximum reach, entertainment-first, algorithm-friendly"
          - format: "Meme cards and shareworthy images"
            reason: "Low friction, high share rate, identity-driven"
          - format: "Story-driven carousels"
            reason: "Narrative format hooks through curiosity"
          - format: "Trend response content"
            reason: "Rides existing attention waves"
        worst_formats:
          - format: "Long sales pages"
            reason: "No context for why they should read"
          - format: "Product demos"
            reason: "Zero frame of reference"
        primary_metric: "Reach and new followers"
        cta_approach: "Follow for more / Save this / Share with someone who needs this"

      problem_aware:
        best_formats:
          - format: "Educational carousels"
            reason: "Structured problem-solution revelation"
          - format: "Long-form captions"
            reason: "Space for empathetic problem crystallization"
          - format: "Story sequences"
            reason: "Multi-touch problem education"
          - format: "Talking-head reels"
            reason: "Direct, authentic problem validation"
        worst_formats:
          - format: "Product pitches"
            reason: "They don't know solutions exist yet"
          - format: "Comparison content"
            reason: "Nothing to compare — not shopping yet"
        primary_metric: "Saves, comments, DMs"
        cta_approach: "Follow for the solution / Comment if this is you / DM me 'help'"

      solution_aware:
        best_formats:
          - format: "Methodology carousels"
            reason: "Showcase unique approach in structured format"
          - format: "Comparison reels"
            reason: "Help them evaluate options (with your criteria)"
          - format: "Case study threads"
            reason: "Detailed proof through specific stories"
          - format: "Live demonstrations"
            reason: "Real-time proof of mechanism"
        worst_formats:
          - format: "Generic tips content"
            reason: "They've seen it — need differentiation"
          - format: "Vague promise content"
            reason: "Need specificity, not more promises"
        primary_metric: "Link clicks, profile visits, DMs asking about your offer"
        cta_approach: "Link in bio / DM me 'system' / Watch the free training"

      product_aware:
        best_formats:
          - format: "Testimonial carousels"
            reason: "Social proof at scale builds belief"
          - format: "Objection-handling reels"
            reason: "Address specific doubts directly"
          - format: "FAQ Stories"
            reason: "Answer the questions preventing purchase"
          - format: "Behind-the-scenes of results"
            reason: "Show the mechanism delivering outcomes"
        worst_formats:
          - format: "Generic educational content"
            reason: "They're past education — need conviction"
          - format: "Broad audience content"
            reason: "Need targeted, specific messaging"
        primary_metric: "Conversion rate, sales page visits, cart additions"
        cta_approach: "Grab it now / Join before doors close / Limited spots available"

      most_aware:
        best_formats:
          - format: "Flash sale Stories"
            reason: "Direct, urgent, action-oriented"
          - format: "Countdown posts"
            reason: "Visual urgency"
          - format: "Restock/reopen announcements"
            reason: "Notify waiting buyers"
          - format: "Quick reminder reels"
            reason: "Short activation content"
        worst_formats:
          - format: "Long educational content"
            reason: "They already know — just need activation"
          - format: "Introductory content"
            reason: "Wastes their time with info they have"
        primary_metric: "Direct sales, revenue"
        cta_approach: "Buy now / Last chance / Link in bio — use code X"

  content_funnel_architecture:
    overview: |
      A well-designed organic content funnel moves people through awareness
      levels over time. Each piece of content serves a specific awareness
      level and nudges the audience toward the next level. The funnel is
      not a single post — it's a SEQUENCE of content over days or weeks.

    funnel_stages:
      stage_1_attract:
        awareness_target: "Unaware → Problem Aware"
        content_purpose: "Cast the widest net. Reach new people. Make them aware."
        content_ratio: "30-40% of total content"
        content_types:
          - "Viral-optimized reels and TikToks"
          - "Shareworthy identity content"
          - "Trend response content"
          - "Bold, provocative observations"
        success_metric: "New followers, reach, impressions"
        transition_trigger: "Audience engages with problem-aware content organically"

      stage_2_educate:
        awareness_target: "Problem Aware → Solution Aware"
        content_purpose: "Crystallize the problem. Reveal root causes. Tease solutions."
        content_ratio: "25-30% of total content"
        content_types:
          - "Problem crystallization carousels"
          - "Root cause education threads"
          - "Empathetic story content"
          - "Myth-busting content"
        success_metric: "Saves, comments, DMs, follower quality"
        transition_trigger: "Audience asks 'how do I fix this?' or searches for solutions"

      stage_3_differentiate:
        awareness_target: "Solution Aware → Product Aware"
        content_purpose: "Introduce your unique mechanism. Differentiate from alternatives."
        content_ratio: "15-20% of total content"
        content_types:
          - "Methodology reveals"
          - "Comparison content"
          - "Case studies and proof"
          - "Framework introductions"
        success_metric: "Profile visits, link clicks, DMs about your offer"
        transition_trigger: "Audience follows you specifically for your method"

      stage_4_convert:
        awareness_target: "Product Aware → Most Aware → Customer"
        content_purpose: "Build conviction. Handle objections. Make offers."
        content_ratio: "10-15% of total content"
        content_types:
          - "Testimonial compilations"
          - "Objection-handling content"
          - "Offer announcements"
          - "Urgency/scarcity content"
        success_metric: "Conversion rate, revenue, customer acquisition"
        transition_trigger: "Purchase, signup, or enrollment"

    content_calendar_implications:
      weekly_mix:
        monday: "Problem-aware content (crystallize the pain)"
        tuesday: "Unaware content (reach and attraction)"
        wednesday: "Solution-aware content (methodology reveal)"
        thursday: "Problem-aware content (root cause education)"
        friday: "Unaware content (entertainment/identity)"
        saturday: "Product-aware content (proof and conviction)"
        sunday: "Solution-aware or product-aware (soft CTA)"
      monthly_rhythm: |
        Week 1: Heavy unaware + problem-aware (cast the net)
        Week 2: Mix of all levels (nurture existing, attract new)
        Week 3: Heavy solution-aware + product-aware (differentiate and build conviction)
        Week 4: Product-aware + most-aware (convert, launch, offer)
      campaign_launch_sequence:
        day_minus_14: "Unaware content — broaden reach"
        day_minus_10: "Problem-aware content — crystallize pain"
        day_minus_7: "Solution-aware content — reveal method"
        day_minus_3: "Product-aware content — proof and mechanism"
        day_minus_1: "Most-aware content — offer teaser"
        launch_day: "Most-aware content — full offer with urgency"
        day_plus_1_to_3: "Product-aware content — objection handling + testimonials"
        day_plus_5: "Most-aware content — final urgency / closing"

  platform_algorithm_interaction:
    overview: |
      Platform algorithms reward different content behaviors. Understanding
      how awareness-level content interacts with algorithms helps optimize
      both reach and conversion simultaneously.

    instagram:
      algorithm_reward: "Saves, shares, and watch time"
      best_awareness_for_reach: "Unaware and Problem Aware (broadest appeal)"
      best_awareness_for_conversion: "Product Aware and Most Aware (targeted to followers)"
      strategy: |
        Use Reels (unaware/problem-aware) for algorithm-powered reach.
        Use Carousels (problem-aware/solution-aware) for saves and depth.
        Use Stories (product-aware/most-aware) for conversion with existing audience.

    tiktok:
      algorithm_reward: "Watch time, replays, shares"
      best_awareness_for_reach: "Unaware (pure entertainment and pattern interrupt)"
      best_awareness_for_conversion: "Problem Aware to Solution Aware (educational content)"
      strategy: |
        TikTok's algorithm favors unaware content because it maximizes
        watch time and shares. Use TikTok as a top-of-funnel awareness
        machine, then redirect to other platforms for conversion content.

    linkedin:
      algorithm_reward: "Comments, dwell time, meaningful engagement"
      best_awareness_for_reach: "Problem Aware and Solution Aware"
      best_awareness_for_conversion: "Solution Aware and Product Aware"
      strategy: |
        LinkedIn audiences are typically more solution-aware. Lead with
        methodology and thought leadership. Problem crystallization
        content performs well because the audience is professional and
        actively seeking improvement.

    youtube:
      algorithm_reward: "Click-through rate, average view duration, session time"
      best_awareness_for_reach: "Problem Aware (search-driven discovery)"
      best_awareness_for_conversion: "Solution Aware to Product Aware (depth builds trust)"
      strategy: |
        YouTube is the best platform for moving people through multiple
        awareness levels in a single piece of content. A 10-minute video
        can take someone from problem-aware to product-aware. Use
        problem-aware titles for CTR, then educate through the levels.

    x_twitter:
      algorithm_reward: "Replies, quote tweets, bookmarks"
      best_awareness_for_reach: "Unaware (provocative observations, bold takes)"
      best_awareness_for_conversion: "Solution Aware (threads with methodology)"
      strategy: |
        X rewards boldness and conversation starters. Use unaware-level
        provocative content for reach, then thread-based methodology
        reveals for the solution-aware segment. Conversion happens in DMs.

# ============================================================================
# SECTION 6: SKILL INTEGRATION MAP
# ============================================================================
# How the Schwartz framework integrates with each engine skill.
# ============================================================================

skill_integration:
  S01_audience_intelligence:
    integration_point: "Awareness Level Distribution Mapping"
    how_it_applies: |
      When building the Audience Intelligence File (AIF), map what percentage
      of the target audience sits at each awareness level. This determines
      the content mix. A brand-new creator's audience is mostly unaware.
      An established creator's audience skews solution-aware to product-aware.
    specific_outputs:
      - "Awareness level distribution estimate for target audience"
      - "Language and emotional state for each level (from their words, not yours)"
      - "Desire intensity, urgency, and scope rankings"
      - "Market sophistication stage assessment"

  S03_brand_voice:
    integration_point: "Voice Calibration Per Awareness Level"
    how_it_applies: |
      The brand voice must flex based on awareness level. At unaware, the
      voice is more entertaining and provocative. At problem-aware, more
      empathetic and validating. At product-aware, more authoritative and
      proof-driven. The Brand Voice File (BVF) should include voice
      variations for each awareness level.
    specific_outputs:
      - "Voice tone guidelines per awareness level"
      - "Vocabulary and language register for each level"
      - "Emotional register map (entertainment → empathy → authority → urgency)"

  S04_content_architecture:
    integration_point: "Content Pillar to Awareness Level Mapping"
    how_it_applies: |
      Each content pillar in the Content Architecture File (CAF) should be
      tagged with its primary awareness level. This ensures the content
      calendar has deliberate awareness-level diversity and that no single
      level dominates at the expense of funnel health.
    specific_outputs:
      - "Awareness level tag for each content pillar"
      - "Content series mapped to funnel stages"
      - "Awareness-level mix ratios per platform"

  S05_hook_library:
    integration_point: "Hook Formula Selection by Awareness Level"
    how_it_applies: |
      The Hook Library File (HLF) must categorize every hook by its target
      awareness level. When generating hooks for a specific piece of content,
      the awareness level determines which formula set to pull from. A hook
      aimed at the wrong awareness level will fail regardless of quality.
    specific_outputs:
      - "Hook formulas categorized by awareness level"
      - "Hook selection decision tree based on content purpose"
      - "Platform-specific hook variations per awareness level"
      - "Hook testing protocol with awareness-level hypothesis"

  S06_virality_scoring:
    integration_point: "Awareness-Audience Fit Score"
    how_it_applies: |
      The Virality Scoring Framework (VSF) should include an awareness-audience
      fit dimension. A piece of content's virality potential drops drastically
      if the awareness level doesn't match the target audience. This score
      should weight heavily in the overall virality prediction.
    scoring_dimension:
      name: "Awareness Calibration Score"
      weight: "20-25% of total virality score"
      criteria:
        - "Hook matches target awareness level"
        - "Content depth appropriate for awareness level"
        - "CTA appropriate for awareness level"
        - "Language/emotional register matches audience state"
        - "Market sophistication stage accounted for"
      scoring:
        perfect_calibration: "10/10 — content hits exact awareness level of target audience"
        good_calibration: "7-8/10 — content is close but may miss some nuance"
        poor_calibration: "3-5/10 — content is aimed at wrong awareness level"
        fatal_miscalibration: "1-2/10 — content is completely disconnected from audience state"

  S07_campaign_brief:
    integration_point: "Awareness Journey Mapping"
    how_it_applies: |
      Every campaign brief should include an awareness journey — the path
      from current awareness level to desired awareness level. A launch
      campaign might move the audience from solution-aware to product-aware
      to most-aware over 2 weeks. A brand awareness campaign might focus
      entirely on moving people from unaware to problem-aware.
    specific_outputs:
      - "Starting awareness level of target audience"
      - "Target awareness level by campaign end"
      - "Content sequence mapped to awareness level transitions"
      - "Market sophistication assessment for the campaign category"

  S08_script_writing:
    integration_point: "Script Structure by Awareness Level"
    how_it_applies: |
      The opening, body, and close of any script must be calibrated to the
      target awareness level. An unaware script opens with identity/story.
      A problem-aware script opens with empathetic problem crystallization.
      A product-aware script opens with sharpened proof. The entire structure
      shifts based on awareness.
    script_structures:
      unaware_script:
        open: "Identity hook or story setup (0-3 seconds)"
        body: "Narrative that reveals hidden problem (3-30 seconds)"
        close: "Worldview shift + follow CTA (final 5 seconds)"
      problem_aware_script:
        open: "Problem crystallization hook (0-3 seconds)"
        body: "Root cause education + empathetic validation (3-45 seconds)"
        close: "Hope + follow/save CTA (final 5 seconds)"
      solution_aware_script:
        open: "Mechanism or method hook (0-3 seconds)"
        body: "Methodology reveal + differentiation + mini-proof (3-60 seconds)"
        close: "Link to learn more + CTA (final 5 seconds)"
      product_aware_script:
        open: "Sharpened claim or proof hook (0-3 seconds)"
        body: "Evidence stack + objection handling + mechanism depth (3-90 seconds)"
        close: "Specific offer + direct CTA (final 10 seconds)"
      most_aware_script:
        open: "Product name + offer (0-3 seconds)"
        body: "Quick reminder of value + urgency element (3-15 seconds)"
        close: "Direct purchase CTA + deadline (final 5 seconds)"

  S09_caption_writing:
    integration_point: "Caption Structure and Length by Awareness Level"
    how_it_applies: |
      Caption length, structure, and CTA type must match the awareness level.
      Most-aware captions are short and direct. Problem-aware captions are
      long and empathetic. The first line of the caption serves as a
      secondary hook and must be calibrated identically to the primary
      hook formula.
    caption_guidelines:
      unaware: "Short to medium. Punchy. Shareable. No product mention. Identity-driven."
      problem_aware: "Long-form. Empathetic. Validating. Problem crystallization. Follow CTA."
      solution_aware: "Medium. Methodology-focused. Differentiation. Learn-more CTA."
      product_aware: "Medium to long. Proof-heavy. Objection-handling. Direct CTA."
      most_aware: "Short. Offer + urgency + link. No explanation needed."

# ============================================================================
# SECTION 7: DIAGNOSTIC FRAMEWORK
# ============================================================================
# How to diagnose content failures using awareness level miscalibration.
# ============================================================================

diagnostic_framework:
  overview: |
    When content underperforms, the FIRST diagnostic question should always be:
    "Was this content calibrated to the right awareness level?" Before blaming
    the algorithm, the timing, the format, or the creative quality — check
    awareness calibration. It is the most common and most invisible failure mode.

  symptom_to_diagnosis:
    - symptom: "High reach but low engagement"
      likely_diagnosis: "Content is unaware-level but audience is already problem/solution-aware"
      fix: "Create awareness-appropriate content for existing audience while using unaware content only for reach"

    - symptom: "High engagement but no conversions"
      likely_diagnosis: "Content stays at problem-aware level and never moves to solution/product-aware"
      fix: "Add solution-aware and product-aware content to the mix to complete the funnel"

    - symptom: "Low reach on educational content"
      likely_diagnosis: "Educational content targets solution-aware but platform serves mostly unaware audiences"
      fix: "Wrap educational content in unaware-level hooks (entertainment/story/provocation)"

    - symptom: "Sales posts get ignored"
      likely_diagnosis: "Jumping to most-aware CTA with audience that's still solution or problem-aware"
      fix: "Warm up with awareness-appropriate content sequence before the offer"

    - symptom: "Comments say 'I already know this'"
      likely_diagnosis: "Content aimed at problem-aware when audience is solution or product-aware"
      fix: "Level up to mechanism reveals and proof content"

    - symptom: "Content feels 'too salesy'"
      likely_diagnosis: "Product-aware content being served to problem-aware or unaware audience"
      fix: "Reduce product mentions. Lead with problem crystallization or identity content."

    - symptom: "Audience growing but wrong people"
      likely_diagnosis: "Unaware content is too broad — attracting people outside your desire mapping"
      fix: "Add identity qualifiers to unaware content that filter for your target audience"

    - symptom: "Lots of saves but few followers"
      likely_diagnosis: "Content is valuable but lacks personality/identity (stuck at Stage 3 sophistication)"
      fix: "Add personal voice, story, and identity to mechanism content"

  awareness_audit_checklist:
    step_1: "Categorize your last 20 pieces of content by awareness level"
    step_2: "Calculate the percentage distribution across all 5 levels"
    step_3: "Compare to recommended funnel ratios (30-40% unaware, 25-30% problem, 15-20% solution, 10-15% product/most)"
    step_4: "Identify gaps — which awareness levels are underserved?"
    step_5: "Cross-reference underperforming content with awareness calibration"
    step_6: "Assess market sophistication stage and verify content meets the current stage requirements"
    step_7: "Adjust content calendar to fill awareness level gaps"

# ============================================================================
# SECTION 8: AWARENESS x SOPHISTICATION MATRIX
# ============================================================================
# The intersection of awareness levels and sophistication stages
# creates a calibration grid for precision content targeting.
# ============================================================================

awareness_sophistication_matrix:
  overview: |
    Awareness level and market sophistication are INDEPENDENT axes. A prospect
    can be problem-aware in a Stage 5 sophistication market (they feel the pain
    but have been bombarded with solutions and trust none of them). Or they can
    be product-aware in a Stage 1 market (they know your product in a market
    where you're the only option). The intersection determines exactly how to
    approach them.

  high_impact_combinations:
    - combination: "Problem Aware + Stage 5 Sophistication"
      description: "They feel the pain AND they're cynical about all solutions"
      approach: "Pure empathy and identity. No claims. No mechanisms. Just 'I see you and I've been there.' Build trust through radical authenticity before introducing anything."
      content_example: "I spent 3 years burning out on content. Every guru had a system. None worked for someone like me. So I stopped listening and started observing. Here's what I noticed."

    - combination: "Solution Aware + Stage 3 Sophistication"
      description: "They know solutions exist and the market is introducing mechanisms"
      approach: "Lead with your unique named mechanism. Make it sound proprietary. Show how it's fundamentally different from the 2-3 mechanisms they've already seen."
      content_example: "Forget content calendars, posting schedules, and hashtag hacks. The Awareness Calibration Protocol works on a completely different axis — the psychology of your audience, not the behavior of the algorithm."

    - combination: "Unaware + Stage 1 Sophistication"
      description: "They don't know they have a problem AND nobody else is addressing it"
      approach: "Maximum opportunity. Simple, bold claim wrapped in identity content. You're creating the category."
      content_example: "Most creators are guessing what to post. There's actually a science to it. And nobody's teaching it."

    - combination: "Product Aware + Stage 4 Sophistication"
      description: "They know your product AND they've seen enhanced mechanisms from competitors"
      approach: "Deep proof. Specific results. Mechanism depth that competitors can't match. The content itself demonstrates your superior methodology."
      content_example: "Here's the exact Awareness Calibration Protocol we ran for 3 clients last month. Client A: 340% engagement increase. Client B: $47K in organic revenue. Client C: 12,000 new followers. Here's the step-by-step breakdown."

    - combination: "Most Aware + Stage 5 Sophistication"
      description: "They know and want your product AND the market is saturated with identity-based marketing"
      approach: "Radical simplicity. No marketing. Just the offer, clean and direct. The relationship is the mechanism — honor it with zero manipulation."
      content_example: "Doors open tomorrow. You know the program. You know the results. 10 spots. First come, first served. [Link]"

# ============================================================================
# SECTION 9: IMPLEMENTATION QUICK REFERENCE
# ============================================================================
# Rapid-reference decision trees for content creation workflow.
# ============================================================================

quick_reference:
  before_creating_any_content:
    question_1: "What awareness level is my target audience for THIS piece of content?"
    question_2: "What market sophistication stage is my niche currently at?"
    question_3: "What mass desire am I channeling (not creating)?"
    question_4: "Does my hook match the awareness level? (If no, rewrite before proceeding)"
    question_5: "Does my CTA match the awareness level? (If too aggressive for the level, soften it)"

  awareness_level_decision_tree:
    step_1: "Does the audience know my product? → YES: Level 5 or 4 → NO: Continue"
    step_2: "Does the audience know solutions exist? → YES: Level 3 → NO: Continue"
    step_3: "Does the audience feel the problem? → YES: Level 2 → NO: Level 1"

  sophistication_decision_tree:
    step_1: "Has anyone made this claim before? → NO: Stage 1 → YES: Continue"
    step_2: "Have competitors expanded the claim with numbers/proof? → NO: Stage 2 → YES: Continue"
    step_3: "Have competitors introduced named mechanisms? → NO: Stage 3 → YES: Continue"
    step_4: "Have competitors enhanced their mechanisms? → NO: Stage 4 → YES: Stage 5"

  content_creation_checklist:
    - "Identified target awareness level"
    - "Assessed market sophistication stage"
    - "Selected hook formula from correct awareness-level formula set"
    - "Matched content length to awareness level"
    - "Calibrated CTA to awareness level"
    - "Verified emotional register matches audience state"
    - "Checked that content advances audience to next awareness level"
    - "Confirmed no awareness-level mismatch in the content (e.g., unaware hook with product-aware body)"

  the_golden_rule: |
    Enter the conversation already happening in the prospect's mind.
    Match their awareness level. Channel their existing desire.
    Move them ONE level forward per piece of content.
    Never skip levels. Never miscalibrate.
    The awareness framework is not theory — it is the operating system
    for every piece of content the engine produces.
