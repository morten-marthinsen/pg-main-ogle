# ============================================================================
# BRENDAN KANE - THE GUIDE TO GOING VIRAL
# Complete Viral Content Model (VCM) Framework
# Source: "The Guide to Going Viral: The Art and Science of Succeeding" (2024)
# ============================================================================

metadata:
  title: "The Guide to Going Viral - Complete Framework Extraction"
  author: "Brendan Kane"
  book: "The Guide to Going Viral: The Art and Science of Succeeding"
  publisher: "Hook Point LLC"
  year: 2024
  isbn: "9788990871404"
  credentials:
    - "Founder and CEO of Hook Point"
    - "Generated tens of billions of views"
    - "100+ million followers for clients"
    - "Oversaw $200M+ marketing spend"
    - "Pioneered first influencer campaign on YouTube (2007)"
    - "Author: One Million Followers, Hook Point"
  core_thesis: "Creating viral content is not luck - it's a science based on research, formats, and communication psychology"

# ============================================================================
# SECTION 1: VIRAL CONTENT MODEL (VCM)
# ============================================================================

viral_content_model:
  overview:
    definition: "A creative process designed to perfect storytelling on social media and achieve genuine success"
    core_principle: "Going viral is not a mere stroke of luck; it's a science"
    generated_results:
      - "Tens of billions of views"
      - "100+ million followers"
      - "$1 billion in revenue for clients"

  three_core_pillars:
    1_grabbing_attention:
      description: "Rising above the noise is crucial"
      why_it_matters: "If you can't stop someone from scrolling past your content, they'll never see your message"
      tactics:
        - "Strong opening hooks"
        - "Compelling thumbnails"
        - "Unexpected visual elements"
        - "Pattern interrupts"

    2_holding_attention:
      description: "Providing maximum value to your audience"
      why_it_matters: "Substance is vital - you want people to engage with and crave more of your content"
      key_insight: "This isn't about clickbait or trickery"
      tactics:
        - "Structured storytelling"
        - "Building tension and curiosity"
        - "Narrative gaps that keep viewers engaged"
        - "Dynamic pacing"

    3_monetizing_attention:
      description: "Aligning content strategy with business goals"
      why_it_matters: "Investment of time, money, and resources must pay off"
      benefits:
        - "Fuels business growth"
        - "Ensures ROI on content creation"
        - "Helps avoid creator fatigue and burnout"

  seven_myths_debunked:
    myth_1:
      belief: "Extensive experience is necessary for social media success"
      reality: "Effective strategies and adaptability are more crucial than extensive experience"
      proof_points:
        - "Tanner Leatherstein: 1.7M followers - started with minimal social media experience"
        - "Dr. Erin Nance: 700K followers on TikTok - hand surgeon with no prior experience"
        - "MrBeast began alone in a bedroom at age 13"

    myth_2:
      belief: "Success requires high costs and large teams"
      reality: "Viral success lies in storytelling and audience connection, not production scale"
      proof_points:
        - "Hunter Prosper: 8.3M followers - approaches strangers with just an iPhone"
        - "Robert Croak: 1.1M followers - films walking listicles with basic setup"
        - "The School of Hard Knocks: 1.9M followers - street interviews with basic microphone"

    myth_3:
      belief: "You must be on every social media platform"
      reality: "Success comes from mastering one platform before expanding"
      proof_points:
        - "MrBeast: 260M YouTube subscribers - initially focused solely on YouTube"
        - "Joe Rogan: $250M Spotify deal - initially focused only on YouTube"

    myth_4:
      belief: "Frequent posting guarantees virality"
      reality: "Virality depends on quality and attention retention, not posting frequency"
      proof_points:
        - "Mark Rober: Posts once or twice a month"
        - "MrBeast early days: One video a month"
        - "Veritasium: Two to three videos per month"

    myth_5:
      belief: "My business isn't sexy enough to go viral"
      reality: "Any topic can go viral with the right storytelling approach"
      proof_points:
        - "Clear Value Tax: 2M subscribers - tax advice on YouTube"
        - "Graham Stephan: 4.7M subscribers - finance tips for millennials"
        - "Erika Kullberg: 14M followers - legal concepts on TikTok/Instagram"
        - "Ben Newell: 1.5M followers - building terrariums"

    myth_6:
      belief: "Hashtags guarantee visibility"
      reality: "Hashtags have lost power due to algorithm evolution prioritizing retention"
      key_insight: "Platforms now prioritize retention and engagement over hashtag use"

    myth_7:
      belief: "Virality is pure luck"
      reality: "Virality is the result of meticulous research, planning, and strategic execution"
      key_insight: "Success like MrBeast's is far from random - it's deliberate process"

# ============================================================================
# SECTION 2: PERFORMANCE DRIVERS
# ============================================================================

performance_drivers:
  overview:
    definition: "The qualitative factors that drive content success beyond mere views and likes"
    methodology: "GSB (Gold, Silver, Bronze) analysis to identify what works"

  effect_on_viewer_eov:
    definition: "The impact tactics have on the viewer - intangible yet powerful experiences"
    key_principle: "Focusing on EOV is more crucial than simply replicating tactics"
    examples:
      - "Gaining clarity"
      - "Sparking curiosity"
      - "Feeling satisfied"
      - "Building anticipation"
      - "Experiencing surprise"
      - "Perspective shift"
      - "Gut punch emotional response"

    critical_insight: |
      Viewers don't engage with content simply because the music was nice
      or the lighting was dramatic. Their engagement depends on the EOV -
      how the content moves them emotionally.

  universal_performance_drivers:
    cleverness:
      formula: "Clever = Smart + Unexpected"
      applications:
        clever_process: "Use dynamic visual metaphors to breathe new life into well-worn topics"
        clever_ideas: "Steer clear of rehashing known content - brainstorm fresh perspectives"
        parodies: "Select familiar material, exaggerate features, balance humor with commentary"
      examples:
        - "Dr. Julie's Trauma Basket: 7.6M views - crumpled paper represents trauma"
        - "Hot Ones interviews: Answering questions while eating super-hot wings"
        - "Grace Wells' Crummy Commercial: 22.4M views - conventional videography on mundane objects"
        - "Dissolve's Generic Brand Video: 2.9M views - parody of standard business video format"

    absurdity:
      characteristics:
        - "Nonsensical"
        - "Peculiarly specific"
        - "Bizarre"
        - "Inappropriate"
        - "Unreasonable"
        - "Combining elements not normally seen together"
      applications:
        novel_scenarios: "Introduce unusually specific tasks or challenges"
        genuine_reactions: "Elicit authentic reactions through unexpected situations"
        escapism: "Offer unusual experiences away from routine"
      examples:
        - "Areyoukiddingtv: 51.7M views - asking students to deliver mac-n-cheese, toss books, pour juice on themselves"
        - "ThatWasEpic: 53M views - cutting headphone cords then giving AirPods"

    contrast:
      description: "Highlights stark differences between elements or characters"
      applications:
        - "Delivery style differences"
        - "Visual element contrasts"
        - "Script-based contrasts"
        - "Character juxtaposition"
      effect: "Creates tension and humor that engages audiences"

    tension:
      description: "Building anticipation or suspense to keep viewers engaged"
      why_it_works: "Creates a looming problem needing resolution"
      algorithm_benefit: "Signals to platform algorithms that content retains viewer interest"

    perspective_shift:
      description: "Presenting familiar ideas then reframing in unexpected ways"
      effect: "Creates aha moments that viewers remember and share"

    immediately_applicable:
      description: "Advice that can be put into practice right away"
      key_insight: "Universally applicable advice engages audiences more effectively"

  vocal_and_delivery_elements:
    cadence_types:
      playful:
        characteristics: "Energetic, upbeat, rapid pace with varied pitch"
        effect: "Enhances fun and entertainment value"
      dramatic:
        characteristics: "Steady, measured pace with strategic pauses"
        effect: "Adds depth and seriousness"
      conversational:
        characteristics: "Casual, authentic, natural with relaxed pauses"
        effect: "Fosters authenticity and relatability"

    energy_dynamics:
      principle: "Dynamic changes in energy maintain audience interest"
      master_example: "Mark Rober - shifts energy, visuals, and narrative focus"
      tactics:
        - "Introduce playful, light tone"
        - "Transition to intense, suspenseful energy"
        - "Shift from small idea to big idea"
        - "Use rhetorical questions to stimulate curiosity"

    satisfying_content:
      description: "Content that evokes sensory experiences through audio, visual, or temporal elements"
      psychology: "Thrives on patterns generating completion - like hearing 'do' after 'do re mi fa so la ti'"
      examples:
        - "NileRed Shorts' Superconductor: 40M views"
        - "Brainian75's Monster Magnet: 13M views"

# ============================================================================
# SECTION 3: FORMAT SELECTION
# ============================================================================

format_selection:
  overview:
    definition: "Video storytelling structures that serve as frameworks for inserting brands, identities, stories, or ideas"
    key_distinction: "Formats are enduring structures vs. Trends which are fleeting"
    analogy: "Just as most movies follow the three-act structure, social media thrives with platform-specific formats"

  why_formats_matter:
    - "Provide consistent narrative framework"
    - "Guide content presentation to resonate with masses"
    - "Offer versatile canvas for creator messages"
    - "Enable systematic viral success"

  three_act_structure_parallel:
    act_1_introduction:
      - "Presents central characters and environment"
      - "Sets the scene and identifies stakes"
      - "Concludes with pivotal event driving protagonist into conflict"
    act_2_challenge:
      - "Central to narrative"
      - "Delves into complications and character development"
      - "Protagonist faces multiple obstacles"
    act_3_climax:
      - "Resolves central conflict"
      - "Provides resolution for characters"

  viral_formats_detailed:
    visual_metaphor_format:
      description: "Makes abstract or complex topics digestible using physical objects"
      components:
        - "An abstract or complex topic (core subject)"
        - "A visual representation (physical objects)"
        - "A verbal explanation (articulation for clarity)"
      master_creator: "Dr. Julie Smith - 4.7M TikTok, 1.9M Instagram"
      performance_drivers:
        active_metaphor:
          description: "Use object as active participant in narrative"
          gold_example: "Crumpled Paper Trauma: 12M views - physically manipulates props"
          bronze_example: "Cars in Traffic: 128K views - props are static, viewers asked to imagine"
        tension:
          description: "Building anticipation with visual elements"
          gold_example: "Burnout: 3.6M views - lit match inches closer to fingers as video progresses"
          bronze_example: "Confidence Check-In: 61K views - no visual tension or urgency"
        potential_energy:
          description: "Hint that energy is about to be unleashed"
          gold_example: "Kintsugi: 854K views - holds plate and hatchet in first frame"
          bronze_example: "Improvements and Setbacks: 108K views - unclear what object is initially"
        cleverness:
          description: "Unexpectedly smart visual representation"
          gold_example: "Grief Circle Painting: 4.5M views - black spot revealed as small in context"
          bronze_example: "Anxiety Rainbow: 73K views - predictable layer removal metaphor"
        immediately_applicable:
          description: "Universally applicable advice"
          gold_example: "Toxic Environment: 12M views - reflect on surroundings immediately"
          bronze_example: "Four Top Psychology Tips: 13K views - requires uncommon scenarios"

    two_characters_one_lightbulb_format:
      description: "Creator plays two roles (expert and novice) to debunk misconceptions"
      structure:
        - "Novice has common misconception"
        - "Expert provides enlightenment"
        - "Lightbulb moment leads to actionable advice"
      master_creators:
        - "Emily Hackett Fitness"
        - "Mark Tilbury"
        - "Erika Kullberg"
      performance_drivers:
        contrast:
          description: "Stark differences between characters through delivery, visuals, or script"
          gold_example: "Making $80k at Home: 3.6M views - arrogant novice vs composed expert"
          bronze_example: "Insurance for Your Stocks: 130K views - no aha moment, no opposition"
        breaking_misconceptions:
          description: "Challenge common beliefs with alternative perspectives"
          gold_example: "Making $80k at Home: $80K on 15 min/week vs 40 hr/week"
        digestible_actionable_info:
          description: "Practical advice on complex tasks made straightforward"
          gold_example: "Mortgages Explained: 1.9M views - achievable explanation for first-time buyers"
          bronze_example: "Roth IRA: 20K views - opens with inaccessible jargon"
        effective_pacing:
          description: "Rhythm highlighting key info while moving swiftly through repetition"
          gold_example: "Bored of Your Diet: 1.2M views - fast pace, stays on subject"
          bronze_example: "Health Insurance Pt 1: 28K views - drawn-out story before key element"
        leave_viewers_wanting_more:
          description: "Clear pathway for viewers to learn more"
          gold_example: "Creatine Explained: 5.9M views - viewers feel informed, compelled for more"

    untold_stories_format:
      description: "Behind-the-scenes narratives of unexplored stories"
      master_creator: "Daniel Wall - consistently surpasses 1M views"
      performance_drivers:
        strong_hooks_with_story_promise:
          description: "One-liner hooks making viewers pause"
          gold_example: "It's Corn: 6M views - hints at deeper story about song creators"
          bronze_example: "It's Corn Part 2: 256K views - assumed prior knowledge"
        introducing_the_deep_cut:
          description: "Lesser-known stories that trigger 'Oh, wait, what?!' reactions"
          gold_example: "Pogo Forget Slowed Down: 21M views - gradually unveils unexpected insights"
        obstacles_with_high_stakes:
          description: "Narratives centered on overcoming obstacles"
        impactful_conclusions:
          description: "Resolving tension with satisfying character resolutions"

    testing_viral_hacks_format:
      description: "Testing popular hacks or trends to see if they work"
      master_creator: "John Malecki"
      results: "Average views increased from 100K to 1M+"

    man_on_the_street_format:
      description: "Engaging strangers in public for content"
      master_creator: "Alex Stemp - 20M followers"
      approach: "Offering professional photo shoots to random strangers"

    levels_concept_format:
      description: "Activities or explanations shown in increasing complexity"
      applications:
        - "Music (5 versions from terrible to amazing)"
        - "Food"
        - "Neuroscience"
        - "Skateboarding"
      examples:
        - "Charles Cornell's 5 Happy Birthday Versions: 9.6M views"
        - "Tony Hawk's 21 Levels of Skateboarding"
      effect_on_viewer: "Takes viewers through journey of progression - difficult to stop watching"

    watch_me_work_format:
      description: "Experts sharing how-to tutorials or skills"
      master_creator: "Mark Rober"
      key_tactic: "Strategic teasers that create cliffhangers building tension"
      example: "World's Largest Jello Pool: 138M views - teaser stops just before plunge"

  format_selection_criteria:
    - "Consistent high views (hundreds of thousands to millions)"
    - "Success not based on celebrity status"
    - "Organic performance (not ad-driven)"
    - "Multiple creators succeeding with same format"
    - "At least 5-10 successful examples from each creator"

  format_research_process:
    step_1_keyword_search:
      - "Enter keywords into TikTok/YouTube search"
      - "Use ChatGPT and Google for related keywords"
      - "Mix topical keywords with format-specific ones"
    step_2_identify_viral_videos:
      - "Focus on high view counts"
      - "Visit creator's page for more examples"
      - "Look for patterns of success"
    step_3_format_keywords:
      examples:
        - "Challenge"
        - "Hacks"
        - "Reaction"
        - "Review"
        - "Tutorial"
        - "Behind the scenes"

# ============================================================================
# SECTION 4: CONTENT TESTING METHODOLOGY
# ============================================================================

content_testing_methodology:
  gsb_system:
    overview:
      name: "Gold, Silver, Bronze (GSB) Analysis"
      purpose: "Compare high, average, and low performing content to identify what drives success"
      key_insight: "Simply watching viral videos isn't sufficient - must contrast with low performers"

    tier_definitions:
      gold:
        description: "Pinnacle of performance, breakthrough viral content"
        purpose: "Identify and analyze performance drivers"
        approach: "Contrast against low performers to spot differences"
      silver:
        description: "Baseline views consistently achieved by creator"
        statistical_note: "Based on mode value (most common), not mean average"
        reason: "Extremely viral or poor videos could skew the mean"
      bronze:
        description: "Content below median view count"
        purpose: "Understand what NOT to do"

    analysis_process:
      step_1: "Identify Gold high-performing videos first"
      step_2: "Investigate Bronze low-performing videos"
      step_3: "Proceed to Silver baseline videos"
      step_4: "Compare Gold vs Bronze for clear contrasts"
      step_5: "Validate patterns across multiple videos"
      step_6: "Document findings in Key Findings section"

    gsb_sheet_components:
      tier: "GSB category based on performance"
      video_link_title_summary: "URL, title, and brief content summary"
      page: "Creator's page name"
      video_views: "Number of views"
      followers_subs: "Account's follower/subscriber count"
      notes: "Specific observations about structure, style, tactics"
      key_findings: "Core performance drivers based on analysis"

    criteria_for_selection:
      consistent_high_views: "Content should consistently receive hundreds of thousands to millions"
      success_not_status_based: "Avoid celebrity/brand identity-based success"
      organic_performance: "Focus on organic reach, not ad-driven (likes-to-view ratio above 1%)"

    pattern_identification:
      elements_to_analyze:
        - "Topic of the video"
        - "First three seconds"
        - "Video headlines/titles"
        - "Thumbnail designs"
        - "Common visual elements"
        - "Storytelling techniques"
        - "Pacing and rhythm"
        - "Tonality and mood"
        - "Environment/setting"
        - "Opening sequence"
        - "Lighting"
        - "Cadence"
        - "Camera techniques"

    hypothesis_testing:
      principle: "If pattern appears in both Gold and Bronze, it may not be key driver"
      gold_exclusive_patterns: "Likely contribute to high performance"
      bronze_exclusive_patterns: "May detract from performance"
      validation: "Test hypotheses against additional low-performing videos"

  ideation_process:
    ideation_sheet:
      purpose: "Dedicated space for capturing and evaluating ideas"
      components:
        ideas_section: "Overall concept (1-2 sentences) - aim for 20-100 ideas"
        reference_links: "High-performing video references"
        notes_section: "Pertinent details, timestamps, elements to replicate"
        ranking: "Rate each idea 1-5 (1 = top-notch, 5 = least appealing)"

    idea_generation_principles:
      embrace_chaos: "Welcome unconventional ideas from diverse industries"
      quantity_approach: "Generate 100 ideas for every 1 you'll finalize"
      push_through_barriers: "When you 'can't think of any more' - that's when new patterns emerge"
      balance_perspectives: "Avoid overemphasis on one direction"

    idea_rating_criteria:
      rating_1_top:
        - "Rich in detail"
        - "Good reference from strong creator"
        - "Easy to visualize with clear narrative"
      rating_5_bottom:
        - "Vague and generic"
        - "Lacks interesting Hook Point"
        - "No clear narrative structure"

    quick_tips:
      address_fresh_audience: "Visualize audience that doesn't know your subject"
      tap_popular_topics: "Anchor to trending topics, shows, celebrities"
      avoid_jargon: "Use words that resonate with masses"
      seek_strong_references: "Base ideas on high-performing Gold references"

  analysis_guidelines:
    leave_personal_tastes: "Labels based on performance metrics, not preferences"
    avoid_cognitive_biases: "Challenge initial assumptions continuously"
    treat_ideas_as_hypotheses: "Try to disprove them quickly"
    avoid_copycat_syndrome: "Focus on EOV, not just replicating tactics"

  marginal_gains_principle:
    origin: "British cycling team's approach from James Clear's Atomic Habits"
    application: "Research-first methodology for incremental improvements"
    process:
      - "Conduct exhaustive research"
      - "Refine every aspect"
      - "Implement incremental improvements"
      - "Measure and iterate"

# ============================================================================
# SECTION 5: PLATFORM-SPECIFIC OPTIMIZATION
# ============================================================================

platform_specific_optimization:
  algorithm_understanding:
    core_truth: "Algorithms are engineered to prioritize content that captures and sustains attention"
    business_model: "Keep users engaged longer = more ads served = more revenue"
    implication: "Creating content algorithms love is key to getting content seen"

    algorithm_behavior:
      myth: "Algorithms suppress content to force paid media"
      reality: "If true, no content would ever go viral organically"
      what_algorithms_do: "Prioritize retention and engagement"
      what_algorithms_dont_care_about: "Hashtags, posting frequency, posting times"

  platform_guidelines:
    youtube:
      format_focus: "Long-form content (8+ minutes)"
      key_elements:
        - "Compelling thumbnails"
        - "Dramatic facial expressions"
        - "Titles that ask questions or make startling statements"
        - "Depth and multiple perspectives suggested"
      thumbnail_best_practices:
        - "Use dramatic facial expressions"
        - "Suggest depth and complexity"
        - "Create visual intrigue with contrast"
        - "Pair with titles that pique curiosity"
      search_approach: "Enter keywords, identify viral videos, visit creator pages"

    tiktok:
      format_focus: "Short-form content (10 seconds to 3 minutes)"
      key_elements:
        - "Strong opening hooks"
        - "Fast-paced delivery"
        - "Visual metaphors"
        - "Engagement through comments"
      format_finding:
        - "Keyword search in app"
        - "Identify high view count videos"
        - "Look for creator consistency with format"

    instagram_reels:
      format_focus: "Short-form content similar to TikTok"
      search_approach:
        - "Use mobile app, not desktop"
        - "Navigate to Reels tab after search"
        - "Manually scroll and track performance"
        - "Identify repeatable formats"

    linkedin:
      considerations: "More professional, fact-based content"

    facebook:
      considerations: "Broader demographic, varied content types"

  generalist_approach:
    principle: "You're competing with ALL content, not just your industry"
    example: "Finance company competes with baking tutorials, beauty tips, travel vlogs"
    tactic: "Ground content in broader interests while maintaining core expertise"
    case_study:
      creator: "Graham Stephan"
      niche: "Finance for millennials"
      approach: "How I Bought a Tesla for $78 Per Month instead of technical car financing video"
      result: "8.5M views vs potential 1,000 views"

  content_age_guidelines:
    recommended: "1-2 years old, possible stretch to 3 years"
    avoid: "Content older than 4-5 years - considered too old for analysis"

# ============================================================================
# SECTION 6: SHAREABILITY SPECTRUM
# ============================================================================

shareability_spectrum:
  what_makes_content_shareable:
    core_elements:
      emotional_resonance:
        - "Content that moves people emotionally"
        - "Creates 'gut punch' moments"
        - "Sparks strong reactions"
      perspective_shifts:
        - "Presents familiar ideas in new ways"
        - "Challenges common beliefs"
        - "Creates 'Why didn't I think of that?' moments"
      value_delivery:
        - "Provides immediately applicable advice"
        - "Offers fresh insights"
        - "Makes complex topics digestible"
      tension_and_resolution:
        - "Builds anticipation"
        - "Creates narrative gaps"
        - "Delivers satisfying conclusions"

  shareability_drivers:
    curiosity_gap: "Creating need to know what happens"
    social_currency: "Making sharers look informed/clever"
    practical_value: "Useful information worth passing on"
    emotional_triggers: "Content that evokes strong feelings"
    identity_alignment: "Content that reflects sharer's values/interests"

  content_types_by_shareability:
    high_shareability:
      - "Perspective-shifting revelations"
      - "Clever visual metaphors"
      - "Debunked misconceptions"
      - "Immediately actionable tips"
      - "Emotional storytelling"
    low_shareability:
      - "Jargon-heavy content"
      - "Static, predictable formats"
      - "Values-based preaching"
      - "Generic advice without hooks"
      - "Content requiring niche knowledge"

# ============================================================================
# SECTION 7: AUDIENCE TARGETING
# ============================================================================

audience_targeting:
  communication_algorithm:
    overview:
      developer: "Jeff King"
      data_foundation: "1.6 million communication assessments collected globally"
      target_reach: "85% of population with 5 rules properly applied"

    the_big_three_styles:
      feelings_based:
        population_percentage: "30%"
        characteristics:
          - "Engage based on emotions evoked"
          - "Deep sense of compassion, sensitivity, warmth"
          - "Prioritize meaningful connections"
        content_integration:
          - "Share relatable stories and experiences"
          - "Use personal anecdotes and genuine narratives"
          - "Build meaningful connections"
        vocabulary:
          use:
            - "I feel..."
            - "I'm comfortable with..."
            - "I care about..."
            - "I'm sad/happy..."
            - "I love..."
            - "I appreciate..."
          avoid:
            - "Dismissive language"
            - "Judging or criticizing emotions"
        body_language:
          do:
            - "Open, relaxed posture"
            - "Soft, genuine smiles"
            - "Warm eye contact"
          dont:
            - "Crossed arms or slouching"
            - "Rigid facial expressions"
            - "Aggressive body language"

      facts_based:
        population_percentage: "25%"
        characteristics:
          - "Responsible, organized, logical"
          - "Appreciate practical information"
          - "Value educational material"
        content_integration:
          - "Use references, data, statistics"
          - "Adopt democratic communication style"
          - "Present multiple perspectives"
        vocabulary:
          use:
            - "I think..."
            - "Does that mean...?"
            - "Who, what, where, when?"
            - "Based on..."
            - "The time frame is..."
            - "This data/information shows..."
          avoid:
            - "Language prompting impulsive action"
            - "Starting sentences with 'You'"
            - "Subjective language and buzzwords"
        body_language:
          do:
            - "Composed demeanor"
            - "Steady, erect posture"
            - "Neutral facial expression"
          dont:
            - "Excessive or exaggerated gestures"

      fun_based:
        population_percentage: "20%"
        characteristics:
          - "Spontaneous, energetic, playful, creative"
          - "Value lighthearted experiences"
          - "Appreciate amusement and genuine reactions"
        content_integration:
          - "Showcase natural, genuine reactions"
          - "Include spontaneous movement"
          - "Infuse fun into atmosphere"
        vocabulary:
          use:
            - "Wow!"
            - "I love/hate..."
            - "I'm so excited to share this!"
            - "Awesome!"
            - "Great!"
            - "Current, relevant slang"
          avoid:
            - "Indecisive vocabulary (need time to reflect...)"
            - "Monotones or dull expressions"
            - "Starting sentences with 'You'"
        body_language:
          do:
            - "Animated, dynamic gestures"
            - "Open, fluid posture"
            - "Authentic facial expressions"
            - "Spontaneous movement"
          dont:
            - "Rigid or stiff body language"
            - "Static camera shots"

    rule_4_non_values_based:
      avoid: "Personal beliefs and opinions (should, ought, need)"
      percentage_alienated: "90% of population resists values-based communication"
      problem: "Invites counterarguments, fosters division"
      transformation_examples:
        values_based: "Something needs to be done about climate change"
        feelings: "I'm worried about the changing climate"
        facts: "Do you want to know the latest info on climate change?"
        fun: "This climate change thing is freaking CRAZY!"

    rule_5_non_autocratic:
      avoid: "Direct commands (Buy now, Act fast, Sign up now)"
      percentage_resisting: "85% of population resists being told what to do"
      alternatives:
        democratic:
          percentage: "35%"
          approach: "Ask and consult - 'Would you like to purchase this?'"
        benevolent:
          percentage: "30%"
          approach: "Warmth and care - 'We're excited to offer you this deal'"
        laissez_faire:
          percentage: "20%"
          approach: "Casual and playful - 'Hey, we've got amazing deals!'"

    application_examples:
      selling_house:
        traditional: "4BR/3BA home, 2,300 sq ft, at [address], [price]"
        optimized:
          facts: "4BR/3BA home, 2,300 square feet, located at [address], offered at [price]"
          benevolent: "We would love to show this comfy cozy home"
          feelings: "A home with warmth and coziness that feels like you never want to leave"
          fun: "There's a pool out back where you can host the most amazing parties!"
          democratic: "Do you want to live near excellent local schools? Here's data about the schools"
          laissez_faire: "This hip spot won't last long... let me know when you wanna check it out"

