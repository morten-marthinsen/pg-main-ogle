# TEACHING: Content-to-Revenue Funnel Framework
# Source: Synthesized from Hormozi, Vaynerchuk, Flynn, and proven models
# Application: Converting organic content into revenue systematically

framework_name: "Content Funnel Framework"
author: "Synthesized Best Practices"
source: "Multiple frameworks synthesized"
core_thesis: |
  Organic content exists to build an audience that can be monetized.
  Without intentional funnel design, content creates engagement but
  not revenue. Every piece of content should serve a function in the
  journey from stranger to customer.

funnel_stages:

  stage_1_awareness:
    name: "Stranger → Viewer"
    goal: |
      Get discovered by new potential customers. Maximize reach to
      qualified audiences. First impression that earns the second.

    content_types:
      - Viral-optimized content (emotion, shareability)
      - Trend participation
      - Controversy/contrarian takes
      - Entertainment with insight
      - Pattern interrupt content

    success_metrics:
      - Reach / Impressions
      - Views
      - Profile visits
      - New follower rate

    optimization_focus:
      - Hook strength
      - Shareability
      - Algorithm signals

    percentage_of_content: "40-50%"

    key_actions:
      - Hook optimization
      - Trending topic integration
      - Platform-native formats
      - High-arousal emotions

  stage_2_interest:
    name: "Viewer → Follower"
    goal: |
      Convert one-time viewers into followers. Demonstrate enough
      value that they want to see more. Build initial trust.

    content_types:
      - Value-dense educational content
      - Signature frameworks and methods
      - Behind-the-scenes credibility
      - Consistent series content
      - Save-worthy resources

    success_metrics:
      - Follower conversion rate
      - Save rate
      - Return viewer rate
      - Engagement rate

    optimization_focus:
      - Value delivery
      - Consistency
      - Brand recognition
      - Series completion

    percentage_of_content: "25-30%"

    key_actions:
      - Clear "follow for more" CTA
      - Content series that build anticipation
      - Consistent posting schedule
      - Profile optimization

  stage_3_consideration:
    name: "Follower → Engaged Fan"
    goal: |
      Deepen relationship with followers. Build trust through
      consistency and personality. Move from casual follow to
      active engagement.

    content_types:
      - Personal stories and vulnerability
      - Community engagement (Q&A, polls)
      - Deeper educational content
      - Behind-the-scenes access
      - Direct conversation (comments, DMs)

    success_metrics:
      - Comment rate
      - DM volume
      - Story engagement
      - Reply rate

    optimization_focus:
      - Relationship building
      - Two-way communication
      - Trust deepening
      - Community feel

    percentage_of_content: "15-20%"

    key_actions:
      - Respond to comments
      - Ask questions
      - Share personal content
      - Create inside jokes/references

  stage_4_conversion:
    name: "Fan → Lead/Customer"
    goal: |
      Convert engaged audience into leads or customers. Move from
      free value to paid value. Clear path to working together.

    content_types:
      - Case studies and proof
      - Clear offer explanation
      - Testimonials and results
      - Lead magnet promotion
      - Direct sales content

    success_metrics:
      - Lead generation
      - Click-through rate
      - DM inquiries
      - Sales attributed

    optimization_focus:
      - Offer clarity
      - Social proof
      - CTA effectiveness
      - Friction reduction

    percentage_of_content: "10-15%"

    key_actions:
      - Clear CTA to offer/lead magnet
      - Case study content
      - Testimonial integration
      - Scarcity/urgency when appropriate

lead_magnet_strategy:

  purpose: |
    Lead magnets bridge the gap between free content and paid offers.
    They capture contact information in exchange for value, enabling
    follow-up and nurturing.

  effective_lead_magnet_criteria:
    - Solves specific problem instantly
    - Demonstrates expertise
    - Creates desire for more
    - Easy to consume (quick win)
    - Valuable enough to pay for

  types:
    quick_win:
      description: "Immediate result or answer"
      examples:
        - Calculator or quiz
        - Checklist or cheatsheet
        - Template or swipe file
      delivery: "Instant via DM automation"

    educational:
      description: "Deep dive on topic"
      examples:
        - Mini-course or video training
        - Comprehensive guide
        - Case study breakdown
      delivery: "Email sequence"

    community:
      description: "Access to group/people"
      examples:
        - Private community access
        - Live event access
        - Cohort enrollment
      delivery: "Community platform invite"

  delivery_mechanisms:
    dm_automation:
      trigger: "Comment keyword"
      process: "Auto-DM with link/resource"
      best_for: "High-volume lead gen"

    link_in_bio:
      trigger: "CTA in content"
      process: "Click through to landing page"
      best_for: "Consistent capture"

    story_link:
      trigger: "Story CTA"
      process: "Swipe up/link sticker"
      best_for: "Time-limited offers"

offer_integration:

  offer_ladder:
    description: |
      Content should naturally lead up the value/price ladder.
      Each rung prepares for the next.

    rungs:
      free_content:
        price: "$0"
        value: "Education, entertainment, connection"
        purpose: "Build audience, demonstrate expertise"

      lead_magnet:
        price: "$0 (email)"
        value: "Specific solution, quick win"
        purpose: "Capture leads, prove capability"

      low_ticket:
        price: "$7-97"
        value: "Solve specific problem"
        purpose: "Convert buyers, build trust"

      mid_ticket:
        price: "$100-2,000"
        value: "Comprehensive solution"
        purpose: "Primary revenue, transformation"

      high_ticket:
        price: "$2,000+"
        value: "Done-with-you or done-for-you"
        purpose: "Premium revenue, deep work"

  content_to_offer_mapping:
    awareness_content: "Points to → Lead magnet or low ticket"
    educational_content: "Points to → Mid ticket (logical next step)"
    case_study_content: "Points to → High ticket (proof of results)"
    community_content: "Points to → Membership or cohort"

monetization_models:

  model_1_info_products:
    description: "Courses, ebooks, templates"
    content_strategy: "Teach frameworks, show results, create desire for more"
    cta_approach: "Transitional to lead magnet, direct to product"

  model_2_services:
    description: "Done-for-you or done-with-you"
    content_strategy: "Case studies, behind-the-scenes, authority building"
    cta_approach: "Application/call booking"

  model_3_coaching:
    description: "1:1 or group coaching"
    content_strategy: "Transformation stories, methodology demonstration"
    cta_approach: "Application/discovery call"

  model_4_community:
    description: "Paid community or membership"
    content_strategy: "Community glimpses, member wins, belonging creation"
    cta_approach: "Free trial or enrollment window"

  model_5_affiliate:
    description: "Recommending others' products"
    content_strategy: "Reviews, demonstrations, genuine recommendations"
    cta_approach: "Product links with affiliate attribution"

  model_6_sponsorships:
    description: "Brand partnerships"
    content_strategy: "Build audience, demonstrate influence"
    cta_approach: "Media kit, inbound sponsor inquiries"

metrics_framework:

  top_of_funnel:
    - Reach
    - Impressions
    - Views
    - New followers

  middle_of_funnel:
    - Engagement rate
    - Save rate
    - Share rate
    - Profile visits

  bottom_of_funnel:
    - Link clicks
    - Lead magnet signups
    - DM inquiries
    - Applications/bookings

  revenue_metrics:
    - Customer acquisition cost (content hours per customer)
    - Revenue per follower
    - Lifetime value of content-acquired customers
    - Attribution accuracy

content_calendar_integration:

  weekly_rhythm:
    monday: "Value content (Awareness)"
    tuesday: "Educational content (Interest)"
    wednesday: "Engagement content (Consideration)"
    thursday: "Value content (Awareness)"
    friday: "Social proof/case study (Conversion)"
    saturday: "Personal/community (Consideration)"
    sunday: "Big idea/thought leadership (Awareness)"

  funnel_balance:
    - 40-50% Awareness content
    - 25-30% Interest content
    - 15-20% Consideration content
    - 10-15% Conversion content

  campaign_integration:
    pre_launch: "Build anticipation, seed problems"
    launch: "Conversion-focused content"
    post_launch: "Testimonials, case studies"
    evergreen: "Consistent funnel balance"

key_quotes:
  - "Content without a funnel is a hobby, not a business."
  - "Every piece of content should earn its place in the journey."
  - "Free content is paid advertising where YOU control the message."

related_teachings:
  - "hormozi-content-to-leads.yaml"
  - "vaynerchuk-day-trading-attention.yaml"
  - "godin-permission-marketing.yaml"
