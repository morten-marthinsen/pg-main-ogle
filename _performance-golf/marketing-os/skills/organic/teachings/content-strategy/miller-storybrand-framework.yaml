# TEACHING: Donald Miller's StoryBrand Framework
# Source: Building a StoryBrand (2017)
# Application: Positioning brand as guide, customer as hero

framework_name: "StoryBrand Framework (SB7)"
author: "Donald Miller"
source: "Building a StoryBrand"
core_thesis: |
  Customers don't buy the best products — they buy products they can
  understand the fastest. Story is the most powerful tool for clarifying
  your message. Position your customer as the hero, your brand as the
  guide, and your product as the plan that leads to success.

the_sb7_framework:

  element_1:
    name: "A Character (The Hero)"
    description: |
      The customer is the hero, not your brand. The hero wants something.
      Clearly define what your customer wants as it relates to your brand.

    key_insight: |
      If you confuse, you lose. The hero's desire must be clear and specific.
      This is the survival-level want that drives action.

    questions_to_answer:
      - "What does your customer want as it relates to your brand?"
      - "Is this a survival-level desire (money, time, status, relationships)?"
      - "Can this desire be stated in a single sentence?"

    application_to_content:
      - Open content with customer's desire, not your product
      - Make the want explicit and specific
      - Connect to survival-level desires

    examples:
      weak: "We sell marketing software."
      strong: "You want more customers without working more hours."

  element_2:
    name: "Has a Problem"
    description: |
      The hero has a problem — actually three problems: external, internal,
      and philosophical. Companies tend to sell solutions to external
      problems, but customers buy solutions to internal problems.

    three_levels:
      external_problem: |
        The surface-level, tangible problem.
        Example: "I don't have enough leads."

      internal_problem: |
        How the external problem makes them FEEL.
        Example: "I feel like I'm not good at marketing."

      philosophical_problem: |
        Why this is unjust or wrong.
        Example: "Small businesses shouldn't struggle to compete."

    key_insight: |
      Customers buy solutions to internal problems. Address the feeling,
      not just the function.

    application_to_content:
      - Name all three problem levels
      - Lead with internal problem (emotional resonance)
      - Connect to philosophical stakes (why it matters)

    content_hooks_from_problems:
      external: "The reason you're not getting leads..."
      internal: "If you feel overwhelmed by marketing..."
      philosophical: "Small businesses deserve to win."

  element_3:
    name: "And Meets a Guide"
    description: |
      The guide (your brand) has two characteristics: empathy and authority.
      Empathy means you understand how they feel. Authority means you've
      solved this problem before.

    empathy:
      description: |
        Show you understand their struggle. Use their language.
        Express that you've felt what they feel.

      phrases:
        - "I know how it feels when..."
        - "We understand the frustration of..."
        - "You're not alone in this."

    authority:
      description: |
        Show you have the competence to solve the problem.
        Use testimonials, statistics, awards, or experience.

      credibility_signals:
        - Results achieved for others
        - Years of experience
        - Number of customers helped
        - Relevant credentials

    key_insight: |
      Lead with empathy, support with authority. If you only show authority,
      you seem arrogant. If you only show empathy, you seem weak.

    application_to_content:
      - Open with empathy (understanding)
      - Follow with authority (proof)
      - Position yourself as guide, not hero

  element_4:
    name: "Who Gives Them a Plan"
    description: |
      The guide provides a clear plan that removes confusion. Customers
      don't buy when they're confused about next steps. Give them a
      simple path to follow.

    plan_types:
      process_plan: |
        Simple steps to engage with you.
        3 steps maximum. Make it easy.

      agreement_plan: |
        List of agreements that address fears.
        "We guarantee X, Y, Z."

    key_insight: |
      The plan removes fear and confusion. Make the path so clear
      that failure seems impossible.

    application_to_content:
      - Always end with clear next step
      - Break complex processes into 3 simple steps
      - Remove friction and fear

    example_process_plan:
      step_1: "Schedule a call"
      step_2: "We create your strategy"
      step_3: "Watch your business grow"

  element_5:
    name: "And Calls Them to Action"
    description: |
      Heroes don't act unless called to action. Be direct and specific.
      Have both direct and transitional calls to action.

    cta_types:
      direct_cta: |
        The "buy now" action. Direct, specific, risk-requiring.
        Examples: "Schedule a Call", "Buy Now", "Start Free Trial"

      transitional_cta: |
        Lower commitment actions that nurture the relationship.
        Examples: "Download PDF", "Watch Video", "Take Quiz"

    key_insight: |
      If you don't ask, you don't get. Heroes need to be called to action.
      Don't be shy about what you want them to do.

    application_to_content:
      - Every piece needs a call to action
      - Match CTA intensity to content depth
      - Direct CTA should be visible and clear

  element_6:
    name: "That Helps Them Avoid Failure"
    description: |
      What's at stake if they don't act? Fear of failure motivates.
      Paint a picture of what happens if they don't solve the problem.

    key_insight: |
      Loss aversion is stronger than gain seeking. Show them what
      they'll lose by not acting, not just what they'll gain by acting.

    stakes_framework:
      - What will they lose? (Money, time, relationships)
      - What will stay the same? (Stagnation, frustration)
      - What opportunities will they miss?

    application_to_content:
      - Include "what happens if you don't" messaging
      - Paint specific failure scenarios
      - Make inaction feel costly

    example:
      without_stakes: "Learn marketing to grow your business."
      with_stakes: "Stop watching competitors steal your customers while you figure it out alone."

  element_7:
    name: "And Ends in Success"
    description: |
      What does life look like after they solve the problem? Paint a
      specific, compelling picture of the transformation.

    success_dimensions:
      win_external: |
        Tangible outcome achieved.
        Example: "You'll have a consistent flow of qualified leads."

      win_internal: |
        How they'll feel.
        Example: "You'll feel confident and in control of growth."

      win_identity: |
        Who they'll become.
        Example: "You'll be the marketing-savvy founder who gets it."

    key_insight: |
      Don't just solve the external problem. Transform them into
      the person they want to be.

    application_to_content:
      - End with specific success vision
      - Include emotional transformation
      - Make identity shift explicit

brandscript_template:
  template: |
    [CHARACTER] wants [DESIRE].

    But they have a problem:
    - External: [TANGIBLE PROBLEM]
    - Internal: [HOW IT MAKES THEM FEEL]
    - Philosophical: [WHY IT'S WRONG]

    They meet a guide (us) who:
    - Understands them: [EMPATHY STATEMENT]
    - Has authority: [PROOF OF COMPETENCE]

    The guide gives them a plan:
    1. [STEP 1]
    2. [STEP 2]
    3. [STEP 3]

    And calls them to action:
    - Direct: [PRIMARY CTA]
    - Transitional: [LOWER-COMMITMENT CTA]

    So they can avoid failure:
    - [WHAT THEY'LL LOSE IF THEY DON'T ACT]

    And achieve success:
    - External: [TANGIBLE WIN]
    - Internal: [EMOTIONAL WIN]
    - Identity: [WHO THEY BECOME]

content_application:

  hooks:
    from_desire: "You want [desire]. Here's how to get it."
    from_problem: "The reason [problem] keeps happening..."
    from_guide: "After helping [X customers/years], here's what I know..."
    from_plan: "Three simple steps to [result]..."
    from_failure: "Stop [failure path] before it costs you [stakes]."
    from_success: "What [success state] actually looks like..."

  content_structure:
    opening: "Name the desire or problem (Elements 1-2)"
    body: "Position as guide with plan (Elements 3-4)"
    close: "CTA with stakes and success vision (Elements 5-7)"

  series_ideas:
    - "The Problem With [Common Approach]" (Element 2)
    - "How [Customer Type] [Achieved Result]" (Element 7)
    - "The [Number]-Step Plan to [Outcome]" (Element 4)
    - "What Happens When [Failure]" (Element 6)

key_quotes:
  - "If you confuse, you'll lose."
  - "People don't buy the best products; they buy the products they can understand the fastest."
  - "The customer is the hero, not your brand."
  - "The guide has both empathy and authority."

related_teachings:
