      This is what I call the Content Trap.
    chapter: "Introduction"
    section: "The Content Trap"
    page_context: "Defining the Content Trap after describing the natural instinct to focus on content quality"
    relevance: "Core definition of the Content Trap concept"

  - id: SQ02
    quote: >
      The Content Trap is a mindset that afflicts nearly every organization struggling
      to confront the problems of getting noticed and getting paid, from media to finance
      to education, and whether they're producing stories or designing phones. It has
      three main expressions.
    chapter: "Introduction"
    section: "The Content Trap and the Business of Connections"
    page_context: "Introducing the three expressions of the trap"
    relevance: "Establishes universality of the trap across industries"

  - id: SQ03
    quote: >
      Connections, I will argue in this book, are at the heart of what shapes any
      digitally touched business today and will for the foreseeable future. Being able
      to recognize, leverage, and manage connections separates companies that succeed
      from those that fail.
    chapter: "Introduction"
    section: "The Content Trap and the Business of Connections"
    page_context: "Central argument of the entire book"
    relevance: "The core thesis — connections over content"

  - id: SQ04
    quote: >
      Content businesses everywhere tend to define themselves by their content.
      This is the trap. The power of content is increasingly overwhelmed by the
