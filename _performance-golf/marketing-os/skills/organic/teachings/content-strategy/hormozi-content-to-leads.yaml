# TEACHING: Alex Hormozi's Content-to-Leads Framework
# Source: $100M Leads (2023) + Public Content Strategy
# Application: Turning organic content into lead generation at scale

framework_name: "Content-to-Leads Framework"
author: "Alex Hormozi"
source: "$100M Leads + Acquisition.com public content"
core_thesis: |
  Free content is the most effective lead generation mechanism when
  done correctly. The goal is not engagement for its own sake — it's
  building an audience that will eventually buy. Content is advertising
  you don't pay for, distributed to people who chose to see it.

core_principles:

  principle_1:
    name: "Give Away the Secrets, Sell the Implementation"
    description: |
      Most creators protect their best information. This is backwards.
      Give away your most valuable knowledge freely. People pay for
      saved time, not secret information.

    key_insight: |
      Information is abundant. Implementation is scarce. Give away
      the "what" and "why" — sell the "done for you" and "done with you."

    application:
      - Share your actual strategies and frameworks publicly
      - Create content that would cost money elsewhere
      - Don't hold back "good stuff" for paid products
      - Make free content more valuable than competitors' paid content

    content_implications:
      - Teach real, actionable frameworks
      - Show actual processes and systems
      - Demonstrate real results with specifics
      - Don't tease — deliver

  principle_2:
    name: "Volume Beats Perfection"
    description: |
      High volume + low quality beats low volume + high quality for
      audience growth. You need at-bats to learn what works. Then
      you can increase quality while maintaining volume.

    key_insight: |
      Your first 100 pieces will teach you more than any course.
      The market gives feedback faster than planning does.

    application:
      - Publish daily (minimum)
      - Don't over-edit or over-polish
      - Learn from what performs vs what doesn't
      - Iterate based on data, not assumptions

    content_implications:
      - Create content systems that enable volume
      - Batch creation for efficiency
      - Repurpose across platforms
      - Accept "good enough" over "perfect"

  principle_3:
    name: "One-to-Many Leverage"
    description: |
      Content is one-to-many communication. Every piece reaches many
      people simultaneously. This is the core leverage of content
      marketing over 1:1 outreach.

    key_insight: |
      Time spent on content pays dividends forever. Time spent on
      1:1 conversations pays once. Invest in the leverage.

    application:
      - Prioritize content over DM conversations
      - Turn common questions into content
      - Create once, distribute everywhere
      - Build systems that multiply reach

    content_implications:
      - FAQ content from repeated questions
      - Case study content from client wins
      - Process content from internal systems
      - Story content from daily experiences

  principle_4:
    name: "Teach from Personal Experience"
    description: |
      Authority comes from demonstrated results, not credentials.
      Show what you've done. Teach from experience, not theory.

    key_insight: |
      "I did this" beats "you should do this" every time.
      Results are the ultimate credibility builder.

    application:
      - Lead with your own results and journey
      - Share specific numbers and outcomes
      - Document your process as you do it
      - Be transparent about what worked and didn't

    content_implications:
      - Case study format from your own business
      - Behind-the-scenes process content
      - "What I learned from..." structure
      - Specific numbers > vague claims

content_structure:

  hooks_that_work:
    categories:
      - Counterintuitive statements
      - Specific results/numbers
      - Pattern interrupts
      - Direct challenges to common wisdom
    examples:
      - "I spent $1M on ads. Here's what I'd do differently."
      - "Stop doing [common practice]. Here's why."
      - "After [X clients/years/results], here's what actually works."
      - "This one thing made more difference than everything else combined."

  content_body_structure:
    format: |
      1. Hook (stop the scroll)
      2. Context (why this matters)
      3. Core framework/insight (the meat)
      4. Proof/example (credibility)
      5. Application (what to do with this)
      6. CTA (implicit or explicit)

    principles:
      - Every sentence earns the next sentence
      - Specificity over generality
      - Frameworks are memorable and shareable
      - Examples make concepts concrete

  calls_to_action:
    types:
      soft_cta: |
        "Follow for more" / "Save this" / Comment engagement
        Purpose: Build audience, increase reach
        Frequency: Most content

      medium_cta: |
        "DM me [keyword]" / Link in bio / Free resource
        Purpose: Capture leads, start conversations
        Frequency: 1 in 5-10 posts

      hard_cta: |
        Direct offer / Sales page / Application
        Purpose: Drive conversions
        Frequency: Campaign-specific

lead_generation_mechanics:

  lead_magnet_strategy:
    principle: |
      Lead magnets should be valuable enough to charge for.
      They should demonstrate expertise and create desire for more.

    types:
      - Checklists/cheatsheets from framework content
      - Templates and swipe files
      - Mini-courses or video trainings
      - Tools or calculators
      - Case study compilations

    delivery_mechanism:
      - DM automation ("Comment [word] to get...")
      - Link in bio with clear value prop
      - Story links (limited time)
      - Direct response ads to organic content

  dm_to_sale_flow:
    step_1: "Valuable content creates awareness"
    step_2: "CTA drives DM/lead magnet signup"
    step_3: "DM conversation qualifies interest"
    step_4: "Qualified leads get offer/call"
    step_5: "Sale or nurture sequence"

  content_to_offer_bridge:
    principle: |
      Content should naturally lead to your offer. The line between
      content and sales should be seamless — content demonstrates
      capability, offer provides implementation.

    tactics:
      - "If you want help implementing this, [offer]"
      - "I do this for clients at [company]"
      - Case studies that show what working with you produces
      - Framework content where offer is the next logical step

platform_specific_strategy:

  youtube:
    role: "Long-form authority building"
    content_type: "Deep dives, tutorials, frameworks"
    lead_mechanism: "Description links, end screen CTAs"
    frequency: "1-3x per week"

  instagram:
    role: "Relationship and reach"
    content_type: "Carousels, Reels, Stories"
    lead_mechanism: "DM automation, Link in bio"
    frequency: "1-3x per day"

  tiktok:
    role: "Discovery and top of funnel"
    content_type: "Quick insights, hooks, personality"
    lead_mechanism: "Bio link, redirect to Instagram"
    frequency: "2-3x per day"

  linkedin:
    role: "B2B authority and networking"
    content_type: "Text posts, carousels, articles"
    lead_mechanism: "DM, profile link, comment engagement"
    frequency: "1x per day"

  twitter_x:
    role: "Thought leadership and network"
    content_type: "Threads, hot takes, engagement"
    lead_mechanism: "Bio link, DM"
    frequency: "3-5x per day"

content_pillars:

  pillar_framework:
    description: |
      Content should serve multiple functions: attract new audience,
      engage existing audience, and convert to customers.

    pillar_types:
      value_pillar: |
        Pure value content — frameworks, how-tos, insights
        Purpose: Reach, authority, saves
        Percentage: 60-70%

      story_pillar: |
        Personal stories, journey, behind-the-scenes
        Purpose: Connection, trust, personality
        Percentage: 20-30%

      proof_pillar: |
        Results, case studies, testimonials
        Purpose: Credibility, conversion
        Percentage: 10-20%

metrics_that_matter:

  vanity_metrics:
    - Followers (matters less than you think)
    - Likes (low correlation to revenue)
    - Comments (unless actionable)

  meaningful_metrics:
    - Saves (indicates value)
    - Shares (indicates reach potential)
    - Profile visits (indicates interest)
    - Link clicks (indicates intent)
    - DMs (indicates engagement)
    - Leads generated (actual business outcome)
    - Revenue attributed (ultimate measure)

key_quotes:
  - "If you're not embarrassed by the first version of your product, you've launched too late."
  - "Advertising is tax you pay for being unremarkable."
  - "Give away the secrets, sell the implementation."
  - "Volume beats perfection when you're learning."

