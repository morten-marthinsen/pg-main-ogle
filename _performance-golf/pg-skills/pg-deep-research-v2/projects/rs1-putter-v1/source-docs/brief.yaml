product:
  name: RS1 Putter
  category: Putters
  description: >
    Premium putter ($399) featuring Roll Straight Technology - a forward-balanced
    design that eliminates face drift and keeps the putter face square through the
    stroke. Unlike traditional putters where the face naturally opens, RS1's forward
    axis balance, high forward MOI, and face-down face-balanced design work together
    to start more putts on line.
  known_benefits:
    - Eliminates face drift (face opening during stroke)
    - Forward Axis Balance keeps face square
    - High Forward MOI resists twisting
    - Forward CG promotes natural pulling motion (biomechanically superior)
    - 74-degree lie angle for straighter back-and-through stroke
    - Face-Square Focus Alignment System (3 long lines + 1 short)
    - Multi-material construction (steel face, carbon top, aluminum back)
    - Onset shaft position for unobstructed vision
  price_point: $399

market:
  mode: B  # New product with no marketing history
  existing_marketing: null
  target_customer: >
    Recreational golfers (10-25 handicap) who struggle with consistency on the greens,
    miss short putts, three-putt too often, and blame themselves when the real problem
    is their putter's traditional design that causes face drift.

constraints:
  budget: 50  # Increased for comprehensive research
  timeline: standard
  focus_areas:
    - Face drift / face opening problems
    - LAB Golf / ZeroTorque competitor analysis
    - Three-putting pain and psychology
    - Short putt misses (5-10 feet)
    - Premium putter buyer psychology
    - Putting yips and anxiety
    - Face-balanced vs toe-hang debate

context:
  why_now: >
    RS1 is entering the premium putter market with a unique "face down, face balanced"
    design that competes directly against LAB Golf's ZeroTorque technology. Need
    comprehensive market intelligence to position Roll Straight Technology effectively.
  known_gaps:
    - How do golfers talk about face opening/drift in their own language?
    - What specific complaints do LAB Golf users have (opportunity)?
    - What makes premium putter buyers finally purchase?
    - How do golfers describe the moment they "gave up" on fixing their putting?
  concept_doc: null

competitors:
  primary:
    - name: LAB Golf DF3
      mechanism: "Lie Angle Balance / Zero Torque Technology"
      price: $449-$499
      weakness: "Unconventional appearance, heavy feel, may feel like cheating"
  secondary:
    - name: Scotty Cameron Special Select
      mechanism: "Precision milled, adjustable weights"
      price: $449-$469
    - name: TaylorMade Spider Tour X
      mechanism: "True Path Alignment, High MOI"
      price: $349-$399
    - name: Odyssey Ai-ONE
      mechanism: "AI-designed insert for consistent ball speeds"
      price: $299-$349
    - name: Evnroll ER2
      mechanism: "Sweet Face Technology - variable groove widths"
      price: $379-$429

unique_differentiator: >
  RS1's "Face Down, Face Balanced" design is RARE (<5% of market). While LAB Golf
  uses "Lie Angle Balance" (zero torque), RS1's Forward Axis Balance creates a
  face-forward orientation that actively fights face drift rather than just
  eliminating torque. The pulling motion biomechanics is scientifically superior
  to pushing motion, and RS1 is the only putter explicitly designed around this.
