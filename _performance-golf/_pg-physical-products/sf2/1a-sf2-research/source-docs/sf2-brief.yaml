product:
  name: SF2 Driver
  category: Drivers
  description: |
    The SF2 Driver is a slice-fixing titanium driver that combines proven slice-correction
    technology with premium 3-piece forged titanium construction. It uses "SliceFix Technology"
    - a complete system of aerodynamic, mechanical, and material features that work together
    to square the clubface automatically while maximizing ball speed for competitive distance.

    Key features:
    - 3-Piece Forged Titanium Construction (NEW - primary upgrade from SF1)
    - Speed Geometry Toe Slot (NEW - reduces drag on toe for faster face closure)
    - Improved Aero Square Crown Channels (carried over, enhanced)
    - Improved Counter-Slice Keel (thicker/heavier than SF1)
    - Improved Draw Spin Face Bulge (asymmetric design)
    - Retained Draw-Calibrated Face Angle (3° closed)
    - Retained Takeaway Tracks
    - Retained Counterbalanced Shaft (now with X-Stiff option)
    - 445cc Anti-Slice Speed Geometry Head (smaller than 460cc max)

  known_benefits:
    - Fixes slice without changing swing
    - Delivers 20-30 yards additional distance (from both titanium speed AND straighter ball flight)
    - Premium titanium construction rivals Big Golf drivers
    - Multiple slice-fixing features work synergistically (Slice-Fix Effect)
    - Squares the face automatically at impact
    - Competitive ball speed with premium drivers
    - No sacrifice between accuracy and distance

  price_point: TBD (premium tier based on titanium construction)

  specs:
    material: 3-Piece Forged Titanium
    head_size: 445cc
    loft: 12° (15° equivalent at square face)
    face_angle: 3° Closed
    lie_angle: 60° (more upright)
    length: 45" (M), 44.5" (W)
    swing_weight: D2
    shaft_flexes: 6 (including new X-Stiff)

market:
  mode: A  # Existing product with marketing history (SF1 predecessor)

  existing_marketing:
    - SF1 Driver launch materials (predecessor)
    - Performance Golf brand portfolio

  target_customer: |
    Golfers who slice the ball and have:
    - Tried lessons, YouTube tips, and "anti-slice" drivers without lasting success
    - Lost confidence off the tee
    - Aimed left into trouble just to keep ball in play
    - Lost distance due to the slice curve
    - Experienced frustration with every "banana ball"

  positioning: |
    "The slice-fixing driver that doesn't sacrifice distance"
    "Everything you loved about SF1. Now with tour-level speed."
    "Same slice-fix. Now with serious distance."

  sf1_to_sf2_narrative: |
    SF1 proved equipment can fix your slice without changing your swing.
    But SF1 wasn't a distance driver - it fixed accuracy at the cost of speed.
    SF2 rebuilds from the ground up with premium titanium.
    Now you get BOTH: slice-fix AND competitive distance.

constraints:
  budget: 25  # dollars for scraping
  timeline: standard
  focus_areas:
    - Slice pain (emotional and physical/mechanical)
    - Driver distance desire
    - Equipment vs technique beliefs
    - Competitor driver mechanisms (especially anti-slice claims)
    - Big Golf driver comparisons
    - Price sensitivity for titanium premium

context:
  why_now: |
    SF2 is a major product launch that upgrades the successful SF1 slice-fixing driver.
    The primary upgrade story is: same slice-fix, now with titanium speed/distance.
    Research needs to validate and deepen understanding of:
    1. The slice pain (is it as universally painful as we believe?)
    2. The distance desire (how much does it matter vs accuracy?)
    3. The equipment vs swing debate (do they believe equipment can fix it?)
    4. Competitor positioning (what are others promising?)
    5. The upgrade narrative (do SF1 owners want more distance?)

  known_gaps:
    - Depth of emotional impact of slice (embarrassment, confidence, giving up)
    - Belief structures around "can equipment fix technique problems?"
    - How competitors position their slice/draw solutions
    - Price sensitivity for premium titanium vs carbon fiber
    - The "distance vs accuracy" trade-off perception
    - Do golfers believe you can have BOTH or must choose?

  concept_doc: /Users/donfrench/Downloads/SF2 (Research & Copy).md

