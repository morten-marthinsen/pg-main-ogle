# TEACHING: Jonah Berger's STEPPS Framework
# Source: Contagious: Why Things Catch On (2013)
# Application: Understanding what makes content shareable

framework_name: "STEPPS"
author: "Jonah Berger"
source: "Contagious: Why Things Catch On"
core_thesis: |
  Virality is not random. Content spreads because it contains specific,
  identifiable elements that tap into fundamental human psychology.
  The six STEPPS principles explain why some content gets shared while
  most gets ignored.

principles:

  S_social_currency:
    name: "Social Currency"
    definition: |
      People share things that make them look good to others. Content that
      makes the sharer appear smart, cool, in-the-know, or successful gets
      shared because sharing is a form of self-presentation.

    key_insight: |
      We share what makes us look good, not just what is good.

    mechanisms:
      - inner_remarkability: "Find the inner remarkability - what makes this surprising?"
      - game_mechanics: "Create status, achievement, or competition elements"
      - insider_status: "Make people feel like insiders with exclusive info"

    application_to_organic_content:
      - Create "smart person" content people want to be seen sharing
      - Give insider information that feels exclusive
      - Help audience signal their identity/values
      - Make sharing feel like a flex, not just an endorsement

    questions_to_ask:
      - "Will sharing this make my audience look good?"
      - "What does sharing this say about the sharer?"
      - "Is there insider/exclusive element?"

    example_tactics:
      - "Tools the top 1% use"
      - "What [prestigious group] knows that you don't"
      - "The strategy behind [successful example]"

  T_triggers:
    name: "Triggers"
    definition: |
      People talk about things that are top of mind. Triggers are stimuli
      in the environment that remind people of related ideas and products.
      More triggers = more frequent activation = more word of mouth.

    key_insight: |
      Top of mind = tip of tongue. Build associations with frequent triggers.

    mechanisms:
      - environmental_triggers: "Link to everyday experiences"
      - temporal_triggers: "Associate with times of day/week/year"
      - routine_triggers: "Connect to habitual behaviors"

    application_to_organic_content:
      - Create content around daily experiences your audience has
      - Build associations with routine moments (morning, commute, etc.)
      - Make your content the natural thought when X happens
      - Use recurring series tied to time-based triggers

    questions_to_ask:
      - "What everyday thing could remind them of this?"
      - "How often will they encounter the trigger?"
      - "Is the trigger linked to a positive context?"

    example_tactics:
      - "Monday morning" series
      - Content tied to common experiences
      - Phrases that become associated with your brand

  E_emotion:
    name: "Emotion"
    definition: |
      When we care, we share. Emotional content gets shared because it
      arouses us physiologically. But not all emotions are equal -
      high-arousal emotions drive more sharing than low-arousal ones.

    key_insight: |
      High-arousal emotions (awe, anger, anxiety, excitement) drive 2-3x
      more sharing than low-arousal emotions (sadness, contentment).

    high_arousal_emotions:
      positive:
        - awe
        - excitement
        - amusement
        - inspiration
      negative:
        - anger
        - anxiety
        - fear
        - outrage

    low_arousal_emotions:
      positive:
        - contentment
        - satisfaction
        - relaxation
      negative:
        - sadness
        - disappointment

    application_to_organic_content:
      - Aim for high-arousal emotional responses
      - Awe and inspiration > contentment and satisfaction
      - Anger at injustice can drive massive sharing
      - Excitement and surprise trump calm satisfaction

    questions_to_ask:
      - "What emotion does this trigger?"
      - "Is it high-arousal or low-arousal?"
      - "Would this emotion make someone want to DO something?"

    example_tactics:
      - Awe-inspiring transformations
      - Righteous anger at industry problems
      - Excitement about possibilities
      - Anxiety about missing out

  P_public:
    name: "Public"
    definition: |
      Built to show, built to grow. Observable behavior gets imitated.
      If people can see others doing/using/sharing something, they're
      more likely to do it themselves.

    key_insight: |
      Make the private public. Design for observable behavior.

    mechanisms:
      - behavioral_residue: "Leave visible traces of engagement"
      - social_proof: "Show others engaging"
      - public_participation: "Make engagement visible"

    application_to_organic_content:
      - Create content that generates visible engagement
      - Design shareable formats (duets, stitches, quote tweets)
      - Encourage public participation (challenges, tags)
      - Make consumption visible (screenshots, references)

    questions_to_ask:
      - "Can others see people engaging with this?"
      - "Does this leave behavioral residue?"
      - "How do we make the private public?"

    example_tactics:
      - Challenge content that gets recreated
      - Screenshot-worthy moments
      - Content that sparks visible responses

  P_practical_value:
    name: "Practical Value"
    definition: |
      People like to help others. Useful content gets shared because
      sharing useful information is a form of social bonding and
      demonstrates care for others.

    key_insight: |
      News you can use. Make content genuinely useful to pass along.

    mechanisms:
      - useful_information: "Provide actionable value"
      - save_worthy: "Content worth returning to"
      - shareable_advice: "Tips others would appreciate"

    application_to_organic_content:
      - Create genuinely useful how-to content
      - Make content save-worthy (checklists, frameworks, templates)
      - Design for easy sharing with "tag someone who needs this"
      - Deliver value that makes sharing a gift to others

    questions_to_ask:
      - "Is this genuinely useful?"
      - "Would someone share this to help a friend?"
      - "Is this worth saving/returning to?"

    example_tactics:
      - Actionable tips and frameworks
      - "Save this for later" content
      - Templates and swipe files
      - "Tag someone who needs this"

  S_stories:
    name: "Stories"
    definition: |
      Information travels under the guise of idle chatter. Stories are
      vessels that carry information. When the message is wrapped in a
      narrative, it becomes easier to remember and share.

    key_insight: |
      Stories are Trojan horses for information. Wrap messages in narrative.

    mechanisms:
      - narrative_structure: "Beginning, middle, end"
      - character: "Someone to follow and care about"
      - tension: "Problem or conflict to resolve"
      - resolution: "Satisfying conclusion"

    application_to_organic_content:
      - Wrap lessons in stories, not lectures
      - Create characters (yourself, customers, examples)
      - Build tension before delivering insight
      - Make the message integral to the story (can't remove it)

    questions_to_ask:
      - "Is there a story here?"
      - "Who is the character? What's their journey?"
      - "Is the message integral or removable?"

    example_tactics:
      - Customer transformation stories
      - Personal failure → success narratives
      - "Here's what happened when..." structure

application_matrix:
  content_function_mapping:
    awareness: ["Social Currency", "Emotion", "Public"]
    engagement: ["Emotion", "Stories", "Public"]
    conversion: ["Practical Value", "Social Currency", "Stories"]
    community: ["Stories", "Triggers", "Public"]

  platform_emphasis:
    TikTok: ["Emotion", "Public", "Social Currency"]
    Instagram: ["Social Currency", "Emotion", "Public"]
    YouTube: ["Stories", "Practical Value", "Emotion"]
    LinkedIn: ["Social Currency", "Practical Value", "Stories"]
    X: ["Social Currency", "Emotion", "Triggers"]

virality_score_mapping:
  ea_emotional_activation: "E - Emotion (high-arousal focus)"
  sc_social_currency: "S - Social Currency"
  pi_pattern_interrupt: "Not directly mapped, but supported by E"
  pf_platform_fit: "P - Public (observable, shareable)"
  sh_shareability: "All STEPPS contribute to shareability"

key_quotes:
  - "Virality isn't born, it's made."
  - "People don't think in terms of information. They think in terms of narratives."
  - "When we care, we share."
  - "Top of mind means tip of tongue."

related_teachings:
