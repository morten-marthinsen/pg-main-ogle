# ============================================================================
# ROBERT McKEE - STORYNOMICS
# Story-Driven Marketing Framework
# Source: "Storynomics: Story-Driven Marketing in the Post-Advertising World" (2018)
# ============================================================================

metadata:
  title: "Storynomics - Complete Framework Extraction"
  authors:
    - "Robert McKee"
    - "Thomas Gerace"
  book: "Storynomics: Story-Driven Marketing in the Post-Advertising World"
  publisher: "Twelve (Hachette Book Group)"
  year: 2018
  word_count: 85000
  credentials:
    mckee:
      - "Master story consultant"
      - "Author of 'Story: Substance, Structure, Style, and the Principles of Screenwriting'"
      - "Taught thousands of writers including Oscar winners"
    gerace:
      - "CEO of Skyword"
      - "Content marketing pioneer"
  core_thesis: "Story is the ultimate marketing tool because story fits the mind - the mind converts actuality into story in the first place"

# ============================================================================
# PART 1: THE MARKETING REVOLUTION
# ============================================================================

marketing_crisis:
  overview:
    problem: "Consumers are cutting the barbed wire of ad-imprisoned media and disappearing into paid subscriptions and ad blockers"
    reality: "Millennials are not only banishing advertising from their lives but sneering at the institution itself"
    statistics:
      tv_viewing_drop: "30% drop in under-forty viewing over 5 years"
      ad_blockers: "198 million people using ad-blocking software globally (2015)"
      ad_blocking_growth: "41% annual growth"
      blocked_ads_value: "$41.4 billion in ads blocked worldwide (2016)"

  advertising_story_of_addiction:
    origin: "1700s - newspapers needed revenue beyond subscriptions"
    benjamin_franklin: "Patron Saint of Advertising - taught business leaders print marketing"

    interruption_discovery:
      insight: "Most effective strategy was interruption - placing ads directly in readers' way"
      mechanism: "Hooks reader's interest with news, then interrupts midstream with brand message"
      consequence: "The more we interrupt consumers, the less we satisfy their overall experience"

    television_dominance:
      height: "Three networks reached 50 million viewers nightly in prime time"
      duration: "For sixty years, the TV commercial was the primary way Americans learned about new products"
      ad_creep:
        1950s: "4 minutes per hour"
        1970s: "8 minutes per hour"
        2011: "Almost one minute out of every three on cable"

  consumer_revolt:
    trigger: "Broadband adoption - gave consumers choice"
    netflix_model:
      insight: "Returned to subscription model but refused ad temptation"
      result: "93.8 million subscribers by Q4 2016"
      daily_consumption: "116 million hours of programming every day, completely ad-free"

    streaming_cascade:
      - "HBO NOW/GO: 25+ million Game of Thrones viewers"
      - "Spotify: 50 million ad-free premium subscribers"
      - "Apple Music: 27 million ad-free subscribers"
      - "Hulu capitulation: Launched ad-free tier after Netflix dominance"

  marketing_deception:
    two_types:
      rational_rhetoric:
        mechanism: "Presents evidence and draws conclusion, but only evidence supporting the claim"
        difference_from_science: "Science seeks truth; rhetoric seeks the win"
        problem: "Marketing via rhetorical argument provokes skepticism"
        ariely_experiment:
          setup: "Audiophiles rated stereo - some told info from manufacturer, others from Consumer Reports"
          result: "Consumer Reports group offered $407 vs $282 for manufacturer-labeled"
          insight: "Mistrust of marketing runs so deep it colors perception even in firsthand experience"

      emotional_manipulation:
        pioneer: "Bill Bernbach and DDB agency"
        approach: "Aim powerful emotional appeals directly at consumer's subconscious desires"
        tactics:
          seduction: "Entices with promise of pleasure"
          coercion: "Persuades with threat of pain"
        modern_failure: "Today these ploys not only fail, they offend"
        millennial_response: "Nearly two-thirds use ad-blocking software"

# ============================================================================
# PART 2: STORY CREATION
# ============================================================================

evolution_of_story:
  core_principle: "Story is the evolutionary adaptation to consciousness"

  first_human_thought:
    emergence: "I am"
    consequence: "Self-awareness split consciousness in two"
    description: "Behind your active mind, a core self observes your every thought and deed"
    cost: "A life spent essentially alone, at a distance from all other living things"

  second_human_thought:
    emergence: "And someday my time in time will end"
    consequence: "Time-awareness flooded the mind, bringing dread"
    distinction:
      fear: "Emotion felt when we don't know what's going to happen"
      dread: "Emotion that grips us when we know what's going to happen and can't stop it"

  story_making_mind:
    function: "Gene by gene, natural selection implanted story-making mechanisms into DNA"
    buss_definition: "An evolved psychological mechanism - procedures designed to take information and transform it via decision rules into output"
    problem_solved: "Chaos and the dread of death"

    how_it_works:
      step_1: "Body absorbs millions of bits of raw sensory stimuli"
      step_2: "Mind ignores 99% and concentrates on 1% that grabs attention"
      attention_trigger: "CHANGE - when conditions shift, we're under threat or surprised by luck"
      brodmann_area_10: "Where past flows into future, comparing prior events with current experience"

  eight_powers_of_story:
    1_self_awareness:
      description: "Power to distinguish subjective core self from objective public self"
      function: "Observe outer self as if separate personality"

    2_other_awareness:
      description: "Power to look behind eyes of another and sense consciousness like your own"
      becomes: "Empathy - identification + insight"

    3_memory:
      description: "Power to store and recall experience"
      function: "Builds understanding by recording patterns, stacking by common elements"
      application: "Uses patterns to control future by making history repeat"

    4_intelligence:
      description: "Power to extract knowledge and apply logical reasoning to conclusions"
      function: "Spots fallacies and refutes them; generates content"

    5_imagination:
      description: "Power to reshape reality into undreamed-of possibilities"
      function: "Renews calcified knowledge, gives tellings limitless variations"

    6_insight:
      description: "Power to see through appearances and perceive inner causalities"
      distinction: "Data measures outer results; insight discovers HOW and WHY"

    7_correlation:
      description: "Power to create - the essence of creativity"
      mechanism: "Takes two known things, seeks hidden connection (third thing) joining them in unprecedented way"

    8_self_expression:
      description: "Power to perform - harmonizes all powers to create stories"
      function: "Telling begins in one mind but ends in another"

definition_of_story:
  prime_definition: "A dynamic escalation of conflict-driven events that cause meaningful change in a character's life"
  core_event: "Conflict changes life"

  what_story_is_not:
    not_process: "Manufacturing accumulates; story PROGRESSES"
    not_hierarchy: "Corporate org charts describe how things get done, but tell no story"
    not_chronology: "List of growth marks over sequence of dates - just temporal process"
    not_journey: "Life zigzags elliptically - protagonist struggles dynamically, not passively"
    not_narrative: "All stories are narratives but not all narratives are stories"

  narrative_vs_story:
    narratives: "Flat, bland, repetitive, boring recitations - slide through mind like juice through a goose"
    stories: "Value-charged and progressive - mind embraces, imagination is natural home"

eight_stages_of_story_design:
  stage_1_target_audience:
    prime_principle: "Meaningful Emotional Effect"
    task: "Clear vision of audience and final effect on thoughts AND feelings"
    moneyball_example: "Adult sports lovers + deep understanding of hows/whys + gratification when quiet hero beats odds"

  stage_2_subject_matter:
    prime_principle: "Balance"
    components:
      - "Physical and social setting"
      - "Protagonist"
      - "Core value"
    key_rule: "The more specific the setting, the more universal the story's appeal"
    moneyball_example: "Billy Beane, GM of Oakland A's - success/failure value in balance"

  stage_3_inciting_incident:
    prime_principle: "Imbalance"
    function: "Unforeseen event that upsets balance of core character's life"
    mechanism: "Neutral charge of core value turns sharply positive or negative"
    moneyball_example: "Beane meets Peter Brand, discovers sabermetrics - hope for coming year (positive) but war with personnel (negative)"

  stage_4_object_of_desire:
    prime_principle: "Unfulfilled Need"
    definition: "What core character feels he must obtain to rebalance his life"
    moneyball_example: "Team in the World Series"

  stage_5_first_action:
    prime_principle: "Tactical Choice"
    function: "Action designed to cause positive reaction that delivers object of desire"
    moneyball_example: "Hires castoff players based on Brand's sabermetric scouting"

  stage_6_first_reaction:
    prime_principle: "Violation of Expectation"
    function: "Reality violates expectation - antagonistic forces more powerful than anticipated"
    mechanism: "Gap cracks open between subjective expectation and objective reality"
    moneyball_example: "A's lose 26 of first 46 games; Howe attacks sabermetrics as failure"

  stage_7_crisis_choice:
    prime_principle: "Insight"
    function: "In greater jeopardy, protagonist learns from reaction and chooses more difficult, riskier action"
    moneyball_example: "Beane trades away Howe's star to force use of sabermetric choice"

  stage_8_climactic_reaction:
    prime_principle: "Closure"
    function: "Second action causes climactic reaction matching expectations - grants object of desire"
    result: "Core character's life returns to balance"
    moneyball_example: "Team sets AL record of 20 wins in row, 103-59 finish, playoff berth"

  long_form_stories:
    prime_principle: "Progressive Action/Reaction"
    mechanism: "Stages 7 and 8 repeat with difference and escalate"
    pattern: "Violations swing struggles back and forth between positive and negative charges with progressive power"

core_values:
  definition: "Binaries of positive/negative charge that pump the lifeblood of story"
  examples:
    - "success/failure"
    - "truth/lie"
    - "loyalty/betrayal"
    - "love/hate"
    - "right/wrong"
    - "rich/poor"
    - "life/death"
    - "winning/losing"
    - "courage/cowardice"
    - "power/weakness"
    - "freedom/slavery"
    - "excitement/boredom"
    - "meaningfulness/meaninglessness"
    - "maturity/immaturity"
    - "justice/injustice"

  function: "When value's charge changes (positive to negative or reverse), event becomes meaningful and emotions flow"

  core_value_determines:
    - "Story's fundamental meaning"
    - "Unique emotional impact"

protagonist:
  definition: "Sun at center of solar system - supporting characters orbit around"
  can_be:
    - "Single character"
    - "Duo (Thelma and Louise)"
    - "Team (Inglourious Basterds)"
    - "Institution (CDC in Contagion)"
    - "All humanity (War of the Worlds)"

  empathy_vs_sympathy:
    sympathetic: "Likable - amiable person you might want as friend"
    empathetic: "Like me - innate trait shared by character and audience"
    requirement: "Sympathy is optional, empathy is ESSENTIAL"
    reason: "Audience involvement hinges on personal identification"

  center_of_good:
    function: "Positive human quality emanating from within character that audience identifies with"
    mechanism: "Audience sorts positives from negatives, seeking emotional door into story"

# ============================================================================
# PART 3: PUTTING STORY TO WORK
# ============================================================================

purpose_told_story:
  definition: "Story designed specifically to inspire a target action from target audience"

  call_to_action:
    mechanism: "Purpose-told story climax triggers mental process: IF protagonist's brand empowered victory, THEN I should buy"
    key_insight: "Protagonist must mirror target consumer while brand plays supporting role"

  story_psychology:
    transportation: "Readers/viewers unconsciously transfer attitudes and intentions from story to real life"
    green_brock_study: "Transported readers changed attitudes toward positions advocated by story"
    lasting_effect: "Transported readers' attitudes persisted two weeks later"

  protagonist_mirror_principle:
    rule: "Protagonist should be consumer, brand should be supporting character"
    anti_pattern: "Do NOT make your brand the protagonist"
    reason: "Consumer becomes empathetic protagonist pursuing object of desire"

  brand_as_mentor:
    mechanism: "Like Obi-Wan to Luke, brand helps protagonist achieve victory"
    effect: "Consumer concludes: IF brand empowered protagonist's victory, THEN I should get this brand"

storified_branding:
  hard_truth: "Nobody wants to hear about your company or your product"

  brand_definition:
    patrick_davis_model:
      attributes: "Adjectives describing characteristics"
      benefits: "Value customers gain"
      core_idea: "Brand's fundamental essence"

  brand_trust_crisis:
    2017_edelman_barometer:
      ceo_trust_drop: "12% - largest drop in 17 years"
      impersonal_institutions: "Least trusted - including corporations"

  storified_brand_solution:
    principle: "Tell stories that express values rather than brag about products"
    examples:
      dove_real_beauty:
        effect: "Changed conversation about women's self-image"
        mechanism: "Story expressed values audience already held"
      always_likeagirl:
        super_bowl_result: "Inspired 4.5 billion impressions worldwide"
        mechanism: "Reframed derogatory phrase as empowering"
      ariel_sharetheload:
        context: "India - women do 10x housework vs US"
        effect: "2 million men pledged to #ShareTheLoad"
        result: "Market share increase + brand affinity"

storified_advertising:
  principle: "Ads work best when interruption tells a story that hooks, holds, and entertains"

  ge_what_about_owen_campaign:
    setup: "Computer science grad takes job at GE instead of tech startup"
    format: "Six short episodes showing reactions"
    result: "Job applications to GE software division jumped 800%"
    insight: "Story made invisible work tangible and exciting"

storified_demand_generation:
  content_marketing_continuum:
    stage_1_no_content: "No content marketing presence"
    stage_2_random: "Random, uncoordinated content"
    stage_3_coordinated: "Coordinated content strategy"
    stage_4_integrated: "Fully integrated with business goals"
    stage_5_continuous: "Continuous optimization based on data"

  cmo_challenge:
    tenure: "Average CMO tenure just 42 months"
    pressure: "Must deliver results while building long-term brand"

  colgate_oral_care_example:
    monthly_visits: "2.7 million"
    organic_keywords: "300,000+"
    equivalent_adwords_cost: "$93 million annually"
    method: "Educational content about dental health - no bragging or promising"

building_audience:
  three_ways_to_earn_audience:
    1_search:
      mechanism: "Content optimized for search queries"
      google_dominance: "3.5 billion searches daily"
      key: "Rank on first page - 71% of clicks go to page 1"

    2_social:
      challenge: "Organic reach declining - Facebook reported <2% for pages"
      solution: "Create shareable, emotionally resonant stories"
      influencer_strategy: "Partner with aligned influencers for amplification"

    3_personalization:
      statistic: "74% of consumers frustrated by irrelevant content"
      solution: "Tailor story experiences based on user data"
      result: "Higher engagement and conversion"

storified_sales:
  b2b_application:
    principle: "Features tell, stories sell"

    traditional_failure:
      numbers_game: "X calls = Y meetings = Z sales"
      result: "Rarely hooks attention when anyone answers"

    storified_approach:
      step_1: "Research client's inciting incident"
      step_2: "Identify their object of desire"
      step_3: "Understand their failed first actions"
      step_4: "Position your solution as enabling their success"

  email_hook_formula:
    acknowledge: "Reference their inciting incident"
    empathize: "Show understanding of their struggle"
    offer: "Position solution that resolves their story"

  prospect_ranking_by_story:
    1_highest: "Companies that experienced negative inciting incident"
    2_high: "Companies that experienced positive inciting incident"
    3_medium: "Companies preparing for negative inciting incident"
    4_lower: "Companies preparing for positive inciting incident"
    5_lowest: "Companies in balance with no prospect of change"

# ============================================================================
# MEASUREMENT: -NOMICS
# ============================================================================

measuring_story_success:
  ultimate_metric: "Margin growth - loved brands charge more for same thing"

  key_content_metrics:
    organic_reach: "How many unique people visit content"
    audience_composition: "Who actually reads the content"
    engagement: "Time spent, frequency of return, social sharing"

  b2c_measurement:
    overstock_example:
      story_site_visitors: "70% then shop at Overstock.com"
      conversion_lift: "7x higher than visitors acquired elsewhere"
      transaction_value: "35% more per transaction"

  b2b_measurement:
    integration_stack:
      content_platform: "Skyword, Kapost"
      marketing_automation: "Marketo, Eloqua, Pardot"
      sales_automation: "Salesforce"
    result: "Know exactly which stories generate which leads and sales"

  sales_success_metrics:
    calls_to_meetings_ratio: "Do inquiries hook prospects?"
    meetings_to_proposals_ratio: "How well does qualification work?"
    close_rate: "Do storified pitches work?"
    asp_change: "Are we getting greater value for core offering?"

