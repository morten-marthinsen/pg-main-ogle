algorithm_priorities:
  primary_metric: engagement_and_saves
  core_principle: "Instagram rewards creators who use all features and drive saves/shares"

  ranking_signals:
    tier_1_critical:
      - save_rate:
          weight: highest
          description: "Saves indicate high-value content"
          benchmark: "1-3% save rate is strong"
          strategy: "Saveable = educational, lists, reference material"
      - share_rate:
          weight: highest
          description: "Shares to DMs and Stories"
          strategy: "Create 'tag a friend' or 'send to someone who needs this'"
      - engagement_velocity:
          weight: highest
          description: "Engagement in first 30-60 minutes"
          strategy: "Engage with audience before and after posting"

    tier_2_important:
      - comment_depth:
          weight: high
          description: "Not just comments, but conversations"
          strategy: "Reply to every comment, ask follow-ups"
      - watch_time:
          weight: high
          description: "For Reels - completion and rewatch"
          benchmark: "70%+ completion for Reel push"
      - profile_visits:
          weight: medium_high
          description: "Shows interest beyond single post"

    tier_3_supporting:
      - like_rate:
          weight: medium
          description: "Lowest value engagement signal"
      - story_engagement:
          weight: medium
          description: "Replies, poll answers, stickers"
      - feature_usage:
          weight: medium
          description: "Using Reels, Stories, Lives, etc."

