algorithm_priorities:
  primary_metric: engagement_velocity_and_conversation
  core_principle: "X rewards content that sparks conversation and gets amplified through replies, retweets, and quotes"

  ranking_signals:
    tier_1_critical:
      - reply_rate:
          weight: highest
          description: "Replies indicate conversation value"
          strategy: "Provocative takes, open questions"
      - retweet_rate:
          weight: highest
          description: "Retweets = distribution amplifier"
          strategy: "Create quotable, shareable content"
      - engagement_velocity:
          weight: highest
          description: "Speed of engagement in first hour"
          strategy: "Post when audience is active"

    tier_2_important:
      - quote_tweets:
          weight: high
          description: "Quote tweets drive conversation"
          strategy: "Create content worth adding to"
      - bookmark_rate:
          weight: high
          description: "Saves for later = high value"
          strategy: "Lists, frameworks, references"
      - time_spent:
          weight: medium_high
          description: "Time reading thread/content"

    tier_3_supporting:
      - like_rate:
          weight: medium
          description: "Basic engagement signal"
      - profile_clicks:
          weight: medium
          description: "Interest in author"
      - link_clicks:
          weight: medium
          description: "If link included"

distribution_mechanics:
  for_you_feed:
    description: "Algorithm-curated main feed"
    factors:
      - "Engagement from accounts you follow"
      - "Engagement from similar interest accounts"
      - "Recency of post"
      - "Author credibility score"

  following_feed:
    description: "Chronological from follows"
    strategy: "Build engaged follower base for guaranteed reach"

  search_and_trending:
    description: "Hashtag and keyword discovery"
    strategy: "Participate in relevant trending topics"

  reply_visibility:
    description: "Replies can surface in main feeds"
    strategy: "Reply to large accounts with value-add content"

content_optimization:
  thread_narrative:
    principle: "Threads outperform single tweets for depth"

    structure:
      tweet_1: "Hook - curiosity, controversy, or promise"
      tweets_2_n: "Deliver value, one idea per tweet"
      final_tweet: "Summary + CTA (follow, retweet, reply)"

    thread_mechanics:
      - "Number tweets (1/ or [1/10])"
      - "Make each tweet standalone valuable"
      - "Include visuals every 3-4 tweets"
      - "End with engagement ask"

    thread_loop:
      - "Final tweet references first"
      - "Retweet first tweet with final"
      - "Pin thread when complete"

  reply_ladder:
    principle: "Build following by adding value in replies"

    execution:
      - "Reply to large accounts in your niche"
      - "Add genuine value, not generic praise"
      - "Be early to popular tweets"
      - "Include your unique perspective"

    visibility_boost:
      - "Getting reply from original poster"
      - "Engagement on your reply"
      - "Your followers engaging"

  quote_tweet_leverage:
    principle: "Quote tweets add your voice to others' content"

    strategies:
      - "Add contrarian take to viral tweet"
      - "Expand on thread with your experience"
      - "Disagree respectfully with reasoning"
      - "Apply concept to your niche"

