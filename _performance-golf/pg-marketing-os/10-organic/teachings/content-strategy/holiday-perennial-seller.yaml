source_quotes:

  # --- INTRODUCTION ---

  - id: sq_01
    quote: "In other words, classics stay classic and become more so over time. Think of it as compound interest for creative work."
    chapter: "Introduction"
    context: "Holiday explaining the Lindy effect — every day something lasts increases the chances it will continue to last"
    application_to_content: "Build content that compounds. Each year it survives adds future life expectancy. Invest in timeless over trendy."

  - id: sq_02
    quote: "We're all selling ideas. Whatever the form, the process is the same. And if we get really good at it and we think about it the right way, our idea can sell forever, an infinite number of times."
    chapter: "Introduction"
    context: "Holiday's thesis that the perennial seller framework applies across all creative industries — books, music, film, startups, restaurants"
    application_to_content: "Whether you create content, courses, music, or products — the principles of lasting work are universal."

  # --- PART I: THE CREATIVE PROCESS ---

  - id: sq_03
    quote: "Even the best admen will admit that, over the long term, all the marketing in the world won't matter if the product hasn't been made right. In fact, it's a classic 'measure once, cut twice' scenario, in that the better your product is, the better your marketing will be. The worse it is, the more time you will have to spend marketing and the less effective every minute of that marketing will be."
    chapter: "Part I — The Creative Process"
    context: "Holiday arguing against the 80/20 rule of spending 80% on promotion and 20% on creation"
    application_to_content: "Quality is the ultimate marketing strategy. Great work reduces the marketing burden; mediocre work multiplies it."

  - id: sq_04
    quote: "It starts by wanting to create a classic."
    chapter: "Part I — The Work Is What Matters"
    context: "Holiday quoting his mentor Robert Greene on the first prerequisite for perennial success"
    application_to_content: "Intent shapes outcome. Begin every project with the explicit ambition to create something that endures."

  - id: sq_05
    quote: "Lots of people want to be the noun without doing the verb."
    chapter: "Part I — Ideas Are Not Enough"
    context: "Holiday quoting poet Austin Kleon on the gap between wanting to be a creator and actually creating"
    application_to_content: "Execution separates perennial creators from dreamers. The work itself is the only path to lasting impact."

  - id: sq_06
    quote: "Focus on the things that don't change."
    chapter: "Part I — Great Things Are Timeless and Take Time"
    context: "Holiday citing Jeff Bezos's advice to employees, connecting it to Hamilton's enduring Federalist Papers and Seinfeld's timeless comedy"
    application_to_content: "Anchor content to permanent human concerns — status, meaning, identity, mastery — not platform features or current events."

  - id: sq_07
    quote: "If you listen to the greatest music ever made, that would be a better way to find your own voice to matter today than listening to what's on the radio and thinking: 'I want to compete with this.' It's stepping back and looking at a bigger picture than what's going on at the moment."
    chapter: "Part I — Short Term vs. Long Term"
    context: "Holiday quoting record producer Rick Rubin's advice to artists about finding inspiration in timeless work rather than current trends"
    application_to_content: "Study the greatest work ever created in your field, not what's trending this week. That's how you find your enduring voice."

  - id: sq_08
    quote: "Who is this thing for? Instead, many creators want to be for everyone . . . and as a result end up being for no one."
    chapter: "Part I — The Question Almost No One Asks"
    context: "Holiday on the critical importance of defining a specific audience before and during the creative process"
    application_to_content: "Define your audience with surgical precision. Perennial sellers start as cult favorites loved intensely by a narrow group."

  - id: sq_09
    quote: "The best art divides the audience. If you put out a record and half the people who hear it absolutely love it and half the people who hear it absolutely hate it, you've done well. Because it is pushing that boundary."
    chapter: "Part I — Bold, Brash, and Brave"
    context: "Holiday quoting Rick Rubin on producing Slayer's Reign in Blood — refusing to water down the heaviest album ever for mainstream appeal"
    application_to_content: "Polarizing work builds passionate communities. Content that tries to offend no one inspires no one either."

  # --- PART II: POSITIONING ---

  - id: sq_10
    quote: "Nobody creates flawless first drafts. And nobody creates better second drafts without the intervention of someone else. Nobody."
    chapter: "Part II — Find Your Editor"
    context: "Holiday on the necessity of external feedback, citing Harper Lee's editor transforming her manuscript into To Kill a Mockingbird over two years of rewrites"
    application_to_content: "Every piece of content needs a trusted outside perspective. The gap between good and perennial is bridged by feedback."

  - id: sq_11
    quote: "Positioning is what your project is and who it is for. Packaging is what it looks like and what it's called. The Pitch is the sell — how the project is described and what it offers to the audience."
    chapter: "Part II — Positioning, Packaging, and the Pitch"
    context: "Holiday's framework for the three critical variables that determine whether work gets attention"
    application_to_content: "Every piece of content needs clear positioning (what/who), packaging (visuals/title), and pitch (why care). All three must align."

  - id: sq_12
    quote: "You can't judge a book by its cover? It's total nonsense. Of course you can judge a book by its cover — that's why books have covers. They're designed to catch people's attention and draw them toward the work — and away from all the other works that stand equal on the shelf."
    chapter: "Part II — Positioning, Packaging, and the Pitch"
    context: "Holiday demolishing the cliche to argue that presentation is a critical competitive advantage"
    application_to_content: "Thumbnails, headlines, cover images — these are not afterthoughts. They are your first and often only chance to earn attention."

  # --- PART III: MARKETING ---

  - id: sq_13
    quote: "These are all organic, natural recommendations of products or ideas — and they are, without question, the single most powerful force in the life of a product. No one has the steam or the resources to actively market something for more than a short period of time, so if a product is going to sell forever, it must have strong word of mouth. It must drive its own adoption. Over the long haul, this is the only thing that lasts."
    chapter: "Part III — Only One Thing Matters: Word of Mouth"
    context: "Holiday establishing word of mouth as the single non-negotiable requirement for perennial success"
    application_to_content: "Engineer your content for word of mouth from day one. Make it so good that NOT sharing it feels like a disservice."

  - id: sq_14
    quote: "Find one person who trusts you and sell him a copy. Does he love it? Is he excited about it? Excited enough to tell ten friends because it helps them, not because it helps you? Tribes grow when people recruit other people. That's how ideas spread as well. They don't do it for you, of course. They do it for each other."
    chapter: "Part III — Only One Thing Matters: Word of Mouth"
    context: "Holiday quoting Seth Godin on how word-of-mouth success begins with a single customer"
    application_to_content: "Start with one true fan. If they won't evangelically share your work, the content isn't good enough yet — refine it."

  # --- PART IV: PLATFORM ---

  - id: sq_15
    quote: "A platform is the combination of the tools, relationships, access, and audience that you have to bring to bear on spreading your creative work — not just once, but over the course of a career."
    chapter: "Part IV — What's a Platform?"
    context: "Holiday's comprehensive definition of platform beyond just social media followers"
    application_to_content: "Your platform is not your follower count. It is your email list, your relationships, your body of work, your community, and your reputation — combined."

  - id: sq_16
    quote: "If I could give a prospective creative only one piece of advice, it would be this: Build a list. Specifically, an email list."
    chapter: "Part IV — Build Your List. Build Your List. Build Your List."
    context: "Holiday's single most important tactical recommendation for creators, citing email's 50-year track record via the Lindy effect"
    application_to_content: "Email is the only distribution channel you fully own. Social media followers are rented. Email subscribers are yours."

  - id: sq_17
    quote: "Platform is not a stepping stone. It is the finish line."
    chapter: "Part IV — Why You Need a Platform"
    context: "Holiday quoting Casey Neistat, who left Hollywood film distribution to build direct audience relationships on YouTube"
    application_to_content: "Don't build a platform hoping it leads to a deal. The platform IS the deal. Direct audience access is the ultimate asset."

  # --- CONCLUSION ---

  - id: sq_18
    quote: "It feels nice for a moment, then surreal, then back to work."
    chapter: "Conclusion — What's Luck Got to Do with It?"
    context: "Craig Newmark (founder of Craigslist) when Holiday asked what it felt like to have created something used by millions for over twenty years"
    application_to_content: "The perennial seller mindset is never 'done.' Each success is a brief moment before the next iteration begins."

skill_mappings:
  S04_content_architecture: |
    Build content libraries, not content feeds. Architect your content as interconnected
    perennial assets that cross-reference and reinforce each other. Use the content atom
    model to create core pieces that generate 12-20+ derivative pieces. Structure content
    in modular, updatable formats that maintain relevance across years. Prioritize depth
    over breadth — own one territory completely rather than participate in many.
  S07_campaign_brief: |
    Design campaigns with a perennial core and trending surface. Every campaign should
    produce at least one timeless asset alongside its time-sensitive elements. Brief
    campaigns with the hybrid strategy: 60-70% perennial core, 20-30% trending surface,
    10% bridge content. Ensure campaign messaging passes the timelessness test before launch.
    Engineer word-of-mouth into every campaign — make the work remarkable, easy to describe,
    triggered by recurring situations, and status-enhancing to share.
  S18_repurpose_multiplication: |
    Use the content atom model to multiply every core piece into 12-20+ platform-native
    pieces. Create downstream products from perennial content: ebooks from blog posts,
    courses from frameworks, tools from methodologies. Build platform-proof assets by
    ensuring every piece exists in a format you control. Refresh perennial content with
    updated examples while keeping timeless principles intact. Structure content for
    modular updating — swap examples without rebuilding the framework.
