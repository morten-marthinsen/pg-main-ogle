# SECRET #11 ==================================================================
perfect_webinar_framework:
  framework_name: "The Perfect Webinar Framework"
  source_quote: >
    "What I discovered from the best people in the business was that teaching
    the best content hurts sales. But learning how to identify, break, and
    rebuild false belief patterns gets people to take the action they need
    in order to change."
  principle: >
    The Perfect Webinar is not a webinar — it is a universal one-to-many
    selling framework that works on stages, in webinars, on Facebook Lives,
    in video sales letters, on podcasts, in email sequences, and on sales
    pages. The framework revolves around three core phases: The Big Domino,
    The Three Secrets, and The Stack and Closes. The key insight: do NOT
    teach tactics. Teach strategy (what to do) and use stories to break
    false beliefs. Reserve the tactical how for paying customers.

  three_phases:
    phase_1_big_domino: "Introduce the new opportunity through your origin Epiphany Bridge story"
    phase_2_three_secrets: "Break the three core false beliefs (Vehicle, Internal, External) through frameworks and stories"
    phase_3_stack_and_closes: "Present the offer using the Stack and close with specific proven closes"

  timing_90_minutes:
    first_15_min: "Intro, Big Domino, and Origin Story"
    next_15_min: "Secret #1 — Vehicle Framework Story"
    next_15_min_2: "Secret #2 — Internal Beliefs Story"
    next_15_min_3: "Secret #3 — External Beliefs Story"
    last_30_min: "Stack and Closes"

  timing_30_minutes:
    first_5_min: "Intro, Big Domino, and Origin Story"
    next_5_min: "Secret #1 — Vehicle Framework Story"
    next_5_min_2: "Secret #2 — Internal Beliefs Story"
    next_5_min_3: "Secret #3 — External Beliefs Story"
    last_10_min: "Stack and Closes"

  key_ratio: >
    The ratios stay the same regardless of time available. One-sixth intro/Big Domino,
    one-sixth per secret, two-sixths for Stack and closes. You expand or compress
    stories based on time, but the structure never changes.

  strategy_not_tactics:
    source_quote: >
      "This is not a teaching presentation; this is a presentation to
      inspire people to take action and change their lives. You can teach
      the strategy (what they need to do) but do not teach the tactics
      (how they need to do it). Teaching the tactics is what you do after
      they have purchased."
    why_it_works: >
      If you teach tactics without first breaking beliefs, people go back
      to their old patterns. Belief change must happen BEFORE tactical
      implementation. The act of buying creates commitment that drives action.
    source_quote_2: >
      "Dozens of my friends have come to my events as free guests, where
      someone sitting next to them had paid $50,000 to be in the same room.
      The strange thing is that so far none of these friends have ever
      launched successful businesses from the info they got at the event.
      None. Yet for those who paid to be in the room, our success rate is
      almost 100 percent."

  organic_application: >
    You do not need a webinar to use this framework. Every long-form content
    piece — a 10-minute YouTube video, a podcast episode, a detailed thread,
    a multi-part email sequence, an Instagram Live — can follow the Perfect
    Webinar structure. The key principle for organic content: teach the WHAT,
    not the HOW. Your free content builds belief and desire. Your paid content
    delivers implementation. This single distinction will 10x the effectiveness
    of your organic-to-paid conversion pipeline.

  implementation:
    - "Identify your Big Domino statement"
    - "Create your origin Epiphany Bridge story (first 15 minutes)"
    - "Identify three core false beliefs (vehicle, internal, external)"
    - "Create a framework with an Epiphany Bridge story for each false belief"
    - "Build your Stack Slide with all offer elements and values"
    - "Practice the full presentation until it flows naturally"
    - "Record it and plug it into your funnels"

  common_mistakes:
    - "Teaching too much tactical content and killing sales"
    - "Trying to get people to believe multiple things instead of one Big Domino"
    - "Skipping the story for each secret and going straight to the framework"
    - "Not including case studies and social proof"
    - "Making the presentation about you instead of about their transformation"

# SECRET #12 ==================================================================
big_domino:
  framework_name: "The Big Domino"
  source_quote: >
    "If I can make them believe that (my new opportunity) is the key to
    (the result they desire most) and is only attainable through (my
    specific vehicle/frameworks), then all other objections and concerns
    become irrelevant and they have to give me money."
  principle: >
    The entire presentation exists to knock down ONE belief — the Big Domino.
    If that one belief falls, all other objections become irrelevant. Every
    additional belief you ask someone to accept cuts conversions by 50% or
    more. Your three secrets are not new beliefs — they are different angles
    of attack on the same Big Domino. Find the ONE thing, and build
    everything around it.

  big_domino_statement_template: >
    If I can make them believe that [new opportunity] is the key to
    [what they desire most], and it is only attainable through [my specific
    vehicle/framework], then all other objections become irrelevant
    and they have to give me money.

  modus_ponens_logic:
    source_quote: >
      "If A, then B. A. Therefore, B."
    application: >
      If funnels are the key to online business success (A), and
      ClickFunnels is the only way to easily build funnels (B), then
      you must use ClickFunnels. The entire presentation exists to
      establish A as true in the listener's mind. Once A falls,
      B is inevitable.

  valid_vs_invalid_big_domino:
    invalid_example: >
      'If I can make people believe that cutting calories and exercising
      is the key to losing weight...' — This fails because it is an
      improvement offer, not a new opportunity. There are hundreds of
      identical programs. This is a red ocean, not a blue ocean.
    valid_example: >
      'If I can make them believe that ketosis is key to losing weight
      and is attainable only through my proprietary framework that gets
      your body into ketosis within 10 minutes...' — This is a new
      opportunity with a specific vehicle. Blue ocean.

  who_what_statement:
    template: "I am going to teach [submarket] how to [result] through [your niche/new opportunity]."
    examples:
      - "I am going to teach real estate investors how to make money through flipping houses on eBay."
      - "I am going to teach people who are sick of dieting how to lose weight by drinking ketones."

  title_formula:
    template: "How to [result they desire most] without [thing they fear most]"
    examples:
      - "How to Create a Seven-Figure Funnel in Less Than 30 Minutes without Having to Hire a Tech Guy"
      - "How to Stop Exercising and Still Lose Weight through a Little-Known Trick That Almost Instantly Puts Your Body into Ketosis, without Giving up Your Favorite Carbs"

  one_sentence_persuasion:
    source: "Blair Warren's One Sentence Persuasion Course"
    source_quote: >
      "People will do anything for those who encourage their dreams, justify
      their failures, allay their fears, confirm their suspicions, and help
      them throw rocks at their enemies."
    application_in_presentations:
      justify_failures: "If you've failed at this in the past, it's not your fault."
      allay_fears: "If you've been concerned you can't succeed, I want to put those fears to rest."
      throw_rocks: "The big corporations want you to think you need venture capital. They're wrong."
      confirm_suspicions: "If you've ever thought the system is designed to keep you down, you're right."
      encourage_dreams: "I know you have a dream to change the world, and I want to show you how."

  organic_application: >
    Every content series should have one Big Domino. Do not scatter your
    content across unrelated beliefs. Your audience should hear the same
    core message — from different angles, through different stories, in
    different formats — until the Big Domino falls. Your content calendar
    is not a random collection of topics. It is a systematic multi-angle
    assault on one belief that, when it falls, converts your audience.

  implementation:
    - "Write your Big Domino statement using the template"
    - "Test it — if it requires believing in an improvement offer, rewrite it as a new opportunity"
    - "Write your who/what statement"
    - "Create a title using the 'How to X without Y' formula"
    - "Build your intro using all five elements of Blair Warren's persuasion framework"
    - "Map every content piece to one of the three angles of attack on your Big Domino"

  common_mistakes:
    - "Having multiple Big Dominos (each additional belief halves conversions)"
    - "Building a Big Domino around an improvement offer instead of a new opportunity"
    - "Not making the Big Domino specific enough — 'funnels are great' vs. 'funnels are the ONLY key to online business success'"
    - "Teaching random content instead of systematically attacking the Big Domino from different angles"

# SECRET #13 ==================================================================
three_secrets:
  framework_name: "The Three Secrets (Breaking and Rebuilding Belief Patterns)"
  source_quote: >
    "In a perfect world, you would present someone with your new opportunity,
    you'd know what the Big Domino was, you'd tell an Epiphany Bridge story
    to give them a new belief, the Big Domino would fall, and you'd have a
    customer or follower for life. Sometimes that does happen. One good
    epiphany story and they're all in. Many times, though, once you change
    that big belief for them, they immediately start coming up with other
    concerns."
  principle: >
    After your origin story introduces the Big Domino, three categories
    of false beliefs will surface: beliefs about the Vehicle itself, beliefs
    about their own Internal ability, and beliefs about External forces.
    For each, you state the secret (curiosity-driven title), introduce
    your framework, tell the Epiphany Bridge story about how you learned
    or earned it, teach the strategy (not tactics), show case studies, and
    break additional false beliefs with supporting stories.

  three_false_belief_categories:
    false_belief_1_the_vehicle:
      description: "They doubt whether the new opportunity itself will work"
      example: "Funnels sound cool, but I don't understand how they would work for me."
      treatment: "Tell the Epiphany Bridge story about HOW you discovered/developed the vehicle framework. Teach strategy. Show case studies."

    false_belief_2_internal:
      description: "They doubt their own ability to execute"
      example: "I'm sold on funnels, but I'm not technically inclined, so I don't think I could build one."
      treatment: "Tell the Epiphany Bridge story about how YOU (or someone like them) overcame the same internal doubt. Show the framework that makes it easy."

    false_belief_3_external:
      description: "They believe outside forces will stop them"
      example: "I think I could build a funnel, but even if I did, I don't know how to drive traffic into it."
      treatment: "Tell the Epiphany Bridge story about how you overcame the external obstacle. Show the framework for handling it."

  rewriting_secrets_as_curiosity_hooks:
    principle: >
      Rewrite each false belief as a 'secret' using a 'how to' statement that
      hints at your framework. Curiosity is the key.
    example:
      secret_1: "Funnel Hacking: How to Ethically Steal More Than $1,000,000 Worth of Funnel Hacks from Your Competitors for Less Than $100"
      secret_2: "Funnel Cloning: How to Clone a Proven Funnel (Inside of ClickFunnels) in Less Than 10 Minutes"
      secret_3: "My #1 Traffic Hack: How to Get the Exact Same Customers Who Are Currently Going to Your Competitors to Start Coming to Your Funnel Instead!"

  supporting_epiphany_bridge_stories:
    source_quote: >
      "Jason Fladlien spent about 90 minutes busting every objection. He'd
      say, 'You're probably thinking (insert false belief), right? Well,
      (tell quick Epiphany Bridge story).' He went on for about 50 false
      beliefs. At the end of the webinar, we sold three times more during
      his 90 minutes than we sold in the first 90 minutes."
    technique: >
      After teaching each secret, add rapid-fire supporting stories
      using the pattern: 'You're probably thinking X, right? Well,
      actually...' Each story takes 30-60 seconds and breaks one
      additional false belief.

  organic_application: >
    The Three Secrets framework maps directly to your content pillars.
    Pillar 1: Vehicle content (why your method works). Pillar 2: Internal
    belief content (you CAN do this). Pillar 3: External belief content
    (nothing external can stop you). Each pillar gets its own stories,
    frameworks, and case studies. Your content calendar should rotate
    through all three pillars weekly. The 'You're probably thinking X,
    right?' format is perfect for short-form video content and Instagram
    Stories.

  implementation:
    - "Identify the ONE core false belief for each category (vehicle, internal, external)"
    - "Rewrite each as a curiosity-driven secret title"
    - "Create an Epiphany Bridge story for each core false belief"
    - "Create a named framework that addresses each false belief"
    - "Gather case studies for each secret"
    - "List 10+ supporting false beliefs per category and create 30-60 second stories for each"
    - "Build content pillars around the three categories"

  common_mistakes:
    - "Treating the three secrets as three NEW beliefs instead of three angles on the Big Domino"
    - "Teaching tactics instead of strategy during the content section"
    - "No case studies or social proof for each secret"
    - "Skipping the supporting Epiphany Bridge stories (this is where most extra sales come from)"
    - "Making the secrets boring instead of curiosity-driven"

# SECRET #14 ==================================================================
the_stack:
  framework_name: "The Stack (Offer Presentation Framework)"
  source_quote: >
    "The only thing prospects remember when you sell is the last thing you
    show them. The Stack solves this problem by changing how you structure
    the way you introduce and show your offer and its bonuses."
  principle: >
    When presenting an offer, most people list the core product, then
    add bonuses, ending with the last bonus. The audience only remembers
    the last item and associates the price with that final element.
    The Stack solves this by keeping all elements visible on one slide.
    After introducing each new element, you return to the Stack Slide
    showing ALL elements with a running total value. The last thing they
    see before the price is the FULL offer, not just the last bonus.
    This single technique has generated more revenue than anything else
    Brunson has ever done.

  stack_slide_mechanics:
    step_1: "Introduce Element #1 (core product), tell its story, show value on Stack Slide"
    step_2: "Introduce Element #2 (frameworks/training), tell its story, add to Stack Slide with running total"
    step_3: "Continue for each element — always returning to the Stack Slide with cumulative value"
    step_4: "Show the Big Stack Slide with EVERYTHING listed and total value (should be 10x the price)"
    step_5: "Use 'If All' statements to get them to confirm the value"
    step_6: "Reveal the actual price (massive contrast to the stacked value)"

  if_all_close:
    source_quote: >
      "Now obviously, I'm not going to charge you $11,552. But if I DID
      charge you $11,552, and all it did was [Secret #1 result], would
      it be worth it to you?"
    three_if_all_statements:
      - "Vehicle: If all this did was [Secret #1 result], would it be worth $X?"
      - "Internal: And if all it did was [Secret #2 result], would it be worth $X?"
      - "External: And what if all it did was [Secret #3 result], would it be worth it?"
    result: >
      They say yes three times at the full stacked value. When you reveal
      the actual price (90% discount from their confirmed value), it becomes
      an irresistible offer.

  key_slides_in_stack_sequence:
    - "Transition to selling (recap three secrets)"
    - "The Question ('Let me ask you a question...')"
    - "Core product introduction with story"
    - "You'll be able to / You'll be able to get rid of"
    - "Problem this product solved for you"
    - "How much time/money it saves them"
    - "Stack Slide #1 (core product + value)"
    - "Each additional element + updated Stack Slide"
    - "Big Stack Slide (all elements + total value)"
    - "If All statements"
    - "I Had Two Choices close"
    - "What would the end result be worth?"
    - "Price drop and reveal"
    - "Price justification"
    - "Two choices close"
    - "Guarantee"
    - "The real question"
    - "Last Stack Slide"
    - "Urgency/scarcity bonus"
    - "Closing CTA and Q&A"

  source_quote_on_importance: >
    "And that is the Stack. That single concept has made me more money than
    anything else I've ever done in this business. Study it. Master it.
    There is no greater gift I could give you than this."

  organic_application: >
    The Stack principle applies to how you present ANY offer in organic
    content. When promoting a product, do not just name the product and
    its price. Build up the value element by element. In a carousel post,
    each slide adds a new element of value. In a caption, layer in
    benefits progressively. In a video, reveal components one by one.
    The audience should feel the value compounding before you ever
    mention price. Even in a simple Story series, you can stack value
    across 5-7 slides before the CTA.

  implementation:
    - "List every element of your offer with individual values"
    - "Ensure total stacked value is at least 10x the actual price"
    - "Create a story (learned or earned) for each element"
    - "Build a visual Stack Slide showing all elements and running total"
    - "Write three 'If All' statements tied to your three secrets"
    - "Include urgency and scarcity in every offer presentation"
    - "Apply the Stack principle to all organic content that promotes an offer"

  common_mistakes:
    - "Listing bonuses separately instead of stacking them visually"
    - "Total value is not 10x the price (add more value to the offer)"
    - "No story behind each offer element (reduces perceived value)"
    - "Skipping 'If All' statements (misses the psychological anchoring)"
    - "No urgency or scarcity (people delay and never come back)"
    - "Going deep into module-by-module details (overwhelms the audience)"

# SECRET #15 ==================================================================
trial_closes:
  framework_name: "Trial Closes (The Pied Piper Technique)"
  source_quote: >
    "I've been asking you dozens of little yes-or-no questions where the
    only answer is yes. You instantly started nodding, and you didn't stop
    until I pointed it out just now." — Ted Thomas, as quoted by Brunson.
  principle: >
    Trial closes are simple yes-or-no questions sprinkled throughout your
    content where the only reasonable answer is yes. They create a
    pattern of agreement that makes the final ask (for money or action)
    feel natural rather than abrupt. Brunson added trial closes to an
    existing automated webinar and revenue jumped from $9.45 to $16.50
    per registrant — a 74% increase from this one technique alone.

  examples:
    - "Are you ready to get started?"
    - "Are you all getting this?"
    - "Is this making sense?"
    - "Can you imagine if that happened to you?"
    - "Isn't that cool?"
    - "Isn't that exciting?"
    - "Am I right?"
    - "Can you see yourself doing ________?"
    - "I'm sure you've noticed this too, right?"
    - "Would you like to be our next case study?"
    - "You've heard them talk about this before, right?"

  most_powerful_placement:
    source_quote: >
      "The most powerful times to use trial closes are right after you've
      shared a case study or success story from one of your students.
      Many times people will share their story and then quickly move on.
      If you notice when I share any story, I'll always pause, and then
      drop a half dozen trial closes before I move on. 'Did you hear that?
      Isn't that amazing? Can you imagine what your life would be like if
      that happened to you? Are you getting this?!'"

  organic_application: >
    Trial closes work in written content just as well as spoken content.
    In captions: 'Can you relate?' 'Has this happened to you?' 'Makes
    sense, right?' In video: pause after key points and ask a rhetorical
    yes-question. In Stories: use the poll sticker with 'yes' answers.
    In threads: end threads with 'If you agree, repost this.' Trial
    closes drive both engagement metrics AND psychological agreement
    patterns that make your CTAs convert higher.

  implementation:
    - "Write 20 trial close questions that fit your niche"
    - "Place them throughout your content — after every key point, case study, or framework"
    - "In video content, pause and make eye contact after each trial close"
    - "In written content, use trial closes as engagement-driving questions"
    - "After every success story, add 3-5 trial closes before moving on"
    - "Use poll stickers and interactive features as trial closes on social media"

  common_mistakes:
    - "Only asking for the 'yes' at the very end (the final CTA)"
    - "Moving too quickly past success stories without pausing for trial closes"
    - "Making trial closes feel forced or unnatural (they should flow conversationally)"
    - "Not using enough — Brunson uses dozens per presentation"

