# SECRET #1 ===================================================================
finding_your_voice:
  framework_name: "Finding Your Voice — The Five Phases of Becoming an Expert"
  source_quote: >
    "People are silently begging to be led." — Jay Abraham, as quoted by Brunson.
    "We realize the only way to keep growing isn't to learn more, but instead to
    shift our focus from personal growth to contribution. It's only by shifting
    our focus to helping others that we continue to grow."
  principle: >
    Everyone goes through five distinct phases on their journey to becoming
    an expert. You do not need a PhD or decades of experience. You need to
    be at least one chapter ahead of the people you serve. The shift from
    learner to teacher is where mastery accelerates — because teaching
    forces you to break down what you know into frameworks others can follow.
    Contribution is the key to continued growth.

  five_phases:
    phase_1_the_dreamer:
      description: >
        You consume everything about a topic. You read books, watch videos,
        attend events. You are fascinated but have not yet taken action.
      source_quote: >
        "During this first phase of his growth, he spent over 10,000 hours
        watching, reading, and studying everything he could find."
      organic_application: >
        Share your learning journey. Document what you are consuming and
        what excites you. 'Currently reading X and here is the one idea
        that blew my mind' posts build early audience rapport.

    phase_2_the_reporter:
      description: >
        You start interviewing and learning from others who have already
        achieved what you want. You document what they teach you.
      source_quote: >
        "Bruce Lee said, 'Research your own experience. Absorb what is
        useful, reject what is useless, add what is essentially your own.'"
      organic_application: >
        Interview experts in your niche. Create content from those
        interviews. You build authority by association while learning.
        Podcast episodes, Instagram Lives, and collaboration posts all
        serve this phase.

    phase_3_the_framework_creator:
      description: >
        You take what you have learned and start organizing it into
        your own frameworks. You name your processes and systems.
      source_quote: >
        "As I broke down the move into smaller pieces to teach to the
        kids, I started to look at the move differently. I saw the
        pattern and then taught it to them."
      organic_application: >
        This is where your content becomes proprietary. Name your
        frameworks. Create carousel posts explaining your 3-step,
        5-step, or 7-step systems. Frameworks are the most shareable
        and saveable content type on social media.

    phase_4_the_servant:
      description: >
        You start serving others by teaching your frameworks. Your
        focus shifts from personal growth to contribution.
      source_quote: >
        "Contribution is the key to continued growth."
      organic_application: >
        Create content specifically designed to help your audience
        implement. Tutorials, walkthroughs, live coaching sessions,
        and challenge-based content all serve this phase. Your audience
        becomes your laboratory for testing and refining frameworks.

    phase_5_the_expert_guide:
      description: >
        You have results — both your own and your students' results.
        You become the trusted guide in your market.
      source_quote: >
        "If you haven't yet, you'll soon find out that the feeling you
        get as the expert or the guide in someone else's journey — when
        someone you've helped has accomplished their goal and enjoyed
        success — is a thousand times better than the feeling you get
        from your own success."
      organic_application: >
        Lead with case studies. Your content shifts from 'here is what
        I know' to 'here is what my students achieved.' Testimonial
        posts, before/after stories, and student spotlight content
        become your primary organic assets.

  implementation:
    - "Identify which phase you are currently in — be honest"
    - "Create content appropriate to your current phase (do not fake being in Phase 5)"
    - "Document your journey publicly — people connect with the process, not just the results"
    - "Interview at least 10 people ahead of you in your niche (Phase 2 content)"
    - "Name at least 3 proprietary frameworks from your experience (Phase 3 content)"
    - "Start teaching those frameworks to even a small audience (Phase 4 content)"
    - "Collect and publish results from people who follow your frameworks (Phase 5 content)"

  common_mistakes:
    - "Waiting until you feel 'qualified' — you only need to be one chapter ahead"
    - "Skipping the Reporter phase and inventing frameworks from thin air"
    - "Never naming your frameworks — unnamed processes cannot spread or be remembered"
    - "Teaching tactics without building belief first"
    - "Trying to serve everyone instead of a specific submarket"

# SECRET #2 ===================================================================
teaching_your_frameworks:
  framework_name: "Teaching Your Frameworks — Strategy vs. Tactics"
  source_quote: >
    "When you're teaching a course, you tell your story, explain the strategy,
    teach the tactics, and provide social proof. When you are selling, you do
    not teach the tactics. You teach the what (strategy) but not the how."
  principle: >
    A framework is a proprietary system that organizes your knowledge into
    teachable steps. The distinction between strategy (the what) and tactics
    (the how) is critical. In organic content and selling situations, you
    teach strategy to create desire. You reserve tactics for paying customers.
    This is not withholding value — it is the correct sequence for belief
    change. Without belief in the strategy first, tactics are useless.

  framework_creation_process:
    step_1: "Identify the result your audience wants"
    step_2: "Break down the process you used to get that result into distinct steps"
    step_3: "Name the framework (proprietary names create perceived value and memorability)"
    step_4: "Create a visual representation (diagram, flowchart, numbered steps)"
    step_5: "Test the framework by teaching it to others and watching for confusion points"
    step_6: "Refine based on student results and common failure points"

  naming_your_framework:
    principle: >
      A named framework is perceived as more valuable than an unnamed process.
      'My 5-step system' is forgettable. 'The Epiphany Bridge' is proprietary,
      memorable, and shareable. Name everything.
    examples_from_book:
      - "The Epiphany Bridge (storytelling framework)"
      - "The Perfect Webinar (sales presentation framework)"
      - "The Big Domino (belief identification framework)"
      - "The Stack (offer presentation framework)"
      - "The Hero's Two Journeys (story structure framework)"
      - "Funnel Hacking (competitive modeling framework)"

  organic_application: >
    Frameworks are the single highest-performing content type for organic reach.
    They are saved, shared, and screenshotted at rates far above opinion content
    or motivational content. Every framework you create becomes a reusable content
    asset. One framework can generate a carousel post, a thread, a Reel explainer,
    a podcast episode, and a lead magnet — all from the same core IP.

  strategy_vs_tactics_in_content:
    strategy_content: >
      Teach WHAT to do and WHY it works. This creates desire and belief.
      Example: 'The secret to viral content is the Epiphany Bridge — you
      need to tell stories that give your audience the same aha moment you
      had.' This is a strategy post.
    tactical_content: >
      Teach HOW to do it step by step. This creates implementation.
      Example: 'Here is exactly how to write your Epiphany Bridge story
      in 14 steps with fill-in-the-blank templates.' This is course content.

  implementation:
    - "Audit your expertise — list every process, system, or approach you use that gets results"
    - "Name each one with a proprietary name"
    - "Create a visual diagram for each framework"
    - "Write a 30-second elevator pitch for each framework"
    - "Build content around the strategy (the what) of each framework"
    - "Reserve the tactical how-to for paid products"

  common_mistakes:
    - "Teaching all tactics in free content and leaving nothing for paid customers"
    - "Not naming your frameworks — they remain generic and forgettable"
    - "Overcomplicating frameworks with too many steps (3-7 steps is optimal)"
    - "Never testing frameworks with real people before building content around them"
    - "Forgetting to add social proof and case studies alongside framework teaching"

# SECRET #3 ===================================================================
three_core_markets:
  framework_name: "The Three Core Markets (Three Core Desires)"
  source_quote: >
    "There are three core markets or desires that every product is marketed
    through. The three desires (in no particular order) are health, wealth,
    and relationships. When people purchase a product or service, they're
    hoping to get a certain result in one of these three areas of their lives."
  principle: >
    Every product or service exists within one of three core desires:
    Health, Wealth, or Relationships. Within each core desire are submarkets,
    within each submarket are niches, and within niches you create your own
    category. Your marketing message must focus on only ONE desire per message.
    Trying to address two desires simultaneously cuts conversions by 50% or more
    (often 90%+). The path to becoming a category king is: Core Desire ->
    Submarket -> Niche -> Your New Category.

  hierarchy:
    core_desires:
      - health: "Weight loss, nutrition, fitness, mental health, biohacking, longevity"
      - wealth: "Income, investing, business, career, financial freedom"
      - relationships: "Dating, marriage, parenting, social skills, communication"

    submarkets: >
      Within each desire, there are submarkets. Weight loss is a submarket
      of health. Real estate investing is a submarket of wealth. Marriage
      counseling is a submarket of relationships.

    niches: >
      Within each submarket, there are niches. Keto is a niche within
      weight loss. Flipping houses is a niche within real estate investing.

    your_category: >
      Within (or adjacent to) a niche, you create your OWN category.
      This is where you become the category king by creating a new
      opportunity that did not exist before.

  source_quote_on_focus: >
    "Any time you try to get your potential customer to believe in two things,
    your conversions will usually cut in half (most times by 90 percent or more).
    Focus only on one desire with each message you put into the market."

  blue_ocean_strategy:
    principle: >
      Instead of competing in an existing red ocean (crowded niche), create
      your own blue ocean by establishing a new category. You do not compete
      in someone else's category — you create your own and become the
      undisputed leader.
    source_quote: >
      "Products that don't make it are usually still great products. That's
      not the problem. The problem is that business owners often have no idea
      who they're selling to, where people are already buying from, and what
      kind of market positioning to use."

  market_positioning_types:
    competitive: >
      Position against existing solutions. David Ogilvy with Dove: 'It's not
      soap; it's Dove.' Brunson with ClickFunnels: 'It's not a website; it's
      a funnel.' You throw rocks at the old way and present yours as the
      replacement.
    complementary: >
      Position as an addition to what already exists. Albert Lasker with
      Sunkist: he didn't attack any existing product, he created the orange
      juice extractor as something entirely new that complemented breakfast.

  organic_application: >
    Understanding your position in the three-desire hierarchy determines
    everything about your content strategy. Your hooks must speak to ONE
    core desire. Your content pillars should map to your submarket. Your
    unique angle is your niche/category. Every piece of organic content
    should reinforce your position as the category creator within your
    specific niche, not as another voice in the red ocean.

  implementation:
    - "Identify which of the three core desires your audience is pursuing"
    - "Map your submarket and niche precisely"
    - "Research 20-30 existing experts in your submarket — know who is already there"
    - "Define your unique category and name it"
    - "Create a market positioning statement (competitive or complementary)"
    - "Ensure every content piece addresses only ONE core desire"

  common_mistakes:
    - "Trying to serve multiple desires simultaneously in one message"
    - "Not knowing who the existing players are in your submarket"
    - "Positioning as an improvement instead of a new category"
    - "Competing on price instead of category differentiation"
    - "Failing to do homework on the competitive landscape before launching content"

# SECRET #4 ===================================================================
the_new_opportunity:
  framework_name: "The New Opportunity (Opportunity Switch vs. Improvement Offer)"
  source_quote: >
    "Our goal is not to fix what's not working. Our goal is to replace what's
    not working with something altogether different."
  principle: >
    People do not want improvement offers — they want new opportunities.
    An improvement offer asks someone to admit their past choices were wrong
    (status decrease). A new opportunity lets them move toward something fresh
    without the pain of acknowledging failure. Steve Jobs did not build a
    better CD player — he created the iPod. Tesla did not make a better
    car — they made an electric car. Your job is to create an opportunity
    SWITCH, not an opportunity improvement.

  why_improvement_offers_fail:
    improvement_is_hard:
      explanation: >
        People have already tried to improve. They carry pain from past
        failures. A new opportunity lets them start fresh without
        known pain.
      source_quote: >
        "Your customers must be wholly ignorant of the difficulties involved
        in their vast undertaking. Experience is a handicap." — Eric Hoffer,
        The True Believer

    desire_vs_ambition:
      explanation: >
        Less than 2% of the population is truly ambitious. Improvement offers
        target only that 2%. New opportunities target the remaining 98% who
        have desire but not the ambition to grind through improvement.

    memories_of_poor_past_decisions:
      explanation: >
        Improvement requires admitting past failure. This creates a status
        decrease. No one wants to admit they chose wrong.

    commodity_pricing:
      explanation: >
        Improvement offers compete in red oceans where dozens of similar
        options exist. Price becomes the differentiator and margins collapse.
      source_quote: >
        "Dan Kennedy once told me, 'If you can't be the number one lowest-price
        leader in your market, there is no strategic advantage of being the second
        lowest price leader in town, but there is a huge strategic advantage of
        being the most expensive.'"

  why_new_opportunities_work:
    new_discovery: >
      Sharing something new gives people an immediate status increase.
      People want to be the first to share a new idea with their friends.
    no_pain_of_disconnect: >
      No admission of past failure required. They move toward something
      new rather than fixing something broken.
    dream_replacement: >
      A new opportunity gives people a new dream to pursue. Where there
      is no vision, the people perish (Proverbs 29:18).
    greener_pastures: >
      Instead of trying to convince people their grass is green, let
      them follow you to the other side of the fence — where they
      already want to be.

  how_to_create_new_opportunity:
    step_1: "Identify the result your dream customers want"
    step_2: "List every vehicle they have already tried to get that result"
    step_3: "Create an opportunity SWITCH — a new vehicle, not a better version of the old one"
    step_4: "Build an opportunity STACK — package your one opportunity in multiple ways to ascend customers up your value ladder"

  opportunity_switch_vs_stack:
    switch: >
      One business should have ONE and only one opportunity switch. This is
      your core new opportunity that replaces the old vehicle. Everything on
      the front end of your business drives this switch.
    stack: >
      After someone has switched to your new opportunity, you STACK additional
      offers that deepen their engagement with that SAME opportunity. You do
      not introduce NEW opportunities — you package the existing one differently.
    source_quote: >
      "Each new opportunity I launched after the first one lost the trust of
      my dream customers a little more. With each promotion, my lists would
      get less responsive, and eventually my business almost crashed."

  organic_application: >
    Every piece of front-end organic content should drive one thing: the
    opportunity switch. You are pulling people from their old, broken
    vehicle into your new opportunity. Your hooks should name and throw
    rocks at the old vehicles. Your stories should demonstrate why the
    new opportunity works. Stop creating content that tries to improve
    what people are already doing — create content that shows them a
    completely different path. This is the single most powerful reframe
    for organic content strategy.

  implementation:
    - "Define your ONE new opportunity clearly in one sentence"
    - "List every old vehicle your audience is using (these become content hooks)"
    - "Create 'throwing rocks' content that exposes why old vehicles fail"
    - "Create Epiphany Bridge stories showing how you discovered the new opportunity"
    - "Never launch competing new opportunities — use opportunity stacking instead"
    - "Build front-end funnels for each cold submarket that switch them into your opportunity"

  common_mistakes:
    - "Selling improvement instead of a new opportunity"
    - "Launching multiple new opportunities instead of stacking within one"
    - "Not throwing rocks at old vehicles (being too polite to call out what is broken)"
    - "Forgetting that your audience has already tried and failed with other solutions"
    - "Skipping the opportunity switch in content and going straight to tactics"

# SECRET #4 CONTINUED ==========================================================
status_the_hidden_driver:
  framework_name: "Status — The Only Thing That Causes People to Move"
  source_quote: >
    "Is this thing I'm considering going to increase my status or decrease it?
    Status as I'm defining it here has nothing to do with how other people
    perceive you, but rather with how you perceive yourself."
  principle: >
    Every purchasing decision is subconsciously filtered through one question:
    'Will this increase or decrease my status?' Status is not about external
    perception — it is about SELF-perception. People will not take action if
    the risk of status decrease outweighs the hope of status increase. Your
    job as a marketer is to load up the status-increase side and minimize
    the status-decrease side with guarantees, social proof, and done-for-you
    elements.

  status_factors:
    increases_status:
      - "Appearance of intelligence (makes them look smarter)"
      - "Appearance of wealth, power, or happiness"
      - "Physical appearance improvements"
      - "Style and identity signals (Mac vs. PC)"
      - "Being first to discover something new"
      - "Association with successful community"
    decreases_status:
      - "Risk of looking stupid if it fails"
      - "Admitting past decisions were wrong"
      - "Spending money on something that might not work"
      - "Being judged by friends, family, or colleagues"
      - "Losing money, time, or relationships"

  source_quote_on_balance: >
    "There's this balancing act going on in our brains all the time. We're
    balancing hope of increased status against fear of decreased status."

  organic_application: >
    Every piece of content must pass the status test from the audience's
    perspective. Will sharing this content increase their status? Will
    engaging with your brand increase their status? Will being seen
    following you increase their status? Content that makes your audience
    look smart, ahead of the curve, or part of an exclusive group gets
    shared. Content that might make them look foolish gets avoided.
    Frame all CTAs in terms of status elevation, not just results.

  implementation:
    - "For every offer or content piece, ask: 'How does this increase my audience's perceived status?'"
    - "Add guarantees and risk reversals to minimize status-decrease fear"
    - "Create 'insider' language and community identity that elevates member status"
    - "Use case studies of people 'just like them' to reduce fear of failure"
    - "Frame the cost of inaction as a greater status threat than the cost of trying"

  common_mistakes:
    - "Ignoring the status dynamic entirely and focusing only on features/benefits"
    - "Creating offers that require public admission of failure (improvement offers)"
    - "Pricing so low that association with your brand decreases perceived status"
    - "Not providing enough social proof to overcome fear of status decrease"

# SECRET #5 ===================================================================
more_money_same_framework:
  framework_name: "More Money for the Same Framework"
  source_quote: >
    "People will spend more money for the exact same content (or framework)
    packaged in a different way. Think about it: What is the difference between
    the book, Think and Grow Rich, and the audiobook? The answer is: nothing.
    They are the same book, word for word, yet I paid 10 times more money
    ($9.97 for the physical book and $97 for the CDs) for the exact same
    content packaged in a different way."
  principle: >
    The same framework can be packaged and sold at multiple price points.
    A book, a course, a live workshop, a mastermind, and a coaching program
    can all teach the same core framework — people pay more for different
    delivery mechanisms, speed of implementation, and levels of access.
    This is the value ladder applied to a single framework.

  value_ladder_packaging:
    tier_1_book: "$10-$50 — Framework delivered as text"
    tier_2_course: "$100-$2,000 — Framework delivered as video training with exercises"
    tier_3_live_workshop: "$500-$5,000 — Framework taught live with interaction"
    tier_4_certification: "$2,000-$10,000 — Framework taught with certification to teach others"
    tier_5_mastermind: "$10,000-$100,000 — Framework applied in small group with personal access"
    tier_6_one_on_one: "$25,000+ — Framework implemented with direct expert guidance"

  organic_application: >
    This principle means you never run out of content. One framework generates
    content for every tier of your value ladder. Your organic content introduces
    the strategy of the framework (free). Your lead magnet gives a deeper look.
    Your low-ticket product teaches the full framework. Your high-ticket offers
    implement it with you. Every social media post can ladder up to a
    specific tier.

  implementation:
    - "Map your core frameworks to a value ladder with at least 3-4 tiers"
    - "Create organic content that introduces the strategy of each framework"
    - "Build lead magnets that go one level deeper into each framework"
    - "Design courses, workshops, or programs that teach full implementation"
    - "Use organic content to qualify leads for the appropriate tier"

  common_mistakes:
    - "Believing you need a completely new topic for every new product"
    - "Giving away all tactics in free content, leaving nothing for the value ladder"
    - "Not creating enough packaging tiers — most experts stop at one or two"
    - "Underpricing because you think 'it is the same content' without recognizing the value of delivery format"

# SECRET #6 ===================================================================
future_based_cause:
  framework_name: "The Future-Based Cause (Building a Movement)"
  source_quote: >
    "People usually come into a community for the expert, but they stay
    for the community."
  principle: >
    A true movement requires more than expertise and frameworks — it
    requires a future-based cause that gives people identity, belonging,
    and purpose. You must create a platform for change, facilitate an
    identity shift in your followers, create a manifesto or declaration,
    establish milestone awards (the four-minute mile), and unite with
    a social mission that transforms the journey.

  four_steps_to_movement:
    step_1_create_platform_for_change:
      description: >
        Give your movement a name, a banner, and a meeting place.
        This is where your followers gather and identify themselves.
      example: "ClickFunnels created 'Funnel Hackers' — an identity, not just a customer base"

    step_2_identity_shift:
      description: >
        Help your followers see themselves differently. They are not
        just learning — they are BECOMING something new.
      source_quote: >
        "A mass movement appeals not to those intent on bolstering and
        advancing a cherished self, but to those who crave to be rid of
        an unwanted self." — Eric Hoffer, The True Believer

    step_3_four_minute_mile:
      description: >
        Create milestone awards that celebrate achievement within your
        movement. Just as Roger Bannister breaking the four-minute mile
        made others believe it was possible, your movement needs visible
        proof that the goal is achievable.
      source_quote: >
        "What is the four-minute mile for your movement that you could
        create an award around for your people? Initially, the four-minute
        mile will need to be something that you've already accomplished, so
        you can show them it's possible and give them hope and belief."
      example: >
        ClickFunnels created the Two Comma Club award (for members who
        generated $1M+ through a funnel), then Two Comma Club X ($10M+),
        then Two Comma Club C ($100M+).

    step_4_social_mission:
      description: >
        Unite your movement behind a cause larger than profit.
        The journey of transformation becomes the real purpose.
      example: >
        ClickFunnels created the Two Heart Club for members who
        donated more than $1 million to charity.

  organic_application: >
    Movement-building IS organic marketing. Create identity-based content
    that makes followers feel like they belong to something. Use named
    community identities ('You are a Funnel Hacker' not 'You use funnels').
    Celebrate member milestones publicly. Create content around your
    four-minute-mile moments. Rally around a manifesto or declaration.
    This transforms followers from passive consumers into active evangelists
    who create organic reach on your behalf.

  implementation:
    - "Name your movement and your members (create an identity they can claim)"
    - "Write a manifesto or declaration of what your movement stands for"
    - "Design milestone awards for key achievements within your community"
    - "Spotlight member achievements in your content (four-minute-mile moments)"
    - "Connect your movement to a social mission larger than profit"
    - "Create exclusive language, inside jokes, and signals that bond community members"

  common_mistakes:
    - "Building an audience instead of a movement (passive vs. active)"
    - "Not naming the community identity — just having 'followers'"
    - "Keeping all the spotlight on yourself instead of member achievements"
    - "No visible milestones or awards to drive aspiration"
    - "Purely profit-driven messaging without a larger cause"

