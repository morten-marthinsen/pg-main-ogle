# =============================================================================
# 16 MINI CLOSES (REFERENCE LIST)
# =============================================================================

mini_closes:
  framework_name: "16 Mini Closes for Sales Presentations"
  source: "Multiple sources, including Jason Fladlien's Webinar Pitch Secrets 2.0"
  principle: >
    These closes are woven throughout the Stack portion of any presentation.
    Choose the ones that fit naturally and strengthen your argument. They
    are not all used in every presentation — pick the most relevant ones.

  close_list:
    close_1_money_is_good:
      principle: "Disassociate from fear of spending money. Money is a tool for exchange."
      application: "Remind your audience that money only has value when exchanged for something greater."

    close_2_disposable_income:
      principle: "Help them realize they are spending disposable income on things that don't serve them."
      application: "Most people blow their extra money on short-term pleasures. Redirect it toward long-term transformation."

    close_3_money_replenishes:
      principle: "Money comes back every two weeks. Time does not."
      application: "You can save months or years of wasted time. The money will replenish. The time will not."

    close_4_break_old_habits:
      principle: "If they leave without investing, nothing changes."
      application: "Today is the day to break the pattern that has kept you stuck."

    close_5_information_without_application:
      principle: "Information without action is worthless."
      application: "You've learned the strategy. Now you need the tools and guidance to implement."

    close_6_money_or_excuses:
      principle: "You can have money or excuses, but not both."
      application: "The people who succeed invest in themselves. The people who don't, make excuses."

    close_7_if_all:
      principle: "If all this did was [one result], would it be worth it?"
      application: "Use three If All statements tied to your three secrets."

    close_8_i_had_two_choices:
      principle: "Cheap and accessible vs. premium with guaranteed support."
      application: "I chose to charge more so I could dedicate resources to guarantee your success."

    close_9_what_would_result_be_worth:
      principle: "Ask what the end result is worth to them before revealing price."
      application: "If you had a successful [result] today, what would it be worth?"

    close_10_two_choices:
      principle: "Do nothing (get nothing) or take a leap of faith."
      application: "You can leave here with the same problems, or you can test this risk-free."

    close_11_guarantee:
      principle: "Risk reversal removes the final barrier."
      application: "30-day money-back guarantee. Test-drive it. Nothing to lose."

    close_12_the_real_question:
      principle: "Even if it does only HALF of what I claimed, it pays for itself."
      application: "Is it worth a few minutes to check this out?"

    close_13_urgency_scarcity:
      principle: "Limited time or limited quantity creates action."
      application: "This bonus is only available for the next 30 minutes / first 50 people."

    close_14_price_justification:
      principle: "Compare your price to alternatives (full price, hiring someone, doing it alone)."
      application: "If you hired someone to do this, it would cost $X. You're getting it for $Y."

    close_15_youre_probably_thinking:
      principle: "Preemptively address objections."
      application: "You're probably thinking [objection], right? Well, actually [quick story]."

    close_16_q_and_a_with_cta:
      principle: "Answer questions with a CTA after each answer."
      application: "After every answer during Q&A, repeat the offer link."

  organic_application: >
    These closes work in organic content too. Use 'money replenishes but
    time doesn't' in content about investing in yourself. Use 'if all this
    did was...' when promoting any offer. Use 'you're probably thinking...'
    as a content format for addressing objections. Use urgency and scarcity
    in launch content and limited-time offers. Each close is a standalone
    content idea.

# =============================================================================
# MASTER CONTENT CREATION FRAMEWORK (SYNTHESIS)
# =============================================================================

organic_content_synthesis:
  framework_name: "Expert Secrets Applied to Organic Content Creation"
  principle: >
    When you combine all frameworks from Expert Secrets, you get a complete
    organic content operating system. Every piece of content breaks a false
    belief, tells a story, builds toward one Big Domino, and ladders up to
    an offer. There is no such thing as 'random content' when you operate
    from this system.

  weekly_content_mapping:
    monday: "Origin Story content (your journey, your discovery, your transformation)"
    tuesday: "Vehicle Framework content (why your method works, strategy teaching)"
    wednesday: "Internal Belief content (you-can-do-this stories, student spotlights)"
    thursday: "External Belief content (nothing-can-stop-you stories, objection-busting)"
    friday: "Future-Based Cause content (movement building, community celebration, milestones)"
    weekend: "Epiphany Bridge stories (personal stories, behind-the-scenes, vulnerability)"

  content_format_mapping:
    reels_shorts: "30-second Epiphany Bridge stories or single-secret reveals"
    carousels: "Framework breakdowns (named frameworks with 3-7 steps)"
    long_captions: "Full Epiphany Bridge stories with 14-question depth"
