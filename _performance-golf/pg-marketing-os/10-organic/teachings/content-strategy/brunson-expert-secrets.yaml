# SECRET #16-17 ================================================================
testing_and_shortcuts:
  framework_name: "Testing Your Presentation Live & The Perfect Webinar Shortcut"
  source_quote: >
    "I rewatched the video and found a few dozen places where I could add in
    trial closes. I then recorded just the trial closes and inserted them into
    the video file. That webinar went from making $9.45 per registrant to
    $16.50 per registrant."
  principle: >
    Your first presentation will not be perfect. Test it live, watch for
    where people nod (they believe) and where they go still (they have
    unresolved false beliefs). Refine the stories and add more false-belief
    busting content where needed. The Perfect Webinar Shortcut is a
    30-minute version that follows the same framework with compressed
    timing. Use it for Facebook Lives that become ads.

  organic_application: >
    Go live on social media and deliver your Perfect Webinar in shortened
    form. Watch the comments in real time for objections and questions.
    These reveal false beliefs you have not addressed. Each live session
    becomes a testing ground for refining your story inventory and
    identifying gaps in your belief-change sequence.

  implementation:
    - "Deliver your presentation live at least 5 times before automating"
    - "Track which stories get the strongest reactions"
    - "Note where engagement drops — those are unresolved false beliefs"
    - "Add supporting Epiphany Bridge stories to weak spots"
    - "Create a 30-minute shortcut version for social media Lives"
    - "Record the best version and turn it into evergreen content"

# SECRET #18 ==================================================================
five_minute_perfect_webinar:
  framework_name: "The 5-Minute Perfect Webinar"
  source_quote: >
    "After months of tweaking, she launched a new five-minute version of the
    Perfect Webinar and it took off! Within six weeks she had passed $130K
    in sales and made almost $2 million in her first year!" — About Jaime Cross.
  principle: >
    The 5-Minute Perfect Webinar is a compressed version of the full framework
    designed for lower-priced products, ads, landing pages, and social media
    content. It follows the same belief-change principles but in a rapid-fire
    format. This is the bridge between organic content and direct selling
    for products under $100.

  script_structure:
    hook: "Hey, did you know that [big misconception]?"
    credibility: "I'm [name] and I am [role] who has helped [accomplishment]."
    big_idea: "So what is [the big idea]? It's [the thing]."
    three_secrets:
      secret_1: "The first secret is [first secret]. The big idea here is [idea]. This is important because [why]!"
      secret_2: "The second secret is [second secret]. The main thing is [idea]. This means [why]."
      secret_3: "The third secret is [third secret]. The main thing is [idea]. This is key because [why]."
    objection_handle: "Now I know what you're thinking. It's [objection]. Well the tricky thing is [truth]!"
    offer: "So I've [created/developed] this [thing] you can [what they can do with it]."
    cta: "Click the link to get it today while it's still available."
    urgency: "I honestly don't know how much longer we'll keep this available, and prices will probably go up because [reason]."

  organic_application: >
    This is the ULTIMATE organic content framework for social media selling.
    It maps perfectly to: a 60-second Reel, a 2-3 minute YouTube Short,
    a Facebook/Instagram Live, a TikTok, or a multi-slide carousel. It is
    the organic content workhorse for creators who want to sell products
    under $100 directly from social media. Use it as your ad script. Use
    it as your landing page video. Use it as your weekly Live format.
    The 5-Minute Perfect Webinar turns every social media post into a
    potential sales machine.

  implementation:
    - "Write out the full script using the template above for your main product"
    - "Record it as a 3-5 minute video"
    - "Use it as a Facebook/Instagram Live (then boost the recording)"
    - "Use it as the sales video on your landing page"
    - "Adapt it for carousel posts (one slide per script section)"
    - "Create multiple versions for different audiences within your submarket"
    - "Test different hooks while keeping the structure the same"

  common_mistakes:
    - "Trying to use the full 90-minute framework for a $39 product"
    - "Skipping the three secrets and just pitching the product"
    - "Not including the objection handle (the most conversion-critical element in short form)"
    - "No urgency or scarcity — without it, people bookmark and forget"
    - "Making it longer than 5 minutes — brevity IS the format constraint"

# SECRET #19 ==================================================================
plugging_into_value_ladder:
  framework_name: "Plugging Expert Secrets into Your Value Ladder"
