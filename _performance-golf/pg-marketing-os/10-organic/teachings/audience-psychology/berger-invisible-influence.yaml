  - id: sq_intro_02
    quote: "Ninety-nine-point-nine percent of all decisions are shaped by others. It's hard to find a decision or behavior that isn't affected by other people."
    chapter: "Introduction"
    context: "Quantifying the pervasiveness of social influence"
    marketing_application: "Belief-shifting statistic for content about why social proof matters"

  - id: sq_intro_03
    quote: "In fact, looking across all domains of our lives, there is only one place we don't seem to see social influence. Ourselves."
    chapter: "Introduction"
    context: "The blind spot — people recognize influence on others but never on themselves"
    marketing_application: "Pattern interrupt hook; audiences underestimate how much they are influenced"

  - id: sq_intro_04
    quote: "People could see social influence affecting others' behavior, but not their own."
    chapter: "Introduction"
    context: "BMW study where owners acknowledged influence on others' car purchases but denied it for themselves"
    marketing_application: "Validates why indirect persuasion (social proof, signals) outperforms direct selling"

  # --------------------------------------------------------------------------
  # CHAPTER 1 — Monkey See, Monkey Do (Imitation)
  # --------------------------------------------------------------------------

  - id: sq_ch1_01
    quote: "Even when they could clearly tell that the group was incorrect... Even when the answer is clear, people still imitate others."
    chapter: "Chapter 1: Monkey See, Monkey Do"
    context: "Summary of Asch's line-length conformity experiments"
    marketing_application: "Foundation for why social proof overrides personal judgment in buying decisions"

  - id: sq_ch1_02
    quote: "If other people do it, choose it, or like it, it must be good."
    chapter: "Chapter 1: Monkey See, Monkey Do"
    context: "Explaining why people use others as information shortcuts"
    marketing_application: "Core principle behind testimonials, reviews, and best-seller positioning"

  - id: sq_ch1_03
    quote: "Mimicry facilitates social interactions because it generates rapport. Like a social glue, mimicry binds us and bonds us together."
    chapter: "Chapter 1: Monkey See, Monkey Do"
    context: "Explaining the neuroscience behind behavioral mimicry and mirror neurons"
    marketing_application: "Mirror your audience's language, tone, and cadence to build instant trust"

  - id: sq_ch1_04
    quote: "People who mimicked their partner were five times as likely to find a successful outcome."
    chapter: "Chapter 1: Monkey See, Monkey Do"
    context: "Texoil negotiation study — mimicry increased deal-closing rate from near-zero to two-thirds"
    marketing_application: "Mirroring audience language in copy and content dramatically increases conversion"

  - id: sq_ch1_05
    quote: "Nothing draws a crowd like a crowd."
    chapter: "Chapter 1: Monkey See, Monkey Do"
    context: "Explaining how small initial popularity advantages snowball through social influence"
    marketing_application: "Seed early social proof aggressively; initial momentum compounds"

  - id: sq_ch1_06
    quote: "Rather than being driven by quality, hits might sometimes just be driven by luck and the herd."
    chapter: "Chapter 1: Monkey See, Monkey Do"
    context: "Salganik's music experiment showing identical songs had wildly different popularity across parallel worlds"
    marketing_application: "Distribution and early momentum matter as much as content quality"

  # --------------------------------------------------------------------------
  # CHAPTER 2 — A Horse of a Different Color (Differentiation)
  # --------------------------------------------------------------------------

  - id: sq_ch2_01
    quote: "Sometimes people don't want to be the same as everyone else. Sometimes people want to be different."
    chapter: "Chapter 2: A Horse of a Different Color"
    context: "Beer study — people ordered different beers to avoid matching companions, even at cost of satisfaction"
    marketing_application: "Offer enough variety for audiences to feel individually expressed within your brand"

  - id: sq_ch2_02
    quote: "Siblings encourage both imitation and differentiation... younger siblings try to create their own niche."
    chapter: "Chapter 2: A Horse of a Different Color"
    context: "Birth order research showing younger siblings differentiate from older siblings' domains"
    marketing_application: "Position your brand as the 'different path' for audiences tired of the dominant player"

  - id: sq_ch2_03
    quote: "Regardless of whether its music changes, when a band becomes popular, liking it makes people less unique."
    chapter: "Chapter 2: A Horse of a Different Color"
    context: "Explaining why early adopters abandon things once they go mainstream"
    marketing_application: "Maintain exclusivity signals even while scaling; protect early adopter identity"

  # --------------------------------------------------------------------------
  # CHAPTER 3 — Not If They're Doing It (Signals & Identity)
  # --------------------------------------------------------------------------

  - id: sq_ch3_01
    quote: "Like an amateur Sherlock Holmes, we try to deduce things about the people around us based on their choices. Cars and clothes serve more than just a functional purpose. They act as a silent communication system, signaling information to others."
    chapter: "Chapter 3: Not If They're Doing It"
    context: "How every choice functions as an identity signal"
    marketing_application: "Every piece of content your audience shares signals their identity — optimize for that"

  - id: sq_ch3_02
    quote: "People's attitudes entirely depended on who the policy was associated with... party was stronger than policy."
    chapter: "Chapter 3: Not If They're Doing It"
    context: "Geoffrey Cohen study — Democrats and Republicans reversed policy opinions based solely on party endorsement"
    marketing_application: "WHO endorses your offer matters more than WHAT the offer contains"

  # --------------------------------------------------------------------------
  # CHAPTER 4 — Similar but Different (Optimal Distinctiveness)
  # --------------------------------------------------------------------------

  - id: sq_ch4_01
    quote: "Too novel and it's unfamiliar. Too familiar and it's boring. But in between and it's just right."
    chapter: "Chapter 4: Similar but Different"
    context: "The Goldilocks effect — inverted-U relationship between familiarity and liking"
    marketing_application: "Content strategy sweet spot: 70% familiar framework + 30% novel angle"

  - id: sq_ch4_02
    quote: "Similar enough to what is already out there to evoke the warm glow of familiarity, but novel enough to seem new and not just derivative of what came before. Similarity shapes popularity because it makes novel things feel familiar."
    chapter: "Chapter 4: Similar but Different"
    context: "Why moderately similar things catch on — from baby names to car designs to music"
    marketing_application: "Frame innovations inside familiar containers; use known formats with fresh content"

  - id: sq_ch4_03
    quote: "We don't want to be exactly the same or completely different. Instead, we choose and behave in ways that allow us to be optimally distinct, threading the needle between similarity and difference. Like Goldilocks, we avoid the extremes."
    chapter: "Conclusion"
    context: "Summary of the book's central framework — optimal distinctiveness"
    marketing_application: "Brand positioning must be similar enough to be categorized, different enough to be chosen"

  - id: sq_ch4_04
    quote: "Moderate similarity helps resolve this tension. We wear the same brands as our friends, but we pick out different styles. We buy the same couch as our coworker, but pick a different color."
    chapter: "Chapter 4: Similar but Different"
    context: "Princeton eating club study — students dressed similarly to their club but differentiated within it"
    marketing_application: "Give your audience a shared identity (tribe) with room for individual expression"

  # --------------------------------------------------------------------------
  # CHAPTER 5 — Come On Baby, Light My Fire (Social Facilitation)
  # --------------------------------------------------------------------------

  - id: sq_ch5_01
    quote: "The mere presence of others changes performance."
    chapter: "Chapter 5: Come On Baby, Light My Fire"
    context: "Triplett's cycling studies and Zajonc's cockroach experiments on social facilitation"
    marketing_application: "Community visibility drives performance — make audience effort and progress visible"

  # --------------------------------------------------------------------------
  # CONCLUSION — The Power of Choosing Influence
  # --------------------------------------------------------------------------

  - id: sq_conclusion_01
    quote: "Because, at our core, we are all social animals. Whether we realize it or not, other people have a subtle and surprising impact on almost everything we do. When it comes to our own lives, social influence is as silent as it is powerful. Just because we can't see it, it doesn't mean it's not there."
    chapter: "Conclusion"
    context: "Berger's closing argument on the invisibility and power of social influence"
    marketing_application: "Master framework: build systems that leverage invisible influence rather than explicit persuasion"

  - id: sq_conclusion_02
    quote: "By understanding how it works, we can harness its power. We can avoid its downsides and take advantage of its benefits."
    chapter: "Conclusion"
    context: "Berger's call to action — influence as a tool to be wielded intentionally"
    marketing_application: "Position yourself as the guide who helps audiences understand and leverage these forces"
