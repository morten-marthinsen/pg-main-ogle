# =============================================================================
# IMPLEMENTATION GUIDE
# =============================================================================

implementation_guide:

  mindset_prerequisites:
    required_beliefs:
      - "Social media success is learnable, not lucky"
      - "I'm willing to test extensively before judging"
      - "Content underperformance is data, not failure"
      - "I will study what works, not just create what I want"
      - "Mastery of one format beats dabbling in many"

    mindset_is_the_differentiator: |
      "If I look at all the variables of all the clients I've worked with
      over the past 20 years, the biggest recurring theme with the people
      who have the most success is purely mindset." - Brendan Kane

  quick_start_process:
    day_1_to_7:
      - "Consume social media actively, not passively"
      - "Start identifying formats that could work for you"
      - "Look beyond your competitors (they're probably doing it wrong)"

    day_8_to_14:
      - "Select 3-5 potential formats"
      - "Do Gold/Silver/Bronze analysis on each"
      - "Identify performance drivers"

    day_15_to_30:
      - "Choose one format to master"
      - "Create first 5-10 pieces of content"
      - "Compare side-by-side with references"

    day_31_to_90:
      - "Consistent creation within your format"
      - "Weekly analysis and iteration"
      - "Document what's working and why"

    day_91_to_120:
      - "Refine based on performance data"
      - "If format is working, double down"
      - "If not, diagnose why (not automatic format switch)"

  success_metrics:
    primary:
      - "Consistent growth in views over time"
      - "At least one million views within 120 days"

    secondary:
      - "Engagement rate improvements"
      - "Save rate (for educational content)"
      - "Profile visits and link clicks"
      - "Business inquiries/conversions"

    leading_indicators:
      - "Hook retention (3-second and 30-second)"
      - "Watch-through rate"
      - "Share rate"

  common_failure_points:
    - error: "Switching formats after one underperformance"
      fix: "Commit to 20+ attempts before evaluating format"

    - error: "Only analyzing your own content"
      fix: "Always compare to high-performing references"

    - error: "Creating ads instead of content"
      fix: "Focus on value, trust, expertise - not selling"

    - error: "Thinking niche content is better"
      fix: "Apply Generalist Principle to broaden reach"

    - error: "Expecting results without consistent effort"
      fix: "Treat it like any skill - requires practice and iteration"

    - error: "Blaming the algorithm"
      fix: "Algorithms want to promote good content - focus on quality"

