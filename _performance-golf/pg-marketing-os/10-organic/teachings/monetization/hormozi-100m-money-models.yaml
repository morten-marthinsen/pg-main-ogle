# =============================================================================
# ALEX HORMOZI - $100M MONEY MODELS (2025)
# Complete Monetization Framework Extraction
# =============================================================================
# Source: "$100M Money Models: How To Make Money" by Alex Hormozi
# Extracted for: OrganicMarketingEngine / Creator Economy Applications
# =============================================================================

metadata:
  title: "$100M Money Models"
  author: "Alex Hormozi"
  year: 2025
  core_premise: "A Money Model is a deliberate sequence of offers designed to increase how many customers you get, how much they pay, and how fast they pay it"
  success_metric: "Make more profit from one customer than it costs to get and service many customers in the first 30 days"
  goal: "Remove cash as a limiter to scaling your business"

# =============================================================================
# SECTION 1: CORE FRAMEWORK - WHAT IS A MONEY MODEL?
# =============================================================================

money_model_definition:
  what_it_is: "A deliberate sequence of offers"
  purpose:
    - "Increase how many customers you get"
    - "Increase how much they pay"
    - "Increase how fast they pay it"

  minimum_viable_money_model:
    description: "Make more profit from a customer than it costs to get and service them in 30 days"
    target_timeframe: "30 days or less"
    reason: "Any business can get interest-free money for 30 days via credit card"

  100m_money_model:
    description: "Make more profit from ONE customer than it costs to get and service MANY customers in 30 days"
    result: "Removes cash as a bottleneck for growth"

  key_insight: "The thing you sell the most isn't always the thing you make the most profit on"

  example_mcdonalds:
    burger_profit: "$0.25"
    with_fries: "$0.75 added"
    with_drink: "$1.75 added"
    supersized: "$1.00 added"
    total_profit_transformation: "From $0.25 to $3.00 (11.6x increase)"

# =============================================================================
# SECTION 2: THE FOUR OFFER TYPES
# =============================================================================

four_offer_types:
  overview:
    purpose: "Different offers solve different problems at different stages"
    combination: "Use one, two, multiples of one, or all four together"
    best_practice: "Most profitable businesses use all four"

  type_1_attraction_offers:
    purpose: "Turn strangers into customers"
    mechanism: "Offer something free or at a discount"
    when_to_use: "First - if you're not getting customers, you need one of these"

  type_2_upsell_offers:
    purpose: "Get people to spend more cash"
    mechanism: "Offer solutions to problems your previous offer reveals"
    when_to_use: "After attraction - to maximize 30-day profits"

  type_3_downsell_offers:
    purpose: "Get people to say yes when they would have said no"
    mechanism: "Change how they pay or what they get"
    when_to_use: "After any 'no' response"

  type_4_continuity_offers:
    purpose: "Keep people buying (recurring revenue)"
    mechanism: "Ongoing value for ongoing payments"
    when_to_use: "Last - to maximize long-term customer value"

# =============================================================================
# SECTION 3: ATTRACTION OFFERS (5 TYPES)
# =============================================================================

attraction_offers:
  core_principle: "Everyone wants a great deal - the greatest discount is free"
  flexibility: "Free, discount, and $1 exist on a continuum - interchange as needed"

  # -------------------------------------------------------------------------
  # ATTRACTION OFFER #1: WIN YOUR MONEY BACK
  # -------------------------------------------------------------------------
  win_your_money_back:
    tagline: "If you do X within Y time within Z rules, you can get it free"

    how_it_works:
      - "Set a goal for the customer and tell them how to reach it"
      - "If they reach it, they qualify to get money back (cash or store credit)"
      - "Criteria can be results-based, action-based, or both"

    three_criteria_types:
      results_based:
        description: "Customer gets result = money back"
        examples: ["Making $X/month", "Getting Y customers", "Losing Z lbs"]
        customer_bet: "Betting on their ability to reach the goal"

      actions_based:
        description: "Customer does actions = money back"
        examples: ["Attend all sessions", "Log progress", "Take pictures", "Do homework"]
        customer_bet: "Betting on their ability to follow directions"

      actions_and_results:
        description: "Customer does both = money back"
        examples: ["Follow directions AND hit goal"]
        customer_bet: "Betting on following directions and your directions working"

    good_criteria_characteristics:
      easy_to_track:
        description: "Train exactly what they need to do"
        examples: ["Phones track steps", "Word processors track word count", "Cameras date photos"]

      gets_results:
        description: "Make criteria likely to get desired results"
        tip: "If criteria look too easy, you're probably close to realistic"

      advertises_business:
        description: "Make advertising part of criteria"
        examples: ["Posting progress", "Tagging social media", "Referring", "Leaving reviews"]

    how_to_apply_store_credit:
      wrong_way: "Give all credit up front (3 free months)"
      right_way: "Spread over longer period ($600 over 12 months = $50/mo discount)"
      reason: "People fall off if they don't pay something"

    upsell_opportunities:
      method: "Make check-in meetings part of money-back criteria"
      timing: "After checking in, offer what makes sense based on feedback"
      example_meetings:
        - "Nutrition Orientation → Supplement offer"
        - "Progress Check-in → Membership offer"
        - "Transformation Feedback → Membership offer again or prepay discount"

    pro_tips:
      make_everyone_winner: "Halfway through, make next offer as if they already won"
      let_losers_win: "At end, credit their deposit toward staying even if they failed"

    creator_application:
      use_case: "Courses, coaching programs, membership communities"
      example: "Pay $500 for 8-week program, get money back if you complete all modules and implement"
      benefit: "Creates accountability, generates testimonials, converts to long-term customers"

  # -------------------------------------------------------------------------
  # ATTRACTION OFFER #2: GIVEAWAYS
  # -------------------------------------------------------------------------
  giveaways:
    tagline: "Many will enter...many will win"

    how_it_works:
      - "Pick a Grand Prize (the thing you want everyone to buy)"
      - "Ask for contact information and eligibility criteria"
      - "Pick qualifying actions for entrants"
      - "Put giveaway on deadline"
      - "Announce winner, contact everyone else with promotional offer"

    key_elements:
      grand_prize:
        description: "The thing you want everyone to buy"
        tip: "Assign monetary value as price anchor"
        example: "If you sell $5,000 value for $2,000, advertise the $5,000 value"

      promotional_offer:
        description: "What you sell to everyone else (partial scholarship)"
        mechanism: "Discount, bonus, or minor change from Grand Prize"
        example: "$6,000 grand prize, $2,000 gift card promotional offer"

      eligibility_questions:
        purpose: "Get ammo for personalized selling"
        examples: ["Why should we pick you?", "Why this program?", "Why now?", "What's your goal?"]

      qualifying_actions:
        purpose: "Promote giveaway more or demonstrate interest"
        examples: ["Attending a call", "Making a post", "Entering a group"]

    deadline_strategy:
      duration: "3-7 days from start"
      daily_updates: "Let them know time remaining + provide value"
      claiming_deadline: "7 days to claim promotional offer after winner announced"

    double_prize_hack:
      description: "Give away two grand prizes for twice the leads"
      mechanism: "If someone you refer wins, you win too"
      benefit: "Referrers invested in success of referrals, keeps quality high"

    important_rules:
      - "Grand prizes must be GRAND - if nobody bites, give away something better"
      - "Limit entries by time, number, or both"
      - "Have downsells available for those who can't buy promotional offer"
      - "For recurring business, apply discount over longest period they'll agree to"

    creator_application:
      use_case: "Course launches, community building, list building"
      example: "Free year of coaching ($12,000 value) giveaway, everyone else gets $6,000 partial scholarship"
      benefit: "Massive lead generation with qualified buyers"

  # -------------------------------------------------------------------------
  # ATTRACTION OFFER #3: DECOY OFFER
  # -------------------------------------------------------------------------
  decoy_offer:
    tagline: "Which one do you think will get you the best results?"

    how_it_works:
      - "Advertise free or discounted lesser version of premium offer"
      - "When leads engage, present both options emphasizing premium"
      - "Let them choose - either way you get a customer"

    key_principle: "Know more about your customer's problem than they do"

    creating_the_decoy:
      method: "Offer fewer components, older models, or less personalized versions"
      critical: "Remove any guarantees"
      purpose: "Get leads to engage - nothing more"

    making_contrast_huge:
      principle: "The bigger the contrast, the better the deal, the more customers take premium"
      decoy: "As basic as reasonable"
      premium: "As awesome as possible"

    permission_to_sell:
      question: "Are you here for free stuff or lasting results?"
      if_results: "Skip to premium offer"
      if_free: "Present decoy, then contrast with premium"
      follow_up: "Which do you think will get you to your goal faster?"

    advertising_discounts_four_ways:
      percentage_off: "25% off"
      absolute_amount: "$300 off"
      free_portion: "3 Months Free"
      total_package: "One Year For $900 ($1,200 value)"

    show_rate_tip: "Discount offers have higher show-up rates than free offers"

    creator_application:
      use_case: "Courses, coaching, digital products"
      example: "Free DIY training vs. $399 Done-With-You Program with coaching, accountability, guarantee"
      benefit: "Close everyone - either they take premium or start free and upgrade later"

  # -------------------------------------------------------------------------
  # ATTRACTION OFFER #4: BUY X GET Y FREE
  # -------------------------------------------------------------------------
  buy_x_get_y_free:
    tagline: "Buy one puppy, get two puppies free!"

    how_it_works:
      - "When customers buy something, they get other stuff free"
      - "The more free stuff and higher its value, the better it works"
      - "Can be same items or different complementary items"

    reframe_pricing:
      instead_of: "3 shirts for $30"
      reframe_to: "Buy 1 shirt for $30, get 2 free"
      same_price: "But way more perceived free stuff"

    key_rules:
      more_free_than_paid: "Buy 2 get 10 free beats buy 10 get 2 free"
      mix_and_match: "Free things can be different from paid things"
      quantity_matters: "More cheaper free things can beat fewer expensive free things"

    for_services:
      example: "Buy 6 months get 6 months free"
      variations:
        good: "Buy 12 Months Get 6 Months Free - $1,800"
        better: "Buy 9 Months Get 9 Months Free - $1,800"
        best: "Buy 6 Months Get 12 Months Free - $1,800"
      reason: "Same price, same service, but third option has most free stuff"

    pricing_strategy:
      method: "Raise prices before giving stuff away to preserve profits"
      note: "Actually raise your prices - don't lie"

    cash_management_warning: "If you get a year's worth of payments in a month, budget to deliver for the whole year"

    existing_customer_offer: "Make this offer to existing customers for fast cash - limit to 10% of customers"

    creator_application:
      use_case: "Memberships, subscriptions, course bundles"
      example: "Buy 6 months coaching, get 12 months community access free"
      benefit: "Longer commitment, more touchpoints to upsell, higher LTV"

  # -------------------------------------------------------------------------
  # ATTRACTION OFFER #5: PAY LESS NOW OR PAY MORE LATER
  # -------------------------------------------------------------------------
  pay_less_now_pay_more_later:
    tagline: "Time is money"

    how_it_works:
      - "Give choice: pay full-price later OR pay discounted price now"
      - "Pay later option: delayed payment + satisfaction guarantee"
      - "Pay now option: 20-50% discount + additional bonuses"
      - "Card captured either way"

    pay_later_option:
      description: "$0 now, billed later unless they cancel"
      requirement: "Must meet conditions to qualify for guarantee"
      conditions: "Attendance, showing up, turning in data, etc."

    pay_now_option:
      discount: "20-50% off"
      bonuses: "Additional value not available with pay later"
      card_on_file: "Already captured, easy to process"

    promise_requirements:
      clear_yes_no: "Make promise a clear yes/no result"
      deliverable: "Make sure you can deliver within timeframe"
      trackable: "Pain rating before/after, metrics, completion"

    optimization:
      too_many_pay_later: "Discount pay now more, add better bonuses"
      too_many_pay_now: "Do the opposite"
      more_than_10_percent_cancel: "Promised too much, conditions too low, or price too high"

    hint_at_upsell_early: "Everyone wants to know when my next [X] starts..."

    creator_application:
      use_case: "Workshops, events, digital products"
      example: "$0 for 3-day workshop, billed $500 at end unless cancel. Or pay $299 now + recordings + bonus call"
      benefit: "Removes all risk from customer, captures card, upsell opportunity"

# =============================================================================
# SECTION 4: UPSELL OFFERS (4 TYPES)
# =============================================================================

upsell_offers:
  core_principle: "When an offer solves a problem, another appears - upsell the solution"
  key_insight: "Often, upsells make the majority of the profit"

  three_upsell_categories:
    more: "More of what they just got (quantity)"
    better: "Better versions of it (quality)"
    new: "New or complementary stuff (different)"

  failure_reasons:
    - "Offer something they don't want (too different or doesn't solve their problem)"
    - "Offer at wrong time (before they've experienced the problem)"
    - "Offer it wrong way (they don't believe you)"

  # -------------------------------------------------------------------------
  # UPSELL OFFER #1: THE CLASSIC UPSELL
  # -------------------------------------------------------------------------
  classic_upsell:
    tagline: "You can't have X without Y!"

    how_it_works:
      - "Offer solution to customer's next problem the moment they become aware of it"
      - "Your core offer solves one problem and creates another"
      - "Upsell immediately solves that next problem"

    key_principle: "Know more about your customer's problem than they do"

    examples:
      car_wash: "Car wash → Sealant"
      bicycle: "Bicycle → Helmet → Lights → Puncture-Resistant Tires"
      course: "Exercise course → Nutrition course"

    tactics:
      offer_profitable_first: "Offer higher profit options first"
      say_no_to_say_yes: "You don't want anything else do you? (No = Yes)"
      surprise_and_delight: "Give bonuses you held back even if they bought without them"
      hyper_buying_cycle: "Sell more when they're buying more (new hobby, life change)"
      free_bonuses_create_problems: "Bonuses can reveal problems upsells solve"
      speed_matters: "Faster they get access, more they value it"
      bundle_and_name: "Bundle upsells into named packages"
      integrate_upsells: "Make upsell products part of how you deliver first offer"
      bamfam: "Book A Meeting From A Meeting - always schedule next touchpoint"

    pricing_psychology:
      three_options:
        small: "$5"
        medium: "$8 (not $7)"
        large: "$9"
      result: "More people take large"
      reverse: "Price medium at $7 and small at $6 = more people take medium"

    upsell_guarantees: "Instead of free guarantees, add 5-50% for guarantee as upsell"

    creator_application:
      use_case: "After any purchase"
      example: "Course → Templates → Implementation coaching → Done-for-you service"
      benefit: "Dramatically increases customer value without new customer acquisition"

  # -------------------------------------------------------------------------
  # UPSELL OFFER #2: MENU UPSELL
  # -------------------------------------------------------------------------
  menu_upsell:
    tagline: "You don't need that...you need this"

    how_it_works:
      - "Tell customers what they DON'T need (unselling)"
      - "Tell them what they DO need (prescribing)"
      - "Ask preferences between options (A/B upselling)"
      - "Make buying easy (card on file)"

    four_tactics:
      unselling:
        description: "Tell customers what they don't need"
        purpose: "Emphasize what they do need"
        example: "You're not gonna need this weight-gainer shake..."

      prescription_upsell:
        description: "Tell them what they do need with personalized instructions"
        components: ["How it integrates with other purchases", "How to maximize value"]
        example: "You're gonna want to take two of these at night..."

      ab_upsell:
        description: "Ask preference between options instead of yes/no"
        mechanism: "Either choice results in upsell"
        example: "Do you want chocolate or vanilla?"
        add_nudge: "This is my favorite..."

      card_on_file:
        description: "Ask to use card already on file"
        mechanism: "Lowers hidden costs of buying"
        script: "Wanna just use the card on file?"

    make_anything_ab_sellable:
      quantity: "One bottle or two?"
      start_dates: "Start tomorrow or Monday?"
      flavors: "Chocolate or vanilla?"
      time_slots: "Morning or afternoon?"
      delivery: "Standard or overnight?"
      personnel: "John or Sara?"

    employees_love_unselling: "Encourage employees to help customers 'game the system'"

    the_economist_play:
      problem: "Want people to buy both digital and print"
      wrong: "A: Digital $59, B: Digital+Print $125 → People took cheap option"
      right: "A: Digital $59, B: Print $125, C: Digital+Print $125 → People took C"
      principle: "Add decoy option priced same as bundle"

    creator_application:
      use_case: "Multiple products/services"
      example: "You don't need all 8 courses. You just need these 3. Here's exactly how to use them..."
      benefit: "Higher close rate, customers feel helped not sold"

  # -------------------------------------------------------------------------
  # UPSELL OFFER #3: ANCHOR UPSELL
  # -------------------------------------------------------------------------
  anchor_upsell:
    tagline: "The only thing worse than making a $1,000 offer to a person with a $100 budget...is making a $100 offer to someone with a $1,000 budget"

    how_it_works:
      - "Present premium/expensive offer first (5-10x main offer price)"
      - "Get 'The Gasp' - customer freaks about cost"
      - "Come to the rescue - ask if they care about what makes it premium"
      - "Present main offer - customer feels relieved and sees better deal"
      - "Ask how they want to pay"

    key_insight: "Some customers WILL buy the premium offer"

    anchor_effectiveness:
      price_ratio: "Premium should be 5-10x more expensive than main offer"
      same_primary_features: "Main and premium should have same core features"
      different_secondary_features: "Premium has different 'premium' features"

    the_gasp:
      description: "Customer's mini panic attack at premium price"
      meaning: "The bigger the gasp, the more they bought"
      response: "Come to the rescue - ask what features they care about"

    critical_rules:
      - "Don't treat anchor like a fake or customer will too"
      - "Actually want people to buy the premium offer"
      - "Have premium suit ready before presenting main suit"

    creator_application:
      use_case: "Any offer with tiered pricing"
      example: "Present $50,000 done-for-you service first, then $5,000 course seems like a steal"
      benefit: "More sales at main price point + occasional premium sales"

  # -------------------------------------------------------------------------
  # UPSELL OFFER #4: ROLLOVER UPSELL
  # -------------------------------------------------------------------------
  rollover_upsell:
    tagline: "Wanna just roll it forward?"

    how_it_works:
      - "Credit some or all of customer's previous purchases toward next offer"
      - "Gets way more people to take upsell"
      - "Can use with new, current, or previous customers"

    four_situations_to_use:
      re_engage_old: "Reach out to customers 6+ months since last purchase"
      rescue_upset: "Better alternative to refund"
      steal_competitors: "Roll over what they paid competitor toward your offer"
      upsell_regular: "Roll current purchase into longer commitment"

    pricing_rule:
      description: "Make upsell offer at least 4x rollover credit"
      example: "$600 credit toward $2,400+ offer = 25% max discount"
      principle: "Test to find sweet spot for rollover amount"

    urgency_tactic: "Make rollover a one-time only offer in the moment"

    gift_card_play:
      description: "Sell $200 gift cards for $20 (90%+ discount)"
      rules: "Limit 2 per customer, can only use on other people"
      mechanism: "When friends redeem, roll $200 toward $1,000+ offer"
      result: "People pay you to refer their friends"

    winback_campaign_example:
      action: "Made personalized videos for 200 past customers offering $4,000 credit"
      result: "20% took the offer = ~$1,900,000 annual revenue"
      roi: "One day of recording videos"

    creator_application:
      use_case: "Converting one-time buyers to recurring"
      example: "Roll your course purchase into annual membership credit"
      benefit: "Dramatically increases conversions and customer retention"

# =============================================================================
# SECTION 5: DOWNSELL OFFERS (3 TYPES)
# =============================================================================

downsell_offers:
  core_principle: "They said no to THIS offer, not ALL offers"

  rules_of_downselling:
    trades_not_discounts: "If you're gonna give something, get something"
    personalize_dont_pressure: "Find what they like/don't like, adjust accordingly"
    same_things_new_ways: "100 ways to offer what you have, not 100 new products"
    never_drop_price_just_because: "Don't change price just to get someone to buy"
    customers_talk: "If they find out someone got same thing for less, you'll upset people"

  two_downsell_approaches:
    change_how_they_pay: "Balance how much they pay now vs. over time"
    change_what_they_get: "Change quantity, quality, or offer something different"

  # -------------------------------------------------------------------------
  # DOWNSELL OFFER #1: PAYMENT PLAN DOWNSELLS
  # -------------------------------------------------------------------------
  payment_plan_downsells:
    tagline: "How much can you put down today?"

    how_it_works:
      - "Offer same product at same overall price"
      - "Spread cost: some up front, rest in scheduled payments"
      - "Get more buyers because they pay less in the moment"
      - "Boost profits because they still pay full price over time"

    seven_step_process:
      step_1_reward_prepay:
        description: "Discount for paying in full"
        framing: "It's $15...but $10 if you prepay"
        psychology: "Reward for prepay, not punish for payment plan"

      step_2_third_party_options:
        financing: "Another company pays you, customer pays them"
        credit_card: "Ask 'would you rather I decide payment terms or you?'"
        layaway: "Pay off before getting product"

      step_3_half_now_half_later:
        question: "When's the next time you get paid?"
        offer: "Put half down today, rest when you get paid"
        fallback: "What's the most you can put down today?"

      step_4_temperature_check:
        question: "On a scale 1-10, how bad do you want this?"
        if_8_plus: "We're gonna figure out a way to make this happen"
        if_7_or_below: "Ask 'Why not a 10?' then offer something different"

      step_5_three_payments:
        offer: "1/3 now, 1/3 next two paychecks"

      step_6_evenly_spread:
        offer: "Payments spread over service duration"
        example: "16-week program = 16 weekly payments"

      step_7_free_trial:
        offer: "Trial With Penalty (next chapter)"

    seesaw_downselling:
      question: "Would you rather have giant monthly payments or tiny ones?"
      frame: "More you put down now, lower monthly payments"
      team_approach: "Pull chair to their side, walk through options together"

    payment_plan_upsell: "Offer to pay off balance for original prepay discount"

    align_with_paydays: "Charge on days people get paid for fewer declines"

    billing_frequency_insight:
      monthly: "10.7% monthly churn"
      quarterly: "5% monthly churn"
      annual: "2% monthly churn"
      principle: "Start high (fewer bigger payments), work down"

    creator_application:
      use_case: "High-ticket courses, coaching, programs"
      example: "$5,000 program → $2,500 down + 5 payments of $500"
      benefit: "Close more sales, same revenue, better cash flow"

  # -------------------------------------------------------------------------
  # DOWNSELL OFFER #2: TRIAL WITH PENALTY
  # -------------------------------------------------------------------------
  trial_with_penalty:
    tagline: "If you do X, Y, Z, I'll let you start for free"

    how_it_works:
      - "Customers try product/service free IF they meet terms"
      - "Terms should create excellent customers"
      - "If they don't meet terms, they pay"
      - "Card required"

    comparison_to_win_your_money_back:
      win_your_money_back: "Pay now, get money back if meet terms"
      trial_with_penalty: "Start free, pay only if DON'T meet terms"

    example_criteria:
      b2c: "Attend calls, post progress weekly, journal daily, attend sessions"
      b2b: "Send 100 messages/day, report stats, attend training, post homework"
      software: "Attend onboarding calls, do homework, activate profile, complete setup"

    five_step_downsell_process:
      step_1_offer_trial: "How about we just get ya started for free?"
      step_2_get_card: "What card do you wanna use?"
      step_3_sell_staying: "If this got you results, will you stay long-term?"
      step_4_explain_fees: "Miss criteria = small fee to keep you on track"
      step_5_make_checkins_required: "Check-ins are upsell opportunities"

    fee_structure:
      option_a: "Small fee per miss-up"
      option_b: "One lump fee on first miss"
      recommendation: "Small fees per miss usually work better"

    critical_rule: "If someone won't put card down and agree to do work, don't sell them"

    creator_application:
      use_case: "Courses, coaching, programs with homework"
      example: "Free trial if you: complete modules, submit homework, attend calls"
      benefit: "Converts resistant buyers, creates engaged customers"

  # -------------------------------------------------------------------------
  # DOWNSELL OFFER #3: FEATURE DOWNSELLS
  # -------------------------------------------------------------------------
  feature_downsells:
    tagline: "Why don't we try this instead?"

    how_it_works:
      - "Lower price by changing what customer gets"
      - "NOT a discount (same thing for less)"
      - "Change quantity, quality, or remove components"

    feature_downsell_formula: "Take something away + lower price + 'How about now?'"

    key_insight:
      description: "People weigh money saved vs. value lost"
      tactic: "Remove features from highest to lowest value"
      result: "Incentivizes customers to buy higher value option"

    downsell_categories:
      quantity:
        products: "3-month supply → 1-month supply"
        services: "4 sessions/month → 2 sessions/month"

      quality:
        products: "Leather seats → vinyl seats"
        services: "5-min response → overnight response"

      service_quality_features:
        time_availability: "Come anytime vs. specific times"
        days_of_week: "All days vs. Mon/Wed/Fri"
        times_of_day: "24hrs vs. 9-5"
        amount_of_time: "60min calls vs. 15min calls"
        location: "All locations vs. one location"
        speed_of_response: "Minutes vs. hours vs. days"
        speed_of_delivery: "Same day vs. next week"
        service_ratio: "1-on-1 vs. 1-to-many"
        communication: "Video call vs. chat vs. email"
        provider_qualifications: "Owner vs. senior vs. junior"
        live_vs_recorded: "Live vs. recorded"
        in_person_vs_remote: "In-person vs. remote"
        diy_dwy_dfy: "Do It Yourself vs. Done With You vs. Done For You"
        personalization: "Custom vs. generic"
        guarantee: "Lifetime vs. 1 year vs. conditional"

      remove_entire_features:
        description: "Remove feature itself, not just reduce it"
        powerful_example: "Remove guarantee to justify price reduction"
        psychology: "People see value of feature only after seeing price difference"

    done_for_you_to_diy:
      description: "If they refuse all services, sell DIY product"
      examples:
        chiropractor: "Adjustments → home massage tools"
        painter: "Painting service → paint + equipment rental"
        consulting: "Done-for-you → workshop"

    naming_packages:
      expensive: "The Whale Package, High Roller, Total Transformation"
      cheapest: "The Minimum (implies they need at least this)"

    temperature_check: "After two downsells, ask 1-10 how bad they want it"

    barter_with_reviews:
      offer: "Knock $100 off if you: leave reviews, video testimonial, social posts, 2 introductions"
      value: "Advertising worth more than discount"

    creator_application:
      use_case: "Multiple service/product tiers"
      example: "Full coaching → Group coaching → Self-paced course → Templates only"
      benefit: "Close everyone at some level, never lose a buyer entirely"

# =============================================================================
# SECTION 6: CONTINUITY OFFERS (3 TYPES)
# =============================================================================

continuity_offers:
  core_principle: "You can shear a sheep for a lifetime, but you can only skin it once"

  why_continuity:
    more_customers: "Lower monthly price attracts more buyers"
    more_upsells: "4x customers = 4x upsell opportunities"
    predictable_revenue: "Recurring cash flow"

  tradeoff:
    pro: "More customers, more long-term revenue"
    con: "Less cash now"
    solution: "Use continuity LAST - after getting cash from other offers"

  observation: "No successful continuity business has standalone membership offer - all have bells and whistles to upsell"

  # -------------------------------------------------------------------------
  # CONTINUITY OFFER #1: CONTINUITY BONUS OFFERS
  # -------------------------------------------------------------------------
  continuity_bonus_offers:
    tagline: "If you like this, you're gonna love what I have next..."

    how_it_works:
      - "Give awesome thing if they sign up today"
      - "Bonus value typically exceeds first continuity payment"
      - "Can be one-time or monthly bonuses"

    bonus_types:
      one_time:
        products: "Small things or one big complementary product"
        services: "Defined program, onboarding, setup, feature"
        example: "Free $800 dog toy collection when you sign up for monthly food"

      monthly:
        description: "Ongoing bonus with membership"
        example: "New dog toy every month as member"

    combined_with_prepay:
      mechanism: "Offer bonus + prepay discount"
      example: "Free accelerator program ($1,000 value) + 6-month prepay discount"

    creator_application:
      use_case: "Membership communities, subscriptions"
      example: "Join annual membership, get all previous courses ($5,000 value) free"
      benefit: "Dramatically increases conversion to recurring"

  # -------------------------------------------------------------------------
  # CONTINUITY OFFER #2: CONTINUITY DISCOUNT OFFERS
  # -------------------------------------------------------------------------
  continuity_discount_offers:
    tagline: "If you sign up today, you get X time free"

    how_it_works:
      - "Give free time/products in exchange for longer commitment"
      - "Can apply discount up front, at end, spread out, or after first payments"

    four_discount_applications:
      up_front:
        description: "Free time first, payments start after"
        best_for: "Industries with enforceable contracts"
        warning: "Delays cash, may have higher churn"

      at_the_end:
        description: "Make all payments, earn free time"
        benefit: "Lower churn"

      spread_over_time:
        description: "Divide discount across term"
        example: "3 months free = $600 / 12 months = $50/mo discount"
        bonus: "Keep discount for life if complete term"

      after_first_payments:
        description: "Pay 1-2 times, then get discount"
        framing: "First and last month, activation fee"
        benefit: "Collect cash to cover advertising and delivery"

    highest_value_tip:
      insight: "Bill every 4 weeks instead of monthly"
      math: "12 months = 12 payments. 52 weeks = 13 four-week cycles"
      profit_impact: "8.3% more revenue. On 20% margins = 41% more profit"
      effort: "Just change a few words"

    extend_dont_eat:
      wrong: "12 months - 3 free = 9 paid months"
      right: "12 months + 3 free = 15 total months"

    processing_fee_tip:
      script: "It's $X plus a 3% processing fee"
      result: "3% straight to bottom line, nobody refuses"

    two_forms_of_payment:
      why: "Customers don't cancel but payment info changes/expires"
      offer: "Save 3% by giving second form of payment"
      script: "We only charge fee because it costs man hours to get new info"
      best: "Get ACH (direct bank link) - cheapest transaction method"

    gift_card_tactic:
      mechanism: "Give discount as physical gift card"
      benefits: ["Lead magnet if gifted to friend", "Many forget to use = full price"]

    lifetime_discount_at_churn_point:
      strategy: "Offer lifetime lower rate if they stay past average churn month"
      example: "15% off for life if you stay 5 consecutive months"

    cancellation_strategy:
      fee_equal_to_discount: "Cancel anytime by paying discount amount received"
      make_cancellation_clear: "No obvious way = complaints outside business"
      exit_interview: "Waive fee for feedback - save 1/3 of cancelers"

    creator_application:
      use_case: "Memberships, communities, subscriptions"
      example: "Sign up annually, get 3 months free (spread as $25/mo discount)"
      benefit: "Higher conversion, longer retention, predictable revenue"

  # -------------------------------------------------------------------------
  # CONTINUITY OFFER #3: WAIVED FEE OFFER
  # -------------------------------------------------------------------------
  waived_fee_offer:
    tagline: "Pay month-to-month with setup fee, or I'll waive it if you commit to a year"

    how_it_works:
      - "Present startup fee for month-to-month (3-5x monthly rate)"
      - "Waive entire fee if they commit longer term"
      - "If cancel inside term, pay the fee"

    example:
      commitment: "12 months"
      monthly_rate: "$1,000"
      fee: "$5,000"
      option_a: "Pay $5,000 + $1,000/month, cancel whenever"
      option_b: "Waive $5,000, pay $1,000/month for 12 months, pay fee if cancel early"

    psychology:
      why_it_works: "Customers stay because leaving costs more than staying"
      gets_them_to_start: "Immediate value by avoiding fee"
      gets_them_to_stick: "Cost to quit exceeds cost to stay"

    presenting_the_fee:
      justification: "It costs us money to get you started"
      if_short_term: "You cover setup costs"
      if_long_term: "We cover setup costs for you"

    fee_size_tradeoffs:
      larger_fee: "More people commit long-term"
      smaller_fee: "More people go month-to-month (more up front cash)"

    after_commitment_fulfilled: "Fee officially goes away"

    best_for: "Commitments of one year or longer"

    cause_donation_twist:
      mechanism: "Ask what cause they hate - if cancel early, fee donated there"
      psychology: "Two reasons to stay: don't want to pay, don't want cause they hate to get it"

    warning: "If more than 5% want to cancel early, product may have issues"

    creator_application:
      use_case: "Annual memberships, coaching programs"
      example: "$2,500 setup fee waived with 12-month commitment"
      benefit: "Dramatic increase in commitment length, nearly eliminates early churn"

# =============================================================================
# SECTION 7: BUILD YOUR MONEY MODEL
# =============================================================================

build_your_money_model:
  three_stages:
    stage_1_get_cash:
      focus: "Attraction Offers"
      goal: "Get more customers for less"

    stage_2_get_more_cash:
      focus: "Upsell & Downsell Offers"
      goal: "Make more money from them faster"

    stage_3_get_most_cash:
      focus: "Continuity Offers"
      goal: "Maximize total money spent"

  evolution_sequence:
    step_1: "Get customers reliably"
    step_2: "Make sure they pay for themselves reliably"
    step_3: "Make sure they pay for other customers reliably"
    step_4: "Start maximizing each customer's long-term value"
    step_5: "Spend as many advertising dollars as possible to print money"

  step_by_step_process:
    step_1_attraction_offer:
      goal: "Turn strangers into customers and cover costs"
      action: "Pick from: Win Your Money Back, Giveaways, Decoy, Buy X Get Y Free, Pay Less Now Pay More Later"
      timeline: "May take up to a year to figure out what works"

    step_2_upsell_offer:
      goal: "Get 30-day profits well above costs"
      action: "Pick from: Classic Upsell, Menu Upsell, Anchor Upsell, Rollover Upsell"
      timing: "Make offer at time of greatest need"

    step_3_downsell_offer:
      goal: "Get customers who said no to say yes"
      action: "Use Payment Plans, Trials, or Feature Downsells"
      tip: "Alternate between them in same sale for flexibility"

    step_4_continuity_offer:
      goal: "Get one last sale and stack recurring cash"
      action: "Pick from: Continuity Bonuses, Continuity Discounts, Waived Fee"
      note: "Sometimes best timing is after first 30 days"

  critical_rules:
    perfect_one_at_a_time:
      warning: "Don't implement whole Money Model at once"
      process: "Pick one offer → Try it → Make it reliable → Make it automatic → Next stage"
      measure: "In quarters, not weeks"

    simple_scales_fancy_fails:
      principle: "100 ways to offer same thing, not 100 things to offer"
      example: "Personal training: 1, 2, 3, 4 sessions/week = one product, many offers"

    affiliate_products_fill_gaps:
      what_it_is: "Sell other people's stuff for commission"
      when_to_use: "Starting out, adding offers, avoiding operational headache"
      examples:
        service: "Dental agency refers to braces manufacturer for commission"
        local: "Massage therapist sells partner's home tools"
        digital: "Educator recommends software, gets commission on signups"

    raise_prices_in_stages:
      start: "Cheap at first for customer feedback"
      process: "As you get yeses, raise price"
      stop: "When you make less money overall"

    automatic_renewal:
      tip: "Turn attraction offers into continuity with auto-renewal"
      example: "Buy 6 Get 6 Free → auto-renews month-to-month after 12 months"

    mix_and_match:
      principle: "No rules - combine offers however you want"
      example: "Free trial + pay less now/more later + lifetime discount = one multi-headed offer"

