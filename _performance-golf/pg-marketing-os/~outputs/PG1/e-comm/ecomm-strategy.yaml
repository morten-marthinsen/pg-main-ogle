  # 15. FAQ (Section 15)
  # ──────────────────────────────────────
  - name: "FAQ"
    purpose: "12 Q&A pairs addressing objections — accordion behavior"
    class: "section section--white"
    id: "faq"
    zone: "BTF"
    priority: 13
    layout: "Single column accordion, max-width 760px"
    background: "var(--white)"
    container: "container (1200px)"
    content:
      header:
        label: "Questions? Answers."
        title: "Frequently Asked Questions"
      faq_list:
        class: "faq-list"
        max_width: "760px"
        margin: "0 auto"
        behavior:
          type: "Accordion — one open at a time"
          default_open: "First question"
          toggle_icon: "Plus SVG (14x14), rotates 45deg when open"
          icon_container: "28px circle, fog bg, pebble border"
          icon_open_state: "orange background, white stroke, rotated 45deg"
        question_style:
          font_size: "clamp(15px, 1.6vw, 17px)"
          font_weight: 600
          color: "var(--black)"
          hover_color: "var(--orange)"
          padding: "var(--space-xl) 0"
        answer_style:
          font_size: "15px"
          line_height: 1.75
          color: "var(--gray-ui)"
          padding_bottom: "var(--space-xl)"
        questions:
          - q: "What is the PG1 Smart System?"
            a: "A personalized golf improvement system — not an app. Six integrated components that start by finding your root swing flaw and adapt the more you use it. The app is the delivery vehicle. The system is what makes it different."
          - q: "How does the Smart System find my root swing flaw?"
            a: "Either your send your swing to your coach or you use SwingScan AI. We recommend SwingScan AI because it is trained on 2M+ swings across 77+ documented flaw patterns. Film your swing with your phone. SwingScan identifies your root swing flaw, then your coach can review your root swing flaw and make sure your Smart Step is the fastest way for you to improve right now."
          - q: "What is a Smart Step?"
            a: "The one thing to work on right now. Not a list of 12 corrections. The single drill, focus, or correction that addresses your root swing flaw at this moment. As your flaw resolves, your Smart Step evolves. The system decides what matters most, right now."
          - q: "What is Smart Match?"
            a: "How you get matched with your coach. The system pairs you with a coach based on your specific root swing flaw type — so the person guiding you actually specializes in fixing your problem. Not randomly assigned."
          - q: "How is this different from other golf apps?"
            a: "Every golf app does one of three things: measures, prescribes, or analyzes. None of them find your root swing flaw first. The PG1 Smart System starts by finding your root swing flaw — then shows you exactly how to fix it. Nobody else does this."
          - q: "How fast will I see results?"
            a: "Day 1 — you get your root swing flaw identified and your Smart Step. Most golfers feel the difference in their first practice session because they are working on the right thing for the first time. The 365-day guarantee gives you a full year to see the results for yourself."
          - q: "Do I need special equipment?"
            a: "No. Just your cell phone, your clubs, and enough room to make a swing!"
          - q: "What is the difference between Annual and Lifetime?"
            a: "Both include full access: all 6 system components, all 3 bonuses, every future feature. Annual: $199/year, rate locked, cancel anytime. Lifetime: $399 once, never pay again, numbered Founders badge."
          - q: "What happens after the 1,000 Founders spots fill?"
            a: "Founders Club closes permanently. Future members join at public pricing — significantly higher. Your Founders rate is locked forever, even as the platform adds features and the public price increases."
          - q: "Does the Smart System keep working after my root swing flaw is fixed?"
            a: "Yes. Once your root swing flaw resolves, the Smart System identifies your next biggest opportunity for improvement. Then the next. This is an ongoing system — not a one-time fix. For as long as you want to play, the system is finding the one thing that will make the biggest difference right now in each area of your game."
          - q: "Who are the coaches?"
            a: "The PG1 coaching team includes Hank Haney (Tiger Woods' Former Coach), Martin Chuck, Erika Larkin, Andrew Rice, JT Thomas, Eric Cogorno, and Brian Mogg — supported by David Leadbetter, Rocco Mediate, Rick Smith, Cameron McCormick, and more. Smart Match pairs you with the coach who specializes in fixing your specific root swing flaw type."
          - q: "Is my data private?"
            a: "Yes. Your swing videos and data are used only for YOUR improvement. PG1 does not share individual user data."

