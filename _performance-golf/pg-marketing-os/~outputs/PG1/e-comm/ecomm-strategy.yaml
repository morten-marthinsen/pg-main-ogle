section_map:
  active_sections:
    - section_number: 1
      section_name: "Hero Carousel"
      priority: 1
      word_budget: 175
      zone: "ATF"
      conversion_impact: "HIGH"
      proof_type_required: "App screenshot(s), SwingScan diagnosis UI, PG1 logo, Brixton portrait or keynote thumbnail. Carousel tells the product story in 8-10 frames."
      design_notes_seed: "Full-width hero with app UI screenshot as centerpiece. Mobile: swipe carousel. First position may be keynote video thumbnail with play button overlay. Headline/subhead overlay on first image. Clean, Apple-keynote-inspired aesthetic — not cluttered app-store style."
      crossover_skill: null
      crossover_note: "Ecom-native. Handled by EC-02 (Hero & Value Prop)."
      rationale: "Always priority 1 per E-COMM-ENGINE Law 3. Stops the scroll, earns the scroll-down. Headline 'You've Never Been Diagnosed' is the Big Idea expression. Fast-action buyers who watched the keynote convert here."

    - section_number: 3
      section_name: "CTA Box"
      priority: 2
      word_budget: 100
      zone: "ATF"
      conversion_impact: "HIGH"
      proof_type_required: "Trust badges (60-day guarantee icon, 1,000 Founders badge, secure checkout). Two pricing tier cards. Counter showing spots remaining (if available)."
      design_notes_seed: "Two pricing tier cards (Annual / Lifetime) side by side on desktop, stacked on mobile. Lifetime card highlighted as recommended. CTA button: 'Get My Diagnosis'. Sticky CTA on scroll for mobile. Founders counter or badge below cards."
      crossover_skill: "16-offer-copy"
      crossover_strength: "MODERATE"
      crossover_note: "Value anchor (condensed), pricing tier presentation, guarantee badge."
      rationale: "Primary ATF conversion point. Two pricing tiers, Founders badge, guarantee badge. Captures keynote-warmed buyers immediately. CTA framing: 'Get My Diagnosis' (not 'Buy an app')."

    - section_number: 9
      section_name: "Problem/Solution"
      priority: 3
      word_budget: 300
      zone: "BTF"
      conversion_impact: "HIGH"
      proof_type_required: "70% lesson failure stat (Bobby Clampett, GolfWRX). USGA handicap stagnation data (2020-2025). Relatable imagery: frustrated golfer, conflicting YouTube thumbnails, stack of training aids."
      design_notes_seed: "Full-width, contrasting background to signal BTF entry. Dark or muted tone. Mobile: stack vertically. Emotional weight section — generous whitespace, short paragraphs, data callouts as large-format pull quotes."
      crossover_skill: "13-root-cause"
      crossover_strength: "STRONG"
      crossover_note: "Enemy identification (The Symptom Industry — systemic, not personal). Pain validation with data. Root cause reveal: treatment-without-diagnosis. Anchor phrase: 'You've never been diagnosed.'"
      rationale: "Emotional entry point for BTF. Validates the golfer's frustration with market-level data — not their fault, the system skipped a step. Creates the 'this is for me' feeling. Without this, the mechanism explanation lacks emotional weight."

    - section_number: 10
      section_name: "Why It Works (Mechanism)"
      priority: 4
      word_budget: 350
      zone: "BTF"
      conversion_impact: "HIGH"
      proof_type_required: "SwingScan UI screenshots showing diagnosis flow. Step-by-step visual (7-step sequence). Medical analogy visual (optional). 2M+ swings / 96% accuracy / 77+ flaws as data callouts."
      design_notes_seed: "Full-width. Step-by-step numbered sequence as visual flow. Each step gets a mini-card with icon + label + one-sentence description. Mobile: vertical stack. Data points as large-format callouts between steps. Breathing room — this is the intellectual backbone."
      crossover_skill: "14-mechanism"
      crossover_strength: "STRONG"
      crossover_note: "Named mechanism reveal (SwingScan Diagnosis). How-it-works sequence (7 steps). Medical analogy as primary explanation frame. Three-layer explanation (simple/medium/technical) — use medium for page, simple for hero."
      rationale: "SwingScan Diagnosis is the intellectual backbone. Explains HOW the product solves the root cause. The 7-step sequence (Film -> Analyze -> Identify -> Plan -> Coach -> Adapt -> Resolve) is the mechanism story. Must differentiate from generic 'AI analysis' — SwingScan DIAGNOSES, it does not just measure."

    - section_number: 4
      section_name: "Product Highlights"
      priority: 5
      word_budget: 250
      zone: "BTF"
      conversion_impact: "HIGH"
      proof_type_required: "Icons per highlight. Feature names from EC-01. Micro-images or app UI screenshots per highlight."
      design_notes_seed: "Icon + feature name + one-line description grid. Desktop: 3-column grid or accordion. Mobile: stack or accordion with first item expanded. Clean, scannable. Each highlight links to deeper section if available."
      crossover_skill: "15-product-introduction"
      crossover_strength: "STRONG"
      crossover_note: "Feature naming (caveman-benefit format from EC-01), feature hierarchy (hero/supporting/technical), feature-benefit linkage. Top 5 features displayed."
      rationale: "First BTF section after the emotional Problem/Solution. Scannable feature summary resolves 'what do I actually get?' Bridges emotional weight to concrete product features."

    - section_number: 6
      section_name: "Expert Credibility (Coaching Team)"
      priority: 6
      word_budget: 250
      zone: "BTF"
      conversion_impact: "HIGH"
      proof_type_required: "Coach headshots (6 PGA coaches). Individual credential lines. Brixton portrait or quote. $5M+ investment figure. 276 team members / 15 countries data point. MyFitnessPal/Weather Channel developer mention."
      design_notes_seed: "Coach grid (3x2 on desktop, 2x3 or scrollable on mobile). Each coach card: photo + name + specialty + flaw type match. Brixton quote or founder story callout box. Investment and team stats as supporting data bar."
      crossover_skill: "18-proof-weaving"
      crossover_strength: "STRONG"
      crossover_note: "Authority citation (coach credentials, founder story), statistical proof ($5M+, 276 team members, 1.4M golfers helped), credential presentation."
      rationale: "Coaching team credibility addresses the #1 belief barrier: WHO-01 ('Only an in-person coach can help'). Six PGA coaches matched to flaw types — not a marketplace gamble. Brixton's story personalizes the investment. Answers: 'Who built this and why should I trust them?'"

    - section_number: 5
      section_name: "UGC / Social Proof Carousel"
      priority: 7
      word_budget: 100
      zone: "BTF"
      conversion_impact: "HIGH"
      proof_type_required: "Beta user testimonials (placeholder until populated). Celebrity/influencer badges (Alonzo Mourning, others). UGC screenshots or video thumbnails. Star ratings if available."
      design_notes_seed: "Horizontal scrollable carousel. Each card: quote + name + handicap (if available) + photo/avatar. Celebrity section below or integrated. Mobile: swipe carousel. If insufficient UGC at launch, use beta feedback quotes with placeholder styling for future UGC."
      crossover_skill: "18-proof-weaving"
      crossover_strength: "STRONG"
      crossover_note: "Review integration (pull-quote format), UGC video thumbnails, celebrity/influencer proof section."
      rationale: "Social proof density is critical per E-COMM-ENGINE Law 4. Pre-launch status means placeholder content needed. Celebrity/influencer badges (Alonzo Mourning) provide borrowed credibility. Post-launch, this becomes the highest-conversion section as testimonials populate."

    - section_number: 8
      section_name: "What to Expect Timeline"
      priority: 8
      word_budget: 200
      zone: "BTF"
      conversion_impact: "MEDIUM"
      proof_type_required: "Timeline visual (Day 1, Week 1, Month 1, Month 3). App UI screenshots at each stage. Progress indicators."
      design_notes_seed: "Horizontal timeline on desktop, vertical on mobile. Each milestone: time marker + what happens + what you feel. Progress bar visual. Clean, forward-moving energy."
      crossover_skill: null
      crossover_note: "Ecom-native. Unique to SaaS/membership — shows the onboarding and value realization journey."
      rationale: "SaaS-specific section not used for physical products. Addresses 'how does this actually work when I sign up?' Maps the value realization timeline: diagnosis happens fast (Day 1), plan builds (Week 1), coach matches (Week 1-2), adaptation begins (Month 1), compensation dissolution visible (Month 3). Reduces 'I won't know what to do' anxiety."

    - section_number: 11
      section_name: "Comparison Chart"
      priority: 9
      word_budget: 200
      zone: "BTF"
      conversion_impact: "HIGH"
      proof_type_required: "Multi-column comparison table. Category labels (not brand names): 'YouTube Instruction,' 'In-Person Lessons,' 'Tracking Apps,' 'AI Swing Apps,' 'PG1 Pulse.' Check/X icons."
      design_notes_seed: "Five-column table with PG1 column highlighted. Mobile: horizontal scroll or condensed responsive. Check/X icons. Rows: Root Flaw Diagnosis, Personalized Plan, Matched Coach, Adaptive Learning, Price comparison. PG1 column wins on all diagnostic criteria."
      crossover_skill: null
      crossover_note: "Ecom-native. No competitor brand names per brief directive — category types only."
      rationale: "Addresses competitive positioning without naming competitors. Shows structural difference: YouTube = tips, Lessons = prescriptions, Trackers = data, AI Apps = generic analysis, PG1 = diagnosis first. Directly answers 'How is this different from what I've tried?'"

    - section_number: 12
      section_name: "Cost Savings / Value Calculator"
      priority: 10
      word_budget: 150
      zone: "BTF"
      conversion_impact: "MEDIUM"
      proof_type_required: "Price comparison data: lesson costs ($150-350/session), coaching programs ($1,800-10,000), TrackMan ($20,000), competitor app subscriptions. Total spend calculation."
      design_notes_seed: "Visual calculator or comparison stack. Large-format price callouts. Running total that builds to $5,700+ stated value, then reveals $299 Founders price. Mobile: vertical stack with price reveal at bottom."
      crossover_skill: "16-offer-copy"
      crossover_strength: "MODERATE"
      crossover_note: "Value anchoring (adapted for SaaS). Price comparison against alternative solution costs. Financial waste reframe from campaign brief."
      rationale: "SaaS-appropriate value framing. Converts the golfer's past spending into value contrast. Industry insiders valued at $2,000-3,000/yr anchors the $199/yr and $299 lifetime as genuine. Addresses 'Is $299 worth it?' by reframing as 'You've already spent more than $299 on things that didn't diagnose you.'"

    - section_number: 16
      section_name: "Offer/Pricing"
      priority: 11
      word_budget: 300
      zone: "BTF"
      conversion_impact: "HIGH"
      proof_type_required: "Two pricing tier cards with full feature comparison. Value stack ($5,700 total stated value). 4 bonus callouts. Founders badge mockup. CTA buttons per tier."
      design_notes_seed: "Two-column pricing cards (desktop), stacked (mobile). Lifetime card highlighted. Value stack items listed with struck-through full prices. Bonus items below value stack. Founders counter/badge. Dual CTAs: 'Get My Diagnosis — Annual' / 'Get My Diagnosis — Lifetime'."
      crossover_skill: "16-offer-copy"
      crossover_strength: "STRONG"
      crossover_note: "Full value stack presentation, price anchoring, bonus integration, guarantee framing (reference), Founders identity."
      rationale: "Full offer presentation for BTF browsers. Distinct from ATF CTA Box — this is the complete value argument including stack, bonuses, and value contrast. Positioned after proof and comparison so the golfer understands what they're getting and why it's worth it before seeing the full price presentation."

    - section_number: 17
      section_name: "Guarantee"
      priority: 12
      word_budget: 150
      zone: "BTF"
      conversion_impact: "HIGH"
      proof_type_required: "Guarantee badge/seal icon. 'The Diagnosis Promise' as branded name. 60-day + 7-day unconditional stacked guarantee terms."
      design_notes_seed: "Centered, single-focus section. Guarantee seal/badge visual. Short paragraph with clear terms. Full-width centered block. Breathing room above and below."
      crossover_skill: "16-offer-copy"
      crossover_strength: "MODERATE"
      crossover_note: "Guarantee framing (branded: The Diagnosis Promise). Stacked guarantee (60-day conditional + 7-day unconditional)."
      rationale: "Risk reversal removes purchase barrier. 'The Diagnosis Promise' branding connects the guarantee to the mechanism — if the diagnosis doesn't deliver clarity, every penny back. Stacked with 7-day free trial removes all first-week risk."

    - section_number: 15
      section_name: "FAQ"
      priority: 13
      word_budget: 400
      zone: "BTF"
      conversion_impact: "HIGH"
      proof_type_required: "None required. Clean typography. Plus/minus toggle icons."
      design_notes_seed: "Accordion with first question expanded. Mobile: native accordion, tap to expand/collapse. Generous line spacing in answers. 10-12 Q&A pairs."
      crossover_skill: null
      crossover_note: "Ecom-native. Accordion Q&A. Handles residual objections after proof and offer."
      rationale: "Objection handling targeting the 8 objection categories from research. Key objections: 'Is this just another golf app?' (positioning), 'Can AI really diagnose my swing?' (technology trust), 'What if I don't improve?' (guarantee), 'What happens after Founders fills up?' (pricing), 'Do I need special equipment?' (accessibility), 'How is this different from Arccos/Sportsbox/Skillest?' (differentiation)."

    - section_number: 18
      section_name: "Use Cases / Audience Segments"
      priority: 14
      word_budget: 150
      zone: "BTF"
      conversion_impact: "MEDIUM"
      proof_type_required: "Segment-specific imagery. Golfer persona labels."
      design_notes_seed: "Three-column card grid (desktop), carousel or stack (mobile). Each card: persona label + 2-3 sentence description + how PG1 serves them."
      crossover_skill: null
      crossover_note: "Ecom-native. Audience segment section broadening market appeal."
      rationale: "Broadens appeal beyond primary persona. Segments: The Plateau Player (handicap stuck despite effort), The Lesson Skeptic (burned by past instruction), The Tech-Forward Golfer (believes in AI but hasn't found the right system). Serves secondary conversion for readers who don't see themselves in the primary narrative."

    - section_number: 2
      section_name: "Copy Block"
      priority: 15
      word_budget: 125
      zone: "ATF"
      conversion_impact: "HIGH"
      proof_type_required: "App screenshot. Icon row (4-5 icons with labels: diagnosis, plan, coach, adaptive, founders)."
      design_notes_seed: "Desktop: two-column (text left, app screenshot right). Mobile: full-width text above image. Short, scannable. Value prop expansion beneath hero."
      crossover_skill: null
      crossover_note: "Ecom-native. ATF companion element handled by EC-02."
      rationale: "Value prop expansion below hero. HIGH conversion impact for ATF visitors but ranked P15 because content derives from hero and product highlights. High on page, low page-building priority."

  excluded_sections:
    - section_number: 7
      section_name: "Ingredients/Materials"
      exclusion_reason: "SaaS product — no physical materials or ingredients. Technology explanation covered in Section 10 (Why It Works). Feature breakdown in Section 4 (Product Highlights)."
      reactivation_trigger: "N/A for software product."

    - section_number: 13
