      orange: "#FD3300"
      orange-dark: "#DB2C00"
      black: "#1D1A1A"
      gray-ui: "#7B726C"
    neutrals:
      stone: "#B3AAA3"
      pebble: "#DFD9D5"
      sand: "#ECE9E4"
      fog: "#F4F2F0"
      mist: "#FCFAFA"
      white: "#FFFFFF"
    css_custom_properties:
      --orange: "#FD3300"
      --orange-dark: "#DB2C00"
      --black: "#1D1A1A"
      --gray-ui: "#7B726C"
      --stone: "#B3AAA3"
      --pebble: "#DFD9D5"
      --sand: "#ECE9E4"
      --fog: "#F4F2F0"
      --mist: "#FCFAFA"
      --white: "#FFFFFF"

  typography:
    font_stacks:
      sans: "-apple-system, 'Helvetica Neue', 'DM Sans', Arial, sans-serif"
      serif: "Georgia, 'Times New Roman', serif"
      mono: "'DM Mono', 'Courier New', monospace"
    css_custom_properties:
      --font-sans: "-apple-system, 'Helvetica Neue', 'DM Sans', Arial, sans-serif"
      --font-serif: "Georgia, 'Times New Roman', serif"
      --font-mono: "'DM Mono', 'Courier New', monospace"
    type_scale:
      h1:
        font: "var(--font-sans)"
        weight: 800
        size: "clamp(44px, 7vw, 88px)"
        line_height: 0.94
        letter_spacing: "-0.03em"
        text_transform: "uppercase"
      h2:
        font: "var(--font-sans)"
        weight: 700
        size: "clamp(30px, 4.5vw, 54px)"
        line_height: 1.0
        letter_spacing: "-0.025em"
      h3:
        font: "var(--font-sans)"
        weight: 600
        size: "clamp(18px, 2vw, 24px)"
        line_height: 1.2
        letter_spacing: "-0.015em"
      subhead:
        font: "var(--font-sans)"
        size: "clamp(17px, 2vw, 21px)"
        line_height: 1.5
        color: "var(--gray-ui)"
      label:
        font: "var(--font-mono)"
        size: "11px"
        weight: 400
        letter_spacing: "0.12em"
        text_transform: "uppercase"
        color: "var(--orange)"
      label_variants:
        light: "color: var(--stone)"
        dark: "color: var(--gray-ui)"
      body:
        font: "var(--font-sans)"
        size: "17px"
        line_height: 1.6
        color: "var(--black)"

  spacing:
    css_custom_properties:
      --space-xs: "4px"
      --space-sm: "8px"
      --space-md: "16px"
      --space-lg: "24px"
      --space-xl: "40px"
      --space-2xl: "64px"
      --space-3xl: "96px"
      --space-4xl: "128px"

  borders_and_radius:
    css_custom_properties:
      --radius: "6px"
      --radius-lg: "12px"

  containers:
    css_custom_properties:
      --container: "1200px"
      --container-narrow: "760px"
    implementation:
      container:
        width: "100%"
        max_width: "var(--container)"
        margin: "0 auto"
        padding: "0 var(--space-lg)"
      container_narrow:
        max_width: "var(--container-narrow)"
        margin: "0 auto"
        padding: "0 var(--space-lg)"

  buttons:
    primary:
      class: "btn btn--primary"
      background: "var(--orange)"
      color: "var(--white)"
      padding: "16px 32px"
      font_weight: 700
      font_size: "15px"
      letter_spacing: "0.04em"
      text_transform: "uppercase"
      border_radius: "var(--radius)"
      transition: "background 0.18s ease, transform 0.15s ease"
      hover:
        background: "var(--orange-dark)"
        transform: "translateY(-1px)"
    primary_lg:
      class: "btn btn--primary-lg"
      background: "var(--orange)"
      color: "var(--white)"
      padding: "20px 44px"
      font_size: "17px"
      hover:
        background: "var(--orange-dark)"
        transform: "translateY(-1px)"
    ghost:
      class: "btn btn--ghost"
      background: "transparent"
      color: "var(--white)"
      padding: "16px 32px"
      border: "2px solid rgba(255,255,255,0.35)"
      hover:
        border_color: "var(--white)"
        background: "rgba(255,255,255,0.07)"

  section_base:
    padding: "var(--space-3xl) 0"
    padding_desktop: "var(--space-4xl) 0"
    breakpoint: "768px"
    variants:
      dark:
        class: "section--dark"
        background: "var(--black)"
        color: "var(--white)"
      fog:
        class: "section--fog"
        background: "var(--fog)"
      sand:
        class: "section--sand"
        background: "var(--sand)"
      white:
        class: "section--white"
        background: "var(--white)"

