# ════════════════════════════════════════════════════════════════
# SECTION-BY-SECTION LAYOUT SPECS
# ════════════════════════════════════════════════════════════════

sections:

  # ──────────────────────────────────────
  # 0. NAVIGATION
  # ──────────────────────────────────────
  - name: "Navigation"
    purpose: "Fixed top nav with PG1 logo and Founders Club CTA"
    class: "site-nav"
    zone: "Global"
    layout: "Fixed top, flex row, space-between"
    position: "fixed, top: 0, left: 0, right: 0, z-index: 100"
    background: "rgba(29,26,26,0.94)"
    backdrop_filter: "blur(14px)"
    border_bottom: "1px solid rgba(255,255,255,0.06)"
    content:
      inner:
        class: "nav-inner"
        display: "flex"
        align_items: "center"
        justify_content: "space-between"
        height: "64px"
        padding: "0 var(--space-lg)"
        max_width: "var(--container)"
        margin: "0 auto"
      left:
        element: "PG1 logo link"
        class: "nav-logo"
        image:
          src: "https://shop.performancegolf.com/cdn/shop/files/PG1-Symbol-White.png?height=40&v=1772211379"
          alt: "PG1 logo"
          width: 30
          height: 30
        link: "#hero"
      right:
        element: "CTA button"
        class: "btn btn--primary nav-cta"
        text: "Join the Founders Club"
        link: "#pricing"
        visibility: "hidden below 640px, visible at 640px+"

  # ──────────────────────────────────────
  # 1. HERO
  # ──────────────────────────────────────
  - name: "Hero"
    purpose: "Full-viewport headline with value prop, dual CTAs, trust badges, and app composite"
    class: "hero"
    id: "hero"
    zone: "ATF"
    priority: 1
    layout: "Full-viewport flex column, content right-aligned"
    min_height: "100svh"
    background: "var(--black)"
    background_image:
      src: "https://shop.performancegolf.com/cdn/shop/files/BP_1994.jpg?v=1772658412&width=1200"
      position: "center 30% / cover"
      opacity: 0.3
      transform: "translateX(-15%); width: 130%"
      gradient_overlay: >
        linear-gradient(to bottom,
          rgba(29,26,26,0.2) 0%,
          rgba(29,26,26,0.5) 50%,
          rgba(29,26,26,0.97) 100%)
    padding_top: "64px (nav clearance)"
    content_padding: "var(--space-2xl) var(--space-lg) var(--space-3xl)"
    content_alignment: "flex-end (right-aligned within container)"
    content:
      headline:
        text: "PG1 Smart System."
        element: "h1"
        color: "var(--white)"
        max_width: "600px"
        text_align: "left"
      subhead:
        text: "The PG1 Smart System finds your root swing flaw and gives you the one thing to work on right now to fix it. Because when you fix one flaw with one plan... improvement is inevitable."
        class: "hero-subhead"
        font_size: "clamp(18px, 2.2vw, 24px)"
        line_height: 1.5
        color: "var(--pebble)"
        max_width: "600px"
        background: "rgba(29,26,26,0.65)"
        backdrop_filter: "blur(8px)"
        padding: "var(--space-lg) var(--space-xl)"
        border_radius: "var(--radius-lg)"
        border_right: "3px solid var(--orange)"
        border_left: "none"
        text_align: "left"
      actions:
        layout: "flex column, gap var(--space-md), align-items: flex-end"
        mobile_breakpoint: "480px — switches to row"
        buttons:
          - text: "Join the Founders Club"
            class: "btn btn--primary-lg"
            link: "#pricing"
          - text: "See How It Works"
            class: "btn btn--ghost"
            link: "#how-it-works"
      trust_badges:
        layout: "flex row, wrap, gap var(--space-lg)"
        border_top: "1px solid rgba(255,255,255,0.1)"
        padding_top: "var(--space-xl)"
        items:
          - icon: "checkmark circle (orange)"
            text: "365-Day Guarantee"
          - icon: "checkmark circle (orange)"
            text: "1,000 Founders Only"
          - icon: "checkmark circle (orange)"
            text: "Secure Checkout"
        item_style:
          font_size: "13px"
          color: "var(--stone)"
          letter_spacing: "0.03em"
          font_weight: 500
          icon_size: "18px circle, orange background, white checkmark SVG"
      app_composite:
        class: "hero-app-composite"
        max_width: "900px"
        margin_top: "var(--space-2xl)"
        border_radius: "var(--radius-lg)"
        box_shadow: "0 20px 60px rgba(0,0,0,0.4)"
        image:
          src: "https://shop.performancegolf.com/cdn/shop/files/deck-app.png?v=1772221802&width=1200"
          alt: "PG1 Smart System — Assessment, Practice Plan, SwingScan AI, and 1-on-1 Coaching"
          loading: "eager"
          width: 1200
          height: 675

  # ──────────────────────────────────────
  # NOTE: Section 2 (Copy Block) is NOT included in this YAML per Donnie's instruction.
  # The copy exists in ecomm-copy-final.md for reference only.
  # ──────────────────────────────────────

  # ──────────────────────────────────────
  # 2. FRAME CLAIM — SWING FLAW FACTS (Section 8.5)
  # ──────────────────────────────────────
  - name: "Frame Claim — Swing Flaw Facts"
    purpose: "Binary argument — plants the root swing flaw concept before the problem section"
    class: "section section--fog"
    id: "swing-flaw-facts"
    zone: "BTF"
    priority: 3a
    layout: "Single column, centered, narrow container"
    background: "var(--fog)"
    container: "container (1200px)"
    inner_max_width: "var(--container-narrow) — 760px"
    content:
      header:
        text: "Why Your ROOT Swing Flaw Matters"
        element: "h2"
        color: "var(--black)"
        text_align: "center"
      body:
        font_size: "clamp(17px, 1.8vw, 20px)"
        line_height: 1.8
        color: "var(--gray-ui)"
        strong_color: "var(--black)"
        paragraphs:
          - text: "Your ROOT swing flaw is the root cause of every other problem in your swing."
            emphasis: "'ROOT' in strong/black"
          - text: |
              When you don't fix your ROOT flaw, you struggle to consistently improve your golf game.

              ❌ No matter how much you practice or play
              ❌ No matter how many videos you watch
              ❌ No matter how much you pay for lessons and equipment
          - text: "Because every fix you try is treating your swing symptoms, not the root cause of your problems."
            style: "font-size: clamp(18px, 1.9vw, 22px); font-weight: 700; color: var(--black)"
          - text: |
              When you DO fix your root swing flaw, you quickly start playing the golf you know you're capable of.

              Because fixing the root cause of your problem automatically eliminates 3-4 of your "symptom" swing faults.

              ✅ Without spending a lot of time practicing
              ✅ Without investing a lot of money into your game
              ✅ Without aggravating injuries or pushing physical limitations
            emphasis: "'DO' in strong/black"

  # ──────────────────────────────────────
  # 3. PROBLEM — TRADITIONAL INSTRUCTION (Section 9)
  # ──────────────────────────────────────
  - name: "Problem — Traditional Instruction"
    purpose: "Names the problem — traditional instruction treats symptoms, not the root cause"
    class: "section section--white"
    id: "problem"
    zone: "BTF"
    priority: 3b
    layout: "Single column, centered, narrow container"
    background: "var(--white)"
    container: "container (1200px)"
    inner_max_width: "var(--container-narrow) — 760px"
    content:
      header:
        text: "The #1 Problem With Traditional Instruction"
        element: "h2"
        color: "var(--black)"
        text_align: "center"
      body:
        font_size: "clamp(16px, 1.7vw, 18px)"
        line_height: 1.8
        color: "var(--gray-ui)"
        paragraphs:
          - "Traditional golf instruction gives you lots of good information..."
          - text: "But no traditional training method finds and fixes your root swing flaw."
            style: "strong, color: var(--black)"
          - "❌ YouTube — great coaches giving great advice... that may or may not apply to your swing."
          - "❌ Instructors — they fix what they can see in an hour, then you're on your own. Plus, most coaches aren't trained to diagnose your root swing flaw."
          - "❌ Apps — give you data but no direction."
          - "❌ Drills — work on the range, fall apart on the course — because practicing the wrong thing won't fix your real problem."
      analogy:
        element: "h3"
        text: "Working on your swing without knowing your root swing flaw is like getting surgery without a diagnosis."
        style: "centered, bordered top and bottom (2px solid var(--pebble)), padded"
        font_size: "clamp(20px, 2.5vw, 28px)"
      body_continued:
        paragraphs:
          - "When it comes to your health, you would NEVER do that. But that's the approach you're taking every single day with your golf game."
          - text: "And the numbers prove it."
            style: "font-weight: 700; color: var(--black)"
          - "In 1983, the average male golfer's handicap was 17. Today — after 40 years of equipment revolutions, launch monitors, swing apps, online instruction, and billions spent on coaching — it's 14. Three strokes in 40 years."
          - "Not only that, but there are only 1% more golfers who are 10-20 handicaps today (49%) than in 1983 (48%)."
      stat_blocks:
        layout: "2-column grid, max-width 620px, centered"
        gap: "var(--space-lg)"
        margin_top: "var(--space-2xl)"
        cards:
          - number: "3"
            label: "strokes of improvement in 40 years"
          - number: "1%"
            label: "more golfers playing 10-20 handicap today than in 1983"
        card_style:
          background: "var(--fog)"
          border: "1px solid var(--pebble)"
          border_radius: "var(--radius-lg)"
          padding: "var(--space-xl) var(--space-lg)"
          text_align: "center"
          number_style:
            font_size: "clamp(52px, 7vw, 76px)"
            font_weight: 800
            color: "var(--orange)"
            line_height: 1
            letter_spacing: "-0.03em"
          label_style:
            font_size: "13px"
            color: "var(--gray-ui)"
            line_height: 1.5

  # ──────────────────────────────────────
  # 4. HOW IT WORKS (Section 10)
  # ──────────────────────────────────────
  - name: "How It Works — The PG1 Smart System"
    purpose: "Solution reveal — mechanism explanation with FROM/TO comparison"
    class: "section section--fog"
    id: "how-it-works"
    zone: "BTF"
    priority: 4
    layout: "Single column with centered FROM/TO comparison grid"
    background: "var(--fog)"
    container: "container (1200px)"
    content:
      header:
        label: "The Solution"
        title: "The PG1 Smart System"
        subhead: "The Future of Golf Instruction Is Here."
        subhead_max_width: "580px"
      intro_text:
        text: "The PG1 Smart System is the first and only training system that finds your root swing flaw — then guides you step-by-step through fixing it fast.\n\nBecause when you address your root swing flaw, improvement is inevitable."
        font_size: "clamp(16px, 1.7vw, 18px)"
        line_height: 1.8
        color: "var(--gray-ui)"
        max_width: "var(--container-narrow)"
        text_align: "center"
      comparison_intro:
        text: "Here's What PG1 Total Game Transformation Looks Like"
        font_size: "clamp(17px, 1.8vw, 20px)"
        font_weight: 600
        color: "var(--black)"
