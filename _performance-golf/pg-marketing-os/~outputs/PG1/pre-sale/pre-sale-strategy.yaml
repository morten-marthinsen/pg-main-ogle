          font: "var(--pg-font-heading)"
          font_size: "var(--pg-text-sm)"
          font_weight: "600"
          text_transform: "uppercase"
          letter_spacing: "0.06em"
          color: "var(--pg-mist)"
          background: "var(--pg-orange)"
          hover_background: "var(--pg-dark-orange)"
          hover_shadow: "var(--pg-shadow-orange)"
