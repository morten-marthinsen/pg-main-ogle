# ════════════════════════════════════════════════════════════════
# SECTION-BY-SECTION LAYOUT SPECS
# ════════════════════════════════════════════════════════════════

sections:

  # ──────────────────────────────────────
  # 1. NAVIGATION
  # ──────────────────────────────────────
  - name: "Navigation"
    purpose: "Fixed top nav with PG logo and keynote CTA"
    class: "pg-nav"
    layout: "flex row, space-between, centered items"
    background: "rgba(10, 10, 10, 0.85) with backdrop-filter: blur(20px)"
    border_bottom: "1px solid var(--page-border)"
    position: "fixed, top: 0, z-index: 100"
    padding: "var(--pg-space-4) 0"
    container: "pg-container (max-width 1200px)"
    content:
      left:
        element: "PG Logo"
        type: "image link"
        src: "https://shop.performancegolf.com/cdn/shop/files/PG-Logo.svg?v=1770845489&width=200"
        alt: "Performance Golf"
        height: "28px"
        filter: "brightness(0) invert(1)"
        link: "https://shop.performancegolf.com"
      right:
        element: "CTA button"
        text: "Apply for Your Seat"
        link: "#keynote"
        font: "var(--pg-font-heading)"
        font_size: "var(--pg-text-xs)"
        font_weight: "600"
        text_transform: "uppercase"
        letter_spacing: "0.08em"
        color: "var(--pg-mist)"
        background: "var(--pg-orange)"
        hover_background: "var(--pg-dark-orange)"
        hover_shadow: "var(--pg-shadow-orange)"
        padding: "var(--pg-space-2) var(--pg-space-4)"
        border_radius: "var(--pg-radius)"

  # ──────────────────────────────────────
  # 2. HERO
  # ──────────────────────────────────────
  - name: "Hero"
    purpose: "Full-viewport headline with series badge and scroll indicator"
    class: "pg-hero"
    id: "hero"
    layout: "flex column, centered, full-viewport height"
    background: "var(--page-bg) with subtle radial gradient overlays"
    background_effects:
      - "radial-gradient(ellipse 80% 50% at 50% 0%, rgba(253, 51, 0, 0.06) 0%, transparent 60%)"
      - "radial-gradient(ellipse 60% 40% at 50% 100%, rgba(253, 51, 0, 0.03) 0%, transparent 50%)"
    padding: "var(--pg-space-32) var(--pg-space-6) var(--pg-space-16)"
    min_height: "100vh"
    text_align: "center"
    mobile_adjustments:
      padding_top: "var(--pg-space-24)"
      min_height: "90vh"
      headline_font_size: "clamp(2.2rem, 10vw, 3.5rem)"
    content:
      badge:
        text: "Now Streaming"
        font: "var(--pg-font-mono)"
        font_size: "var(--pg-text-xs)"
        text_transform: "uppercase"
        letter_spacing: "0.1em"
        color: "var(--pg-orange)"
        decoration: "Pulsing orange dot (8px circle) to the left"
        animation: "fadeSlideUp 0.8s ease 0.3s forwards"
      headline:
        text: "$5 Million to Answer One Question About Your Golf Game."
        emphasis: "'One Question' in var(--pg-orange)"
        font: "var(--pg-font-heading)"
        font_size: "var(--pg-text-hero) — clamp(2.5rem, 8vw, 6rem)"
        font_weight: "700"
        line_height: "0.9"
        letter_spacing: "-0.03em"
        text_transform: "uppercase"
        color: "var(--text-primary)"
        max_width: "14ch"
        animation: "fadeSlideUp 1s ease 0.6s forwards"
      subhead:
        text: "A six-part insider series. New episodes dropping now."
        font: "var(--pg-font-display) — Georgia"
        font_size: "var(--pg-text-xl)"
        font_style: "italic"
        line_height: "1.4"
        letter_spacing: "-0.01em"
        color: "var(--text-secondary)"
        max_width: "36ch"
        animation: "fadeSlideUp 0.8s ease 1s forwards"
      scroll_indicator:
        type: "Three animated chevrons (no text)"
        position: "absolute bottom, centered"
        chevron_size: "20px x 20px"
        chevron_style: "border-right: 2px solid var(--text-muted), border-bottom: 2px solid var(--text-muted), rotated 45deg"
        gap: "4px between chevrons"
        animation: "chevronPulse 2s ease-in-out infinite, staggered delays (0s, 0.15s, 0.3s)"
        overall_animation: "fadeSlideUp 0.6s ease 1.4s forwards"

  # ──────────────────────────────────────
  # 3. BRIXTON INTRO
  # ──────────────────────────────────────
  - name: "Brixton Intro"
    purpose: "Personal letter from Brixton with portrait — establishes voice and credibility"
    class: "pg-intro"
    id: "intro"
    layout: "Single column on mobile, two-column grid on desktop (1fr 1.4fr)"
    background: "var(--page-bg)"
    padding: "var(--pg-space-24) 0 (desktop), var(--pg-space-16) 0 (mobile)"
    container: "pg-container (max-width 1200px)"
    decorative: "Vertical 1px line at top, centered, 80px tall, gradient from transparent to var(--page-border)"
    animation: "pg-reveal (scroll-triggered)"
    content:
      portrait:
        position: "Left column on desktop, above letter on mobile"
        sticky: "On desktop, position: sticky, top: 120px"
        max_width: "360px, centered"
        image:
          src: "https://shop.performancegolf.com/cdn/shop/files/FTL_JJ-124_2.png?v=1772210721&width=1000"
          alt: "Brixton Albert, CEO of Performance Golf"
          aspect_ratio: "4:5"
          object_fit: "cover"
          object_position: "center 100%"
          border_radius: "var(--pg-radius-md)"
          filter: "grayscale(20%)"
          loading: "lazy"
        caption:
          text: "Brixton Albert — CEO, Performance Golf"
          font: "var(--pg-font-mono)"
          font_size: "var(--pg-text-xs)"
          text_transform: "uppercase"
          letter_spacing: "0.08em"
          color: "var(--text-muted)"
          margin_top: "var(--pg-space-4)"
      letter:
        position: "Right column on desktop"
        max_width: "600px, centered"
        label:
          text: "From the desk of Brixton Albert"
          font: "var(--pg-font-mono)"
          font_size: "var(--pg-text-xs)"
          text_transform: "uppercase"
          letter_spacing: "0.15em"
          color: "var(--pg-fog)"
          margin_bottom: "var(--pg-space-6)"
        body:
          font: "var(--pg-font-display) — Georgia"
          font_size: "var(--pg-text-xl)"
          line_height: "1.6"
          letter_spacing: "-0.01em"
          color: "var(--text-secondary)"
          paragraph_spacing: "var(--pg-space-6)"
          first_paragraph:
            font_size: "var(--pg-text-2xl)"
            color: "var(--text-primary)"
          emphasis: "italic text in var(--text-primary)"
        signature:
          text: "— Brixton"
          font: "var(--pg-font-display)"
          font_size: "var(--pg-text-2xl)"
          font_style: "italic"
          color: "var(--text-primary)"
          margin_top: "var(--pg-space-10)"

  # ──────────────────────────────────────
  # 4. EPISODE GRID
  # ──────────────────────────────────────
  - name: "Episode Grid"
    purpose: "Six episode cards with video placeholders and teaser copy"
    class: "pg-episodes"
    id: "episodes"
    layout: "CSS grid — 1-col mobile, 2-col tablet (768px+), 3-col desktop (1024px+)"
    background: "var(--page-bg-elevated)"
    padding: "var(--pg-space-24) 0 (desktop), var(--pg-space-16) 0 (mobile)"
    container: "pg-container (max-width 1200px)"
    grid_gap: "var(--pg-space-6)"
    animation: "pg-stagger on grid (children fade in with 80ms stagger)"
    content:
      header:
        animation: "pg-reveal"
        text_align: "center"
        margin_bottom: "var(--pg-space-16)"
        label:
          text: "The Series"
          font: "var(--pg-font-mono)"
          font_size: "var(--pg-text-xs)"
          text_transform: "uppercase"
          letter_spacing: "0.12em"
          color: "var(--pg-orange)"
          margin_bottom: "var(--pg-space-4)"
        title:
          text: "Six Conversations"
          font: "var(--pg-font-heading)"
          font_size: "clamp(2rem, 5vw, var(--pg-text-5xl))"
          font_weight: "700"
          line_height: "1"
          letter_spacing: "-0.03em"
          text_transform: "uppercase"
          color: "var(--text-primary)"
      card_design:
        background: "var(--page-bg-card)"
        border: "1px solid var(--page-border)"
        border_radius: "var(--pg-radius-md)"
        hover: "border-color: rgba(253, 51, 0, 0.25), transform: translateY(-2px)"
        cursor: "pointer (entire card opens modal)"
        video_area:
          aspect_ratio: "16:9"
          background: "var(--page-bg)"
          gradient_overlay: "linear-gradient(to bottom, transparent 50%, var(--page-bg-card))"
          play_button:
            size: "64px circle"
            background: "rgba(253, 51, 0, 0.9)"
            hover: "var(--pg-orange), scale(1.08)"
            icon: "SVG play triangle, 20x20, white fill, 3px left offset"
        body:
          padding: "var(--pg-space-6) var(--pg-space-6) var(--pg-space-8) (mobile), var(--pg-space-8) (desktop 1024px+)"
          episode_number:
            font: "var(--pg-font-mono)"
            font_size: "var(--pg-text-xs)"
            text_transform: "uppercase"
            letter_spacing: "0.1em"
            color: "var(--pg-orange)"
            margin_bottom: "var(--pg-space-3)"
          title:
            font: "var(--pg-font-heading)"
            font_size: "var(--pg-text-2xl)"
            font_weight: "700"
            letter_spacing: "-0.02em"
            color: "var(--text-primary)"
            margin_bottom: "var(--pg-space-4)"
          teaser:
            font: "var(--pg-font-heading)"
            font_size: "var(--pg-text-sm)"
            line_height: "1.7"
            color: "var(--text-secondary)"
            margin_bottom: "var(--pg-space-4)"
          hook:
            font: "var(--pg-font-display)"
            font_size: "var(--pg-text-sm)"
            font_style: "italic"
            color: "var(--text-muted)"
            padding_top: "var(--pg-space-4)"
            border_top: "1px solid var(--page-border)"
      episodes:
        - number: "Episode 1"
          title: "The Confession"
          teaser_paragraphs:
            - "Brixton says what no golf company CEO has said out loud. Performance Golf — his own company — was part of the problem. More content. More instructors. More products. And none of it addressed the one thing that actually determines whether a golfer improves or stays stuck for the rest of their life."
            - "This is the conversation that started everything."
          hook: "\"Someone finally said it.\""
          special_elements: null
        - number: "Episode 2"
          title: "The War Room"
          teaser_paragraphs:
            - "The whiteboards on the wall at Performance Golf headquarters tell a story most companies would never let you see. Two years of building. Real arguments about what golfers actually need versus what the industry keeps selling them. A team that put their careers behind the answer — with $5 million in the room to prove it was not a conversation. It was a commitment."
          hook: "\"This is what it looks like when a company decides to build something that did not exist before.\""
          special_elements: null
        - number: "Episode 3"
          title: "The Root Swing Flaw"
          teaser_paragraphs:
            - "Every golfer has three to five visible swing flaws. Most of them are not the problem — they are symptoms of a single underlying flaw that nobody has ever identified for you. Not your instructor. Not your app. Not the YouTube coach who seemed to know exactly what you were doing wrong. This episode names the concept that makes your entire history of improvement attempts make sense for the first time."
          hook: "\"One flaw. Creating everything.\""
          special_elements: null
        - number: "Episode 4"
          title: "The Coaches"
          teaser_paragraphs:
            - "Hank Haney. Martin Chuck. Erika Larkin. Andrew Rice. JT Thomas. Eric Cogorno. Brian Mogg — supported by David Leadbetter, Rocco Mediate, Rick Smith, and Cameron McCormick. These coaches are not endorsing something from a distance. They helped build it. This episode shows you what that collaboration produced and why these coaches agreed to put their names behind a system none of them would have imagined five years ago."
          hook: "\"The coaches who built this are the same ones who will work with you.\""
          special_elements:
            coach_avatars:
              position: "Between title and teaser text"
              layout: "flex row, overlapping circles (margin-left: -8px, first child 0)"
              style:
                size: "36px circles"
                border: "2px solid var(--page-bg-card)"
                filter: "grayscale(30%)"
                object_fit: "cover"
              coaches:
                - name: "Hank Haney"
                  src: "https://www.performancegolf.com/wp-content/uploads/2023/08/hank-haney.webp"
                - name: "Martin Chuck"
                  src: "https://www.performancegolf.com/wp-content/uploads/2023/08/martin-chuck.webp"
                - name: "Erika Larkin"
                  src: "https://www.performancegolf.com/wp-content/uploads/2024/08/erika-larkin.webp"
                - name: "Andrew Rice"
                  src: "https://www.performancegolf.com/wp-content/uploads/2024/08/andrew-rice.webp"
                - name: "JT Thomas"
                  src: "https://cdn.shopify.com/s/files/1/0680/3020/2177/files/JT-Thomas.png?v=1772034786"
                - name: "Eric Cogorno"
                  src: "https://www.performancegolf.com/wp-content/uploads/2023/08/eric-cogorno.webp"
                - name: "Brian Mogg"
                  src: "https://www.performancegolf.com/wp-content/uploads/2023/08/brian-mogg.webp"
        - number: "Episode 5"
          title: "The Breakthrough"
          teaser_paragraphs:
            - "A real golfer walks in with a swing he has been fighting for years. Multiple instructors. Hundreds of hours on the range. The system identifies his root swing flaw in minutes — something no human coach caught across dozens of lessons. Then he gets one thing to work on. One correction. And you watch his swing change on camera, in real time, in the same session."
          hook: "\"Watching someone's game change is different from hearing about it.\""
          special_elements: null
        - number: "Episode 6"
          title: "72 Hours"
          teaser_paragraphs:
            - "Brixton. Direct to camera. No production. No script. In three days, he is going to share something Performance Golf has been building for two years with the people who matter most to this company. Not investors. Not press. You."
          hook: "\"Three days.\""
          special_elements: null

  # ──────────────────────────────────────
  # 5. THE QUESTION
  # ──────────────────────────────────────
  - name: "The Question"
    purpose: "Curiosity gap — names the root swing flaw concept as a personal challenge"
    class: "pg-question"
    id: "question"
    layout: "Centered text, single column"
    background: "var(--page-bg)"
    padding: "var(--pg-space-32) var(--pg-space-6) (desktop), var(--pg-space-20) var(--pg-space-6) (mobile)"
    text_align: "center"
    container: "pg-container--narrow (max-width 768px)"
    decorative:
      - "Vertical 1px lines top and bottom, centered, 100px tall, gradient from transparent to rgba(253, 51, 0, 0.3) to transparent"
    animation: "pg-reveal"
    content:
      headline:
        text: "What is YOUR root swing flaw?"
        emphasis: "'YOUR' in var(--pg-orange)"
        font: "var(--pg-font-heading)"
        font_size: "clamp(2rem, 6vw, var(--pg-text-6xl))"
        font_weight: "700"
        line_height: "1"
        letter_spacing: "-0.03em"
        text_transform: "uppercase"
        color: "var(--text-primary)"
        margin_bottom: "var(--pg-space-16)"
      lines:
        max_width: "500px"
        font: "var(--pg-font-display)"
        font_size: "var(--pg-text-2xl)"
        line_height: "1.5"
        color: "var(--text-secondary)"
        spacing: "var(--pg-space-3)"
        items:
          - "Every golfer has three to five visible swing flaws."
          - "Only one is the root cause."
          - "Most golfers go their entire life without ever identifying theirs."
          - text: "Until now."
            special: true
            font: "var(--pg-font-heading)"
            font_size: "var(--pg-text-4xl)"
            font_weight: "700"
            color: "var(--pg-orange)"
            margin_top: "var(--pg-space-8)"
            letter_spacing: "-0.02em"

  # ──────────────────────────────────────
  # 6. KEYNOTE
  # ──────────────────────────────────────
