# ════════════════════════════════════════════════════════════════
# ANIMATIONS
# ════════════════════════════════════════════════════════════════

animations:

  keyframes:
    fadeSlideUp:
      from: "opacity: 0; transform: translateY(24px)"
      to: "opacity: 1; transform: translateY(0)"
    pulse:
      "0%, 100%": "opacity: 1"
      "50%": "opacity: 0.4"
    chevronPulse:
      "0%": "opacity: 0; transform: rotate(45deg) translate(-4px, -4px)"
      "30%": "opacity: 0.6"
      "60%": "opacity: 0.6; transform: rotate(45deg) translate(2px, 2px)"
      "100%": "opacity: 0; transform: rotate(45deg) translate(4px, 4px)"

  scroll_reveal:
    class: "pg-reveal"
    initial: "opacity: 0; transform: translateY(30px)"
    visible: "opacity: 1; transform: translateY(0)"
    transition: "opacity 0.7s ease, transform 0.7s ease"
    trigger: "IntersectionObserver with threshold 0.15 and rootMargin '0px 0px -40px 0px'"
    behavior: "Once — unobserve after first intersection"

  stagger:
    class: "pg-stagger"
    initial: "opacity: 0; transform: translateY(20px)"
    transition: "opacity 0.5s ease, transform 0.5s ease"
    delays: "0ms, 80ms, 160ms, 240ms, 320ms, 400ms (per child index)"
    trigger: "Same IntersectionObserver as pg-reveal"

  hero_entrance:
    elements:
      - "badge: fadeSlideUp 0.8s ease 0.3s forwards"
      - "headline: fadeSlideUp 1s ease 0.6s forwards"
      - "subhead: fadeSlideUp 0.8s ease 1s forwards"
      - "scroll chevrons: fadeSlideUp 0.6s ease 1.4s forwards"

