        strong_weight: "400"
        paragraphs:
          - "Brixton built this presentation for the Performance Golf team. The team that spent two years and $5 million building what you have been watching in this series."
          - "Now he is opening the doors — to 1,000 golfers."
          - "He is going to walk through everything — what the root swing flaw is, why it has been invisible to the entire golf instruction industry, and what his team built to finally address it."
          - "**This is the moment when two years of work meets the golfers it was built for. Not everyone gets a seat.**"

  # ──────────────────────────────────────
  # 6a. COUNTDOWN TIMER (inside Keynote)
  # ──────────────────────────────────────
  - name: "Countdown Timer"
    purpose: "Live countdown to keynote date"
    class: "pg-countdown"
    parent_section: "pg-keynote"
    layout: "flex row, centered, gap var(--pg-space-4)"
    margin: "var(--pg-space-12) top and bottom"
    mobile_adjustments:
      gap: "var(--pg-space-2)"
      min_width: "56px per block"
    content:
      blocks:
        - label: "Days"
          id: "countdown-days"
        - label: "Hours"
          id: "countdown-hours"
        - label: "Minutes"
          id: "countdown-minutes"
        - label: "Seconds"
          id: "countdown-seconds"
      block_design:
        min_width: "72px (mobile: 56px, tablet+: 100px)"
        number:
          font: "var(--pg-font-mono)"
          font_size: "clamp(2.5rem, 6vw, 4rem)"
          font_weight: "400"
          line_height: "1"
          letter_spacing: "-0.02em"
          color: "var(--text-primary)"
        label:
          font: "var(--pg-font-mono)"
          font_size: "var(--pg-text-xs)"
          text_transform: "uppercase"
          letter_spacing: "0.12em"
          color: "var(--text-muted)"
      separator:
        character: ":"
        font: "var(--pg-font-mono)"
        font_size: "clamp(2rem, 5vw, 3rem)"
        color: "var(--text-muted)"
        opacity: "0.4"
        padding_bottom: "var(--pg-space-6)"
    behavior:
      type: "JavaScript interval (1000ms)"
      target: "Placeholder — 14 days from page load (replace with actual keynote date)"
      format: "Zero-padded numbers (e.g., 08, 04, 17)"
      end_state: "All zeros when countdown reaches 0"

  # ──────────────────────────────────────
  # 6b. QUALIFICATION QUIZ (inside Keynote)
  # ──────────────────────────────────────
  - name: "Qualification Quiz"
    purpose: "Multi-step quiz that qualifies and captures email for keynote access"
    class: "pg-quiz"
    id: "qualification-quiz"
    parent_section: "pg-keynote"
    max_width: "500px, centered"
    margin_top: "var(--pg-space-12)"
    states:
      initial:
        visible: "CTA trigger button + seats text"
