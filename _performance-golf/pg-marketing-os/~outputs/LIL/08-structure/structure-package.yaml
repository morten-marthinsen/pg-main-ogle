        - {id: DAT-11, type: data, strength: 8.53, role: "2-4 failed sets — quantifies the cycle"}
        - {id: AUT-11, type: authority, strength: 8.42, role: "Piaget — scientific authority for verbal learning gap"}
      count: 4

    benefit:
      functional: "It is not your kid's fault. It is not your fault. The equipment was designed for a type of learning your toddler's brain does not use yet."
      dimensionalized: "Every frustrating backyard session, every time they walked away after three swings, every set that broke or sat in the garage — that was the equipment failing your kid, not your kid failing at golf."
      emotional: "Relief. The guilt dissolves. You were not pushing too hard, and your kid was not too young. There is a different way."

    coherence_score: 8.5

