    title: "The Dream and the Gap"
    page_section: "Hero + Problem/Empathy"
    gap_id: GAP-003a
    emotional_beat: relief

    claim:
      statement: "The reason most toddlers walk away from golf after three swings is not their attention span and not their coordination — it is the equipment. Every toddler golf product on the market was designed around one assumption: that someone would be standing there giving verbal instructions. But developmental science has confirmed for nearly 80 years that toddlers ages 2-5 cannot convert verbal instructions into physical movement. The equipment was speaking the wrong language."
      type: reframed
      opinion_test: PASS
      score: 8.55

    proof:
      elements:
        - {id: SOC-02, type: social, strength: 7.95, role: "Sledgehammer analogy — visceral problem framing"}
