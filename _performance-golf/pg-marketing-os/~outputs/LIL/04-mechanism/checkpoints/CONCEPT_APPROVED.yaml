# ─── APPROVED CONCEPT — FULL DETAIL ─────────────────────────────────────

concept_detail:
  core_idea: |
    The equipment is a self-learning system for golf. Each piece uses shapes,
    colors, and physical positioning to teach one golf fundamental — alignment,
    stance, setup, face angle — without any verbal instruction. The shape sorter
    principle explains HOW: just as a shape sorter teaches geometry through its
    design (circle goes in the circle hole, nobody teaches that), this equipment
    teaches golf through its design (yellow ball matches white ball, nobody
    coaches that).

  explanation_architecture:
    step_1: "Recognition — you've tried coaching, toddlers can't process words into movement"
    step_2: "Insight — but they CAN learn from shapes and colors (shape sorter principle)"
    step_3: "Application — we built a self-learning golf system that uses THAT channel"
    step_4: "Proof — 'match the yellow ball to the white ball' — seven words, alignment taught"
    step_5: "System — every piece works the same way, visual/tactile cue teaches one skill"
    step_6: "Payoff — the equipment teaches, you just play. Golf buddy, not golf coach."

  analogy:
    primary: "A shape sorter for golf — the object teaches through its design"
    supporting: "Nobody teaches a toddler a shape sorter. The shape sorter teaches the toddler."
    validation: "Shape sorter analogy scored 8.90 in Root Cause Arena (Hybrid A)"

  proof_map:
    knockout: "MEC-13: 'Match the yellow ball to the white ball' — one-sentence instruction (score 10.00, KO potential 25.12)"
    system_proofs:
      - "MEC-01: Color matching teaches alignment (score 10.00)"
      - "MEC-03: Walk-in frame teaches setup position (score 10.00)"
      - "MEC-06: Skills Mat teaches stance with 8 visual guides (score 10.00)"
      - "MEC-12: Walk-in eliminates parent repositioning (score 10.00)"
    authority: "AUT-11: Piaget developmental psychology, preoperational stage ages 2-7 (score 8.42)"
    competitive: "DAT-19: Zero competitors have visual-tactile mechanisms (score 9.24)"

  soul_md_alignment:
    voice_fit: "Grant explaining to another parent how the equipment works on its own"
    energy: "Authentic excitement — 'dude, you don't even have to teach them'"
    anti_voice_check:
      - "NOT corporate: 'self-learning system' in Grant voice, not engineering voice"
      - "NOT pushy: 'the equipment teaches' is hope-forward, not pressure"
      - "NOT condescending: doesn't imply parent was doing it wrong"
    hope_market: "Frames through what's NOW POSSIBLE (self-learning), not what was broken"

  naming_direction:
    must: "Tie to golf — the mechanism name must ground in golf, not generic learning"
    should: "Evoke the self-teaching nature — the equipment IS the teacher"
    could: "Reference shapes/colors as the learning method"
    must_not:
      - "Use engineering names (Focal Sphere, Walk-In Frame, etc.)"
      - "Sound clinical/corporate (Visual-Tactile Learning System)"
      - "Be generic (The Method, The System, The Technique)"
      - "Exceed 4 words"

