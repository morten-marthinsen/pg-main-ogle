      price: "$22-25/dozen"
    - name: "Bridgestone e6 / e12"
      type: direct-competitor
      positioning: "Distance with straight flight, anti-side-spin technology"
      price: "$26-32/dozen"
    - name: "Srixon Soft Feel"
      type: direct-competitor
      positioning: "Soft feel, 2-piece ionomer, budget-friendly"
      price: "$22-24/dozen"
    - name: "TaylorMade Soft Response"
      type: direct-competitor
      positioning: "Soft compression, 3-piece, designed for moderate swing speeds"
      price: "$22-25/dozen"
    - name: "Vice Drive / Vice Pro"
      type: indirect-competitor
