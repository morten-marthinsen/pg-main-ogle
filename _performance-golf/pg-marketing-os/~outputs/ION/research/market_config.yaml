# market_config.yaml
# Auto-generated from research brief — iON+ Golf Ball
# Created: 2026-03-26

project:
  name: ion-plus
  created: 2026-03-26
  market_mode: B

terminology:
  customer:
    primary: "golfer"
    plural: "golfers"
    adjective: "golf"
    secondary: "amateur golfer"
    tertiary: "recreational golfer"

  problem:
    primary: "not enough distance off the tee"
    secondary: "too much spin causing slices and lost distance"
    category: "performance / distance"
    symptoms:
      - "drives getting shorter"
      - "slicing the ball"
      - "losing distance"
      - "ball doesn't feel right"
      - "overpaying for balls I lose"

  product:
    type: "golf ball"
    solution: "3-piece ionomer golf ball"
    differentiator: "visual alignment technology"
    tagline: "Charged for Distance"

platforms:
  tier_1:
    - name: "Reddit r/golf"
      type: forum
      tool: apify
      priority: critical
      rationale: "Largest online golf community. Extremely active ball discussions, honest reviews, comparison threads."
      specific_sources:
        - "r/golf"
        - "r/GolfEquipment"
    - name: "GolfWRX Forums"
      type: forum
      tool: firecrawl
      priority: critical
      rationale: "Dedicated equipment forum with deep technical discussions. Ball fitting, compression, spin conversations."
      specific_sources:
        - "golfwrx.com/forums"
    - name: "Amazon Golf Ball Reviews"
      type: review
      tool: firecrawl
      priority: critical
      rationale: "Massive volume of verified purchaser reviews for all competitor balls. Real language about feel, distance, price."
      specific_sources:
        - "amazon.com/dp/ (competitor ball ASINs)"
  tier_2:
    - name: "MyGolfSpy"
      type: review-site
      tool: firecrawl
      priority: high
      rationale: "Independent testing and reviews. Community comments are gold for real opinions."
      specific_sources:
        - "mygolfspy.com/best-golf-balls"
        - "mygolfspy.com/golf-ball-reviews"
    - name: "YouTube Golf Ball Reviews (comments)"
      type: video-comments
      tool: apify
      priority: high
      rationale: "Rick Shiels, TXG, Mark Crossfield ball reviews have thousands of comments from amateurs."
      specific_sources:
        - "Rick Shiels golf ball reviews"
        - "TXG golf ball testing"
        - "Mark Crossfield ball comparisons"
    - name: "Golf Digest / Golf.com"
      type: media
      tool: firecrawl
      priority: high
      rationale: "Best ball lists, buyer guides — comments and forums."
      specific_sources:
        - "golfdigest.com/hot-list/golf-balls"
        - "golf.com/gear/golf-balls"
  tier_3:
    - name: "The Hackers Paradise Forum"
      type: forum
      tool: firecrawl
      priority: moderate
      rationale: "Dedicated to average golfers — exactly the iON+ target."
      specific_sources:
        - "thehackersparadise.com/forum"
    - name: "Golf Monthly Forum"
      type: forum
      tool: firecrawl
      priority: moderate
      specific_sources:
        - "forums.golfmonthly.com"
    - name: "Facebook Golf Groups"
      type: social
      tool: perplexity
      priority: moderate
      rationale: "Older demographic, lots of ball discussion. Can't scrape directly — use Perplexity to surface cached/indexed discussions."

  blocked:
    - name: "Facebook (direct scraping)"
      reason: "Requires auth, blocks scrapers"
      alternative: "Use Perplexity to find cached/indexed discussions"
    - name: "Reddit (via Firecrawl)"
      reason: "Firecrawl blocked by Reddit"
      alternative: "Use Apify actor for Reddit scraping"

aspects:
  - name: "Distance Performance"
    definition: "How far the ball carries and rolls, total distance off the tee and fairway"
    example_terms: ["distance", "carry", "yards", "long", "far", "roll out", "total distance"]
  - name: "Feel & Sound"
    definition: "Tactile and auditory feedback at impact — softness, click, thud, firmness"
    example_terms: ["feel", "soft", "clicky", "mushy", "firm", "sound", "feedback", "off the putter"]
  - name: "Spin & Control"
    definition: "Ball behavior on approach shots and around the green — spin, check, roll"
    example_terms: ["spin", "greenside", "check up", "bite", "roll out", "wedge", "short game"]
  - name: "Price & Value"
    definition: "Cost per dozen relative to perceived quality — value proposition, willingness to pay"
    example_terms: ["price", "expensive", "cheap", "value", "worth it", "cost per dozen", "affordable"]
  - name: "Durability & Loss"
    definition: "How long balls last, scuff resistance, frequency of losing balls"
    example_terms: ["durability", "scuff", "cut", "lost balls", "water", "woods", "last", "dozen per round"]

competitors:
  known:
    - name: "Titleist Pro V1 / Pro V1x"
      type: direct-comparison
