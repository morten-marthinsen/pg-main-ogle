# ─── KNOWN FUTURE CANDIDATES ──────────────────────────
# Items Donnie/Ben mentioned may graduate to system level:
future_candidates:
  - item: "MCP server configurations (MCP-SETUP.md)"
    likelihood: high
    notes: "MCP configs are project-agnostic; PG likely centralizes them"

  - item: "Workspace rules / workspace.md"
    likelihood: high
    notes: "PG adding cross-project workspace rules at root level"

  - item: "Claude Code settings (.claude/ within marketing-os)"
    likelihood: high
    notes: "Nested .claude/ creates shadowing conflicts with root-level settings"
