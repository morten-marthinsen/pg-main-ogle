# Complete Framework Extraction for Organic Marketing Engine
# Source: Day Trading Attention: How to Actually Build Brand and Sales
# Publisher: HarperCollins Publishers, 2024
# =============================================================================

metadata:
  book_title: "Day Trading Attention: How to Actually Build Brand and Sales"
  author: "Gary Vaynerchuk"
  publisher: "HarperCollins Publishers"
  year: 2024
  isbn: "9780063317598"
  extraction_date: "2026-03-03"
  framework_version: "1.0"

# =============================================================================
# PART 1: CORE PHILOSOPHY
# =============================================================================

day_trading_attention:
  core_concept: |
    Attention is the most valuable currency in modern marketing. Just like day traders
    watch stock markets for short-term opportunities, marketers must watch social
    platforms for attention arbitrage opportunities. The platforms where attention
    is underpriced relative to its value represent the biggest opportunities.

  key_principles:
    - name: "Attention is Currency"
      description: "Every piece of content competes for the scarcest resource: human attention"
      application: "Measure success by attention captured, not just impressions served"

    - name: "Underpriced Attention Arbitrage"
      description: "Find platforms where attention costs less than its actual value"
      application: "Early adoption of emerging platforms and features yields highest ROI"

    - name: "Content is the Toll"
      description: "You must pay the toll of quality content to earn attention"
      application: "Invest in content quality proportional to the platform's attention value"

    - name: "Platform-Native Content"
      description: "Each platform has unique cultural expectations and consumption patterns"
      application: "Never cross-post without platform-specific optimization"

    - name: "Volume with Quality"
      description: "Quantity and quality are not mutually exclusive at scale"
      application: "Build systems that enable high-volume production without sacrificing relevance"

    - name: "Distribution Over Creation"
      description: "The bottleneck is usually distribution, not creation ability"
      application: "Allocate 80% of energy to distribution strategy, 20% to creation"

  attention_economics:
    supply_side:
      - "Total human attention hours available per day is fixed"
      - "New platforms compete for existing attention pools"
      - "Attention fragments across more channels over time"

    demand_side:
      - "Every brand, creator, and individual competes for attention"
      - "Organic reach is earned through relevance and engagement"
      - "Paid reach supplements but cannot replace organic relevance"

    arbitrage_opportunities:
      high_value_2024:
        - "TikTok organic reach (still underpriced vs audience value)"
        - "YouTube Shorts (emerging, high reach potential)"
        - "LinkedIn organic (professional audience, low competition)"
        - "Threads (early stage, algorithm favoring growth)"

      declining_value:
        - "Facebook organic (oversaturated, pay-to-play)"
        - "Twitter/X general posts (attention fragmented)"
        - "Instagram feed posts (shifted to Reels)"

# =============================================================================
# PART 2: PLATFORM-SPECIFIC STRATEGIES
# =============================================================================

platforms:

  # ---------------------------------------------------------------------------
  # TIKTOK
  # ---------------------------------------------------------------------------
  tiktok:
    platform_overview:
      current_status: "Highest organic reach potential in 2024"
      audience_size: "1.5+ billion monthly active users"
      demographic_shift: "No longer just Gen Z - all demographics growing"
      algorithm_philosophy: "Interest-based discovery over follower-based distribution"

    algorithm_signals_2024:
      primary_signals:
        - name: "Watch Time"
          weight: "Critical"
          description: "Percentage of video watched is the #1 ranking factor"
          optimization: "Hook in first 1-3 seconds, maintain tension throughout"

        - name: "Completion Rate"
          weight: "Critical"
          description: "Videos watched to completion get massive boost"
          optimization: "Keep videos as short as possible while delivering value"

        - name: "Replay Rate"
          weight: "High"
          description: "Content rewatched signals high value"
          optimization: "Create layered content with details to catch on rewatch"

        - name: "Shares"
          weight: "High"
          description: "Direct shares to friends/groups signal viral potential"
          optimization: "Create content people want to share privately"

        - name: "Comments"
          weight: "Medium-High"
          description: "Comments indicate engagement and controversy"
          optimization: "Ask questions, make debatable statements, use CTAs"

        - name: "Profile Visits"
          weight: "Medium"
          description: "Indicates curiosity beyond single video"
          optimization: "Reference other content, build series hooks"

        - name: "Follows After View"
          weight: "Medium"
          description: "Conversion from viewer to follower"
          optimization: "End with value promise for following"

      negative_signals:
        - "Scroll past quickly (low hook effectiveness)"
        - "Not interested/hide (content mismatch)"
        - "Skip to next without interaction"
        - "Unfollow after viewing"

    best_performing_formats:
      tier_1_highest_reach:
        - name: "Educational/Tutorial"
          description: "Step-by-step how-to content"
          optimal_length: "15-60 seconds"
          hook_style: "Promise specific outcome"
          example: "Here's how to X in 30 seconds"

        - name: "Storytelling"
          description: "Personal narratives with emotional arc"
          optimal_length: "30-90 seconds"
          hook_style: "Open loop/curiosity gap"
          example: "I didn't believe it until..."

        - name: "Trend Participation"
          description: "Jumping on viral sounds/formats"
          optimal_length: "15-30 seconds"
          hook_style: "Familiar pattern recognition"
          timing: "Must be within 48-72 hours of trend emergence"

      tier_2_strong_reach:
        - name: "Behind-the-Scenes"
          description: "Authentic look at process/life"
          optimal_length: "30-60 seconds"
          hook_style: "Voyeuristic curiosity"

        - name: "POV Content"
          description: "First-person perspective narratives"
          optimal_length: "15-45 seconds"
          hook_style: "Relatable scenario setup"

        - name: "Duets/Stitches"
          description: "Response to existing viral content"
          optimal_length: "15-45 seconds"
          hook_style: "Leverage existing context"

      tier_3_niche_reach:
        - name: "Product Reviews"
          description: "Authentic product experiences"
          optimal_length: "30-60 seconds"
          hook_style: "Surprising verdict tease"

        - name: "Day in the Life"
          description: "Lifestyle documentation"
          optimal_length: "60-180 seconds"
          hook_style: "Aspirational/relatable premise"

    optimal_posting:
      frequency: "3-7 posts per day for maximum growth"
      minimum_viable: "1-2 posts per day"
      best_times:
        - "6-9 AM (morning scroll)"
        - "12-3 PM (lunch break)"
        - "7-11 PM (evening wind-down)"
      consistency: "Algorithm favors consistent posters"

    tactics:
      content_creation:
        - "First frame must be visually striking"
        - "Use on-screen text for silent viewers"
        - "Native music/sounds outperform external audio"
        - "Vertical format only - never letterboxed"
        - "Raw/authentic aesthetic outperforms polished"

      engagement_growth:
        - "Reply to every comment in first hour"
        - "Pin controversial or question comments"
        - "Create response videos to comments"
        - "Collaborate with creators in adjacent niches"

      hashtag_strategy:
        approach: "Mix of broad and niche tags"
        quantity: "3-5 hashtags maximum"
        types:
          - "1 broad category tag (#business, #lifestyle)"
          - "1-2 niche specific tags"
          - "1 trending/challenge tag when relevant"

    what_to_avoid:
      - "Overly polished/commercial content"
      - "Repurposed content with visible watermarks"
      - "Slow intros or long preambles"
      - "Hard selling in content"
      - "Ignoring comments and engagement"
      - "Inconsistent posting schedules"
      - "Copying trends after they peak"

  # ---------------------------------------------------------------------------
  # INSTAGRAM
  # ---------------------------------------------------------------------------
  instagram:
    platform_overview:
      current_status: "Mature platform, Reels-centric in 2024"
      audience_size: "2+ billion monthly active users"
      strategic_shift: "From photo-sharing to entertainment/video platform"
      algorithm_philosophy: "Engagement-weighted with strong follower base"

    content_types:
      reels:
        priority_level: "Highest reach potential"
        algorithm_signals_2024:
          - name: "Shares"
            weight: "Critical"
            description: "DM shares are the #1 signal for Reels reach"
            optimization: "Create content worth sending to a friend"

          - name: "Watch Time"
            weight: "Critical"
            description: "Completion rate determines distribution"
            optimization: "Front-load value, maintain tension"

          - name: "Saves"
            weight: "High"
            description: "Indicates reference-worthy content"
            optimization: "Include actionable tips, lists, tutorials"

          - name: "Comments"
            weight: "Medium-High"
            description: "Engagement depth indicator"
            optimization: "Ask questions, create debate"

          - name: "Likes"
            weight: "Medium"
            description: "Basic engagement signal"
            optimization: "Create emotional resonance"

        optimal_length: "7-15 seconds for viral, 30-90 seconds for value"
        best_practices:
          - "Native Instagram creation tools boost reach"
          - "Original audio creates recognition"
          - "Text overlays essential for silent viewing"
          - "First 0.5 seconds determine scroll-stop"
          - "Loop endings increase watch time"

      stories:
        priority_level: "Engagement and community building"
        algorithm_signals:
          - "Reply rate (DMs from stories)"
          - "Sticker interactions (polls, questions, quizzes)"
          - "Tap-forward vs tap-back rate"
          - "Share rate"

        optimal_frequency: "3-7 stories per day"
        best_practices:
          - "Mix content types (video, photo, text)"
          - "Use interactive stickers daily"
          - "Create story series with continuity"
          - "Link to Reels and Feed posts"
          - "Behind-the-scenes content performs best"

        engagement_tactics:
          - "Poll stickers for quick engagement"
          - "Question stickers for DM generation"
          - "Quiz stickers for education"
          - "Countdown stickers for launches"
          - "Link stickers for traffic"

      feed_posts:
        priority_level: "Secondary - portfolio and SEO"
        current_state: "Lower organic reach, but important for credibility"
        carousel_strategy:
          slides: "7-10 slides optimal"
          first_slide: "Hook/curiosity gap"
          middle_slides: "Value delivery"
          last_slide: "CTA or summary"
          optimization: "Educational carousels highest saves"

        single_image:
          use_case: "Brand moments, announcements, quotes"
          optimization: "Strong visual + caption value"

        caption_strategy:
          length: "Medium-long captions (150-300 words)"
          structure:
            - "Hook in first line (before 'more' truncation)"
            - "Value/story in body"
            - "CTA at end"
            - "Hashtags in first comment or end of caption"

    optimal_posting:
      reels_frequency: "1-2 per day"
      stories_frequency: "3-7 per day"
      feed_frequency: "3-5 per week"
      best_times:
        weekdays: "7-9 AM, 12-2 PM, 7-9 PM"
        weekends: "9-11 AM, 7-9 PM"

    engagement_tactics:
      the_180_strategy:
        description: "Leave 90 cents (meaningful comments) on 10 relevant posts, twice daily"
        execution:
          - "Find 10 posts in your niche using hashtags"
          - "Leave genuine, thoughtful comments (not spam)"
          - "Do this twice per day (morning and evening)"
          - "Focus on accounts slightly larger than yours"
        results: "Builds visibility and community connections"

      dm_strategy:
        - "Respond to all DMs within 24 hours"
        - "Start conversations from story replies"
        - "Use voice messages for personal touch"
        - "Never pitch in first DM"

    what_to_avoid:
      - "Posting Reels with TikTok watermarks"
      - "Ignoring Stories in favor of Feed only"
      - "Using banned or shadowbanned hashtags"
      - "Engagement pods (detected and penalized)"
      - "Buying followers or engagement"
      - "Long periods of inactivity"

  # ---------------------------------------------------------------------------
  # YOUTUBE
  # ---------------------------------------------------------------------------
  youtube:
    platform_overview:
      current_status: "Dominant long-form video platform with Shorts growth"
      audience_size: "2.5+ billion monthly active users"
      strategic_value: "Highest monetization potential, evergreen content"
      algorithm_philosophy: "Watch time and session time optimization"

    youtube_shorts:
      current_status: "Growing feature competing with TikTok"
      algorithm_signals_2024:
        - name: "Watch Time"
          weight: "Critical"
          description: "Percentage of Short watched"
          optimization: "Hook immediately, minimal fluff"

        - name: "Engagement Rate"
          weight: "High"
          description: "Likes, comments, shares combined"
          optimization: "Clear CTA, controversial takes"

        - name: "Subscribe Rate"
          weight: "High"
          description: "Conversions from Shorts to channel subscribers"
          optimization: "Demonstrate long-form value proposition"

        - name: "Swipe Away Rate"
          weight: "Negative"
          description: "Quick exits hurt distribution"
          optimization: "Strong first frame hook"

      optimal_length: "30-45 seconds (under 60 second limit)"
      best_practices:
        - "Vertical format, full screen"
        - "Loop potential increases watch time"
        - "Text overlays for comprehension"
        - "Quick cuts maintain attention"
        - "Use #Shorts in title or description"

      shorts_to_long_form_funnel:
        strategy: "Use Shorts as discovery for long-form content"
        execution:
          - "Create Shorts from long-form clips"
          - "Reference full video in Shorts"
          - "Maintain consistent posting across both"
          - "Use Shorts to test topics before long-form"

    long_form_video:
      algorithm_signals_2024:
        - name: "Click-Through Rate (CTR)"
          weight: "Critical"
          description: "Thumbnail + title combination effectiveness"
          target: "5-10% CTR is strong"
          optimization: "A/B test thumbnails, curiosity-driven titles"

        - name: "Average View Duration"
          weight: "Critical"
          description: "How long viewers watch on average"
          target: "50%+ retention is excellent"
          optimization: "Pattern interrupts, open loops, pacing"

        - name: "Session Watch Time"
          weight: "High"
          description: "Does your video lead to more YouTube watching?"
          optimization: "End screens, playlists, binge-worthy series"

        - name: "Engagement"
          weight: "Medium-High"
          description: "Likes, comments, shares"
          optimization: "Ask for engagement, create discussion"

        - name: "Upload Consistency"
          weight: "Medium"
          description: "Regular uploads signal active channel"
          optimization: "Maintain predictable schedule"

      thumbnail_optimization:
        principles:
          - "High contrast colors (avoid YouTube red)"
          - "3 or fewer text words"
          - "Expressive human face when possible"
          - "Curiosity gap without clickbait"
          - "Readable at small sizes"

        testing_approach:
          - "Create 3 thumbnail variations"
          - "Test using YouTube's built-in A/B testing"
          - "Analyze CTR data after 48 hours"
          - "Apply learnings to future thumbnails"

      title_optimization:
        principles:
          - "Front-load keywords for SEO"
          - "Create curiosity without full reveal"
          - "50-60 characters optimal"
          - "Numbers and specifics perform well"
          - "Emotional triggers increase CTR"

        formulas:
          - "How to [Desired Outcome] in [Timeframe]"
          - "[Number] Ways to [Achieve Goal]"
          - "I [Did Something Surprising] - Here's What Happened"
          - "The [Adjective] [Thing] That [Outcome]"
          - "Why [Common Belief] is Wrong"

      intro_hooks:
        first_30_seconds: "Make or break point for retention"
        techniques:
          - name: "Cold Open"
            description: "Jump into most interesting moment"
            example: "Start with the climax, then 'Let me explain...'"

          - name: "Curiosity Gap"
            description: "Promise information to come"
            example: "By the end, you'll know the one thing that..."

          - name: "Pattern Interrupt"
            description: "Do something unexpected"
            example: "Unusual visual, sound, or statement"

          - name: "Pain Point"
            description: "Address viewer's problem immediately"
            example: "If you're struggling with X, this will help..."

          - name: "Social Proof"
            description: "Establish credibility quickly"
            example: "After helping 10,000 people with this..."

    optimal_posting:
      long_form:
        frequency: "1-3 per week"
        consistency: "Same days/times each week"
        best_times: "Weekend mornings, weekday evenings"

      shorts:
        frequency: "1-3 per day"
        consistency: "Daily posting recommended"
        timing: "Can post anytime (algorithm-driven discovery)"

    what_to_avoid:
      - "Clickbait that doesn't deliver"
      - "Long, rambling intros"
      - "Inconsistent posting schedules"
      - "Ignoring thumbnails and titles"
      - "Not analyzing retention graphs"
      - "Skipping end screens and cards"

  # ---------------------------------------------------------------------------
  # LINKEDIN
  # ---------------------------------------------------------------------------
  linkedin:
    platform_overview:
      current_status: "Undervalued organic reach for B2B"
      audience_size: "900+ million members"
      strategic_value: "Highest per-impression value for B2B, professional audience"
      algorithm_philosophy: "Engagement-based with professional relevance"

    algorithm_signals_2024:
      primary_signals:
        - name: "Dwell Time"
          weight: "Critical"
          description: "Time spent reading/viewing content"
          optimization: "Longer, valuable posts with formatting"

        - name: "Comments"
          weight: "Critical"
          description: "Especially meaningful conversations"
          optimization: "Ask questions, share opinions, invite debate"

        - name: "Shares/Reposts"
          weight: "High"
          description: "Content worth sharing professionally"
          optimization: "Create content that makes sharer look smart"

        - name: "Reactions"
          weight: "Medium-High"
          description: "Beyond likes - celebrate, insightful, curious"
          optimization: "Content that provokes specific emotional responses"

        - name: "Follower Engagement"
          weight: "Medium"
          description: "Your followers engaging signals quality"
          optimization: "Build engaged follower base over time"

      negative_signals:
        - "External links in posts (deprioritized)"
        - "Excessive hashtags"
        - "Low engagement in first hour"
        - "Edit-after-post (resets algorithm)"

    best_performing_formats:
      tier_1_highest_reach:
        - name: "Text-Only Posts"
          description: "Well-formatted written content"
          optimal_length: "800-1200 characters"
          formatting:
            - "Use line breaks liberally"
            - "Start with strong hook"
            - "Use white space for readability"
            - "End with question or CTA"

        - name: "Document/Carousel Posts"
          description: "PDF slides in feed"
          slides: "8-12 slides optimal"
          design: "Clean, professional, readable"
          structure:
            - "Slide 1: Compelling title/hook"
            - "Slides 2-11: Value delivery"
            - "Last slide: CTA and summary"

        - name: "Personal Stories"
          description: "Vulnerable, authentic professional narratives"
          elements:
            - "Specific details and moments"
            - "Lesson learned"
            - "Universal applicability"

      tier_2_strong_reach:
        - name: "Native Video"
          description: "Uploaded directly to LinkedIn"
          optimal_length: "1-3 minutes"
          format: "Square or vertical preferred"
          requirements: "Captions mandatory"

        - name: "Polls"
          description: "Quick engagement drivers"
          options: "2-4 choices"
          use_case: "Market research, conversation starters"

        - name: "Newsletter"
          description: "Long-form subscriber-based content"
          frequency: "Weekly or bi-weekly"
          benefit: "Direct notification to subscribers"

      tier_3_limited_reach:
        - name: "Posts with External Links"
          description: "Links to external sites"
          workaround: "Put link in first comment instead"

        - name: "Shared Content"
          description: "Reposting others' content"
          optimization: "Add significant original commentary"

    optimal_posting:
      frequency: "1-2 posts per day maximum"
      minimum: "3-5 posts per week"
      best_times:
        - "Tuesday-Thursday: 8-10 AM"
        - "Tuesday-Thursday: 12-1 PM"
        - "Avoid: Weekends and Monday mornings"

    engagement_tactics:
      first_hour_strategy:
        description: "LinkedIn weights first-hour engagement heavily"
        execution:
          - "Post when your audience is active"
          - "Respond to every comment immediately"
          - "Engage with other posts before and after posting"
          - "Share to relevant groups"

      comment_strategy:
        on_your_posts:
          - "Reply to every comment thoughtfully"
          - "Ask follow-up questions"
          - "Avoid one-word responses"

        on_others_posts:
          - "Add value, not just agreement"
          - "Share relevant experience or insight"
          - "Engage with larger accounts strategically"

    what_to_avoid:
      - "Excessive hashtags (3-5 maximum)"
      - "Links in post body (use first comment)"
      - "Engagement bait ('Like if you agree')"
      - "Overly promotional content"
      - "Editing posts after publishing"
      - "Controversial political content"
      - "Treating it like other social platforms"

  # ---------------------------------------------------------------------------
  # TWITTER/X
  # ---------------------------------------------------------------------------
  twitter_x:
    platform_overview:
      current_status: "Volatile but valuable for influence and B2B"
      audience_size: "350+ million monthly active users"
      strategic_value: "Real-time engagement, thought leadership, media attention"
      algorithm_philosophy: "Engagement-based with recency and relevance"

    algorithm_signals_2024:
      primary_signals:
        - name: "Replies"
          weight: "Critical"
          description: "Conversations signal valuable content"
          optimization: "Tweet opinions that invite response"

        - name: "Retweets/Reposts"
          weight: "High"
          description: "Amplification through sharing"
          optimization: "Create tweetable, quotable content"

        - name: "Quote Tweets"
          weight: "High"
          description: "Added commentary sharing"
          optimization: "Make content worth adding to"

        - name: "Likes"
          weight: "Medium"
          description: "Basic engagement signal"
          optimization: "Relatable, agreeable, or impressive content"

        - name: "Bookmark"
          weight: "Medium"
          description: "Save for later indicates value"
          optimization: "Reference content, lists, insights"

        - name: "Dwell Time"
          weight: "Medium"
          description: "Time spent reading tweet"
          optimization: "Longer tweets with value"

    best_performing_formats:
      tier_1_highest_reach:
        - name: "Threads"
          description: "Multi-tweet connected content"
          optimal_length: "5-15 tweets"
          structure:
            first_tweet: "Hook + promise of value"
            middle_tweets: "Deliver value, each standalone"
            last_tweet: "Summary + CTA to follow/retweet"
          formatting:
            - "Number each tweet (1/, 2/, etc.)"
            - "One idea per tweet"
            - "Use line breaks within tweets"
            - "Include visuals every 3-4 tweets"

        - name: "Hot Takes/Opinions"
          description: "Bold, debatable statements"
          optimal_length: "1-2 tweets"
          execution: "Clear stance, invite disagreement"

        - name: "Lists"
          description: "Numbered valuable information"
          optimal_length: "5-10 items"
          formatting: "One item per line"

      tier_2_strong_reach:
        - name: "Story Tweets"
          description: "Narrative personal experiences"
          optimal_length: "1-5 tweets"
          elements: "Specific details, lesson, emotional hook"

        - name: "Visual Content"
          description: "Images, infographics, screenshots"
          types:
            - "Infographics and charts"
            - "Screenshots with commentary"
            - "Before/after comparisons"

        - name: "Quotes and Insights"
          description: "Memorable, shareable statements"
          optimal_length: "Single tweet"
          execution: "Original thinking in quotable format"

      tier_3_limited_reach:
        - name: "Links"
          description: "External URL shares"
          optimization: "Add significant context and opinion"

        - name: "Replies to Others"
          description: "Response tweets"
          strategy: "Reply to high-engagement tweets early"

    optimal_posting:
      frequency: "3-10 tweets per day"
      threads: "1-2 per week"
      best_times:
        - "8-10 AM weekdays"
        - "12-1 PM (lunch)"
        - "5-6 PM (commute)"
        - "8-10 PM (evening scroll)"

    tactics:
      engagement_strategy:
        - "Quote tweet with added value, not just agreement"
        - "Reply to large accounts with valuable takes"
        - "Build public conversations with peers"
        - "Use Lists to monitor key accounts"

      thread_strategy:
        - "Hook must be strong enough alone"
        - "Each tweet valuable independently"
        - "Cliffhangers between tweets"
        - "Clear numbering system"
        - "Final tweet asks for engagement"

      hashtag_strategy:
        usage: "Minimal - 0-2 per tweet"
        when: "Only for discovery in specific communities"
        avoid: "Hashtag stuffing hurts engagement"

    what_to_avoid:
      - "Excessive hashtags"
      - "Constant self-promotion"
      - "Engaging in bad-faith arguments"
      - "Deleting tweets (damages credibility)"
      - "Ignoring replies and mentions"
      - "Inconsistent voice/persona"

  # ---------------------------------------------------------------------------
  # FACEBOOK
  # ---------------------------------------------------------------------------
  facebook:
    platform_overview:
      current_status: "Mature, pay-to-play for most organic reach"
      audience_size: "3+ billion monthly active users"
      strategic_value: "Older demographics, Groups, Events, Local"
      algorithm_philosophy: "Friends and family prioritized, meaningful interactions"

    algorithm_signals_2024:
      primary_signals:
        - name: "Meaningful Interactions"
          weight: "Critical"
          description: "Comments, especially long ones with replies"
          optimization: "Create conversation-starting content"

        - name: "Shares"
          weight: "High"
          description: "Content shared to feeds or groups"
          optimization: "Create share-worthy moments"

        - name: "Reactions"
          weight: "Medium-High"
          description: "Love, Haha, etc. weighted higher than Like"
          optimization: "Content that provokes emotion"

        - name: "Time on Content"
          weight: "Medium"
          description: "Dwell time indicates interest"
          optimization: "Longer-form valuable content"

    best_performing_formats:
      tier_1_highest_reach:
        - name: "Native Video"
          description: "Uploaded directly to Facebook"
          optimal_length: "1-3 minutes"
          requirements: "Captions essential"
          hook: "First 3 seconds critical"

        - name: "Facebook Reels"
          description: "Short-form vertical video"
          optimal_length: "15-30 seconds"
          status: "Growing feature with bonus reach"

        - name: "Live Video"
          description: "Real-time broadcast"
          optimal_length: "10-60 minutes"
          benefit: "Notifications to followers, high engagement"

      tier_2_strong_reach:
        - name: "Groups Content"
          description: "Posts within Facebook Groups"
          strategy: "Build or participate in niche communities"
          engagement: "Higher organic reach than Page posts"

        - name: "Photo Posts"
          description: "High-quality images"
          types: "Behind-scenes, user-generated, quotes"

        - name: "Text Posts"
          description: "Status updates without links"
          optimal: "Questions, stories, opinions"

      tier_3_limited_reach:
        - name: "Link Posts"
          description: "External links shared"
          reality: "Heavily deprioritized"
          workaround: "Put link in comments"

    groups_strategy:
      building_community:
        - "Create focused, niche groups"
        - "Establish clear rules and culture"
        - "Post consistently (daily)"
        - "Facilitate member-to-member connections"

      participating:
        - "Join relevant industry groups"
        - "Provide value before promoting"
        - "Follow group rules strictly"
        - "Build relationships with admins"

    optimal_posting:
      page_frequency: "1-2 posts per day"
      group_frequency: "1-3 posts per day"
      best_times:
        - "9 AM - 2 PM weekdays"
        - "Evening hours 7-9 PM"

    what_to_avoid:
      - "Expecting organic reach on Pages"
      - "Ignoring Groups strategy"
      - "External links in main post"
      - "Engagement bait (explicitly penalized)"
      - "Posting without paid amplification strategy"

  # ---------------------------------------------------------------------------
  # EMERGING PLATFORMS
  # ---------------------------------------------------------------------------
  emerging_platforms:
    threads:
      status: "Early stage, high potential"
      current_opportunity: "Algorithm favoring growth, underpriced attention"
      strategy:
        - "Cross-post text content from Twitter/X"
        - "Build presence early before saturation"
        - "Experiment with format to learn algorithm"
      best_content:
        - "Conversational posts"
        - "Hot takes and opinions"
        - "Behind-the-scenes"

    youtube_podcasts:
      status: "Growing feature"
      opportunity: "Video podcasts on YouTube gaining distribution"
      strategy:
        - "Film podcasts for YouTube"
        - "Create clips for Shorts"
        - "Leverage existing YouTube audience"

    bereal:
      status: "Declining from peak"
      strategic_value: "Limited for business"
      use_case: "Authenticity signaling only"

    general_principles:
      early_adoption:
        - "First movers capture underpriced attention"
        - "Learn platform before competition arrives"
        - "Accept lower production quality for speed"
        - "Build audience before monetization pressure"

      evaluation_criteria:
        - "Growing user base?"
        - "Where is attention shifting?"
        - "Is attention underpriced vs. value?"
        - "Does it fit your audience demographic?"

# =============================================================================
# PART 3: CONTENT CREATION AT SCALE
# =============================================================================

content_at_scale:
  philosophy:
    core_belief: "Volume and quality are not mutually exclusive"
    key_insight: "Most creators under-produce, not over-produce"
    framework: "Build systems that enable high-volume, high-quality output"

  volume_approach:
    minimum_viable_volume:
      per_platform:
        tiktok: "1-3 per day"
        instagram_reels: "1-2 per day"
        instagram_stories: "3-7 per day"
        youtube_shorts: "1-2 per day"
        youtube_long_form: "1-3 per week"
        linkedin: "1-2 per day"
        twitter_x: "3-10 per day"
        facebook: "1-2 per day"

    scaling_strategy:
      phase_1:
        description: "Foundation building"
        focus: "1-2 platforms, consistent posting"
        volume: "10-15 pieces per week"

      phase_2:
        description: "Expansion"
        focus: "Add platforms, repurpose content"
        volume: "30-50 pieces per week"

      phase_3:
        description: "Scale"
        focus: "Team support, systems, automation"
        volume: "100+ pieces per week"

  content_pillars:
    framework:
      description: "Organize content around 3-5 core themes"
      purpose: "Maintain consistency while enabling variety"
      execution:
        - "Define your expertise areas"
        - "Create content calendar around pillars"
        - "Rotate pillars to avoid repetition"
        - "Each pillar should have multiple formats"

    pillar_types:
      educational: "Teach your audience something valuable"
      inspirational: "Motivate and encourage"
      entertaining: "Engage and delight"
      promotional: "Direct business content (use sparingly)"
      personal: "Human connection and authenticity"

    ratio_recommendation:
      educational: "40%"
      inspirational: "20%"
      entertaining: "20%"
      personal: "15%"
      promotional: "5%"

  content_repurposing:
    pillar_content_model:
      description: "Create one long-form piece, distribute multiple short-form pieces"
      execution:
        long_form_creation:
          - "Record 30-60 minute video/podcast/interview"
          - "Write 2000+ word blog post"
          - "Host live session"

        short_form_extraction:
          - "Cut into 5-15 short clips per long-form piece"
          - "Create quote graphics"
          - "Write social posts summarizing key points"
          - "Design carousel/documents"
          - "Create audio clips for audiograms"

    cross_platform_adaptation:
      principle: "Same idea, platform-native execution"
      execution:
        - "Adapt length to platform expectations"
        - "Adjust aspect ratio (vertical/square/horizontal)"
        - "Modify hook for platform culture"
        - "Use platform-native features and tools"
        - "Respect platform aesthetic expectations"

    content_atomization:
      one_hour_content_to:
        youtube_long_form: "1 full video"
        youtube_shorts: "5-10 clips"
        tiktok: "5-10 clips"
        instagram_reels: "5-10 clips"
        instagram_carousel: "2-3 carousels"
        instagram_stories: "10-20 stories"
        linkedin_posts: "5-10 posts"
        twitter_threads: "2-3 threads"
        twitter_tweets: "15-30 tweets"
        blog_post: "1-2 posts"
        email_newsletter: "1-2 newsletters"
        podcast_clips: "5-10 audiograms"

# =============================================================================
# PART 4: THE RELEVANCE x REACH FRAMEWORK
# =============================================================================

relevance_reach_framework:
  core_concept:
    description: "Balance between reaching many people and reaching the right people"
    formula: "Impact = Relevance x Reach"
    insight: "Neither alone is sufficient; both must be optimized"

  relevance:
    definition: "How well your content matches audience needs and interests"
    components:
      audience_understanding:
        - "Deep knowledge of audience pain points"
        - "Understanding of audience language"
        - "Awareness of audience aspirations"
        - "Knowledge of audience consumption habits"

      content_alignment:
        - "Topics that matter to your audience"
        - "Formats they prefer to consume"
        - "Timing that fits their schedule"
        - "Tone that resonates with them"

      value_delivery:
        - "Actionable information"
        - "Emotional resonance"
        - "Entertainment value"
        - "Identity reinforcement"

    relevance_signals:
      high_relevance:
        - "High engagement rate"
        - "Comments asking questions"
        - "Shares to specific people"
        - "Saves and bookmarks"
        - "DMs with follow-up"

      low_relevance:
        - "Low engagement despite reach"
        - "Quick scroll-past"
        - "Unfollows after viewing"
        - "Negative comments"

  reach:
    definition: "How many people see your content"
    components:
      organic_reach:
        - "Algorithm-driven distribution"
        - "Follower feed presence"
        - "Explore/discovery features"
        - "Viral amplification"

      paid_reach:
        - "Boosted posts"
        - "Paid advertising"
        - "Sponsored content"
        - "Influencer partnerships"

      earned_reach:
        - "Shares and retweets"
        - "Media coverage"
        - "Word of mouth"
        - "Community amplification"

    reach_optimization:
      organic_levers:
        - "Post frequency and timing"
        - "Platform-native content"
        - "Trend participation"
        - "Algorithm signal optimization"

      paid_levers:
        - "Audience targeting"
        - "Budget allocation"
        - "Creative testing"
        - "Bid strategy"

  balance_strategy:
    niche_vs_broad:
      niche_approach:
        pros: "Higher relevance, better conversion"
        cons: "Lower reach, smaller market"
        best_for: "B2B, high-ticket, expertise-based"

      broad_approach:
        pros: "Higher reach, larger audience"
        cons: "Lower relevance, harder conversion"
        best_for: "B2C, mass market, awareness"

      balanced_approach:
        execution:
          - "Broad content for reach (80%)"
          - "Niche content for conversion (20%)"
          - "Use broad to attract, niche to convert"
          - "Test and measure both continuously"

# =============================================================================
# PART 5: ORGANIC VS PAID INTEGRATION
# =============================================================================

organic_paid_integration:
  philosophy:
    core_principle: "Organic earns the right, paid amplifies the result"
    mistake_to_avoid: "Using paid to compensate for poor organic performance"
    optimal_approach: "Organic as testing ground, paid as scaling mechanism"

  organic_role:
    primary_functions:
      - "Content testing and validation"
      - "Community building and engagement"
      - "Authenticity and trust building"
      - "Algorithm learning and optimization"
      - "Cost-effective experimentation"

    organic_first_benefits:
      - "Prove content resonates before spending"
      - "Build genuine audience relationships"
      - "Develop content creation skills"
      - "Understand platform dynamics"
      - "Generate creative insights for paid"

  paid_role:
    primary_functions:
      - "Amplify proven organic content"
      - "Reach beyond organic limitations"
      - "Target specific audiences precisely"
      - "Scale successful campaigns"
      - "Drive specific conversion goals"

    when_to_use_paid:
      - "Organic content proves engagement"
      - "Clear conversion goal exists"
      - "Audience targeting is refined"
      - "Budget allows meaningful testing"
      - "Creative is validated organically"

  integration_strategy:
    testing_funnel:
      step_1:
        name: "Organic Testing"
        action: "Post content organically across platforms"
        metric: "Engagement rate, watch time, shares"
        duration: "48-72 hours"

      step_2:
        name: "Winner Identification"
        action: "Identify top-performing organic content"
        criteria: "Top 10-20% by engagement"
        selection: "Content with proven resonance"

      step_3:
        name: "Paid Amplification"
        action: "Boost winning content with paid spend"
        approach: "Start small, scale winners"
        optimization: "Test audiences, placements, creatives"

      step_4:
        name: "Scale and Iterate"
        action: "Scale successful paid campaigns"
        learning: "Apply insights to new organic content"
        cycle: "Continuous testing and scaling"

    budget_allocation:
      early_stage:
        organic_focus: "90%"
        paid_focus: "10%"
        rationale: "Build skills and test content"

      growth_stage:
        organic_focus: "60%"
        paid_focus: "40%"
        rationale: "Scale proven content"

      scale_stage:
        organic_focus: "40%"
        paid_focus: "60%"
        rationale: "Maximize reach of winners"

# =============================================================================
# PART 6: THE $1.80 STRATEGY AND ENGAGEMENT TACTICS
# =============================================================================

engagement_tactics:
  the_180_strategy:
    origin: "Original Gary Vee strategy, updated for current platforms"
    core_concept: "Leave your '2 cents' on 90 pieces of content per day"
    total: "180 cents = $1.80"

    execution:
      daily_routine:
        step_1:
          action: "Identify 10 relevant hashtags in your niche"
          purpose: "Find active conversations in your space"

        step_2:
          action: "Find top 9 posts under each hashtag"
          purpose: "Engage with highest-visibility content"

        step_3:
          action: "Leave meaningful comment on each (90 total)"
          purpose: "Provide value and gain visibility"

        step_4:
          action: "Do this twice daily (morning and evening)"
          purpose: "Consistent presence in your niche"

      comment_quality:
        good_comments:
          - "Add unique perspective or insight"
          - "Ask thoughtful follow-up question"
          - "Share relevant personal experience"
          - "Provide additional value to the discussion"

        bad_comments:
          - "'Great post!' (no value added)"
          - "Emojis only"
          - "Self-promotional plugs"
          - "Generic agreements"

    platform_adaptations:
      instagram:
        hashtags: "10 niche hashtags"
        posts_per_hashtag: "9 recent posts"
        frequency: "2x daily"

      linkedin:
        approach: "Search feed and hashtags"
        posts: "50-100 relevant posts"
        frequency: "1-2x daily"

      twitter_x:
        approach: "Search and lists"
        tweets: "50-100 relevant tweets"
        frequency: "Throughout the day"

  community_building:
    dm_strategy:
      principles:
        - "Respond to every DM within 24 hours"
        - "Start conversations from story/content engagement"
        - "Use voice/video messages for personal touch"
        - "Never pitch in first interaction"
        - "Build relationships before transactions"

      response_templates:
        new_follower:
          - "Genuine thank you"
          - "Ask what brought them to your content"
          - "Offer specific value"

        content_reply:
          - "Acknowledge their comment specifically"
          - "Add additional value or context"
          - "Ask follow-up question"

        business_inquiry:
          - "Thank them for interest"
          - "Ask qualifying questions"
          - "Provide next steps"

    comment_engagement:
      on_your_content:
        - "Reply to every comment in first hour"
        - "Ask follow-up questions"
        - "Like comments even when not replying"
        - "Pin best comments for visibility"

      timing:
        - "First hour after posting is critical"
        - "Set aside 15-30 min post-publish for engagement"
        - "Return for follow-up engagement 2-4 hours later"

