    - "Audience geography (US, UK = higher)"
    - "Video length (8+ mins = mid-roll ads)"
    - "Content type (advertiser friendly)"

virality_patterns:
  what_goes_viral:
    - "High emotional charge (anger, awe, humor)"
    - "Contrarian takes on popular topics"
    - "Transformation/before-after"
    - "Secrets revealed format"
    - "Trend participation with unique angle"

  viral_title_patterns:
    - "I [did X] for [time period]. Here's what happened."
    - "Why [common belief] is wrong"
    - "[Number] [thing] that [benefit]"
    - "The [adjective] reason why [outcome]"
    - "How [person] [achieved result]"

anti_patterns:
  what_kills_videos:
