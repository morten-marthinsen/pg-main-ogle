algorithm_priorities:
  primary_metric: viewer_satisfaction
  core_principle: "YouTube optimizes for keeping users on the platform longer to show more ads"

  ranking_signals:
    tier_1_critical:
      - click_through_rate:
          weight: highest
          description: "Ratio of impressions to clicks. Title + Thumbnail = CTR"
          benchmark: "2-10% depending on niche, aim for top of range"
      - average_view_duration:
          weight: highest
          description: "How long viewers watch before leaving"
          benchmark: "50%+ of video length is strong"
      - retention_curve:
          weight: highest
          description: "Pattern of audience drop-off throughout video"
          optimization: "Front-load value, pattern interrupts, open loops"

    tier_2_important:
      - watch_time:
          weight: high
          description: "Total minutes watched across all views"
          strategy: "Longer videos CAN work if retention stays high"
      - engagement_velocity:
          weight: high
          description: "Likes, comments, shares in first hours"
          strategy: "Ask questions, create controversy, trigger emotion"
      - session_time:
          weight: medium_high
          description: "Does your video lead to more watching?"
          strategy: "End screens, suggested videos, playlists"

    tier_3_supporting:
      - subscriber_conversion:
          weight: medium
          description: "New subscribers from video"
      - share_rate:
          weight: medium
          description: "External sharing signals value"
      - search_relevance:
          weight: medium
          description: "Title, description, tags matching search queries"

distribution_mechanics:
  traffic_sources:
    browse_features:
      percentage: "40-60% for established channels"
      description: "Homepage and subscription feed"
      optimization: "Consistent posting, high CTR thumbnails"

    suggested_videos:
      percentage: "20-40%"
      description: "Sidebar and end screen recommendations"
      optimization: "Related content, series, playlists"

    youtube_search:
      percentage: "10-30%"
      description: "Direct search results"
      optimization: "SEO, searchable titles, tags, descriptions"

    shorts_feed:
      percentage: "Variable"
      description: "Separate algorithm for <60s vertical video"
      optimization: "Loop endings, fast hooks, trend participation"

  algorithm_testing_phases:
    phase_1: "Initial push to small sample (100-500 impressions)"
    phase_2: "Expanded if CTR + AVD strong (1K-10K)"
    phase_3: "Viral push if metrics maintain (10K-100K+)"
    phase_4: "Evergreen indexing for continued discovery"

content_optimization:
  title_thumbnail_fit:
    principle: "Title and thumbnail must work together, not repeat each other"
    thumbnail_rules:
      - "3 elements max on thumbnail"
      - "Faces with emotion outperform"
      - "Contrast and brightness for mobile visibility"
      - "Text if needed: 3 words max, large font"
    title_rules:
      - "Front-load curiosity or benefit"
      - "Include searchable keywords naturally"
      - "Under 60 characters for full display"
      - "Numbers and lists often perform well"

  retention_optimization:
    first_30_seconds:
      - "Deliver promise immediately"
      - "State what viewer will learn/get"
      - "Pattern interrupt if needed"
      - "Never say 'in this video I will...'"

    mid_video:
      - "Open loops to keep watching"
      - "Pattern interrupts every 30-60 seconds"
      - "B-roll and visual changes"
      - "Preview upcoming value"

    end_of_video:
      - "Strong CTA for engagement"
      - "Tease next video"
      - "End screens for session time"

shorts_algorithm:
  key_differences:
    - "Separate recommendation system from long-form"
    - "Loop completion rate is primary metric"
    - "Speed to value even more critical (<3 seconds)"
    - "Rewatch rate highly weighted"

  optimization:
    - "Hook in first second"
    - "Loop ending (last frame connects to first)"
    - "Trending sounds when relevant"
    - "Vertical 9:16 mandatory"
    - "Under 60 seconds (15-30 often optimal)"

monetization_impact:
  partner_program_requirements:
