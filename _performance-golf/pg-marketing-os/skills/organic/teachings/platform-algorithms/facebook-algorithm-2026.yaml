algorithm_priorities:
  primary_metric: meaningful_interactions
  core_principle: "Facebook prioritizes content that sparks conversations between people"

  ranking_signals:
    tier_1_critical:
      - meaningful_interactions:
          weight: highest
          description: "Comments, shares, reactions from friends/family"
          benchmark: "Conversations > passive consumption"
          strategy: "Create content that sparks discussion"
      - share_rate:
          weight: highest
          description: "Shares to feed, groups, messenger"
          strategy: "Shareable = useful, controversial, or emotional"
      - engagement_velocity:
          weight: highest
          description: "Speed of engagement after posting"
          strategy: "Seed engagement in first hour"

    tier_2_important:
      - comment_length:
          weight: high
          description: "Longer comments = more meaningful"
          strategy: "Ask open-ended questions"
      - video_watch_time:
          weight: high
          description: "For video content"
          benchmark: "3+ seconds counts as view, aim for 60%+ retention"
      - group_engagement:
          weight: medium_high
          description: "Groups are prioritized over pages"

    tier_3_supporting:
      - reactions:
          weight: medium
          description: "Love, haha, wow > simple likes"
      - saves:
          weight: medium
          description: "Bookmarks indicate value"
      - clicks:
          weight: medium
          description: "Clicks to links, profiles"

