content_optimization:
  feed_narrative:
    principle: "Content should feel native to social feed, not broadcast"

    native_formats:
      - "Personal story with lesson"
      - "Question to community"
      - "Behind-the-scenes"
      - "User-generated content reshares"

    avoid:
      - "Overtly promotional posts"
      - "External link dumps"
      - "Engagement bait ('like if you agree')"

  video_optimization:
    watch_time_priority:
      - "Hook in first 3 seconds"
      - "Caption/subtitles for sound-off viewing"
      - "Square or vertical format for mobile"
      - "Native upload (not YouTube links)"

    reels_on_facebook:
      - "Cross-posted from Instagram Reels"
      - "Same optimization principles"
      - "Growing distribution on Facebook"

    live_video:
      - "Highest organic reach of any format"
      - "Algorithm notifies followers"
      - "Engagement during live boosts distribution"

  post_formats:
    text_only:
      reach: "Can perform well if sparks conversation"
      best_for: "Questions, hot takes, personal stories"

    photo_posts:
      reach: "Moderate"
      best_for: "Behind-the-scenes, user content"

    video_native:
      reach: "Strong"
      best_for: "Educational, entertaining, hooks"

    link_posts:
      reach: "Reduced (FB wants users on platform)"
      strategy: "Put link in comments instead"

    carousels:
      reach: "Strong on mobile"
      best_for: "Educational content, stories"

