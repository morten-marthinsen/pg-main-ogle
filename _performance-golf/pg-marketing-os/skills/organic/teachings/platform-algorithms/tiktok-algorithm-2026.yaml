    algorithm_activity: "Tests content in waves, not continuously"
    patience_required: "Videos can resurface days later"
    posting_frequency: "2-3x daily optimal for testing"

content_optimization:
  three_second_hook:
    principle: "If you don't hook in 3 seconds, you've lost them"
    hook_types:
      pattern_interrupt: "Something unexpected visually/audibly"
      curiosity_gap: "Open a question that demands an answer"
      controversy: "Bold claim that triggers reaction"
      transformation_tease: "Before/after preview"
      direct_call: "'Stop scrolling if [you have X problem]'"

    anti_patterns:
      - "Long intros or greetings"
      - "Explaining what you're about to say"
      - "Slow build-up to the point"
      - "Generic openers ('Hey guys')"

  loop_ending:
    principle: "Last frame connects to first, encourages rewatch"
    techniques:
      - "Visual loop (end position = start position)"
      - "Audio loop (sentence continues)"
      - "Question that sends back to start"
      - "Abrupt cut that feels incomplete"

  trend_adaptation:
    principle: "Ride trends but add unique value"
    execution:
      - "Find trending sounds within first 48 hours"
      - "Apply trend to your niche specifically"
      - "Add unique twist or perspective"
      - "Don't copy, translate to your audience"

    trend_sources:
      - "Discover page trending sounds"
      - "Creative Center for business"
      - "Competitor accounts"
      - "Trending hashtags (use sparingly)"

