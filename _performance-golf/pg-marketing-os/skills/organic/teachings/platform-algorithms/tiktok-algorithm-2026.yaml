algorithm_priorities:
  primary_metric: watch_time_and_completion
  core_principle: "TikTok tests content with small batches, promotes what performs"

  ranking_signals:
    tier_1_critical:
      - watch_completion_rate:
          weight: highest
          description: "Percentage of video watched"
          benchmark: "70%+ completion for viral potential"
      - rewatch_rate:
          weight: highest
          description: "How many viewers loop the video"
          benchmark: "Any significant rewatch = strong signal"
      - share_rate:
          weight: highest
          description: "Shares to DMs, other platforms"
          optimization: "Create 'tag a friend' moments"

    tier_2_important:
      - comment_rate:
          weight: high
          description: "Comments per view"
          strategy: "Controversial takes, questions, incomplete info"
      - like_rate:
          weight: high
          description: "Likes per view"
          strategy: "Value delivery, emotional moments"
      - follow_rate:
          weight: medium_high
          description: "New followers from video"
          strategy: "Niche-specific value, authority positioning"

    tier_3_supporting:
      - profile_visits:
          weight: medium
          description: "Users clicking to profile"
      - duet_stitch_use:
          weight: medium
          description: "Others using your content"
      - save_rate:
          weight: medium
          description: "Bookmarks for later"

