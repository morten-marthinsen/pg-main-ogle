  source: "$100M Offers by Alex Hormozi"
  document_type: offer_framework
  word_count: 45407
  key_principles:
    - "Make people an offer so good they would feel stupid saying no"
    - "The person who needs the exchange less always has the upper hand"
    - "Those who pay the most, pay the most attention"
    - "Price is what you pay. Value is what you get."
    - "Fear of loss is stronger than desire for gain"
  application_to_engine:
    - S06_virality_scoring: "Value equation maps to content value perception"
