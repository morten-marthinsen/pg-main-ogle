core_definition:
  grand_slam_offer:
    description: "An offer that cannot be compared to any other product or service available"
    components:
      - "Attractive promotion"
      - "Unmatchable value proposition"
      - "Premium price"
      - "Unbeatable guarantee"
      - "Money model that allows you to get paid to acquire customers"
    result: "Sell in a 'category of one' - purchasing decision is between your product and nothing"
    benefits:
      - "Increased response rates (more clicks)"
      - "Increased conversion (more sales)"
      - "Premium prices (charge more money)"

value_equation:
  formula: "Value = (Dream Outcome × Perceived Likelihood of Achievement) / (Time Delay × Effort & Sacrifice)"

  drivers:
    dream_outcome:
      position: numerator
      goal: increase
      description: "The expression of feelings and experiences the prospect has envisioned"
      key_insight: "Not your product — their transformation"
      status_principle: "The dream outcome that most directly increases a prospect's status will be the one they value most"
      examples:
        - "Not 'lose weight' but 'lose 20lbs in 6 weeks and fit into your wedding dress'"
        - "Not 'gym membership' but 'bikini body by summer'"
      pro_tip: "Frame benefits in terms of status gained from the viewpoint of others"

    perceived_likelihood:
      position: numerator
      goal: increase
      description: "How likely the prospect believes they will achieve the result"
      key_insight: "People pay for certainty"
      example: "How much would you pay to be a surgeon's 10,000th patient vs their first?"
      drivers:
        - proof
        - specificity
        - testimonials
        - authority
        - guarantees

    time_delay:
      position: denominator
      goal: decrease
      description: "Time between purchase and receiving the promised benefit"
      key_insight: "Fast beats free"
      two_elements:
        long_term: "The ultimate dream outcome (what they buy)"
        short_term: "Milestones along the way (what makes them stay)"
      pro_tip: "Always incorporate short-term, immediate wins for a client"
      examples:
        - "Get ads live and close first $2,000 sale within 7 days"
        - "First emotional win as close to purchase as possible"

    effort_sacrifice:
      position: denominator
      goal: decrease
      description: "All ancillary costs - tangible and intangible"
      key_insight: "Done for you > Done with you > Do it yourself"
      comparison_example:
        fitness_vs_liposuction:
          fitness:
            effort: "100+ hours annually"
            sacrifice: "Foods, activities, time"
            time_delay: "12+ months"
            perceived_likelihood: "Low (tried before, failed)"
          liposuction:
            effort: "1 afternoon"
            sacrifice: "Money only"
            time_delay: "Immediate"
            perceived_likelihood: "High (doctor guarantee)"
        result: "Same outcome, dramatically different value - hence $25,000 vs $100/mo"

  infinity_principle: "If you can make the bottom part equal to zero, you have infinitely valuable product"
  perception_note: "Perception is reality - it's about how much they PERCEIVE the increase/decrease"

  london_tunnel_example:
    insight: "Biggest increase in rider satisfaction came from a dotted map showing wait times, not faster trains"
    cost: "Few million dollars vs billions for faster trains"
    lesson: "Psychological solutions often beat logical solutions"

market_selection:
  core_principle: "A starving crowd matters more than offer strength or persuasion skills"
  hierarchy: "Starving Crowd (market) > Offer Strength > Persuasion Skills"

  four_indicators:
    massive_pain:
      description: "Must not want, but desperately NEED what you're offering"
      key_insight: "The pain is the pitch"
      quote: "If you can articulate the pain a prospect is feeling accurately, they will almost always buy"

    purchasing_power:
      description: "Audience needs to afford or access the money needed"
      warning_example: "Resume writing for unemployed people - massive pain but no money"

    easy_to_target:
      description: "Can you find these people?"
      examples:
        - "Associations they belong to"
        - "Mailing lists"
        - "Social media groups"
        - "Channels they watch"

    growing:
      description: "Growing markets are tailwinds, declining are headwinds"
      example: "Newspapers had 3 of 4 indicators but were shrinking 25% annually"

  three_main_markets:
    - Health
    - Wealth
    - Relationships

  niche_power:
    principle: "Riches are in the niches"
    example:
      generic: "Time Management - $19"
      niche_1: "Time Management for Sales Professionals - $99"
      niche_2: "Time Management for B2B Outbound Sales Reps - $499"
      niche_3: "Time Management for B2B Outbound Power Tools & Gardening Sales Reps - $1,000-$2,000"
    result: "100x price increase for nearly identical product"

  commitment: "Don't make me niche slap you - pick then commit"

pricing_principles:
  core_belief: "There is no strategic benefit to being the second cheapest in the marketplace"
  goal: "Charge as high a price as you can say out loud without cracking a smile"

  virtuous_cycle:
    when_you_raise_prices:
      - "Increase clients' emotional investment"
      - "Increase clients' perceived value"
      - "Increase clients' results (they value and are invested)"
      - "Attract best clients (easiest to satisfy, cost less to fulfill)"
      - "Multiply margin (invest in systems, people, experience, scale)"

    when_you_lower_prices:
      - "Decrease clients' emotional investment"
      - "Decrease clients' perceived value"
      - "Decrease clients' results (don't value service)"
      - "Attract worst clients (never satisfied)"
      - "Destroy margin (can't provide exceptional experience)"

  wine_study_insight: "Same wine rated differently based on price alone - higher price = higher perceived value"

  conviction_requirement: "Your conviction must be stronger than their skepticism"

  price_to_value_discrepancy:
    principle: "The moment value dips below price, they stop buying"
    wrong_approach: "Lower price to increase gap"
    right_approach: "Increase value to increase gap - think $100,000 of value for $10,000"

offer_creation:
  five_steps:
    step_1_dream_outcome:
      instruction: "Identify what they ACTUALLY want - their transformation, not your product"
      key_distinction: "Sell the vacation, not the plane flight"
      example: "Lose 20lbs in 6 weeks (not 'gym membership')"

    step_2_list_problems:
      instruction: "Write all obstacles they encounter BEFORE, DURING, and AFTER using your product"
      thinking: "What happens immediately before and after? What's the 'next' thing they need help with?"
      example_categories:
        - "Buying healthy food"
        - "Cooking healthy food"
        - "Eating healthy food"
        - "Exercising regularly"
      four_problem_buckets:
        - "Dream Outcome: This will not be financially worth it"
        - "Likelihood: It won't work for me specifically, external factors"
        - "Effort & Sacrifice: Too hard, confusing, I'll suck at it"
        - "Time: Takes too long, too busy, not convenient"
      quantity: "The more problems you think of, the more you get to solve"

    step_3_solutions_list:
      instruction: "Transform problems into solutions"
      method: "Think 'What would I need to show someone to solve this problem?'"
      format: "Add 'how to' then reverse the problem"
      example:
        problem: "Buying healthy food is hard, confusing, I won't like it"
        solution: "How to make buying healthy food easy and enjoyable, so anyone can do it"

    step_4_delivery_vehicles:
      instruction: "Think of all ways you could deliver each solution"
      cheat_codes:
        attention_level:
          - "One-on-one"
          - "Small group"
          - "One to many"
        effort_level:
          - "Do It Yourself (DIY)"
          - "Done With You (DWY)"
          - "Done For You (DFY)"
        medium:
          - "In-person"
          - "Phone"
          - "Email"
          - "Text"
          - "Zoom"
          - "Chat"
        consumption:
          - "Audio"
          - "Video"
          - "Written"
        response_time:
          - "24/7"
          - "9-5"
          - "Within 5 minutes"
          - "Within hour"
          - "Within 24 hours"
      stretch_test: "If they paid 10x, what would you provide? If 1/10th, how would you still make them successful?"
      key_insight: "One-to-many solutions have biggest discrepancy between cost and value"

    step_5_trim_and_stack:
      instruction: "Remove high cost/low value, keep high value (regardless of cost)"
      trim_criteria:
        remove_first: "High cost, low value"
        remove_second: "Low cost, low value"
        keep: "Low cost, high value AND high cost, high value"
      goal: "They think 'I get ALL this for ONLY that?'"

  sales_fulfillment_continuum:
    principle: "Balance between ease of fulfillment and ease of sales"
    mantra: "Create flow. Monetize flow. Then add friction."
    approach: "Over-deliver like crazy at first, use cash flow to optimize later"

enhancement_stack:
  principle: "Increase demand and decrease perceived supply"

  scarcity:
    definition: "Function of quantity - fear of missing out"
    psychology: "People want what they can't have, what others want, what only a select few have access to"

    three_types:
      limited_supply_seats:
        examples:
          - "Total business cap: Only accepting X clients"
          - "Growth rate cap: Only X clients per week"
          - "Cohort cap: Only X per class/cohort"
        execution: "Always sell out - better to sell out consistently than over-order"

      limited_supply_bonuses:
        example: "Only people who sign up get access to bonuses never available elsewhere"

      never_available_again:
        example: "Limited edition - once they're gone, they're gone forever"
        chanel_example: "Send only 1-2 of each piece to each store - every item is 'last in stock'"

    honest_scarcity: "Define how many you can actually handle, then advertise that"

  urgency:
    definition: "Function of time - deadlines drive decisions"
    statistic: "Last 3% of time creates 50-60% of sales in a campaign"

    four_types:
      cohort_rolling:
        example: "If you sign up today, get in with next group Monday, otherwise wait until next kickoff"

      seasonal_rolling:
        examples:
          - "New Year Promotion ends Jan 30"
          - "Valentines Lovers Promo ends Feb 30"
          - "Sexy By Spring Special ends March 31"
        key: "Same promotion, different seasonal wrapper"

      pricing_bonus:
        example: "Take advantage of discount today, we change them every 4 weeks"
        pro_tip: "Clean pipeline with every price change - let people know price is going up"

      exploding_opportunity:
        description: "Arbitrage opportunity with ticking clock"
        example: "Every second someone delays, they miss disproportionate gains"

  bonuses:
    core_principle: "Single offer is less valuable than same offer broken into component parts and stacked"

    twelve_point_checklist:
      - "Always offer bonuses"
      - "Give special name with benefit in title"
      - "Explain how relates to their issue"
      - "Explain what it is"
      - "Explain how you discovered/created it"
      - "Explain how it improves their life (faster, easier, less effort)"
      - "Provide proof (stat, past client, personal experience)"
      - "Paint vivid mental image of life after using it"
      - "Ascribe price tag and justify it"
      - "Prefer tools & checklists over additional trainings"
      - "Address specific concern/obstacle about why they can't succeed"
      - "Value of bonuses should eclipse value of core offer"

    advanced_tactic: "Get other businesses to provide bonuses for free (exposure for them, value for you)"

    with_scarcity: "Only people who sign up get access to these bonuses, never available elsewhere"
    with_urgency: "If you buy today, I'll add XYZ bonus that normally costs $1,000, for free"

    pro_tip: "Add bonuses instead of discounting - discounting teaches prices are negotiable"

  guarantees:
    core_principle: "Reversing risk is the number one way to increase conversion"
    impact: "Can 2-4x conversion simply by changing guarantee quality"

    four_types:
      unconditional:
        description: "No questions asked refund"
        examples:
          - "Full refund"
          - "50% refund"
          - "Refund + ancillary costs"
          - "Pay for competitor's program"
          - "Return money + additional $1,000"
        risk: "People who buy because of guarantees can become difficult customers"

      conditional:
        description: "Terms and conditions to qualify"
        key_insight: "Tying guarantee to success actions increases their results"
        types:
          outsized_refund: "Double/triple money back if conditions met"
          service_guarantee: "Keep working free until X achieved (favorite)"
          modified_service: "Another Y-period of service free"
          credit_based: "Credit toward any service"
          personal_service: "Work with them 1-on-1 free until goal reached"
          hotel_airfare: "Reimburse product + hotel + airfare"
          wage_payment: "Pay their hourly rate if not valuable"
          release_of_service: "Let out of contract free"
          delayed_payment: "Won't bill again until first outcome"
          first_outcome: "Pay ancillary costs until first outcome"

      anti_guarantee:
        description: "All sales are final"
        use_case: "Products that diminish in value once given or easily copied"
        positioning: "Lean into it - so valuable/exclusive it cannot be returned"
        example: "We're exposing inner workings of our business, as a result, all sales final"

      implied:
        description: "Performance-based - if you don't perform, they don't pay"
        types:
          - "Performance: $XX per sale, $XX per lb lost"
          - "Revshare: 10% of top line, 20% profit share"
          - "Profit-share: X% of profit"
          - "Ratchets: 10% if over X, 20% if over Y, 30% if over Z"
          - "Bonuses/Triggers: I get X when Y occurs"
        advantage: "Perfect alignment between client and provider"

    stacking: "Combine multiple guarantee types for maximum effect"
    example: "Unconditional 30-day no questions asked + conditional triple money back 90-day"

    naming_pro_tip: "Name your guarantee something creative - 'Club a Baby Seal Guarantee'"

  naming:
    purpose: "Attract right avatar and make offer conversion-ready"
    principle: "We're not changing the offer, just the wrapping paper"

    magic_formula:
      M_magnetic_reason_why:
        purpose: "Why are they making this offer? What's in it for me?"
        examples:
          - "Free"
          - "88% off"
          - "Giveaway"
          - "Grand Opening"
          - "New Year"
          - "Back To School"
          - "Anniversary"

      A_announce_avatar:
        purpose: "Call out ideal avatar - who you're looking for"
        examples:
          - "Bee Cave Dentists"
          - "Rolling Hills Moms"
          - "Salon Owners"
          - "Retired Athletes"
          - "Brooklyn Busy Executives"
        tip: "More local = more it converts"

      G_give_goal:
        purpose: "Articulate dream outcome"
        examples:
          - "Pain Free"
          - "Celebrity Smile"
          - "Never Out Of Breath"
          - "Double Your Profit"
          - "Grand Slam Offer"
          - "Little Black Dress"

      I_indicate_interval:
        purpose: "Duration to expect for results"
        examples:
          - "4 Hour"
          - "21 Day"
          - "6 Week"
          - "3 Month"
        warning: "Platforms may not approve quantifiable claims with duration"

      C_container_word:
        purpose: "Denotes this is a bundle/system, not commodity"
        examples:
          - "Challenge"
          - "Blueprint"
          - "Bootcamp"
          - "Intensive"
          - "Masterclass"
          - "Transformation"
          - "Accelerator"
          - "Deep Dive"
          - "System"
          - "Sprint"
          - "Hack"

    pro_tips:
      rhyming: "Good rhymes stick in minds - 'Six-Pack Fast Track', 'Celebrity Butt Shortcut'"
      alliteration: "Make words start with same sound - 'Make Money Masterclass', 'Big Booty Bootcamp'"

    examples:
      wellness:
        - "Free Six-Week Lean-By-Halloween Challenge"
        - "88% Off 12-Week Bikini Blueprint"
        - "Free 21-Day Mommy Makeover"
      doctors:
        - "$2,000-Off Celebrity Smile Transformation"
        - "Lakeway Moms - $1,500 Off Your Kids Braces"
        - "Back Sore No More! 90 Day Rapid Healing Intensive (81% off!)"
      coaching:
        - "5 Clients in 5 Days Blueprint"
        - "7F Agency 12 Week Intensive"
        - "Fill Your Gym in 30 Days (Free!)"

    fatigue_variation_order:
      - "Change creative (images/pictures in ads)"
      - "Change body copy in ads"
      - "Change headline (wrapper of offer)"
      - "Change duration of offer"
      - "Change enhancer (free/discount component)"
      - "Change monetization structure (last resort)"

supply_demand_psychology:
  core_insight: "Desire comes from not getting what you want"
  quote: "Desire is a contract you make with yourself to be unhappy until you get what you want"

  demand_fractal: "Demand is 80/20 - one fifth of prospects willing to pay five times the price (or more)"

  hormozi_law: "The longer you delay the ask, the bigger the ask you can make"
  analogy: "The longer the runway, the bigger the plane that can take off"

  delicate_dance:
    principle: "Keep supply under demand to maximize profits and keep desire ravenous"
    scenario_comparison:
      scenario_1: "Sell 10 units at $500 = $5,000"
      scenario_2: "Sell 2 units at $5,000 = $10,000"
    result: "Scenario 2 makes more money, provides more value, AND increases demand in remaining prospects"

