# =============================================================================
# SECTION 1: THE SECRET FORMULA (Foundation of Everything)
# =============================================================================

secret_formula:
  framework_name: "The Secret Formula"
  source_quote: >
    "The secret formula consists of four simple questions. These are the same
    four questions that I ask anyone who hires me for personal consultations.
    At the time of writing, companies pay me twenty-five thousand dollars per
    day to help them understand and implement this formula."
  description: >
    Before any funnel, any content strategy, any product — answer these four
    questions. They define your entire business. Get them wrong and nothing
    else works. Get them right and everything becomes easier.

  question_1:
    question: "Who is your dream customer?"
    source_quote: >
      "Question #1: Who Is Your Dream Client? The first question you have to
      ask yourself is, Who do I actually want to work with? Most of us start
      with a product idea, never thinking about who we want as clients,
      customers, vendors, and associates... if you don't consciously choose
      your dream client, one day you will wake up like I did, working with
      people who exhaust you and wishing that someone could fire you from
      the business you created."
    description: >
      Not a demographic profile. A specific human being you would love to work
      with every single day. Someone whose problem you are uniquely positioned
      to solve and whose success would make you proud.
    depth: >
      Most businesses define their customer too broadly. "Small business owners"
      is not a dream customer. "A fitness coach doing $10K/month who wants to
      hit $50K but can't figure out how to scale beyond 1-on-1 sessions" — that
      is a dream customer. The more specific, the more magnetic your message.
    action_steps:
      - "Write a one-paragraph description of your single dream customer"
      - "Give them a name and visualize a real person"
      - "Identify their current situation (income, frustrations, desires)"
      - "Define the gap between where they are and where they want to be"
      - "List 5 things they have tried that have not worked"
    organic_content_application: >
      Every piece of content should speak directly to this one person. When you
      write a caption, record a reel, or design a carousel — you are talking to
      them. Not an audience of thousands. One person. This specificity is what
      makes content feel personal at scale.
    common_mistakes:
      - "Targeting too broad — 'anyone who wants to grow their business'"
      - "Choosing based on who will pay, not who you can best serve"
      - "Ignoring psychographics (beliefs, values, identity) for demographics"
      - "Not updating your dream customer profile as your business evolves"

  question_2:
    question: "Where do they congregate?"
    source_quote: >
      "Question #2: Where Can You Find Them? The next question in the Secret
      Formula is WHERE can you find this ideal man or woman? Where do they
      hang out online? Are they on Facebook or Instagram? What groups are
      they part of? What email newsletters do they subscribe to? What blogs
      do they read?"
    description: >
      Your dream customers are already gathered somewhere — online communities,
      podcasts they listen to, influencers they follow, events they attend,
      platforms they spend time on. Find the watering holes.
    depth: >
      This is about concentration, not scatter. If your dream customers all
      follow 5 specific Instagram accounts, those 5 accounts are more valuable
      to you than a million random impressions. Concentration of attention is
      the arbitrage opportunity.
    action_steps:
      - "List 10 influencers/thought leaders your dream customer follows"
      - "Identify 5 podcasts they listen to regularly"
      - "Find 3 online communities (Facebook groups, Subreddits, Discords)"
      - "Name the events (virtual or physical) they attend"
      - "Determine which platform they spend the most time on"
    organic_content_application: >
      This determines your platform strategy and collaboration targets. If your
      dream customers live on LinkedIn, that is where you build. If they follow
      specific creators, those are your collaboration targets. Content strategy
      starts with knowing where attention already lives.
    common_mistakes:
      - "Being on every platform instead of dominating one"
      - "Ignoring niche communities where concentration is highest"
      - "Not studying the content styles that work in those spaces"
      - "Assuming your audience is where you like to spend time"

  question_3:
    question: "What bait will you use to attract them?"
    source_quote: >
      "Question #3: What Bait Will You Use to Attract Them? Once we know
      where the dream customers are, we have to create the right bait to
      attract them. Your bait could be a physical book, a CD, DVD, or an
      audio recording—anything that your dream customer would pay attention
      to and want... When you find out what your dream clients want, it
      becomes very easy to attract them."
    description: >
      Bait is the irresistible offer — free or paid — that gets your dream
      customer to raise their hand and enter your world. In organic content,
      your bait is the content itself plus lead magnets.
    depth: >
      The bait must be so compelling that your dream customer feels foolish
      saying no. It solves a specific, urgent problem. It demonstrates your
      capability. It creates desire for more. The best bait gives a quick win
      that proves your method works.
    action_steps:
      - "Identify the most urgent problem your dream customer wants solved NOW"
      - "Create a lead magnet that delivers a quick win for that problem"
      - "Test multiple bait offers to see which attracts the best customers"
      - "Ensure bait naturally leads to your core offer"
    organic_content_application: >
      In organic marketing, your content IS the bait. Every post, reel, or
      thread is a free sample of your expertise. The best organic creators
      make their free content so valuable that the audience assumes paid
      content must be extraordinary. Lead magnets bridge from content to
      email/contact capture.
    bait_types_for_organic:
      - type: "Framework posts"
        description: "Share a proprietary framework that solves a specific problem"
        example: "The 3-Step Content Engine that generates 50 leads per week"
      - type: "Quick-win carousels"
        description: "Step-by-step guide the audience can implement immediately"
        example: "Swipe through these 7 slides to fix your Instagram bio today"
      - type: "Challenge content"
        description: "Invite the audience into a time-bound transformation"
        example: "Join my 5-Day Hook Writing Challenge — link in bio"
      - type: "Contrarian takes"
        description: "Bold statements that attract your tribe and repel non-fits"
        example: "Stop posting motivational quotes. Here is what to post instead."
      - type: "Results breakdowns"
        description: "Show real results with specific numbers and methods"
        example: "How I grew from 0 to 10K followers in 90 days (exact strategy)"

  question_4:
    question: "What result do you want to give them?"
    source_quote: >
      "Question #4: What Result Do You Want To Give Them? Once you've hooked
      your dream customers with the perfect bait, the last question is what
      RESULT do you want to give them? I'm not talking about what product or
      service you want to sell them. A business is NOT about products and
      services. A business is about what result you can get for your clients.
      Once you (and they) understand that concept, then price is no longer
      a barrier."
    description: >
      This is your transformation promise. Not a feature list. Not a deliverable.
      The actual change in their life, business, or identity after working with you.
    depth: >
      People do not buy products. They buy better versions of themselves. The
      result is the gap between who they are now and who they become after
      going through your value ladder. Define the before-and-after with
      painful specificity.
    action_steps:
      - "Define the before state (specific pain, situation, identity)"
      - "Define the after state (specific outcome, feeling, new identity)"
      - "Articulate the transformation in one sentence"
      - "Create content that bridges the gap between before and after"
    organic_content_application: >
      Your content should repeatedly paint both the before and after states.
      The audience should see themselves in the before state and desire the
      after state. Every piece of content moves them one step closer to
      believing the transformation is possible — and that you are the guide
      who can deliver it.

# =============================================================================
# SECTION 2: THE VALUE LADDER (Core Revenue Architecture)
# =============================================================================

value_ladder:
  framework_name: "The Value Ladder"
  source_quote: >
    "When I walked into the dentist office that morning, I had come in for
    a free teeth cleaning. And in less than an hour, I walked out paying
    over two thousand dollars for my whitening kit and my new retainers.
    This dentist had strategically taken me through a powerful process that
    I call a Value Ladder."
  core_concept: >
    The Value Ladder is a visual representation of the products and services
    you offer, organized from lowest price/lowest value at the bottom to
    highest price/highest value at the top. Every business needs a value ladder.
    Without one, you either leave money on the table (no high-ticket) or
    struggle to get customers (no low-ticket entry point).

  fundamental_principle: >
    You cannot sell a $25,000 coaching package to a stranger. But you can give
    them a free piece of content, then a $7 ebook, then a $97 course, then a
    $997 workshop, then a $5,000 mastermind, then a $25,000 one-on-one package.
    Each rung builds trust, delivers value, and creates desire for the next level.
  source_quote_on_ascension: >
    "Now, ideally we would like to sell everyone our best thing, right? You
    want to serve your customers in the highest way possible. But the sad
    truth is that if I were to walk up to you on the street and say, 'Give
    me a million dollars, and I'll help you to grow your company,' you would
    either laugh in my face or run away, thinking I was insane. Why is that?
    It's because we just met, and so far, I haven't provided you any value."

  the_ladder_visual: >
    Imagine a ladder leaning against a wall. The bottom rung is free content.
    Each rung above it increases in price AND in value. The customer climbs at
    their own pace. Some sprint to the top. Most need time. Your job is to
    make each rung so valuable they cannot help but look up at the next one.

  rung_1_free_content:
    name: "Free Value (The Foundation)"
    price_range: "$0"
    purpose: >
      Attract dream customers, demonstrate expertise, build trust, and create
      the initial relationship. This is where organic content lives.
    what_it_includes:
      - "Social media posts (reels, carousels, stories, threads)"
      - "Blog posts and articles"
      - "Podcast episodes or YouTube videos"
      - "Free webinars or live streams"
      - "Email newsletter content"
    psychology: >
      Reciprocity is the engine. When you give genuine value for free, people
      feel an unconscious obligation to reciprocate. This is not manipulation —
      it is the natural human response to generosity. The more value you give
      freely, the stronger the pull toward paid offerings.
    transition_trigger: >
      The audience member thinks: "If their free stuff is this good, imagine
      what their paid stuff is like." This thought is the bridge to rung two.
    content_creator_application:
      - "Publish 5-7 pieces of content per week minimum across platforms"
      - "Each piece should deliver a complete insight, not a teaser"
      - "Build a content library that serves as proof of expertise"
      - "Use content to address objections before they arise"
    common_mistakes:
      - "Holding back good content for paid products (scarcity mindset)"
      - "Creating content that teases but never delivers (breeds resentment)"
      - "No consistency — sporadic posting destroys trust"
      - "Content that serves ego instead of audience needs"
      - "No clear path from free content to next rung"

  rung_2_lead_magnet:
    name: "Lead Magnet / Tripwire (The First Exchange)"
    price_range: "$0 (email) or $1-$27 (tripwire)"
    purpose: >
      Capture contact information in exchange for a specific, high-value
      resource. Or make a micro-sale that converts a follower into a buyer.
      The goal is not profit — it is relationship deepening and list building.
    what_it_includes:
      - "PDF guides, checklists, templates, swipe files"
      - "Mini video trainings (3-5 videos)"
      - "Free + shipping physical book offers"
      - "Low-cost digital products ($7-$27)"
      - "Quizzes that segment and educate"
    psychology: >
      The first transaction — even if free — is the hardest. Once someone gives
      you their email or makes a $7 purchase, they have crossed a psychological
      threshold. They are now a lead, not just a follower. The commitment and
      consistency principle kicks in: they have started a relationship with you
      and are more likely to continue.
    transition_trigger: >
      The lead magnet delivers such a clear quick win that the customer thinks:
      "This was incredible. What else do they have?" The natural next question
      becomes: "How can I go deeper?"
    content_creator_application:
      - "Create a lead magnet that solves the #1 problem your content addresses"
      - "Promote it naturally in 1 of every 5-7 content pieces"
      - "Use DM automation to deliver it seamlessly"
      - "Ensure the lead magnet demonstrates your paid methodology"
      - "Build an email sequence that nurtures after delivery"
    tripwire_strategy: >
      A tripwire is a low-priced offer ($7-$27) designed to convert a lead into
      a buyer. Profit is irrelevant. The goal is to change the relationship from
      "audience member" to "customer." Once someone has bought anything from you,
      they are 10x more likely to buy again. The tripwire fund your advertising
      and make your free content strategy self-sustaining.
    common_mistakes:
      - "Lead magnet that is too broad (must solve a SPECIFIC problem)"
      - "No delivery system (manual DMs do not scale)"
      - "Lead magnet that does not connect to your core offer"
      - "Tripwire with no upsell path"
      - "Collecting emails with no follow-up sequence"

  rung_3_core_offer:
    name: "Core Offer (The Main Product)"
    price_range: "$97-$997"
    purpose: >
      Your primary revenue generator. A comprehensive solution to your dream
      customer's core problem. This is the product most of your audience will
      buy, and it should deliver transformational value.
    what_it_includes:
      - "Online courses with structured curriculum"
      - "Group coaching programs (6-12 weeks)"
      - "Membership communities with ongoing value"
      - "Done-with-you workshops or bootcamps"
      - "Software tools or comprehensive templates"
    psychology: >
      At this price point, the customer needs three things: (1) belief that
      the transformation is possible, (2) belief that this specific product
      delivers that transformation, and (3) belief that THEY can succeed with
      it. Your free content and lead magnet have already established (1) and (2).
      Social proof, guarantees, and clear methodology establish (3).
    transition_trigger: >
      The customer achieves results with the core offer and realizes: "I want
      more personalized help" or "I want to go faster." They have proven the
      method works and now want acceleration.
    content_creator_application:
      - "Create content that demonstrates the methodology used in your course"
      - "Share student/client results as social proof"
      - "Build anticipation with behind-the-scenes of product creation"
      - "Use launch campaigns to drive concentrated buying pressure"
      - "Webinar content that teaches and naturally leads to the offer"
    common_mistakes:
      - "Over-delivering to the point of overwhelm"
      - "No clear transformation promise — just a pile of modules"
      - "Pricing too low (devalues the transformation)"
      - "No community or support component"
      - "Launching without enough warm audience"

  rung_4_premium_offer:
    name: "Premium / High-Ticket (The Accelerator)"
    price_range: "$2,000-$25,000"
    purpose: >
      Provide hands-on, personalized guidance that accelerates results.
      Smaller group or one-on-one access. This is where the highest
      per-customer revenue lives.
    what_it_includes:
      - "Mastermind groups (quarterly or annual)"
      - "One-on-one coaching packages"
      - "VIP days or intensive workshops"
      - "Done-with-you implementation sprints"
      - "Inner circle access with direct communication"
    psychology: >
      High-ticket buyers are not buying information — they already have
      that from your content and core offer. They are buying proximity,
      speed, and accountability. They want to collapse time. They want
      direct access to you. The premium price creates commitment that
      drives results, which becomes social proof that sells more premium.
    transition_trigger: >
      The premium client becomes a case study, a testimonial, and often
      a referral source. They may also become candidates for the top rung
      or for becoming affiliates and evangelists for your brand.
    content_creator_application:
      - "Share mastermind/coaching results as aspirational content"
      - "Create exclusive behind-the-scenes content from premium events"
      - "Use application funnels (not direct sales) for high-ticket"
      - "Position scarcity naturally — limited spots is real for high-touch"
      - "Let premium clients guest-star in your content for social proof"
    common_mistakes:
      - "Trying to sell high-ticket to cold audiences"
      - "Not having a clear application and qualification process"
      - "Delivering too much access (burnout risk)"
      - "Pricing too low for the value and access provided"
      - "No structured framework — just vibes and conversations"

  rung_5_continuity:
    name: "Continuity / Recurring Revenue (The Ecosystem)"
    price_range: "$27-$297/month or $997-$4,997/year"
    purpose: >
      Create predictable, recurring revenue through ongoing value delivery.
      Continuity programs keep customers in your ecosystem and create
      lifetime value far exceeding one-time purchases.
    what_it_includes:
      - "Monthly membership communities"
      - "Subscription content libraries"
      - "Monthly coaching calls or Q&A sessions"
      - "Software or tool subscriptions"
      - "Newsletter or content subscriptions"
    psychology: >
      Continuity works because of the endowment effect and loss aversion.
      Once someone is a member and receiving value, canceling feels like
      losing something. The key is making the monthly value clearly exceed
      the monthly cost so cancellation never feels rational.
    content_creator_application:
      - "Give community glimpses in public content (FOMO generation)"
      - "Share member wins publicly with permission"
      - "Create free content that demonstrates the depth available inside"
      - "Use content series that make the community feel like a no-brainer"
      - "Build belonging signals (shared language, inside references)"
    common_mistakes:
      - "Continuity that delivers diminishing value over time"
      - "No onboarding process for new members"
      - "Community with no structure (becomes ghost town)"
      - "Pricing too low to sustain quality delivery"
      - "Not measuring churn and addressing reasons for cancellation"

  value_ladder_construction:
    step_1:
      action: "Start with your core offer (Rung 3)"
      reason: "This is the transformation you deliver. Everything else orbits it."
    step_2:
      action: "Build free content that demonstrates the core methodology (Rung 1)"
      reason: "Content is the engine that attracts dream customers to your world."
    step_3:
      action: "Create a lead magnet that solves the gateway problem (Rung 2)"
      reason: "Bridge followers into your email list and deepen the relationship."
    step_4:
      action: "Add a premium offer for customers who want more (Rung 4)"
      reason: "Capture the 5-10% who want acceleration and proximity."
    step_5:
      action: "Layer in continuity for ongoing revenue (Rung 5)"
      reason: "Build predictable monthly revenue and keep customers in ecosystem."

  value_ladder_for_content_creators:
    example_ladder:
      rung_1: "Free Instagram/YouTube/TikTok content teaching frameworks"
      rung_2: "Free PDF checklist via DM automation (captures email)"
      rung_3: "$297 online course with community access"
      rung_4: "$5,000 6-month mastermind (quarterly application cycles)"
      rung_5: "$47/month membership with monthly live calls and resource library"
    key_principle: >
      The content creator's value ladder must feel seamless. A follower should
      naturally progress from watching a reel, to downloading the checklist,
      to buying the course, to joining the mastermind, to subscribing monthly.
      If any transition feels jarring, the ladder is broken.

