# SECTION 3: THE ATTRACTIVE CHARACTER (Personal Brand Architecture)
# =============================================================================

attractive_character:
  framework_name: "The Attractive Character"
  source_quote: >
    "An Attractive Character is not someone who is extraordinarily good
    looking, although they might be. What I'm talking about here is a
    persona that attracts clients or customers and helps you build your
    following to eventually make sales. An Attractive Character allows you
    to build a platform anywhere you want, whether on email, Facebook, or
    YouTube. It doesn't matter where you show up; your AC will draw people
    to you."
  source_quote_on_impact: >
    "This concept can mean the difference between making one thousand
    dollars a month and making one hundred thousand a month."
  core_concept: >
    People buy from people, not brands. The Attractive Character is the persona
    your audience bonds with. It is not a fabricated character — it is a
    strategic amplification of your authentic self. You choose which parts of
    your real personality and story to emphasize. The Attractive Character is
    the magnet that draws your tribe and the moat that competitors cannot copy.

  why_it_matters_for_organic: >
    In organic content, YOU are the product first. Before anyone buys your
    course, coaching, or community, they buy into you. The Attractive Character
    framework gives you a systematic way to build a personal brand that is
    magnetic, memorable, and monetizable. Every reel, post, and story is an
    expression of your Attractive Character.

  the_four_elements:

    element_1_backstory:
      name: "Backstory"
      source_quote: >
        "Every good Attractive Character has to have a backstory. It's essential
        if you want results... You share your backstory because you want people
        to see where you came from. If they can relate to where you came from,
        then they will want to follow you to where you are now. If they don't
        see the backstory, potential customers won't follow you or listen to
        you. You'll seem untouchable; you won't seem real to them."
      definition: >
        Your origin story. How you got to where you are. The journey that gives
        you credibility and relatability. Not a resume — a narrative that shows
        transformation.
      purpose: >
        Backstory creates connection. When your audience sees themselves in your
        past, they believe your solution can work for them. It answers the
        unspoken question: "Why should I listen to you?"
      key_principles:
        - "Lead with the struggle, not the success"
        - "Be specific about the lowest point"
        - "Show the turning point clearly"
        - "Connect your past pain to their current pain"
        - "Make it relatable, not impressive"
      how_to_build_your_backstory:
        step_1: "Identify your 'wall' moment — the crisis that forced change"
        step_2: "Define what life looked like before (their current reality)"
        step_3: "Describe the turning point (the discovery or decision)"
        step_4: "Show the transformation (proof it worked)"
        step_5: "Connect it to their situation (why this matters for them)"
      organic_content_application:
        - "Share origin story in long-form content (YouTube, blog, thread)"
        - "Reference backstory elements in short-form hooks"
        - "Use 'I used to think X, then I discovered Y' format in captions"
        - "Create a pinned post or highlight that tells the full story"
        - "Revisit different chapters of your backstory in different content"
      example: >
        "Five years ago I was $40K in debt, working 14-hour days at a job that
        was slowly killing my creativity. I had a music production business on
        the side that I thought was my ticket out — but I couldn't get anyone
        to care. Then I stumbled on a framework that changed everything. Within
        18 months I replaced my salary, paid off the debt, and now I help other
        creators do the same thing. That framework is what I am about to
        share with you."

    element_2_parables:
      name: "Parables"
      source_quote: >
        "Parables are little stories, easy to remember, that illustrate a
        relevant point... A parable is a story about something that happened
        in your Attractive Character's life. Most people let life pass them
        by, and they don't stop to take note of the interesting things that
        happen to them. But you're different. You have the ability to use
        the things that happen throughout your life to teach and inspire
        others—as well as sell products."
      definition: >
        Teaching stories that illustrate your points through narrative. Not
        abstract lessons — concrete stories with characters, conflict, and
        resolution that embed your frameworks in memory.
      purpose: >
        Facts tell, stories sell. Parables make your teachings memorable and
        shareable. People forget statistics but remember stories. A well-told
        parable does more for your authority than a hundred data points.
      key_principles:
        - "Every parable has a lesson embedded in the narrative"
        - "Use real stories from your life and client experiences"
        - "Include sensory details that make the story vivid"
        - "The resolution should model the behavior you want to teach"
        - "Keep the story tight — no unnecessary tangents"
      parable_formula:
        step_1: "Set the scene (who, where, when — in one or two sentences)"
        step_2: "Introduce the problem (what went wrong or what was at stake)"
        step_3: "Show the struggle (failed attempts, wrong approaches)"
        step_4: "Deliver the turning point (the insight or method that changed things)"
        step_5: "Reveal the outcome (specific results, transformation)"
        step_6: "Extract the lesson (what your audience should take from this)"
      organic_content_application:
        - "Open reels and stories with a parable hook"
        - "Use client transformation stories as parables in carousels"
        - "Build a library of 10-20 go-to parables for different lessons"
        - "Each parable should map to a core belief you want to instill"
        - "Rotate parables across platforms for fresh content"
      example: >
        "Last month a student in my program came to me frustrated. She had been
        posting every day for 6 months — 180 pieces of content — and had 340
        followers. I looked at her content and said, 'You are creating for
        yourself, not your dream customer.' We rewrote her content strategy
        around her audience's #1 pain point. 30 days later: 4,200 followers
        and 47 leads. Same person, same niche, same platform. Different strategy."

    element_3_character_flaws:
      name: "Character Flaws"
      source_quote: >
        "No one wants to hear about the perfect person—because you can't
        relate. Yet most of us try to put on a perfect facade for our
        audiences, thereby alienating the real men and women we are trying
        to reach. Conversely, as soon as the audience knows you're not
        perfect, that you have character flaws, then they will start to
        empathize with you. They'll like you more because you are like
        them: not perfect."
      definition: >
        The imperfections you share openly. Not weakness for the sake of
        vulnerability theater — genuine flaws that make you human, relatable,
        and trustworthy.
      purpose: >
        Perfection is repulsive. People cannot relate to someone who appears to
        have it all figured out. Strategic vulnerability — sharing real
        struggles, mistakes, and shortcomings — creates deep trust because it
        signals honesty. If you share your flaws, you must be telling the truth
        about your strengths.
      key_principles:
        - "Share flaws that your audience also experiences"
        - "Never share flaws that undermine your core competence"
        - "Frame flaws as part of the journey, not permanent conditions"
        - "Use past flaws more than present ones for credibility balance"
        - "Flaws should humanize you, not disqualify you"
      which_flaws_to_share:
        effective_flaws:
          - "I procrastinate on things that are not in my zone of genius"
          - "I spent years doing it the hard way before finding this method"
          - "I have ADHD and had to build systems to compensate"
          - "I was terrible at X when I started and here is how I fixed it"
          - "I made this expensive mistake so you do not have to"
        flaws_to_avoid_sharing:
          - "Anything that suggests you cannot deliver on your core promise"
          - "Flaws that are actually humble-brags disguised as vulnerability"
          - "Deeply personal issues that create discomfort without purpose"
          - "Flaws presented without growth or resolution"
      organic_content_application:
        - "Share 'what I got wrong' content once per week"
        - "Behind-the-scenes content that shows the messy process"
        - "Respond to comments honestly about challenges you face"
        - "Create 'lessons from my failures' carousel series"
        - "Use flaws as hooks: 'I almost quit last month. Here is why.'"

    element_4_polarity:
      name: "Polarity"
      source_quote: >
        "Attractive Characters are typically very polarizing. They share their
        opinions on hard matters, and they stick to their guns—no matter how
        many people disagree with them. They draw a line in the sand. And when
        they take a stand for what they believe in, they split the audience
        into three camps: those who agree with them, those who are neutral,
        and those who will disagree with them."
      source_quote_on_neutrality: >
        "While that sounds like the logical thing to do—appeasing everyone—
        the problem is that being neutral is boring. When an Attractive
        Character tries to win the votes of everyone, they end up reaching
        no one."
      definition: >
        Taking a clear stand on issues your audience cares about. Not being
        controversial for shock value — being willing to draw a line that
        attracts your tribe and repels everyone else.
      purpose: >
        Neutral brands are invisible. When you stand for something specific,
        you become a magnet for people who share those beliefs and a repellent
        for those who do not. This is not a bug — it is the entire strategy.
        A smaller, passionate tribe outperforms a large, indifferent audience
        in every metric that matters.
      key_principles:
        - "Take stands related to your expertise, not random politics"
        - "Be willing to alienate people who are not your dream customer"
        - "Back positions with evidence and experience, not just opinion"
        - "Consistency of position builds trust (do not flip-flop)"
        - "Polarity creates content that gets shared and debated"
      polarity_spectrum:
        too_safe: "Content everyone agrees with (boring, forgettable)"
        right_amount: "Content your dream customer loves and others question"
        too_extreme: "Content that alienates even your core audience"
      organic_content_application:
        - "Publish one contrarian or polarizing post per week"
        - "Use 'unpopular opinion' or 'hot take' formats"
        - "Respond to industry trends with clear positions"
        - "Create 'X vs Y' content that forces a stance"
        - "Build your brand around 3-5 non-negotiable beliefs"
      examples_of_effective_polarity:
        - "Stop posting motivational quotes. Nobody buys from a fortune cookie."
        - "Consistency is not a strategy. Strategy is a strategy."
        - "Your audience does not need more content — they need better content."
        - "Free content should be better than most people's paid content."
        - "Engagement pods are poison. They trick the algorithm but not your bank account."

  identity_types:
    description: >
      Every Attractive Character falls into one of four identity archetypes.
      You do not choose arbitrarily — you identify which one is already most
      natural to you and amplify it. Audiences respond to authenticity, so
      pick the type that matches your genuine personality.

    type_1_leader:
      name: "The Leader"
      source_quote: >
        "The identity of the leader is usually assumed by people whose goal
        is to lead their audiences from one place to another. Most leaders
        have a similar backstory to that of their audiences and, therefore,
        know the hurdles and pitfalls the audience members will likely face
        on the journey to get ultimate results."
      description: >
        You have been where your audience wants to go. You lead from the front
        with your own results. Your authority comes from demonstrated personal
        achievement.
      characteristics:
        - "Shares personal results and achievements openly"
        - "Leads by example — does what they teach"
        - "Strong, decisive communication style"
        - "Attracts followers who want to model their success"
        - "Content features 'this is what I did and here is how you can too'"
      content_style:
        - "Behind-the-scenes of your results"
        - "'Here is exactly how I achieved X' breakdowns"
        - "Framework sharing from personal experience"
        - "Income/results reports with methodology"
        - "Strong opinions backed by personal proof"
      best_for: "Creators who have achieved notable results in their niche"
      example_creators:
        - "Alex Hormozi (business results as authority)"
        - "Grant Cardone (success as proof of concept)"
        - "Leila Hormozi (operator who built at scale)"

    type_2_adventurer:
      name: "The Adventurer / Crusader"
      source_quote: >
        "The adventurer is usually someone who is very curious, but he
        doesn't always have all of the answers. So he sets out on a journey
        to discover the ultimate truth. He brings back treasures from his
        journey and shares them with his audience."
      description: >
        You are on a quest and bring your audience along for the journey.
        You may not have all the answers yet, but your willingness to explore,
        experiment, and report back creates a compelling narrative.
      characteristics:
        - "Documents the journey in real time"
        - "Transparent about experiments and outcomes"
        - "Creates excitement through discovery"
        - "Audience feels like co-adventurers"
        - "Content features 'I tried X and here is what happened'"
      content_style:
        - "Build-in-public content"
        - "30-day challenges documented live"
        - "Experiment results and learnings"
        - "Travel, exploration, new experiences"
        - "Discovery-based frameworks"
      best_for: "Creators earlier in their journey or in rapidly evolving fields"
      example_creators:
        - "Peter McKinnon (photography adventure)"
        - "Ali Abdaal (productivity experiments)"
        - "Tim Ferriss (lifestyle experiments)"

    type_3_reporter:
      name: "The Reporter / Evangelist"
      source_quote: >
        "This identity is often one that people use when they have not yet
        blazed a trail to share with an audience, but have a desire to. So
        they put on the hat of the reporter or evangelist and go out to
        discover the truth. Typically, people who use this identity interview
        dozens, hundreds, or even thousands of people and share those
        interviews, and all they've learned along the way, with their
        audience."
      description: >
        You curate, research, and report on what experts and thought leaders
        are doing. Your authority comes from access, analysis, and synthesis
        rather than personal achievement.
      characteristics:
        - "Interviews experts and shares their wisdom"
        - "Synthesizes multiple sources into insights"
        - "Acts as a trusted curator of information"
        - "Audience values their taste and judgment"
        - "Content features 'I studied X and here is what I found'"
      content_style:
        - "Expert interview content"
        - "Research roundups and analysis"
        - "Book breakdowns and summaries"
        - "Industry trend reports"
        - "Comparative analysis of methods"
      best_for: "Creators who are better at synthesis than original research"
      example_creators:
        - "Jay Shetty (wisdom curation)"
        - "Ryan Holiday (stoicism reporting)"
        - "Lewis Howes (interview-based authority)"

    type_4_reluctant_hero:
      name: "The Reluctant Hero"
      source_quote: >
        "This is my personal identity now, and typically the one that I try
        to share with my audiences. This is the humble hero who doesn't
        really want the spotlight or any fuss made over his discoveries.
        But he knows the information or the secrets he has are so important
        that he must overcome his shyness and share them with the world.
        There's a moral duty that compels him to share all he knows."
      description: >
        You did not choose this path — it chose you. You discovered something
        that worked, people kept asking you about it, and eventually you felt
        a responsibility to share it. Your humility and resistance to the
        spotlight make you trustworthy.
      characteristics:
        - "Humble, almost self-deprecating"
        - "Emphasizes the method over the messenger"
        - "Shares because they feel a duty, not for fame"
        - "Audience trusts them because they are clearly not in it for ego"
        - "Content features 'I never planned to teach this but people kept asking'"
      content_style:
        - "Story-driven content about discovery"
        - "'I was forced to figure this out' narratives"
        - "Method-first, personality-second approach"
        - "Community-driven content (responding to questions)"
        - "Teaching with humility and humor"
      best_for: "Introverts, technical experts, or accidental educators"
      example_creators:
        - "Cal Newport (reluctant productivity guru)"
        - "James Clear (accidental habits expert)"
        - "Derek Sivers (reluctant business philosopher)"

  storyline_types:
    description: >
      These are the recurring narrative patterns that the Attractive Character
      uses to communicate. Master all six and you will never run out of content
      angles. Each storyline type triggers different psychological responses.

    storyline_1_loss_and_redemption:
      name: "Loss and Redemption"
      source_quote: >
        "I had everything. I was on top of the world. Life was great. Then
        ___________ happened. I had to figure my way out of ________________.
        But it turned out to be a blessing in disguise because I went through
        __________, and I learned/received ___________. Now I ___________."
      description: >
        You had something, lost it, and fought your way back. The fall and
        rise is one of the most compelling story structures in human history.
      psychological_trigger: "Hope — if they recovered, I can too"
      structure:
        - "Establish what you had (success, stability, identity)"
        - "Show the loss (failure, crisis, collapse)"
        - "Describe the bottom (the darkest moment)"
        - "Reveal the turning point (what changed)"
        - "Show the redemption (where you are now)"
      organic_content_formats:
        - "Long-form story post or thread"
        - "3-part reel series (the fall, the bottom, the rise)"
        - "Carousel: 'From $X to $0 to $Y — what I learned'"
        - "Podcast or YouTube deep dive on the journey"
      example_hook: "Two years ago I lost everything — my business, my savings, my confidence. Here is what I rebuilt from the wreckage."

    storyline_2_us_vs_them:
      name: "Us vs. Them"
      source_quote: >
        "You want to use us vs. them stories to polarize your audience.
        Remember the power of polarity? Using these types of stories will
        draw your raving fans even closer and give them a rallying cry
        against the outsiders."
      description: >
        Create a clear enemy (an idea, a system, a way of thinking — never a
        person) and position your tribe as the alternative. This builds fierce
        loyalty and tribal identity.
      psychological_trigger: "Belonging — I am part of the smart group"
      structure:
        - "Name the enemy (status quo, broken system, wrong approach)"
        - "Show why most people follow the enemy (ease, convention)"
        - "Reveal why the enemy fails (evidence, consequences)"
        - "Present your alternative (the better way)"
        - "Rally your tribe (call to join the right side)"
      organic_content_formats:
        - "Hot take posts that challenge industry norms"
        - "Comparison carousels (their way vs. our way)"
        - "Reels that call out broken conventions"
        - "Thread breaking down why the common approach fails"
      example_hook: "Everyone is telling you to post more. They are wrong. Here is what actually grows your audience."

    storyline_3_before_and_after:
      name: "Before and After"
      source_quote: >
        "First I was ______________. Now I'm ___________.
        These are stories of transformation, and they work great in any
        market... These stories are pretty self-explanatory and simple to
        write. In fact, you can often tell the whole story with just pictures.
        But don't let the simplicity fool you. These stories are powerful
        motivators, and you should use them often."
      description: >
        Show the transformation from old state to new state. Can be your own
        transformation, a client's, or the audience's potential transformation.
      psychological_trigger: "Desire — I want that result for myself"
      structure:
        - "Paint the before picture with painful specificity"
        - "Show the catalyst (what initiated change)"
        - "Walk through the method (what was done)"
        - "Reveal the after picture with specific results"
        - "Bridge to audience (this is available to you too)"
      organic_content_formats:
        - "Client transformation case studies"
        - "Side-by-side comparisons (screenshots, photos, numbers)"
        - "Video testimonials with before/after context"
        - "Carousel: slide 1 = before, middle slides = method, last slide = after"
      example_hook: "My client Sarah was posting 3 times a day with zero leads. 60 days later she had a waitlist. Here is the one thing we changed."

    storyline_4_amazing_discovery:
      name: "Amazing Discovery"
      source_quote: >
        "Oh my gosh, you guys . . . wait til you hear about this amazing new
        thing I just discovered! You're not going to believe it, but I hit
        it out of the park on my first try! I wasn't sure it would work, but
        it's amazing. You've got to try it!"
      description: >
        Share a discovery — a tool, method, framework, or insight — that
        changed everything. Position it as a breakthrough the audience has
        not heard of yet.
      psychological_trigger: "Curiosity — I need to know this secret"
      structure:
        - "Set up the problem you were trying to solve"
        - "Describe failed attempts (what did not work)"
        - "Reveal the discovery moment"
        - "Show the impact (what changed after discovering it)"
        - "Teach the discovery (give it away)"
      organic_content_formats:
        - "'I just discovered something that changes everything' reels"
        - "Framework reveal carousels"
        - "Deep-dive YouTube videos on the discovery"
        - "Thread walking through the discovery process"
      example_hook: "After 3 years and 2,000 posts, I finally found the one variable that predicts whether content goes viral. It is not what you think."

    storyline_5_secret_telling:
      name: "Secret Telling"
      source_quote: >
        "I've got a secret . . . if you want to find out what it is, you
        need to do ___________. This is my favorite type of storyline. My
        whole company, DotComSecrets, is built around 'secret' storylines.
        The lure of secrets draws the reader into your funnel and up your
        Value Ladder."
      description: >
        Share insider information that most people do not know. Position
        yourself as having access to knowledge that gives your audience
        an unfair advantage.
      psychological_trigger: "Exclusivity — I am getting insider access"
      structure:
        - "Establish that a secret exists (and most people miss it)"
        - "Explain why the secret is hidden (complexity, gatekeeping, convention)"
        - "Reveal the secret with specificity"
        - "Show proof that the secret works"
        - "Give actionable steps to use the secret"
      organic_content_formats:
        - "'What nobody tells you about X' posts"
        - "'The real reason X happens' reels"
        - "Insider knowledge carousels"
        - "'After working with 100+ clients, here is the secret' threads"
      example_hook: "The Instagram algorithm has a hidden preference that 99% of creators do not know about. I have spent 6 months testing it."

    storyline_6_third_person_proof:
      name: "Third Person Proof"
      source_quote: >
        "Sharing other people's successes with your products and programs
        provides powerful social proof. Get as many third-person testimonials
        from your customers, clients, and students as you can. Then sprinkle
        them liberally throughout your stories. Or use them as stand-alone
        stories and case studies."
      description: >
        Tell someone else's success story using your method. Third-person
        stories are often more persuasive than first-person because they
        remove the "of course it worked for YOU" objection.
      psychological_trigger: "Social proof — it works for people like me"
      structure:
        - "Introduce the person (relatable to your audience)"
        - "Describe their starting point (similar to audience's situation)"
        - "Show what they did (your method/framework)"
        - "Reveal the results (specific and impressive)"
        - "Connect to audience (you can do this too)"
      organic_content_formats:
        - "Client spotlight carousels"
        - "Testimonial reels with results overlay"
        - "Case study threads"
        - "Interview or co-created content with the success story"
      example_hook: "Mike was a personal trainer with 200 followers. He did not change his niche, his posting frequency, or his platform. He changed one thing. 90 days later he had 15K followers and a full client roster."

# =============================================================================
# SECTION 4: THE EPIPHANY BRIDGE (Story-Selling Framework)
# =============================================================================

epiphany_bridge:
  framework_name: "The Epiphany Bridge"
  source_note: >
    The Epiphany Bridge is formally introduced in Expert Secrets (the
    companion book to DotCom Secrets). However, the concept of the
    epiphany moment is central to DotCom Secrets' Soap Opera Sequence
    (Email #3) and Attractive Character storylines. The framework is
    included here because Brunson treats both books as a unified system.
  source_quote_from_dotcom_secrets: >
    "Email #3: Epiphany. Now it's time to start bringing in the dawn.
    You have an epiphany. You realize something you hadn't thought of
    before. Maybe it's something that was right in front of you the
    whole time. It's the moment that everything turned around for you.
    By now the reader is so hooked in, they want to know (and hopefully
    buy) your solution."
  core_concept: >
    An Epiphany Bridge is a story designed to take your prospect from their
    current belief to a new belief by giving them the same emotional experience
    you had when you first discovered the truth. Logic does not change beliefs.
    Emotion does. The Epiphany Bridge is the vehicle for emotional persuasion.

  why_it_matters: >
    Every purchase requires a belief shift. The prospect must believe that your
    solution is the right one, that it will work for them, and that now is the
    time to act. Logical arguments rarely create these shifts. But a story that
    recreates your original epiphany moment can create the same shift in your
    audience in minutes.

  the_five_elements:
    element_1_backstory:
      name: "The Backstory"
      description: >
        Where were you before the epiphany? What was your situation, your
        beliefs, your struggles? This establishes relatability. Your audience
        must see themselves in your before-state.
      key_questions:
        - "What did I believe before my epiphany?"
        - "What was I struggling with?"
        - "What had I already tried that failed?"
        - "What was my emotional state?"
      organic_application: >
        Open your content with the backstory. In a reel, this is the first
        3-5 seconds. In a carousel, this is slide 1-2. In a thread, this is
        tweet 1-2. Make it vivid and relatable.
      example: >
        "I used to think that posting more was the answer. I was creating 3
        pieces of content a day, seven days a week, and my account was flatlined
        at 800 followers after 6 months of grinding."

    element_2_journey:
      name: "The Journey"
      description: >
        What happened next? What path did you take? What did you try, learn,
        and experience along the way? The journey creates investment — the
        audience is now traveling with you.
      key_questions:
        - "What steps did I take after my initial struggles?"
        - "What new information did I encounter?"
        - "Who did I learn from?"
        - "What experiments did I run?"
      organic_application: >
        The journey is the middle section. In short-form content, compress it.
        In long-form, let it breathe. The audience should feel the frustration
        and the searching.
      example: >
        "I bought every course. I studied every algorithm hack. I tried trending
        audio, engagement pods, posting at specific times. Nothing moved the
        needle. I was about to quit."

    element_3_wall:
      name: "The Wall / The Problem"
      description: >
        The moment of crisis. The wall you hit that forced a new approach.
        This is the dramatic peak of the story — the darkest-before-dawn
        moment that makes the epiphany meaningful.
      key_questions:
        - "What was the breaking point?"
        - "What made me realize my current approach could never work?"
        - "What emotion did I feel at the wall?"
        - "What was at stake if I did not find a solution?"
      organic_application: >
        The wall is where tension peaks. In a reel, this is where the viewer
        is most engaged. In a carousel, this is the slide where they keep
        swiping. Build it up. Make the audience feel the weight.
      example: >
        "Then one day I looked at my analytics and realized something
        devastating: my content was getting seen. People were watching. They
        just were not following, engaging, or caring. The problem was not
        visibility. It was resonance."

    element_4_epiphany:
      name: "The Epiphany"
      description: >
        The breakthrough moment. The insight that changed everything. This is
        the core of the bridge — the moment you want to recreate in your
        audience's mind. It must feel like a revelation, not a lecture.
      key_questions:
        - "What did I suddenly realize?"
        - "What shifted in my understanding?"
        - "How did this new belief change my approach?"
        - "Why had I not seen this before?"
      organic_application: >
        The epiphany is your thesis statement delivered as an emotional moment.
        It should feel like a lightbulb, not a textbook. Pause after stating
        it. Let it land.
      example: >
        "That is when it hit me: I was creating content about what I wanted to
        talk about, not what my audience needed to hear. I was the main character
        of my content when my audience should have been. The moment I flipped
        that — everything changed."

    element_5_plan_and_achievement:
      name: "The Plan / The Achievement"
      description: >
        What you did with the epiphany and what happened as a result. This is
        the proof. The audience has now felt the emotional journey — now show
        them it worked. Then connect it to them.
      key_questions:
        - "What did I change based on this new belief?"
        - "What specific results did I achieve?"
        - "How quickly did results appear?"
        - "What does this mean for the audience?"
      organic_application: >
        End with proof and a bridge to the audience. Show results, then
        explicitly connect it to their situation. The CTA should feel like
        a natural next step, not a pitch.
      example: >
        "I rewrote my entire content strategy around my audience's top 5
        problems. Within 60 days: 12,000 new followers, 340 email subscribers,
        and 28 paying customers. All organic. No ads. If this resonates with
        you, save this post — because this framework is the same one I used."

  epiphany_bridge_for_short_form:
    reel_structure:
      seconds_0_to_3: "Hook from the backstory or epiphany"
      seconds_3_to_10: "Compressed backstory and journey"
      seconds_10_to_20: "The wall and the epiphany moment"
      seconds_20_to_30: "The result and bridge to audience"
      seconds_30_to_45: "CTA or deeper teaching"

    carousel_structure:
      slide_1: "Hook headline (epiphany or backstory)"
      slide_2: "The backstory (where I was)"
      slide_3: "The journey and the wall (what I tried, what failed)"
      slide_4: "The epiphany (the insight that changed everything)"
      slide_5_to_7: "The plan (what to do with this insight)"
      slide_8: "The results (proof it works)"
      slide_9_to_10: "CTA and bridge to audience"

    thread_structure:
      tweet_1: "Hook from epiphany or result"
      tweet_2_to_3: "Backstory and journey"
      tweet_4: "The wall"
      tweet_5: "The epiphany"
      tweet_6_to_8: "The plan (actionable steps)"
      tweet_9: "Results and proof"
      tweet_10: "CTA and bridge"

  multiple_epiphany_bridges:
    concept: >
      One epiphany bridge sells the core belief. But prospects often have
      multiple false beliefs blocking them. Each false belief needs its own
      epiphany bridge. Brunson identifies three categories of false beliefs
      that need breaking.
    false_belief_categories:
      vehicle: >
        "This method/product will not work." The prospect doubts your specific
        solution. Epiphany bridge needed: story proving the method works.
      internal: >
        "I cannot do this." The prospect doubts their own ability. Epiphany
        bridge needed: story of someone like them who succeeded.
      external: >
        "Something outside my control prevents this." The prospect blames
        circumstances. Epiphany bridge needed: story overcoming external
        obstacles.
    organic_application: >
      Build a content library that addresses all three false belief categories.
      Rotate through vehicle, internal, and external epiphany bridges in your
      content calendar. Over time, you systematically dismantle every objection.

# =============================================================================
# SECTION 5: SOAP OPERA SEQUENCES (Content Series Framework)
# =============================================================================

soap_opera_sequence:
  framework_name: "Soap Opera Sequence"
  source_quote: >
    "When somebody joins your list for the first time, it's essential that
    you quickly build a bond between them and the Attractive Character. The
    way you introduce your character can mean the difference between a
    subscriber opening your emails consistently or hitting the delete key."
  source_quote_on_structure: >
    "I built out a simple, five-day Soap Opera Sequence that I send out
    when someone joins my list. The key to making this sequence work (just
    like a soap opera) is you have to open and close loops that will drag
    your reader from one email to the next."
  source_quote_on_attribution: >
    "I learned a concept called the Soap Opera Sequence from one of my
    friends, Andre Chaperon."
  core_concept: >
    Named after TV soap operas that keep viewers coming back daily, this
    framework structures a sequence of content (email, social, or video)
    that builds tension, delivers value, and creates anticipation for the
    next installment. Each piece ends on a cliffhanger that compels the
    audience to return.

  origin: >
    Originally designed for email sequences sent to new subscribers, the
    Soap Opera Sequence is equally powerful for social media content series,
    story arcs, and multi-part content campaigns. The structure creates
    narrative momentum that turns passive followers into active engagers.

  the_five_episodes:

    episode_1_setting_the_stage:
      name: "Setting the Stage"
      source_quote: >
        "Email #1: Set the Stage. This is the first email, a thank you note,
        that people receive the minute they sign up for your list. It sets
        the stage for the emails to come and lets people know what to expect.
        Are you going to email them once a day, twice a day, or once a week?
        For this first sequence, I recommend once a day for the best results."
      purpose: >
        Introduce yourself, establish what is coming, and create intrigue.
        The audience should know a journey is about to begin and feel
        compelled to follow along.
      key_elements:
        - "Open a story loop (promise something valuable is coming)"
        - "Establish your credibility briefly"
        - "Hint at a transformation or discovery"
        - "Create curiosity about what happens next"
      do_not:
        - "Give away the full framework yet"
        - "Start teaching immediately"
        - "Be boring or generic"
        - "Make it about you instead of them"
      organic_content_format:
        caption: >
          "Something changed in my business 6 months ago that doubled my
          revenue in 90 days. I have never shared this publicly. Over the
          next 5 days, I am going to break down exactly what happened.
          Follow and turn on notifications — you do not want to miss
          tomorrow's post."
        reel: >
          Open with the result (the end of the story), then say 'Let me
          tell you how this happened. Part 1 of 5.' End with a teaser
          for part 2.
      email_version: >
        Subject line: "Something I have never shared before..."
        Body: Brief intro, hint at the discovery, promise to share the
        full story over the next few emails, open a loop.

    episode_2_high_drama_backstory:
      name: "High Drama / Backstory"
      source_quote: >
        "Email #2: Open with High Drama... I learned from Daegan Smith that
        you ALWAYS start any good story at the point of high drama. Most
        people mistakenly start their stories at the beginning, but usually
        stories don't get good until the middle, so it's better to start
        at the good part, and then you can go back and fill in the backstory
        after readers are hooked."
      purpose: >
        Take the audience back to your lowest moment. Build empathy and
        tension. This is the emotional foundation of the sequence — they
        need to FEEL what you felt before the breakthrough.
      key_elements:
        - "Go deep into the backstory (specific details)"
        - "Build emotional connection through vulnerability"
        - "Show the pain, frustration, or crisis clearly"
        - "End with a cliffhanger: you are at the wall"
      dramatic_elements:
        - "Specific numbers (debt amounts, time wasted, opportunities lost)"
        - "Physical sensations (the sinking feeling, the sleepless nights)"
        - "Emotional stakes (what you stood to lose)"
        - "Failed attempts (everything you tried that did not work)"
      organic_content_format:
        caption: >
          "Day 2/5: The Breaking Point. In March 2023, I looked at my bank
          account and saw $1,247. My rent was $2,400. I had spent $15,000 on
          courses and tools. I had tried every strategy the gurus recommended.
          None of it worked. I was 72 hours from shutting everything down and
          going back to a 9-to-5. Then something unexpected happened. I will
          tell you what it was tomorrow."
        reel: >
          Film yourself telling the story with raw emotion. Use cuts to
          emphasize key moments. End mid-sentence or with 'What happened
          next changed everything. Part 3 tomorrow.'

    episode_3_the_epiphany:
      name: "The Epiphany"
      source_quote: >
        "Email #3: Epiphany. Now it's time to start bringing in the dawn.
        You have an epiphany. You realize something you hadn't thought of
        before. Maybe it's something that was right in front of you the
        whole time. It's the moment that everything turned around for you.
        By now the reader is so hooked in, they want to know (and hopefully
        buy) your solution."
      purpose: >
        Deliver the core breakthrough. This is the payoff for the tension
        built in episodes 1 and 2. The audience should feel the same
        lightbulb moment you experienced.
      key_elements:
        - "Reveal the epiphany clearly and memorably"
        - "Connect it to a framework or method they can use"
        - "Show the immediate impact of the new understanding"
        - "Build credibility by sharing the principle behind the insight"
      organic_content_format:
        caption: >
          "Day 3/5: The Moment Everything Changed. I was scrolling through
          the accounts I admired and I noticed something none of the courses
          taught: every single successful creator was doing ONE thing
          differently. [Reveal the insight]. The moment I understood this,
          I knew exactly what to change. Tomorrow I will break down the
          hidden benefits of this approach that most people never see."
        carousel: >
          Slide 1: 'The breakthrough nobody taught me' — Slide 2-3: The
          epiphany explained — Slide 4-6: Why it works (the principle) —
          Slide 7: Results preview — Slide 8: 'Tomorrow: the hidden
          benefits you will not expect'

    episode_4_hidden_benefits:
      name: "Hidden Benefits"
      source_quote: >
        "Email #4: Hidden Benefits. In this email, you want to point out
        benefits the reader is getting by knowing you and following your
        plan or by using your product. You want to focus on benefits that
        probably aren't as obvious... Often, it's the hidden benefits that
        really grab the reader and move them to take action."
      purpose: >
        Show the secondary and unexpected benefits of the epiphany. These
        are the results and advantages that go beyond the obvious — the
        things you did not expect when you first made the change.
      key_elements:
        - "Share 3-5 benefits they did not expect"
        - "Each benefit should address a different pain point"
        - "Use specific examples and results for each"
        - "Create desire by showing the full scope of transformation"
      organic_content_format:
        caption: >
          "Day 4/5: What I Did Not Expect. When I implemented [the method],
          the obvious result was [primary benefit]. But here is what surprised
          me: Benefit 1 — [specific unexpected result]. Benefit 2 — [another
          unexpected result]. Benefit 3 — [the most surprising result].
          Tomorrow is the final part. I am going to give you the exact
          step-by-step so you can implement this today."
        carousel: >
          Each slide = one hidden benefit with a specific example. Final
          slide teases the full implementation guide coming in part 5.

    episode_5_urgency_and_cta:
      name: "Urgency and CTA"
      source_quote: >
        "Email #5: Urgency and CTA. This is usually the last email in my
        Soap Opera Sequence. It's NOT the last email I send people, it's
        just the end of my introduction. The goal is to give the reader
        one last push to go take action right now. You do that by adding
        urgency into the equation and then using a call to action (CTA)...
        Whatever the reason, it needs to be real. Fake urgency will backfire
        on you, and you'll lose all credibility."
      purpose: >
        Close the sequence with urgency and a clear call to action. The
        audience has been on a journey — now direct them to the next step.
        This is where story meets strategy.
      key_elements:
        - "Recap the journey briefly (1-2 sentences)"
        - "Restate the transformation available"
        - "Create urgency (why NOW matters)"
        - "Deliver a clear, specific call to action"
        - "Address the final objection"
      urgency_types:
        natural_urgency: "The window for this approach is closing as the market shifts"
        scarcity_urgency: "I can only take 10 people through this process at a time"
        cost_of_inaction: "Every day you wait is another day of [pain point]"
        momentum_urgency: "You have the knowledge now — the gap is implementation"
      organic_content_format:
        caption: >
          "Day 5/5: Your Next Move. Over the past 5 days I shared the
          framework that took me from [before] to [after]. Here is the
          full breakdown: [Summarize key steps]. Now you have two options.
          Option 1: Implement this yourself (everything you need is in
          this series). Option 2: [Your offer — course, coaching, lead
          magnet]. Comment 'READY' and I will send you the [resource/link]."

  adapting_soap_opera_for_social_media:
    instagram_stories:
      description: "5-day story arc using 3-5 story frames per day"
      tips:
        - "Use polls and questions to increase engagement each day"
        - "Save completed series as a highlight"
        - "Cross-promote in feed posts"
        - "Use countdown sticker for the final episode"
    instagram_reels:
      description: "5-part reel series, one per day"
      tips:
        - "Number each part clearly in the hook"
        - "End each reel with a specific teaser for the next"
        - "Pin the series to your profile grid"
        - "Use the same audio or visual style for series cohesion"
    twitter_x_threads:
      description: "5 threads over 5 days, or one mega-thread"
      tips:
        - "Quote-tweet each day's thread from the previous one"
        - "Use a consistent hashtag for the series"
        - "Final thread includes the CTA"
        - "Bookmark-worthy content in each thread"
    youtube:
      description: "5-part video series or one long-form video with chapter markers"
      tips:
        - "End each video with a teaser and card to the next"
        - "Playlist the series together"
        - "Final video is the full framework + CTA"
        - "Community post to tease each new episode"

# =============================================================================
# SECTION 6: FUNNEL TYPES (Adapted for Organic Content Strategy)
# =============================================================================

funnel_types:
  framework_name: "Core Funnel Architectures"
  source_quote: >
    "I have seven tested and proven funnels that I use all the time with
    my mastermind clients and with my own companies. We use them over and
    over and over again, and they work."
  source_quote_on_frontend_vs_backend: >
    "Cold traffic is probably only aware of the problem they are facing...
    so they need to start at the front of the Value Ladder with a low-level
    funnel, like a Free-Plus-Shipping or Self-Liquidating-Offer Funnel...
    Hot traffic already knows you, likes you, and trusts you. They know
    your products, so it's time to direct them to the backend."
  organic_adaptation_principle: >
    Brunson's funnels were designed for paid traffic and landing pages. When
    adapted for organic content, the funnel structure remains but the medium
    changes. Landing pages become content pieces. Traffic sources become
    platform algorithms. The psychology and sequencing are identical.

  funnel_1_lead_squeeze:
    name: "Lead Squeeze Funnel"
    original_purpose: "Capture email addresses through a landing page with a lead magnet"
    organic_adaptation: "Content-to-Email Pipeline"
    structure:
      step_1_traffic:
        original: "Paid ads drive to landing page"
        organic_version: "High-value content drives to CTA"
        content_types:
          - "Framework carousels with 'DM me GUIDE for the full checklist' CTA"
          - "Reels that teach a concept with 'link in bio for the complete template'"
          - "Threads that end with 'I put this into a free PDF — reply SEND'"
      step_2_squeeze_page:
        original: "Landing page with email opt-in form"
        organic_version: "DM automation or link-in-bio landing page"
        implementation:
          - "ManyChat or similar tool for DM keyword automation"
          - "Simple landing page through Carrd, Linktree, or custom build"
          - "Email capture through ConvertKit, Mailchimp, or Beehiiv"
      step_3_thank_you:
        original: "Thank-you page with next step"
        organic_version: "Automated delivery message with value ladder CTA"
        implementation:
          - "DM delivers lead magnet + introduces core offer"
          - "Email welcome sequence begins (Soap Opera Sequence)"
          - "Thank-you page offers tripwire product"
    conversion_points:
      - "Content view to profile visit"
      - "Profile visit to link click"
      - "Link click to email submission"
      - "Email submission to welcome sequence open"
    metrics_to_track:
      - "Content reach to profile visit ratio"
      - "Profile visit to link click ratio"
      - "Landing page conversion rate"
      - "Email list growth rate"
      - "Welcome sequence open and click rates"

  funnel_2_survey:
    name: "Survey Funnel"
    original_purpose: "Segment audience through questions, then present tailored offers"
    organic_adaptation: "Audience Segmentation Pipeline"
    structure:
      step_1_trigger:
        original: "Ad or landing page with quiz/survey"
        organic_version: "Interactive content that segments audience"
        content_types:
          - "Instagram story polls and question stickers"
          - "Quiz-style carousels ('Which type are you?')"
          - "Comment-to-segment posts ('Comment A if X, B if Y')"
          - "Twitter polls that reveal audience composition"
      step_2_segmentation:
        original: "Survey results route to different offer pages"
        organic_version: "Responses inform content and offer targeting"
        implementation:
          - "Track poll/quiz responses to understand audience segments"
          - "Use comment keywords to tag and segment followers"
          - "Create content series for each identified segment"
          - "Tailor DM conversations based on self-identified segment"
      step_3_tailored_offer:
        original: "Customized sales page per segment"
        organic_version: "Segment-specific content and CTAs"
        implementation:
          - "Different lead magnets for different segments"
          - "Content streams that speak to specific pain points"
          - "DM scripts tailored to each segment's needs"
          - "Offer positioning adjusted by segment"
    organic_segmentation_strategies:
      - strategy: "The 'Which One Are You?' carousel"
        description: >
          Create a carousel that describes 3-4 archetypes in your niche.
          Ask audience to comment which one they are. This reveals their
          self-identified segment and creates engagement.
        example: >
          "The 4 Types of Content Creators: The Perfectionist (posts rarely,
          everything polished), The Grinder (posts constantly, rarely stops
          to optimize), The Strategist (plans everything, executes slowly),
          The Natural (posts intuitively, inconsistent results). Which one
          are you? Comment below."
      - strategy: "Story poll sequences"
        description: >
          Run 5-7 story polls in a row that progressively narrow down the
          audience's situation and needs. Use results to inform content.
        example: >
          "Poll 1: Do you post daily? Poll 2: Do you have an email list?
          Poll 3: Have you made money from your content? Poll 4: What is your
          biggest struggle — ideas, consistency, or conversion?"

  funnel_3_webinar:
    name: "Webinar Funnel"
    source_quote: >
      "I like to sell these mid-priced offers using a Perfect Webinar
      Funnel, Invisible Funnel, or Product-Launch Funnel. Each of these
      takes the time to go into more detail about the solution you're
      providing with your product."
    original_purpose: "Drive registrations to a 60-90 minute presentation that sells"
    organic_adaptation: "Live Content Strategy"
    structure:
      step_1_registration:
        original: "Registration page for scheduled webinar"
        organic_version: "Announcement content building anticipation for live event"
        content_types:
          - "Instagram Live announcement posts (3-5 days before)"
          - "Story countdown sequences"
          - "Teaser reels showing what will be covered"
          - "Email to list with registration details"
      step_2_the_live_event:
        original: "90-minute webinar with teaching and pitch"
        organic_version: "Instagram/YouTube/TikTok Live with value and CTA"
        implementation:
          - "45-60 minute live with structured teaching"
          - "Follow the Perfect Webinar framework (see below)"
          - "Engage with live comments throughout"
          - "End with clear offer and CTA"
      step_3_follow_up:
        original: "Email replay sequence to non-buyers"
        organic_version: "Replay content and follow-up series"
        implementation:
          - "Post replay to YouTube or IGTV"
          - "Create highlight reel clips from the live"
          - "Follow-up content addressing questions from the live"
          - "DM attendees who engaged but did not convert"
    perfect_webinar_framework_adapted:
      opening:
        - "Big promise (what they will learn)"
        - "Credibility (brief qualification)"
        - "Future pace (what life looks like after implementing)"
      content_section:
        secret_1: "Break false belief about the VEHICLE (your method works)"
        secret_2: "Break false belief about INTERNAL ability (they can do it)"
        secret_3: "Break false belief about EXTERNAL factors (nothing will stop them)"
      the_stack:
        - "List everything they get"
        - "Assign value to each component"
        - "Stack total value against price"
        - "Make the offer feel like a no-brainer"
      the_close:
        - "Restate the transformation"
        - "Address final objections"
        - "Create urgency"
        - "Clear CTA with specific instructions"

  funnel_4_product_launch:
    name: "Product Launch Funnel"
    original_purpose: "Build anticipation and launch with concentrated buying pressure"
    organic_adaptation: "Content Campaign Launch Strategy"
    structure:
      pre_launch_phase:
        duration: "2-4 weeks before launch"
        purpose: "Build anticipation, seed the problem, grow the waitlist"
        content_strategy:
          week_1:
            - "Problem-aware content (agitate the pain your product solves)"
            - "Behind-the-scenes of product creation (build anticipation)"
            - "Polls and questions to involve audience in the creation process"
          week_2:
            - "Framework content that previews the methodology"
            - "Testimonials from beta users or early access"
            - "Waitlist promotion with exclusive bonuses"
          week_3:
            - "Case study content showing the transformation"
            - "FAQ content addressing objections preemptively"
            - "Scarcity signals (limited spots, early-bird pricing ends)"
          week_4:
            - "Final countdown content"
            - "Detailed breakdown of what is included"
            - "Live Q&A or webinar for final conversions"
      launch_phase:
        duration: "3-7 days"
        purpose: "Concentrated selling with urgency"
        content_strategy:
          - "Launch announcement post (all platforms)"
          - "Story takeover with live reactions and sales updates"
          - "Testimonial blitz from early buyers"
          - "Daily content addressing specific objections"
          - "Countdown to cart close"
      post_launch_phase:
        duration: "1-2 weeks after"
        purpose: "Maximize late conversions and build case studies"
        content_strategy:
          - "Last-chance content (if applicable)"
          - "Buyer celebration and community welcoming"
          - "Early results sharing from buyers"
          - "Lessons learned and behind-the-scenes of the launch"
          - "Seed the next launch or evergreen path"

# =============================================================================
# SECTION 7: THE STACK AND CLOSE (Offer Presentation Framework)
# =============================================================================

stack_and_close:
  framework_name: "The Stack and Close"
  source_quote: >
    "I consider The Stack my secret weapon. I learned it from one of my
    mentors, Armand Morin. I saw him speak on stage and close nearly half
    the room with almost no effort... I started using it immediately, and
    I went from closing on average 5-10% of a room to consistently
    closing 20% or more."
  source_quote_on_principle: >
    "Armand taught me that the only thing your prospect remembers when
    you sell is the last thing you showed him... So, Armand builds a
    presentation slide called a Stack Slide. This slide has everything
    included in the offer, presented in a long, bulleted list... He keeps
    doing this throughout the entire close. When he gets to that last part
    of the offer, he shows the final stack slide, with EVERYTHING listed,
    and recaps everything on that slide. Then, he finally introduces the
    price."
  core_concept: >
    The Stack is how you present your offer so the value feels overwhelming
    compared to the price. Instead of stating a single price for a single
    product, you stack every component of the offer with its individual value,
    total them up, then reveal a price that is a fraction of the stack total.

  the_stack_methodology:
    principle: >
      Humans judge value in comparison. If you say "this course costs $497,"
      the brain asks "is $497 worth it?" If you say "you get Component A
      (worth $997), Component B (worth $497), Component C (worth $297),
      Bonus 1 (worth $197), and Bonus 2 (worth $97) — total value $2,085 —
      for just $497," the brain says "that is 76% off."
    components:
      core_offer:
        description: "The main product or service"
        value_justification: "What would it cost to get this result without you?"
      bonus_1:
        description: "A complementary resource that accelerates results"
        value_justification: "What would this cost if sold separately?"
      bonus_2:
        description: "A tool, template, or shortcut that saves time"
        value_justification: "How much time (= money) does this save?"
      bonus_3:
        description: "Access to community, support, or coaching"
        value_justification: "What would similar access cost elsewhere?"
      guarantee:
        description: "Risk reversal that eliminates buyer's risk"
        value_justification: "Priceless — removes the fear of wasting money"

  organic_content_application:
    principle: >
      You cannot do a hard stack in every piece of content. But you CAN use
      stack principles to present value in organic content that naturally
      leads to your offer.
    tactics:
      value_demonstration_posts:
        description: >
          Create content that IS one component of your stack. When you teach
          a framework from your course for free, you are demonstrating one
          layer of value. The audience thinks: "If this one piece is this
          valuable, the full thing must be incredible."
        example: >
          "This framework alone is Module 3 of my 12-module program. Here it
          is for free. Imagine what the other 11 modules contain."
      the_organic_stack_post:
        description: >
          A post or carousel that breaks down everything someone gets when
          they work with you, with value assigned to each component.
        structure:
          - "Slide 1: The transformation promise"
          - "Slide 2-6: Each component with its standalone value"
          - "Slide 7: Total value stacked"
          - "Slide 8: Actual price (feels like a steal)"
          - "Slide 9: CTA with urgency"
      story_stack_sequence:
        description: >
          Over 3-5 stories, reveal one component at a time with its value.
          Build the stack in real-time.
        structure:
          - "Story 1: 'Let me show you what you get inside [offer]'"
          - "Story 2-4: One component per story with value"
          - "Story 5: Full stack total vs actual price"
          - "Story 6: CTA with swipe-up or DM keyword"

  urgency_and_scarcity_in_organic:
    principle: >
      Urgency and scarcity work only when they are REAL. Fake scarcity
      destroys trust permanently. In organic content, use natural urgency
      and legitimate scarcity.
    legitimate_scarcity_types:
      cohort_based: "Limited enrollment windows for live programs"
      capacity_based: "Genuine limits on coaching spots or community size"
      pricing_based: "Legitimate price increases based on added value"
      bonus_based: "Time-limited bonuses for early action"
    urgency_in_content:
      - "Countdown content for enrollment windows"
      - "Real-time updates on remaining spots"
      - "Stories showing enrollment progress"
      - "Behind-the-scenes of preparation for the next cohort"
    what_to_avoid:
      - "Evergreen 'last chance' messaging (audiences catch on)"
      - "Fake limited spots that never run out"
      - "Countdown timers that reset"
      - "Pressure tactics that create buyer's remorse"

# =============================================================================
# SECTION 8: TRAFFIC TEMPERATURE (Content Strategy by Awareness Level)
# =============================================================================

traffic_temperature:
  framework_name: "Traffic Temperature Model"
  source_quote: >
    "The first phase to examine is the mindset of the traffic before it
    reaches your site—or, your traffic temperature. You may not ever think
    about it, but there are three levels of traffic that come to your
    website: hot, warm, and cold. Each group needs special treatment and
    individualized communication. Each needs to come across a different
    bridge to arrive at your landing page."
  source_quote_gene_schwartz: >
    "Here is a quote from Gene Schwartz that helped me to understand hot
    vs. warm and cold traffic and how you must communicate differently with
    each type: 'If your prospect is aware of your product and has realized
    it can satisfy his desire, your headline starts with the product. If he
    is not aware of your product, but only of the desire itself, your
    headline starts with the desire. If he is not yet aware of what he
    really seeks, but is concerned with the general problem, your headline
    starts with the problem and crystallizes it into a specific need.'"
  core_concept: >
    Not all audience members are at the same stage of awareness. Brunson
    categorizes traffic as hot, warm, or cold — and each temperature requires
    different content strategies. Organic content must serve all three
    simultaneously.

  hot_traffic:
    definition: "People who already know you, like you, and trust you"
    source_quote: >
      "Hot Traffic is made up of people who already know who you are.
      They're on your email list, they subscribe to your podcast, they read
      your blog—you have an established relationship with them. You're going
      to talk to these people like they're your friends (because they are)."
    characteristics:
      - "Existing followers who engage regularly"
      - "Email subscribers who open your messages"
      - "Previous customers and clients"
      - "Community members and inner circle"
    content_strategy:
      - "Direct offers and CTAs (they are ready to buy)"
      - "Behind-the-scenes and exclusive content (reward loyalty)"
      - "New product announcements (they are first buyers)"
      - "Referral requests (they are your best advocates)"
    percentage_of_content: "10-15% (conversion-focused)"

  warm_traffic:
    definition: "People who know of you but have not built deep trust yet"
    source_quote: >
      "Warm Traffic consists of people who don't know you, but they have a
      relationship with somebody you know. This is where joint venture (JV)
      partnerships work well. Affiliates or JV partners have relationships
      with their lists, and they endorse you or your offer to their
      subscribers."
    characteristics:
      - "Recent followers who are still evaluating"
      - "People who found you through referrals or collaborations"
      - "Occasional engagers who are not yet committed"
      - "People who have consumed some content but not opted in"
    content_strategy:
      - "Value-dense educational content (prove your expertise)"
      - "Social proof and case studies (build credibility)"
      - "Personal stories (build connection and trust)"
      - "Lead magnet offers (move to email where you control the relationship)"
    percentage_of_content: "35-40% (trust-building)"

  cold_traffic:
    definition: "People who have never heard of you"
    source_quote: >
      "Cold Traffic is made up of people who have no idea who you are. They
      don't know what you offer or whether they can trust you. These may be
      people you find on Facebook or who click on your pay-per-click ads...
      it's important to pre-frame them correctly to get the highest return
      on your investment."
    characteristics:
      - "Reached through algorithm distribution (Explore, For You, Reels)"
      - "Discovered through hashtags or search"
      - "First-time viewers from shares or collaborations"
      - "Completely unaware of your existence"
    content_strategy:
      - "Viral-optimized hooks (stop the scroll)"
      - "Pattern interrupts and contrarian takes (stand out)"
      - "Quick wins and actionable value (prove worth immediately)"
      - "Strong bio and profile optimization (convert visitors to followers)"
    percentage_of_content: "45-55% (reach and discovery)"

  temperature_progression: >
    The goal is to move cold traffic to warm, warm to hot, and hot to buyer.
    Content should serve all three temperatures simultaneously. A single piece
    can attract cold traffic (through the hook), build trust with warm traffic
    (through the body), and convert hot traffic (through the CTA).

# =============================================================================
# SECTION 9: APPLICATION TO ENGINE SKILLS
# =============================================================================

engine_skill_applications:

  S04_content_architecture:
    teaching_application: >
      The Value Ladder directly informs content architecture. Every content
      plan must serve a specific rung of the value ladder. Use Brunson's
      Secret Formula to define the dream customer before architecting any
      content system.
    specific_applications:
      - "Map each content pillar to a specific value ladder rung"
      - "Use traffic temperature to determine content mix ratios"
      - "Structure content calendars around soap opera sequences"
      - "Build content series that follow the Epiphany Bridge framework"
      - "Design content-to-offer bridges for each funnel type"

  S07_campaign_brief:
    teaching_application: >
      Campaign briefs should incorporate Brunson's Product Launch Funnel
      structure. Every campaign is a micro-launch with pre-launch, launch,
      and post-launch phases.
    specific_applications:
      - "Include value ladder position in every campaign brief"
      - "Define which false beliefs the campaign addresses"
      - "Map campaign content to funnel stages"
      - "Include soap opera sequence structure for multi-day campaigns"
      - "Specify traffic temperature targets for each content piece"

  S08_script_writing:
    teaching_application: >
      Scripts should follow the Epiphany Bridge structure. Every script is
      a story that bridges the audience from false belief to new belief.
    specific_applications:
      - "Open scripts with backstory elements"
      - "Build to the wall/problem moment"
      - "Deliver the epiphany as the core teaching"
      - "Close with plan and achievement (proof + CTA)"
      - "Use Attractive Character identity type to set the tone"

  S09_caption_writing:
    teaching_application: >
      Captions should use storyline types from the Attractive Character
      framework. Each caption is a mini-epiphany bridge.
    specific_applications:
      - "Rotate through the six storyline types weekly"
      - "Open with backstory or epiphany hooks"
      - "Include character flaws for authenticity"
      - "Use polarity to create engagement and shareability"
      - "End with CTAs matched to traffic temperature"

  S10_carousel_design:
    teaching_application: >
      Carousels are ideal for the Epiphany Bridge and Stack frameworks.
      Each slide is a step in the bridge or a component of the stack.
    specific_applications:
      - "Slide 1 = Hook (backstory or epiphany)"
      - "Middle slides = Bridge (journey, wall, insight)"
      - "Final slides = Plan + CTA (achievement, next step)"
      - "Use stack methodology for offer-focused carousels"
      - "Survey funnel carousels for audience segmentation"

  S11_thread_writing:
    teaching_application: >
      Threads are the perfect format for complete Epiphany Bridges and
      compressed Soap Opera Sequences. Each tweet is a story beat.
    specific_applications:
      - "Tweet 1 = Hook from the epiphany or result"
      - "Build the bridge across 5-8 tweets"
      - "Final tweets = Plan, proof, and CTA"
      - "Use thread series for soap opera sequences"
      - "Attractive Character storylines as thread frameworks"

  S24_monetization_engine:
    teaching_application: >
      The entire DotCom Secrets framework IS a monetization engine. The
      value ladder is the revenue architecture. Funnels are the conversion
      mechanism. The Attractive Character is the trust engine.
    specific_applications:
      - "Build complete value ladders for each product line"
      - "Map content to funnel stages with conversion metrics"
      - "Use stack methodology for offer presentation content"
      - "Track value ladder progression (what percentage of customers ascend)"
      - "Design continuity offerings that lock in recurring revenue"
      - "Use Epiphany Bridges to break buying objections"

