# HORMOZI $100M LEADS TEACHING FILE
# Extracted from: "$100M Leads: How to Get Strangers To Want To Buy Your Stuff"
# Author: Alex Hormozi
# Extraction Date: March 2026

meta:
  author: alex_hormozi
  source_book: "$100M Leads"
  core_thesis: >
    Engaged leads are the true output of advertising. There are only four ways
    to get leads (Core Four), and you either do them yourself or get others to
    do them for you. The path to $100M+ requires mastering one method, then
    stacking lead getters who multiply your reach exponentially.
  skill_mappings:
    - S01_audience_intelligence
    - S04_content_architecture
    - S07_campaign_brief
    - S09_caption_writing
    - S11_thread_writing
    - S16_engagement_protocol

# =============================================================================
# SECTION 1: CORE DEFINITIONS
# =============================================================================

core_definitions:
  lead:
    definition: "A person you can contact"
    examples:
      - "Emails on a list"
      - "Phone numbers"
      - "Social media followers you can DM"
      - "People on the street"
    key_insight: "If you can contact them, they are leads"

  engaged_lead:
    definition: "A person who SHOWS interest in the stuff you sell"
    examples:
      - "Someone who gives contact info on website"
      - "Someone who follows and engages with your content"
      - "Someone who replies to your campaign"
      - "Someone who books a call"
    key_insight: "Engaged leads are the true output of advertising"

  value_equation:
    formula: "(Dream Outcome × Perceived Likelihood) / (Time Delay × Effort & Sacrifice)"
    application: "Maximize the top, minimize the bottom"
    components:
      dream_outcome: "What result do they want?"
      perceived_likelihood: "Do they believe it will work for THEM?"
      time_delay: "How fast do they get results?"
      effort_and_sacrifice: "What do they have to do/give up?"

# =============================================================================
# SECTION 2: THE CORE FOUR (4 Ways to Get Leads)
# =============================================================================

core_four:
  framework_name: "The 2×2 Advertising Matrix"
  principle: >
    There are only four ways to let people know about what you sell. Everything
    else is a combination or variation of these four methods.

  matrix:
    rows:
      - name: "1-to-1"
        description: "Reaching out to one person at a time"
      - name: "1-to-Many"
        description: "Broadcasting to many at once"
    columns:
      - name: "Warm Audience"
        description: "People who know you"
      - name: "Cold Audience"
        description: "People who don't know you"

  quadrants:
    warm_outreach:
      position: "1-to-1 × Warm"
      definition: "Reaching out privately to people who know you"
      cost: "Free (time only)"
      speed: "Immediate results possible"
      volume: "Limited by network size initially"
      best_for: "Starting from zero, testing offers, building momentum"

    post_free_content:
      position: "1-to-Many × Warm"
      definition: "Communicating publicly to build an engaged audience"
      cost: "Free (time only)"
      speed: "Slow build (3-24 months)"
      volume: "Unlimited ceiling once audience builds"
      best_for: "Long-term leverage, compounding returns, authority"

    cold_outreach:
      position: "1-to-1 × Cold"
      definition: "Reaching out privately to people who don't know you"
      cost: "Money (lists, tools, automation)"
      speed: "Fast results when dialed in"
      volume: "Unlimited with budget"
      best_for: "Scaling quickly, B2B, high-ticket offers"

    paid_ads:
      position: "1-to-Many × Cold"
      definition: "Communicating to people who don't know you"
      cost: "Money (ad spend)"
      speed: "Immediate traffic, 3-6 months to optimize"
      volume: "Unlimited with budget"
      best_for: "Scaling proven offers, reaching cold audiences at scale"

  key_insight: >
    The advertising methods that take less money take more time, and vice versa.
    Pick one method to start. Master it before adding another. Most businesses
    fail because they switch methods after a few losses instead of sticking with
    one until it works.

  organic_application:
    - "Warm outreach and free content are the two organic methods"
    - "Start with warm outreach to validate offer, then add content for leverage"
    - "Content compounds—one piece can generate leads forever"
    - "Warm outreach is finite; content is infinite"

# =============================================================================
# SECTION 3: WARM OUTREACH (10-Step System)
# =============================================================================

warm_outreach:
  framework_name: "The 10-Step Warm Outreach Framework"
  principle: >
    Your warm network is finite but powerful. People who know you are 4-10x more
    likely to respond and engage. Start here to validate your offer before scaling.

  ten_steps:
    step_1:
      name: "Get Your List"
      action: "Compile ALL contacts"
      sources:
        - "Phone contacts"
        - "Social media connections"
        - "Email contacts"
        - "Past customers"
        - "Alumni networks"
        - "Community memberships"
      minimum: "100 names to start"

    step_2:
      name: "Pick a Platform"
      action: "Start where you have most contacts"
      options:
        - "Email"
        - "SMS/Text"
        - "DMs (Instagram, LinkedIn, Facebook)"
        - "Phone calls"
      key: "Choose the platform with highest contact density"

    step_3:
      name: "Personalize Your Message"
      action: "Use the ACA Framework"
      aca_framework:
        acknowledge: "Reference how you know them or what they've been up to"
        compliment: "Genuine praise about something specific"
        ask: "Open-ended question that starts conversation (not a pitch)"
      example: >
        "Hey [Name]! Saw you just launched that new project—congrats, it looks
        amazing. How's business going these days?"

    step_4:
      name: "Reach Out"
      action: "100 reach outs per day until booked"
      key: "Volume is non-negotiable"

    step_5:
      name: "Warm Them Up"
      action: "Remind them who you are, ask about them first"
      key: "Build rapport before any pitch"

    step_6:
      name: "Ask for Referrals"
      action: "Even if they say no, ask for introductions"
      script: "Do you know anyone who might be interested?"
      key: "Every conversation should produce leads OR referrals"

    step_7:
      name: "Make Your Offer"
      action: "Free trial, sample, or low barrier entry"
      key: "Use Value Equation elements"

    step_8:
      name: "Handle Objections"
      common_objections:
        - "Time"
        - "Money"
        - "Need to check with decision-maker"
        - "Not sure if it's a fit"

    step_9:
      name: "Follow Up"
      action: "Until they buy or die (or tell you to stop)"
      key: "Takes 3-20 touches to convert"

    step_10:
      name: "Document and Iterate"
      action: "Track what works, refine your script"

  key_scripts:
    nine_word_email:
      template: "Are you still looking to [4 word desire]?"
      example: "Are you still looking to lose weight?"
      why_it_works: "Re-engages cold leads with minimal effort"

    aca_script:
      template: >
        "Hey [Name]! [ACKNOWLEDGE - something about them].
        [COMPLIMENT - genuine praise].
        [ASK - your question/offer]."

  benchmarks:
    inputs: "100 reach outs"
    replies: "20 replies (20%)"
    free_offers_accepted: "4 (4%)"
    customers: "1 (1%)"
    conversion_rate: "1% from reach out to customer"

# =============================================================================
# SECTION 4: COLD OUTREACH
# =============================================================================

cold_outreach:
  framework_name: "Volume × Personalization × Big Fast Value"

  three_problems:
    problem_1:
      name: "No Contact Info"
      solution: "Build or Buy Lists"
      methods:
        - software: "Apollo, ZoomInfo, LinkedIn Sales Navigator"
        - data_brokers: "Purchase targeted lists"
        - manual_research: "Elbow grease - find contacts yourself"

    problem_2:
      name: "They Ignore You"
      solution: "Personalization + Big Fast Value"
      tactics:
        - "Reference something specific about them"
        - "Lead with massive value upfront"

    problem_3:
      name: "They're Not Interested"
      solution: "Volume"
      key: "More attempts = more opportunities"

  personalization_framework:
    step_1: "RESEARCH - Find something unique about them"
    step_2: "REFERENCE - Mention it specifically"
    step_3: "RELATE - Connect it to your offer"
    step_4: "RECOMMEND - Suggest next steps"

  big_fast_value:
    principle: "Give them something valuable BEFORE asking for anything"
    examples:
      - "Free audit"
      - "Free analysis"
      - "Free sample"
      - "Quick win delivered upfront"
    psychology: "Make them feel indebted through value"

  benchmarks:
    conversion_rate: "3% of list should become engaged leads"
    key: "Scale with volume once system works"

# =============================================================================
# SECTION 5: CONTENT STRATEGY (Hook-Retain-Reward)
# =============================================================================

content_framework:
  framework_name: "Hook-Retain-Reward"
  principle: "Every piece of content has three parts that must work together"

  hook:
    purpose: "Stop the scroll. Grab attention. Create pattern interrupt."
    time_window: "1-3 seconds to hook them"

    topic_categories:
      - "Things that worked for you"
      - "Things that didn't work"
      - "Things you discovered"
      - "Current events/news in your niche"

    headline_components:
      recency: "Just discovered... Breaking..."
      relevancy: "Specific to their situation"
      celebrity: "Name drop (if applicable)"
      proximity: "Local/personal connection"
      conflict: "Controversy, tension"
      unusual: "Surprising, unexpected"
      ongoing: "Part of a series"

    formats:
      - "Lists ('7 ways to...')"
      - "How-to ('How to...')"
      - "Questions ('Are you making this mistake?')"

  retain:
    purpose: "Keep them watching/reading. Build anticipation."
    key_principle: "Every sentence earns the next sentence"

    retention_structures:
      lists: "Numbered points people can follow"
      steps: "Sequential process"
      stories: "Narrative with embedded questions"

    embedded_questions:
      technique: "Create curiosity gaps"
      examples:
        - "But what happened next changed everything..."
        - "The third thing surprised me most..."
        - "And then I realized..."

  reward:
    purpose: "Deliver the promised value. Create satisfaction AND desire for more."
    metric: "Value per second"

    requirements:
      - "Every moment must deliver value"
      - "Match or exceed expectations set by hook"
      - "End with clear next step"

  give_ask_ratio:
    minimum_sustainable: "3.5:1 (like TV with commercials)"
    better: "5:1 to 10:1"
    best: "Give until they ask"

    ask_strategies:
      integrated_asks:
        definition: "Weave offers naturally into content"
        example: "Speaking of X, we have a thing that helps with that..."
        feel: "Subtle, within-content mentions"

      intermittent_asks:
        definition: "Separate 'ask' posts between value posts"
        example: "Direct calls to action"
        feel: "Clear 'here's how to work with me' content"

  scaling_strategy:
    step_1: "Start on ONE platform"
    step_2: "Get it working (consistent engagement)"
    step_3: "Then expand to additional platforms"
    step_4: "Repurpose content across platforms"

# =============================================================================
# SECTION 6: PAID ADS (4-Step Process)
# =============================================================================

paid_ads:
  framework_name: "4-Step Paid Ads Process"

  step_1:
    name: "Pick a Platform"
    action: "Go where your audience is"
    key: "Start with ONE platform, master it before expanding"

  step_2:
    name: "Target Your Audience"
    targeting_options:
      - "Demographics"
      - "Interests"
      - "Behaviors"
      - "Lookalike audiences"

  step_3:
    name: "Make an Ad"
    structure: "Callout + Value + CTA"

    callouts:
      labels: "Attention business owners..."
      yes_questions: "Do you struggle with...?"
      if_then_statements: "If you're X, then Y"
      ridiculous_results: "How we got 100 clients in 30 days"

    what_who_when_framework:
      element_1: "What is it? (The product/service)"
      element_2: "Who is it for? (The avatar)"
      element_3: "What's the dream outcome?"
      element_4: "What increases likelihood of achievement?"
      element_5: "What decreases time delay?"
      element_6: "What decreases effort?"
      element_7: "What decreases sacrifice?"
      element_8: "What proof do you have?"

  step_4:
    name: "Get Contact Info"
    methods:
      - "Landing page"
      - "Lead magnet"
      - "Call booking"
      - "Direct message"

  three_phases:
    phase_1:
      name: "Track Money"
      action: "Set up tracking properly"
      key: "Know your numbers BEFORE spending"

    phase_2:
      name: "Lose Money"
      action: "Expect to lose money learning"
      key: "This is the 'tuition' phase"

    phase_3:
      name: "Print Money"
      action: "Once you crack the code, scale what works"

  key_metrics:
    ltgp_cac_ratio:
      minimum: "3:1 (you get $3 for every $1 spent)"
      good: "5:1+"
      rule: "If below 3:1, fix before scaling"

  client_financed_acquisition:
    goal: "Cover your CAC within the first 30 days"
    principle: "Front-end offers pay for acquisition, backend = profit"
    benefit: "Allows infinite scaling"

  budget_guidelines:
    - "Start small ($10-50/day)"
    - "Test creative, not just spend"
    - "80% budget to winners, 20% to tests"

# =============================================================================
# SECTION 7: LEAD MAGNETS (7-Step Framework)
# =============================================================================

lead_magnets:
  framework_name: "7-Step Lead Magnet Creation"
  definition: "A complete solution to a narrow problem"
  purpose: "Trade value for contact information"

  seven_steps:
    step_1:
      name: "Figure Out the Problem to Solve and WHO to Solve It For"
      actions:
        - "Be specific about your avatar"
        - "Identify their #1 problem"
        - "Solve something narrow but completely"

    step_2:
      name: "Figure Out HOW to Solve It"
      three_types:
        reveal_problems:
          description: "Quizzes, assessments, audits"
          mechanism: "Show them what's wrong"
          outcome: "Create awareness of need"

        samples_trials:
          description: "Free taste of your thing"
          mechanism: "Let them experience value"
          outcome: "Try before you buy"

        one_step_of_multi:
          description: "Give step 1 of your 5-step process"
          mechanism: "Creates desire for remaining steps"
          outcome: "Logical progression to paid offer"

    step_3:
      name: "Figure Out How to DELIVER It"
      four_vehicles:
        software: "Tools, calculators, apps"
        information: "PDFs, videos, courses"
        services: "Calls, audits, consultations"
        physical_products: "Samples, books, kits"

    step_4:
      name: "Test What to NAME It"
      formula: "[Result] + [Timeframe] + [Objection Handler]"
      examples:
        - "The 5-Day Fat Loss Challenge (No Exercise Required)"
        - "How to Get 10 Clients in 30 Days (Even If You're New)"
      key: "Test multiple names - this matters more than most think"

    step_5:
      name: "Make It EASY to Consume"
      principles:
        - "Short > Long"
        - "Simple > Complex"
        - "Actionable > Theoretical"
        - "Quick wins > Long journeys"

    step_6:
      name: "Make It DARN GOOD"
      requirements:
        - "Overdeliver massively"
        - "Better than competitors' paid products"
        - "Creates 'holy crap' moments"
        - "Builds trust through value"

    step_7:
      name: "Make It Easy for Them to Tell You They Want MORE"
      cta_elements:
        - "Urgency: 'Book a call in the next 48 hours'"
        - "Scarcity: 'Limited spots available'"
        - "Clear next step"
        - "Remove friction from buying"

  quality_test: "Would someone pay for this? If yes, it's good enough to give away."

# =============================================================================
# SECTION 8: MORE BETTER NEW (Scaling Framework)
# =============================================================================

more_better_new:
  framework_name: "More Better New Framework"
  principle: >
    When something works, do MORE of it first. Then make it BETTER.
    Only add something NEW after maxing out more and better.

  three_levers:
    more:
      definition: "Increase volume of what's already working"
      priority: "FIRST - always try more before anything else"
      cost: "Lowest risk, highest certainty"
      examples:
        - "Posting once a day → twice a day"
        - "50 outreach messages → 100 messages"
        - "1 ad → 10 ads (same winning formula)"

    better:
      definition: "Improve efficiency/conversion of what's working"
      priority: "SECOND - optimize after maxing volume"
      cost: "Medium risk, good return"
      what_to_test:
        - "Headlines/Hooks"
        - "Offers"
        - "Audiences"
        - "Creative formats"
        - "CTAs"
      key_principle: "Test ONE thing per week per platform"

    new:
      definition: "Add a new platform, method, or approach"
      priority: "LAST - only after maxing more + better"
      cost: "Highest risk, uncertain return, longest time to payoff"
      sequence:
        - "New placements (same platform)"
        - "New platforms (different channels)"
        - "New Core Four activities"

  constraint_concept:
    principle: "Identify your bottleneck, fix ONLY that"
    process:
      - "Find the constraint"
      - "Fix that constraint"
      - "Find the next constraint"
      - "Don't optimize non-constraints"

  rule_of_100:
    definition: "Minimum viable volume for any advertising method to work"
    thresholds:
      outreach: "100 reach outs per day"
      content: "100 minutes per day of content creation"
      ad_spend: "$100/day minimum to test paid ads"

    why_it_works:
      - "Statistical significance: enough volume to see patterns"
      - "Skill development: repetition builds proficiency"
      - "Law of large numbers: some will work; need enough attempts"
      - "Psychological: removes 'did I do enough?' doubt"

    mantra: "Do 100 primary actions every day for 100 days. Then you can complain."

  size_of_pie_fallacy: >
    Your business isn't limited by market size. It's limited by how much
    advertising you do. Most markets are MUCH bigger than entrepreneurs think.

# =============================================================================
# SECTION 9: LEAD GETTERS (Others Getting You Leads)
# =============================================================================

lead_getters:
  framework_name: "Four Lead Getters"
  principle: >
    There are more 'other people' than there are of you. The path to $100M+
    requires moving from doing advertising to getting others to do it.

  leverage_levels:
    level_1: "You do Core Four = Low leverage"
    level_2: "One person does it for you = Higher leverage"
    level_3: "Many people do it for you = High leverage"
    level_4: "People who get people to do it = HIGHEST leverage"

  four_types:
    # -------------------------------------------------------------------------
    # LEAD GETTER 1: CUSTOMER REFERRALS
    # -------------------------------------------------------------------------
    customer_referrals:
      why_they_matter:
        - "Higher LTGP (they buy more, pay more)"
        - "Lower CAC (cost nothing to acquire)"
        - "Exponential growth potential"

      referral_growth_equation:
        formula: "Referrals - Churned Customers = Growth"
        scenarios:
          positive: "Referrals > Churn = Growth without advertising"
          neutral: "Referrals = Churn = Need advertising to grow"
          negative: "Referrals < Churn = Advertising just to break even"

      why_businesses_dont_get_referrals:
        problem_1:
          name: "Product Isn't Good Enough"
          solution: "Increase goodwill"
          goodwill_formula: "Goodwill = Value Delivered - Price Charged"

        problem_2:
          name: "They Never Ask"
          solution: "Systematic referral requests"

      six_ways_to_give_more_value:
        way_1:
          name: "Sell Better Customers"
          action: "Find what best customers have in common, target only those"

        way_2:
          name: "Set Better Expectations"
          action: "Under-promise, over-deliver"

        way_3:
          name: "Get More People Better Results"
          action: "Study what best customers DO, force everyone to do those actions"

        way_4:
          name: "Make Faster Wins"
          actions:
            - "Break outcomes into smallest increments"
            - "Communicate frequently"
            - "Deliver early (add 50% to timelines)"
            - "BAMFAM: Book-A-Meeting-From-A-Meeting"

        way_5:
          name: "Keep Making Your Stuff Better"
          process: "Survey > Fix > Implement > Measure > Repeat"

        way_6:
          name: "Tell Them What to Buy Next"
          key: "More things to buy = more referral opportunities"

      seven_ways_to_ask:
        way_1:
          name: "One-Sided Referral Benefit"
          action: "Pay referrer your CAC OR give friend a discount"

        way_2:
          name: "Two-Sided Referral Benefits"
          action: "Split CAC between referrer and friend"
          examples: "Dropbox, PayPal model"

        way_3:
          name: "Ask Right When They Buy"
          script: "Who else would you like to do this with?"
          psychology: "People who do this with someone get 3x results"

        way_4:
          name: "Add Referrals as Negotiation Chip"
          script: "I can give you $100 off for 3 introductions"

        way_5:
          name: "Referral Events"
          examples:
            - "Bring-a-friend campaigns"
            - "Spouse challenges"
            - "Accountability buddy promotions"

        way_6:
          name: "Ongoing Referral Programs"
          action: "Always-on referral incentives mentioned in content"

        way_7:
          name: "Unlockable Referral Bonuses"
          rewards:
            - "VIP status for referrers"
            - "Exclusive content/training"
            - "Premium support tiers"

      one_question_exercise: >
        If you lost all customers but one, and could ONLY grow through that
        one customer's referrals, what would you do differently?

    # -------------------------------------------------------------------------
    # LEAD GETTER 2: EMPLOYEES
    # -------------------------------------------------------------------------
    employees:
      why_they_matter:
        key_insight: >
          You get rich from what you make. You become wealthy from what you own.
        equation:
          with_you: "$2M profit requiring you = worth almost nothing"
          without_you: "$2M profit without you = worth $10M+"

      new_beliefs:
        - "If you want it done right, get someone to spend all their time doing it"
        - "If I can do it, someone else can do it better"
        - "Everyone is replaceable, especially me"

      internal_core_four:
        warm_outreach: "Asking your network"
        cold_outreach: "Recruiting"
        content: "Posting job openings"
        paid_ads: "Promoting job postings"

      three_ds_training:
        step_1_document:
          action: "Write down exact steps YOU do"
          methods:
            - "Record yourself doing it"
            - "Create checklist"
          test: "Can YOU follow your own directions exactly?"

        step_2_demonstrate:
          action: "Do it in front of them"
          method: "Walk through checklist step by step"

        step_3_duplicate:
          action: "They do it in front of you"
          process:
            - "Follow the same checklist"
            - "Fix checklist until it works"
            - "Practice until proficient"

      training_tips:
        - "If they get it wrong, the instructions got it wrong"
        - "Praise following directions, even if result is wrong"
        - "Fast feedback = faster learning"
        - "One piece of feedback at a time"
        - "Retrain team when performance dips"

      roi_calculation:
        formula: "Total Payroll / Total Engaged Leads = Cost per lead"
        benchmark: "Should be at least 3:1 LTGP:CAC"

      diagnosing_problems:
        question: "Do my engaged leads have the problem I solve AND money to spend?"
        if_no: "Advertising problem"
        if_yes_not_buying: "Sales problem"
        if_yes_buying_not_enough: "Advertising problem"

    # -------------------------------------------------------------------------
    # LEAD GETTER 3: AGENCIES
    # -------------------------------------------------------------------------
    agencies:
      wrong_way:
        - "Get excited about results"
        - "Go through onboarding"
        - "Get senior rep"
        - "See results"
        - "Senior rep moves to new client"
        - "Junior rep takes over"
        - "Results suffer"
        - "Cancel and repeat cycle"

      right_way:
        agency_agreement_script: >
          I want to do what you do in my business, but I don't know how. I'd like
          to work with you for 6 months so I can learn how you do it. Plus, I'll
          pay extra for you to break down why you make the decisions you do. Then,
          after I learn it, I'll train my team on it. Once they can do it well
          enough, I'd like to change to a lower cost consulting arrangement.
          Are you opposed to this?

      two_agency_strategy:
        step_1: "Hire one 'good enough' agency to learn ropes"
        step_2: "Hire one elite agency to learn maximization"
        step_3: "Train your team on both"
        step_4: "Cancel when your team beats them"

      ten_signs_of_good_agency:
        - "Someone you know got good results with them"
        - "Prominent companies got results with them"
        - "They have a waiting list"
        - "Clear sales process with realistic expectations"
        - "Focus on long-term strategy, not hacks"
        - "Tell you exactly what they need from you"
        - "Regular meeting schedule and updates"
        - "Simple reporting and clear tracking"
        - "Make a good offer (using value equation)"
        - "They are expensive (good ones always are)"

      timeline:
        learning_period: "6 months typical"
        exit_criteria: "Cancel when you consistently beat them"
        transition: "Move to consulting for edge cases"

    # -------------------------------------------------------------------------
    # LEAD GETTER 4: AFFILIATES
    # -------------------------------------------------------------------------
    affiliates:
      definition: >
        An independent business that tells their audience to buy YOUR stuff
        in exchange for money, free stuff, or both.

      why_build_army:
        comparison:
          direct_sales: "Sell 10 customers/month at $10K = $100K/month (plateaus)"
          affiliate_model: "Sell 10 affiliates/month who each bring 1 customer = compounds"

      six_steps_to_build:
        step_1:
          name: "Find Your Ideal Affiliates"
          questions:
            - "What do best customers buy? Who provides that?"
            - "Where do they go? What businesses are there?"
            - "What do they like to do? Who provides services?"
            - "What types of businesses do they work for?"
          categories:
            - "Softwares they use"
            - "Products they buy"
            - "Equipment they need"
            - "Services they use"
            - "Groups they belong to"
            - "Events they attend"

        step_2:
          name: "Make Them an Offer"
          affiliate_value_proposition: >
            Make more money from current customers and get more leads than your
            current offer (dream outcome)...with high chance of working since
            customers already want the product (likelihood)...without needing to
            build, deliver, or support (effort & sacrifice)...so you can start
            selling tomorrow (time delay).

        step_3:
          name: "Qualify Them"
          two_methods:
            make_them_customer:
              action: "They must buy and use your product"
              why: "If they don't believe enough to buy, they shouldn't sell"

            make_them_expert:
              action: "Certification program"
              pricing: "Charge 10-20% of average affiliate's first-year earnings"
              key: "If they pay, they'll pay attention"

        step_4:
          name: "Figure Out What to Pay Them"
          pay_for:
            - "New customers"
            - "Repeat customers"
            - "Leads generated"
            - "Appointments set"

          three_tier_structure:
            basis: "Based on Maximum Allowable CAC"
            tier_1:
              rate: "25% of CAC"
              trigger: "Anyone who agrees to terms"
            tier_2:
              rate: "50% of CAC"
              trigger: "Once they activate (finish training, do launch)"
            tier_3:
              rate: "100% of CAC"
              trigger: "Once they sustain performance"

            example_40_cac:
              tier_1: "$10 payout"
              tier_2: "$20 payout"
              tier_3: "$40 payout"

            benefit: "Average payout < max CAC = extra profit margin"

        step_5:
          name: "Get Them Advertising (LAUNCH)"
          whisper_tease_shout:
            whisper:
              focus: "Callouts - Create curiosity"
              actions:
                - "Show behind the scenes"
                - "Keep product mysterious"
              timing: "Start months out"
              frequency: "Every 4-6 weeks until 60 days out"

            tease:
              focus: "Elements of Value"
              actions:
                - "Reveal the product"
                - "Announce launch date"
                - "Show value elements (What-Who-When)"
              frequency: "Weekly until 30 days out, then twice weekly"

            shout:
              focus: "Call to Action"
              actions:
                - "Specific actions to take"
                - "Bonuses, scarcity, urgency"
              frequency: "Twice daily starting 3 days out, every 30 minutes on launch day"

        step_6:
          name: "Keep Them Advertising (INTEGRATE)"
          three_strategies:
            give_away_lead_magnet:
              action: "Free with every purchase of their stuff"
              benefit: "Makes their offer more valuable"
              monetization: "You upsell from there"

            sell_lead_magnet:
              action: "They sell it to their audience"
              benefit: "They keep the money"
              monetization: "You upsell your core offer"

            sell_core_offer:
              action: "They sell your main thing directly"
              split: "Split the money"
              benefit: "Highest payout percentage"

      roi_calculation:
        example:
          acquisition_cost: "$4,000 to acquire affiliate"
          affiliate_sales: "$120,000 in 12 months"
          cogs_25_percent: "$30,000"
          gross_profit: "$90,000"
          affiliate_payout_40_percent: "$36,000"
          leftover: "$54,000"
          ltgp_cac_ratio: "13.5:1"

      three_ways_to_improve_roi:
        - "Lower CAC (better ads, offer, sales)"
        - "Increase activation (better launch process)"
        - "Increase LTGP (better integration)"

# =============================================================================
# SECTION 10: KEY METRICS AND BENCHMARKS
# =============================================================================

key_metrics:
  critical_ratios:
    ltgp_cac:
      minimum: "3:1"
      good: "5:1"
      great: "10:1+"

    give_ask:
      minimum: "3.5:1"
      good: "5:1"
      great: "10:1+"

  activity_benchmarks:
    warm_outreach:
      input: "100 reach outs"
      output: "1 customer"

    cold_outreach:
      input: "100 contacts"
      output: "3 engaged leads"

    content:
      input: "100 minutes/day"
      output: "Compound over time"

    paid_ads:
      input: "$100/day minimum"
      output: "Test until profitable"

  tracking_requirements:
    - "Engaged leads per day/week/month"
    - "Cost per engaged lead (by method)"
    - "Engaged lead to customer conversion rate"
    - "Customer acquisition cost (CAC)"
    - "Referrals per customer"
    - "Content: views to engagement ratio"
    - "Content: engagement to lead conversion"
    - "Rule of 100 compliance (days hit per week)"

# =============================================================================
# SECTION 11: SCRIPTS AND TEMPLATES
# =============================================================================

scripts_and_templates:
  nine_word_email:
    template: "Are you still looking to [4 word desire]?"

  aca_framework:
    template: >
      [ACKNOWLEDGE] - Hey [Name]! I saw you [recent activity].
      [COMPLIMENT] - That's awesome that [genuine praise].
      [ASK] - Quick question - [your ask]?

  referral_ask:
    template: >
      People who do this program with someone else tend to get 3x the results.
      Who else could you do this program with?

  agency_negotiation:
    template: >
      I want to learn how you do what you do. I'll pay extra for you to teach me.
      After 6 months, I'd like to move to consulting. Are you opposed to this?

  affiliate_offer:
    template: >
      Make more money from your current customers (dream outcome) with high
      likelihood since they already want this (likelihood) without building or
      supporting the product yourself (effort/sacrifice) starting tomorrow (time delay).

# =============================================================================
# SECTION 12: IMPLEMENTATION SEQUENCE
# =============================================================================

implementation:
  phase_1_foundation:
    - "Define your engaged lead (who + what action constitutes a lead)"
    - "Choose ONE Core Four method to master first"
    - "Commit to Rule of 100 daily for 90 days"
    - "Create one lead magnet that solves a narrow problem"

  phase_2_validation:
    - "Track cost per lead and conversion to customer"
    - "Apply More-Better-New: max volume before optimizing"
    - "Build warm outreach system for content engagers"
    - "Systematize referral requests"

  phase_3_scale:
    - "Document all processes for delegation"
    - "Hire first advertising employee (or agency)"
    - "Add second Core Four method only after first is maxed"
    - "Build lead getter programs (referrals, affiliates)"

  phase_4_empire:
    - "Multiple channels running with teams"
    - "Lead getters getting lead getters"
    - "Reinvest percentage in testing new methods"
    - "Acquire or build complementary businesses"

# =============================================================================
# SECTION 13: COMMON MISTAKES
# =============================================================================

common_mistakes:
  - mistake: "Switching methods after a few failures"
    fix: "Commit to one method for 3-6 months minimum"

  - mistake: "Skipping warm outreach"
    fix: "Always start with warm outreach to validate offer"

  - mistake: "Adding 'new' before maxing 'more'"
    fix: "Follow More-Better-New prioritization strictly"

  - mistake: "Not hitting Rule of 100"
    fix: "Track daily, make it non-negotiable"

  - mistake: "All give, no ask in content"
    fix: "Add clear CTAs; optimal ratio is 3:1 to 10:1"

  - mistake: "Lead magnet that doesn't solve complete problem"
    fix: "Make it so good they'd pay for it"

  - mistake: "Skipping levels in the roadmap"
    fix: "Master current level before advancing"

  - mistake: "Not asking for referrals"
    fix: "Build referral ask into every customer interaction"

# =============================================================================
# SECTION 14: THE ADVERTISING EQUATION (Summary)
# =============================================================================

advertising_equation:
  principle: "Advertising always works. It's only a matter of efficiency."

  complete_system:
    step_1: "Get leads (Core Four)"
    step_2: "Convert leads to engaged leads (Lead Magnets + Offers)"
    step_3: "Scale what works (More, Better, New)"
    step_4: "Leverage others (Lead Getters)"
    step_5: "Compound over time (Referrals + Affiliates)"

  ultimate_test:
    question: "If you stopped advertising tomorrow, would your business grow, stay flat, or shrink?"
    grow: "You've built compounding assets (referrals > churn)"
    flat: "You're on a hamster wheel"
    shrink: "You're dependent on constant advertising"

  goal: "Build a lead machine that compounds without you"

