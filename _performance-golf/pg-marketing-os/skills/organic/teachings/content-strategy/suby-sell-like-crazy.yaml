  skill_S04_content_architecture:
    connection: "Phases 5-6 — Traffic and Magic Lantern"
    integration:
      - "Structure content calendar around the 4 content categories (awareness, agitation, solution, conversion)"
      - "Ensure every week contains at least one piece from each category"
      - "Map the Halo Strategy across platforms for omnipresence effect"
      - "Build the content atomization pipeline from core pillar to platform-native pieces"
    architecture_template:
      monday: "Awareness content — myth-busting or provocative question"
      tuesday: "Solution content — framework reveal or how-to"
      wednesday: "Social proof — case study or testimonial"
      thursday: "Problem-agitation — cost of inaction or pain-point story"
      friday: "Value delivery — actionable tip, template, or tool"
      saturday: "Personal or behind-the-scenes — build parasocial connection"
      sunday: "Offer or CTA — direct ask with value stack reminder"

  skill_S07_campaign_brief:
    connection: "Phases 2-4 — Bait, Capture, Godfather Strategy"
    integration:
      - "Every campaign brief starts with dream buyer identification (Phase 1 output)"
      - "Define the HVCCO for the campaign (what free value drives entry)"
      - "Map the nurture sequence across organic touchpoints"
      - "Design the Godfather Offer stack with clear value hierarchy"
    campaign_brief_template:
      section_1_dream_buyer: "Who exactly is this campaign for?"
      section_2_bait: "What is the free value piece that earns their attention?"
      section_3_capture: "How do we convert attention to contact (follow, email, DM)?"
      section_4_nurture: "What content sequence moves them from curious to convinced?"
      section_5_offer: "What is the Godfather Offer and how is value stacked?"
      section_6_conversion: "What is the final CTA and what risk reversal is included?"
      section_7_maximizer: "What happens after they buy? Upsell, cross-sell, retention?"

  skill_S09_caption_writing:
    connection: "Phase 1 language + Phase 5 content categories"
    integration:
      - "Use dream buyer language in every hook (their words, not yours)"
      - "Structure captions to match content category purpose"
      - "Open with the Power Four framework: where they are now (hook), where they want to go (promise), what is in the way (tension), what the journey looks like (value)"
      - "Close with appropriate CTA based on content category"
    caption_formulas:
      awareness_hook: "[Provocative statement that challenges a belief they hold]"
      agitation_hook: "[Vivid description of their current pain in their exact words]"
      solution_hook: "[Specific result achieved] in [specific timeframe] using [specific method]"
      conversion_hook: "[Customer name] went from [before state] to [after state] in [timeframe]. Here is how."
      value_hook: "The [number]-step [framework name] that [specific outcome]:"

# =============================================================================
# SECTION 5: THE HALO STRATEGY DEEP DIVE
# =============================================================================

halo_strategy_deep_dive:
  the_omnipresence_illusion:
    concept: >
      You do not need to be everywhere. You need to appear to be everywhere
      to your specific dream buyer. This means identifying the 3-5 channels
      they use and showing up consistently on those channels, not spreading
      thin across 15 platforms.
    execution:
      step_1_channel_audit:
        action: "Where does your dream buyer spend their digital time?"
        research_methods:
          - "Ask existing customers what platforms they use daily"
          - "Check where competitors with similar audiences post"
          - "Look at where your content gets the most qualified engagement"
        output: "Ranked list of 3-5 primary channels"

      step_2_pillar_content:
        action: "Create one substantial piece of content per week"
        formats:
          - "Long-form YouTube video (10-20 minutes)"
          - "Podcast episode (20-40 minutes)"
          - "Blog post or newsletter (2,000-3,000 words)"
          - "Live stream or webinar (30-60 minutes)"
        purpose: "This is your anchor. Everything else is derived from this."

      step_3_atomization:
        action: "Break the pillar into platform-native pieces"
        example_from_one_video:
          instagram: "3 Reels (key moments), 2 carousels (frameworks), 5 stories (behind-the-scenes)"
          twitter_x: "1 thread (full breakdown), 7 standalone tweets (individual insights)"
          linkedin: "1 long-form post (professional angle), 3 shorter posts (data points)"
          tiktok: "4 short clips (hook-heavy moments)"
          newsletter: "1 edition (deep-dive with added commentary)"
        total_output: "26 pieces of content from one creation session"

      step_4_cross_pollination:
        action: "Reference your other platforms in each piece of content"
        examples:
          - "In your Reel: 'I went deeper on this in my latest newsletter—link in bio'"
          - "In your newsletter: 'I showed the exact process in a Reel this week—go watch'"
          - "In your tweet: 'Recorded a full breakdown on YouTube—thread below with key points'"
        purpose: "Drive your audience across platforms, creating the perception of omnipresence"

