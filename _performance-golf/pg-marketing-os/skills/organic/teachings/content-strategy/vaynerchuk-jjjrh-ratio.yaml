# =============================================================================
# SECTION 1: THE JJJRH FRAMEWORK — CORE DEFINITIONS
# =============================================================================

jjjrh_framework:
  framework_name: "Jab, Jab, Jab, Right Hook"
  origin: >
    Gary Vaynerchuk's boxing metaphor for the rhythm of social media
    communication. Derived from observing that brands who only sell
    (right hooks) alienate audiences, while brands who only give
    (jabs) never monetize. The winning combination is strategic
    sequencing of value before asks.

  the_boxing_metaphor:
    principle: >
      In boxing, you don't walk into the ring throwing haymakers. You set up
      your knockout punch with a series of jabs that test your opponent's
      defenses, create openings, and establish rhythm. Social media works
      the same way. Jabs are the light, value-driven touches that build
      trust and familiarity. The right hook is the ask — the conversion
      moment. Without the jabs, the right hook never lands.
    source_quote:
      text: "The right hook gets all the credit for the win, but it's the ring movement and the series of well-planned jabs that come before it that set you up for success. Without a proper combination of jabs to guide your customer—I mean, your opponent—right where you want him, your right hook could be perfect and your opponent could still dodge it as easily as a piece of dandelion fluff."
      chapter: "Introduction: Weigh-In"

    why_boxing_works_as_metaphor:
      - "Jabs require less energy but set up everything"
      - "Right hooks without setup get blocked (ignored, unfollowed)"
      - "Rhythm matters — predictable patterns get countered"
      - "The best fighters adapt their combinations to each opponent (platform)"
      - "You have to read the room (audience) to know when to strike"

  jab:
    definition: >
      Content that gives value without asking for anything in return. No
      call to action, no sales pitch, no conversion intent. Pure value
      delivery designed to strengthen the relationship between brand and
      audience.
    source_quote:
      text: "Jabs are the lightweight pieces of content that benefit your customers by making them laugh, snicker, ponder, play a game, feel appreciated, or escape; right hooks are calls to action that benefit your businesses."
      chapter: "Introduction: Weigh-In (How Storytelling Is Like Boxing)"

    what_makes_a_good_jab:
      source_quote:
        text: "Be generous. Be informative. Be funny. Be inspiring. Be all the characteristics we enjoy in other human beings. That's what jabs are all about. Right hooks represent what is valuable to you—getting the sale, getting people in the door. Jabs are about what is valuable to the consumer."
        chapter: "Round 2: The Characteristics of Great Content and Compelling Stories"
      entertains:
        description: "Content that makes people laugh, smile, or feel good"
        examples:
          - "Behind-the-scenes bloopers from content creation"
          - "Relatable memes about your industry or niche"
          - "Funny observations about the daily grind your audience knows"
          - "Entertaining stories from your journey that don't sell anything"
        why_it_works: >
          Entertainment is the lowest-friction form of value. People scroll
          social media to feel something. When you make them feel good, they
          associate that feeling with your brand. No one unfollows someone
          who consistently makes them laugh.

      educates:
        description: "Content that teaches something useful without gatekeeping"
        examples:
          - "Step-by-step breakdown of a process you use"
          - "Common mistakes in your industry and how to avoid them"
          - "Free frameworks and mental models your audience can apply today"
          - "Data-driven insights that shift how people think about a problem"
        why_it_works: >
          When you teach people something that works, you earn authority.
          They think: if the free stuff is this good, what must the paid
          stuff be like? Education builds trust faster than any sales pitch.

      inspires:
        description: "Content that motivates action or shifts perspective"
        examples:
          - "Transformation stories from your customers or community"
          - "Your own journey through a challenge relevant to the audience"
          - "Reframing a common limitation into an opportunity"
          - "Showing what's possible with proof, not just hype"
        why_it_works: >
          Inspiration triggers the aspirational identity in your audience.
          They see themselves in the story. They start to believe change is
          possible. That emotional state makes them far more receptive when
          you eventually make your ask.

      connects:
        description: "Content that creates genuine human-to-human moments"
        examples:
          - "Vulnerable posts about struggles or failures"
          - "Asking genuine questions and engaging with every reply"
          - "Celebrating your audience's wins publicly"
          - "Sharing personal values, beliefs, or unpopular opinions"
        why_it_works: >
          People buy from people they feel connected to. Connection content
          breaks the fourth wall between brand and audience. It transforms
          followers into community members who feel personally invested in
          your success.

    the_no_ask_rule:
      principle: >
        A jab has zero ask embedded in it. Not a subtle CTA, not a
        soft sell, not a "link in bio" footnote. Nothing. The moment
        you attach an ask to value content, it stops being a jab and
        becomes a right hook wearing a jab costume. Audiences detect
        this instantly and it erodes the trust you were trying to build.
      source_quote:
        text: "When you jab, you're not selling anything. You're not asking your consumer for a commitment. You're just sharing a moment together. Something funny, ridiculous, clever, dramatic, informative, or heartwarming. Maybe something featuring cats. Something, anything, except a sales pitch."
        chapter: "Round 2: The Characteristics of Great Content and Compelling Stories"

      common_violations:
        - "Adding 'DM me for more' to an educational post"
        - "Ending an inspiring story with 'and that's why I created my course'"
        - "Sharing a free tip but gating the next step behind an email signup"
        - "Posting a meme but making it about your product"
        - "Creating a poll that is actually market research for a launch"

      the_test: >
        If you removed all branding from the content, would it still be
        valuable to the audience? If yes, it is a jab. If the value depends
        on knowing about your product or offer, it is not.

  right_hook:
    definition: >
      Content with a clear, specific call to action designed to drive a
      measurable business outcome. The ask. The conversion play. The moment
      you cash in the goodwill you have built through your jabs.
    source_quote:
      text: "Today's perfect right hooks always include three characteristics: 1. They make the call to action simple and easy to understand. 2. They are perfectly crafted for mobile, as well as all digital devices. 3. They respect the nuances of the social network for which you are making the content."
      chapter: "Introduction: Weigh-In (The Sweet Science)"

    what_makes_a_good_right_hook:
      clear_cta:
        description: "The audience knows exactly what you want them to do"
        requirements:
          - "One action, not three"
          - "Specific: 'Click the link in bio to grab X' not 'check it out'"
          - "Friction-minimized: as few steps as possible"
          - "Urgency or scarcity when authentic"
        examples:
          - "Tap the link in bio to get 40% off — ends tonight at midnight"
          - "DM me the word 'READY' and I'll send you the enrollment link"
          - "Swipe up to claim your free strategy call — only 10 spots this week"

      specific_offer:
        description: "The value proposition is concrete, not vague"
        requirements:
          - "Name the thing being offered"
          - "State the benefit clearly"
          - "Include the terms (price, timeline, availability)"
          - "Differentiate from alternatives"

      conversion_focused:
        description: "Every element serves the conversion goal"
        requirements:
          - "Visual matches the CTA energy"
          - "Copy leads to the action, not away from it"
          - "Landing page or destination is aligned"
          - "Tracking is in place to measure results"

    when_to_throw_a_right_hook:
      source_quote:
        text: "You gave so much that when you finally asked, she was emotionally primed to say yes."
        chapter: "Round 2: The Characteristics of Great Content and Compelling Stories"
      timing_signals:
        - "You have built up significant goodwill through recent jabs"
        - "Audience engagement is high (they are paying attention)"
        - "You have a time-sensitive offer that creates natural urgency"
        - "The audience has been primed with related value content"
        - "Platform algorithm is favoring your content (ride the wave)"

      timing_mistakes:
        - "Throwing a right hook as your first post to a new audience"
        - "Back-to-back right hooks with no jabs in between"
        - "Right hooking during a crisis or sensitive cultural moment"
        - "Asking when engagement has been declining (lost attention)"

    anatomy_of_a_perfect_right_hook:
      element_1: "Attention-grabbing visual or hook line"
      element_2: "Brief reinforcement of value (why this matters to THEM)"
      element_3: "The specific offer with clear terms"
      element_4: "Single, unmistakable call to action"
      element_5: "Urgency or scarcity element (if authentic)"
      element_6: "Social proof when available (results, testimonials)"

# =============================================================================
# SECTION 2: THE OPTIMAL JAB-TO-HOOK RATIO
# =============================================================================

jab_to_hook_ratio:
  framework_name: "The Give-to-Ask Balance"

  the_ratio:
    source_quote:
      text: "Jab, jab, jab, jab, jab . . . right hook! Or . . . Give, give, give, give, give . . . ask. Get it?"
      chapter: "Round 2: The Characteristics of Great Content and Compelling Stories"
    vaynerchuk_recommendation: "At minimum 3:1 (three jabs per right hook)"
    optimal_range: "4:1 to 6:1 for most brands"
    high_trust_brands: "3:1 (audience already trusts, less warming needed)"
    new_or_rebuilding_brands: "6:1 to 10:1 (must earn trust first)"
    thought_leaders_and_creators: "5:1 (heavy education, spaced conversion)"

  why_most_brands_get_it_wrong:
    source_quote:
      text: "No one wants to be interrupted, and no one wants to be sold to. Your story needs to move people's spirits and build their goodwill, so that when you finally do ask them to buy from you, they feel like you've given them so much it would be almost rude to refuse."
      chapter: "Round 2: The Characteristics of Great Content and Compelling Stories"
    common_pattern:
      description: >
        Most brands operate at a 1:1 ratio or worse — every piece of
        content has a sales angle. Some are even 0:1, posting nothing
        but promotional material. They treat social media like a billboard
        instead of a relationship.

      consequences:
        - "Audience tunes out (banner blindness for your brand)"
        - "Engagement drops, algorithm stops showing your content"
        - "Unfollows accelerate as people feel 'sold to'"
        - "When you do make an offer, no one is listening"
        - "You train your audience to ignore you"

    the_tv_analogy: >
      Think of content like television. A show is 22 minutes of content
      and 8 minutes of commercials (roughly 3:1). If a show were 22 minutes
      of commercials and 8 minutes of content, no one would watch. Yet
      most brands run their social media like 22 minutes of commercials.
      The show (your jabs) is what earns the right to run the ad (your
      right hook).

    the_relationship_analogy: >
      Social media is not a megaphone — it is a cocktail party. You would
      not walk into a party and immediately pitch everyone. You would
      introduce yourself, have conversations, add value to discussions,
      make people laugh, and only after building rapport would you mention
      what you do if it came up naturally. Brands that only post right
      hooks are the equivalent of that person at the party who won't stop
      talking about their business. Everyone avoids them.

  ratio_in_practice:
    weekly_calendar_example:
      monday: "Jab — Educational carousel or thread"
      tuesday: "Jab — Behind-the-scenes or personal story"
      wednesday: "Jab — Entertaining or relatable content"
      thursday: "Jab — Community engagement or user-generated content"
      friday: "Right Hook — Clear offer with CTA"
      saturday: "Jab — Inspirational or connection content"
      sunday: "Jab — Value-add or industry insight"

    monthly_rhythm:
      week_1: "Jab, Jab, Jab, Jab, Right Hook, Jab, Jab"
      week_2: "Jab, Jab, Jab, Jab, Jab, Jab, Jab (all value)"
      week_3: "Jab, Jab, Jab, Right Hook, Jab, Jab, Jab"
      week_4: "Jab, Jab, Jab, Jab, Jab, Right Hook, Jab"
      monthly_ratio: "Approximately 5.7:1"

    launch_period_exception:
      ratio: "2:1 to 3:1 during active launch windows"
      duration: "Maximum 7-10 days"
      requirement: "Must return to standard ratio immediately after"
      warning: >
        Even during launches, never go below 2:1. The temptation to
        blast right hooks during a promotion is strong, but audience
        fatigue during launch week will kill post-launch engagement.

  calibration_signals:
    ratio_too_low_on_jabs:
      - "Comments are mostly from bots or crickets"
      - "Engagement rate declining week over week"
      - "DMs asking 'do you ever post anything besides ads?'"
      - "Follower growth stalled or negative"
      - "Right hooks getting significantly lower reach than jabs"

    ratio_well_calibrated:
      - "Consistent engagement across all content types"
      - "Right hooks generate actual conversions"
      - "Audience actively asks about your offers in comments"
      - "DMs saying 'I've been following you for a while and I'm ready'"
      - "Follower growth is organic and steady"

    ratio_too_heavy_on_jabs:
      - "High engagement but zero revenue from social"
      - "Audience sees you as free resource, resists paying"
      - "You feel resentful giving so much without return"
      - "No one knows you have something to sell"
      - "Comments like 'I didn't know you offered that'"

# =============================================================================
# SECTION 3: CONTENT IS KING, CONTEXT IS GOD
# =============================================================================

content_context_principle:
  framework_name: "Content is King, Context is God"

  the_thesis: >
    Great content on the wrong platform, in the wrong format, at the
    wrong time, with the wrong tone is wasted content. Context is
    everything. A tweet is not a Facebook post is not an Instagram
    caption is not a LinkedIn article. Each platform has its own
    culture, its own native format, its own user intent. Content
    that ignores context is like a comedian doing stand-up at a
    funeral — the material might be good, but the context makes it
    fail.
  source_quote:
    text: "Content is king, but context is God. You can put out good content, but if it ignores the context of the platform on which it appears, it can still fall flat. Most marketers are oblivious to context because marketers are on social media to sell stuff. Consumers, however, are not. They are there for value."
    chapter: "Round 2: The Characteristics of Great Content and Compelling Stories"

  three_dimensions_of_context:
    platform_culture:
      definition: "The unwritten rules, norms, and expectations of each platform"
      principle: >
        Every platform has a personality. Instagram is the aspirational
        magazine. Twitter/X is the real-time conversation bar. LinkedIn
        is the professional conference. TikTok is the talent show.
        YouTube is the documentary channel. Content must match the
        personality of the room you are entering.
      source_quote:
        text: "Each platform is unique, and requires a unique formula. What works on Facebook won't necessarily work on Twitter. Stories told through pictures on Instagram don't resonate the same way when told in an identical manner on Pinterest. Posting the same content on Tumblr as on Google+ is the equivalent of the tourist deciding that since he can't speak Norwegian he'll just speak Icelandic and it will do."
        chapter: "Introduction: Weigh-In (The Sweet Science)"

      platform_personalities:
        instagram:
          culture: "Visual aspiration, lifestyle curation, aesthetic storytelling"
          user_mindset: "Show me something beautiful, inspiring, or aspirational"
          native_behavior: "Scroll, double-tap, save for later, share to stories"
          content_that_works:
            - "High-quality visuals with purposeful composition"
            - "Carousel breakdowns that teach through visual storytelling"
            - "Reels that hook in the first second with movement or text"
            - "Stories that feel raw, immediate, and behind-the-scenes"
          content_that_fails:
            - "Stock photos with corporate text overlays"
            - "Long paragraphs with no visual anchor"
            - "Content that looks like it was designed for a different platform"
            - "Overly polished content that feels inauthentic"

        twitter_x:
          culture: "Hot takes, real-time commentary, intellectual sparring, brevity"
          user_mindset: "Give me something smart, funny, or controversial in seconds"
          native_behavior: "Rapid scrolling, quote tweets, reply threads, bookmarks"
          content_that_works:
            - "Sharp one-liners that provoke reaction"
            - "Threads that unpack a single insight with momentum"
            - "Real-time commentary on industry events or trends"
            - "Contrarian takes with evidence to back them up"
          content_that_fails:
            - "Generic motivational quotes with no edge"
            - "Multi-paragraph posts that belong on LinkedIn"
            - "Overly produced graphics (feels like advertising)"
            - "Content that ignores the current conversation"

        linkedin:
          culture: "Professional growth, career insights, business storytelling"
          user_mindset: "Help me advance my career or business with credible insights"
          native_behavior: "Read longer posts, comment thoughtfully, share with colleagues"
          content_that_works:
            - "Personal stories with professional lessons embedded"
            - "Data-driven insights about industry trends"
            - "Frameworks and mental models for business decisions"
            - "Vulnerable leadership lessons that feel earned, not performed"
          content_that_fails:
            - "Memes and casual humor (tone mismatch)"
            - "Hard sales pitches in the first line"
            - "Content that reads like a press release"
            - "Engagement-bait questions with no substance"

        tiktok:
          culture: "Raw authenticity, entertainment-first, trend participation"
          user_mindset: "Surprise me, teach me something fast, make me feel something"
          native_behavior: "Watch, share, duet, stitch, follow for more"
          content_that_works:
            - "Hook in the first 0.5 seconds with a bold claim or visual"
            - "Education wrapped in entertainment (edutainment)"
            - "Trend participation with your unique twist"
            - "Raw, unpolished content that feels real"
          content_that_fails:
            - "Over-produced content that feels like a commercial"
            - "Content that doesn't get to the point in the first second"
            - "Ignoring trending sounds, formats, and cultural moments"
            - "Trying to be professional on a platform that rewards authenticity"

        youtube:
          culture: "Deep value, searchable education, long-form storytelling"
          user_mindset: "I have a question or interest — give me a thorough answer"
          native_behavior: "Search, watch, subscribe, binge-watch related content"
          content_that_works:
            - "Detailed tutorials and how-to content"
            - "Searchable titles that match user intent"
            - "Thumbnails that create curiosity without clickbait"
            - "Long-form content with strong retention through pacing"
          content_that_fails:
            - "Short-form content repurposed without adaptation"
            - "Clickbait titles that don't deliver on the promise"
            - "Poor audio quality (YouTube audiences are less forgiving)"
            - "No clear structure or chapter markers in long content"

    format_native:
      definition: "Using the technical format and features each platform prioritizes"
      principle: >
        Platforms reward content that uses their native features. Instagram
        rewards Reels and carousels. Twitter rewards threads and quote tweets.
        TikTok rewards trending sounds and stitches. Using native features
        signals to the algorithm that you are a platform-native creator, which
        increases your distribution.
      source_quote:
        text: "Native content amps up your story's power. It is crafted to mimic everything that makes a platform attractive and valuable to a consumer—the aesthetics, the design, and the tone. It also offers the same value as the other content that people come to the platform to consume."
        chapter: "Introduction: Weigh-In (What Makes a Great Story?)"

      format_requirements:
        instagram:
          image_ratio: "1:1 (feed), 9:16 (stories/reels), 4:5 (portraits)"
          text_on_image: "Minimal, high contrast, readable at thumbnail size"
          carousel_max: "10 slides, first slide must hook, last slide has CTA or save trigger"
          reels_length: "7-30 seconds for maximum completion rate"
          caption_structure: "Hook line, value body, engagement prompt"

        twitter_x:
          character_limit: "280 characters per tweet"
          thread_structure: "Hook tweet, numbered points, recap tweet, CTA tweet"
          optimal_thread_length: "5-12 tweets for maximum engagement"
          visual_boost: "Tweets with images get 150% more retweets"

        linkedin:
          post_structure: "Strong opening line, short paragraphs, line breaks for readability"
          optimal_length: "1,200-1,500 characters for maximum engagement"
          formatting: "Use spacing, emojis sparingly as bullet points, no hashtag walls"
          document_posts: "PDF carousels outperform text-only posts"

        tiktok:
          video_length: "15-60 seconds for discovery, 1-3 minutes for depth"
          text_hooks: "On-screen text in first 0.5 seconds"
          trending_sounds: "Use trending audio within 48 hours of trend emergence"
          captions: "Auto-captions increase watch time by 25%"

        youtube:
          thumbnail: "Custom thumbnail with face, text, and high contrast"
          title: "Under 60 characters, includes search keyword"
          first_30_seconds: "Must hook and preview the value"
          description: "Keyword-rich, timestamped chapters, links"

    user_intent:
      definition: "Understanding WHY someone is on a specific platform at a specific time"
      principle: >
        A person on TikTok at 11pm on a Tuesday has a very different intent
        than the same person on LinkedIn at 9am on a Monday. Content must
        meet the user where they are mentally, not where you wish they were.
      source_quote:
        text: "A story is at its best when it's not intrusive, when it brings value to a platform's consumers, and when it fits in as a natural step along the customer's path to making a purchase."
        chapter: "Introduction: Weigh-In (What Makes a Great Story?)"

      intent_mapping:
        morning_linkedin: "Professional development, industry news, career content"
        midday_instagram: "Inspiration break, visual stimulation, aspiration"
        evening_tiktok: "Entertainment, decompression, discovery"
        weekend_youtube: "Deep learning, hobby content, long-form entertainment"
        realtime_twitter: "Breaking news, hot takes, live events, conversation"

# =============================================================================
# SECTION 4: MICRO-CONTENT STRATEGY
# =============================================================================

micro_content_strategy:
  framework_name: "Micro-Content as the Primary Unit"

  the_shift: >
    The era of big campaign thinking is over. Social media rewards
    consistent, high-volume micro-content over occasional big productions.
    One pillar piece of content should generate 10-30 micro-content pieces
    across platforms. The content itself is the marketing — there is no
    separate "marketing" step.
  source_quote:
    text: "Stop thinking about your content as content. Think about it, rather, as micro-content—tiny, unique nuggets of information, humor, commentary, or inspiration that you reimagine every day, even every hour, as you respond to today's culture, conversations, and current events in real time in a platform's native language and format."
    chapter: "Round 2: The Characteristics of Great Content and Compelling Stories"

  pillar_to_micro_system:
    pillar_content:
      definition: "One substantial piece of content (podcast, video, article, live)"
      frequency: "1-2 per week"
      purpose: "Deep value delivery and thought leadership"

    micro_content_extraction:
      from_one_pillar: "Extract 10-30 pieces of micro-content"
      extraction_methods:
        quotes: "Pull 5-10 quotable moments, format as text graphics"
        clips: "Cut 3-7 short video clips (15-60 seconds each)"
        insights: "Isolate 3-5 standalone insights for text posts"
        questions: "Turn key points into audience questions"
        threads: "Expand one section into a detailed thread"
        carousels: "Visualize a framework or process as carousel slides"
        stories: "Create story sequence that previews or recaps the pillar"

    distribution_sequence:
      day_1: "Publish pillar content on primary platform"
      day_2: "Release 2-3 micro clips on short-form platforms"
      day_3: "Post text-based insights on Twitter/LinkedIn"
      day_4: "Share carousel breakdown on Instagram/LinkedIn"
      day_5: "Engage in comments, repurpose best comments as content"
      day_6: "Thread expansion of most-engaged point"
      day_7: "Story recap driving back to pillar content"

  volume_principle: >
    You cannot be oversharing in a world where 97% of your audience
    does not see any given post. Volume is not annoying — invisibility
    is. Most creators dramatically underestimate how much content they
    need to publish to maintain consistent presence.
  volume_source_quote:
    text: "Micro-Content + Community Management = Effective Social Media Marketing"
    chapter: "Round 2: The Characteristics of Great Content and Compelling Stories"

  daily_volume_targets:
    minimum_viable: "1 post per day across all platforms combined"
    good: "2-3 posts per day across platforms"
    aggressive: "5-7 pieces of micro-content per day"
    vaynerchuk_standard: "12-15+ pieces of content per day"

# =============================================================================
# SECTION 5: REAL-TIME CONTENT AND CULTURAL MOMENT MARKETING
# =============================================================================

realtime_content:
  framework_name: "Day Trading Attention"

  the_principle: >
    Social media moves in real time. The brands that win are the ones
    that can respond to cultural moments within hours, not days.
    Real-time content captures attention spikes that planned content
    cannot. The Super Bowl tweet. The trending meme response. The
    breaking news take. These moments are where outsized engagement lives.
  source_quote:
    text: "Jab at people, all the time, every day. Talk about what they're talking about. When they start talking about something different, talk about that instead. Repeat. Repeat. Repeat."
    chapter: "Round 2: The Characteristics of Great Content and Compelling Stories"

  speed_of_response:
    golden_window: "0-2 hours after a trend emerges"
    still_relevant: "2-6 hours"
    late_but_acceptable: "6-24 hours"
    too_late: "24+ hours (the internet has moved on)"

  cultural_moment_categories:
    planned_events:
      examples:
        - "Award shows, sporting events, product launches"
        - "Holidays and cultural celebrations"
        - "Industry conferences and announcements"
      strategy: "Pre-plan content frameworks, fill in details in real time"

    breaking_moments:
      examples:
        - "Viral memes that align with your niche"
        - "Industry news or disruptions"
        - "Celebrity moments with cultural crossover"
      strategy: "React authentically within the golden window"

    trend_participation:
      examples:
        - "Trending audio or format on TikTok"
        - "Meme templates gaining traction on Twitter"
        - "Challenge formats spreading across platforms"
      strategy: "Adapt the trend to your unique perspective and niche"

  the_relevance_filter:
    before_jumping_on_a_trend_ask:
      - "Does this connect authentically to my brand or niche?"
      - "Can I add a unique perspective, not just copy the format?"
      - "Is the timing right (golden window) or has it peaked?"
      - "Could this backfire or be perceived as tone-deaf?"
      - "Will my audience care, or am I doing this for the algorithm?"

    when_to_skip_a_trend:
      - "It requires you to be someone you are not"
      - "The topic is sensitive and your take could be misconstrued"
      - "You cannot add genuine value or a unique angle"
      - "The trend has already peaked and participation looks desperate"

  real_time_content_process:
    step_1: "Monitor trending topics and cultural moments daily"
    step_2: "Run through relevance filter (30 seconds max)"
    step_3: "Create content within the golden window"
    step_4: "Publish with platform-native formatting"
    step_5: "Engage with responses to amplify reach"
    step_6: "Evaluate performance to calibrate future decisions"

# =============================================================================
# SECTION 6: VISUAL STORYTELLING REQUIREMENTS
# =============================================================================

visual_storytelling:
  framework_name: "Visual-First Communication"

  the_principle: >
    Social media is a visual medium first. Before a single word of your
    caption is read, your visual has already made or lost the impression.
    The visual stops the scroll. The copy closes the deal. Investing in
    visual quality is not optional — it is the cost of entry.
  source_quote:
    text: "When you create stellar content native to a platform's context, you can make a person feel; if your content can make a person feel, he is likely to share it with others, providing you with amplified word of mouth at a fraction of the cost of most other media."
    chapter: "Round 2: The Characteristics of Great Content and Compelling Stories"

  visual_hierarchy:
    level_1_scroll_stopper:
      purpose: "Arrest attention in the feed within 0.3 seconds"
      requirements:
        - "High contrast between subject and background"
        - "Bold, readable text if using text on image"
        - "Human faces perform 38% better than objects"
        - "Unexpected or pattern-interrupting composition"
        - "Vibrant or deliberately muted color palette (not muddy middle)"

    level_2_context_setter:
      purpose: "Communicate the content type and value promise"
      requirements:
        - "Brand-consistent visual identity (colors, fonts, style)"
        - "Content type is immediately clear (tutorial, quote, story, offer)"
        - "Thumbnail readable at smallest display size"

    level_3_story_carrier:
      purpose: "The visual itself communicates the message"
      requirements:
        - "The image or video could deliver value without any caption"
        - "Emotional resonance embedded in the visual"
        - "Progressive disclosure (reveals more on closer inspection)"

  platform_visual_standards:
    instagram:
      feed: "Curated, cohesive grid aesthetic with intentional color palette"
      stories: "Raw, immediate, personality-forward, use native stickers and polls"
      reels: "Movement in first frame, text overlay for sound-off viewing, native editing"

    twitter_x:
      images: "Simple, bold, high contrast, minimal text"
      infographics: "Single-insight visualization, not data-dense charts"
      video: "Square or portrait, captions burned in, hook in first 3 seconds"

    linkedin:
      documents: "Clean, professional design, each slide is one idea"
      images: "Authentic over polished, real photos outperform stock"
      video: "Talking head with captions, professional but not corporate"

    tiktok:
      video: "Vertical only, face close to camera, text hooks on screen"
      lighting: "Natural light or ring light, avoid dark or washed-out footage"
      editing: "Quick cuts, dynamic transitions, match trending edit styles"

    youtube:
      thumbnails: "Face with expression, 3-4 words max, high contrast, curiosity gap"
      video_quality: "1080p minimum, good audio is non-negotiable"
      b_roll: "Use supplementary footage to maintain visual interest"

# =============================================================================
# SECTION 7: COMMON MISTAKES AND ANTI-PATTERNS
# =============================================================================

common_mistakes:
  mistake_1:
    name: "All Right Hooks, No Jabs"
    description: >
      Every post has a sales angle. The feed is a catalog, not a conversation.
      The audience feels like an ATM, not a community.
    source_quote:
      text: "Until recently, traditional marketing was nothing but a one-sided boxing match, with businesses slamming right hooks onto the same three or four platforms—radio, television, print, outdoor, and then later, the Internet—as fast and as often as possible."
      chapter: "Introduction: Weigh-In (How Storytelling Is Like Boxing)"
    fix: >
      Audit your last 20 posts. Count jabs vs hooks. If the ratio is below
      3:1, create a content calendar that enforces the ratio structurally.
      Schedule jabs first, then find slots for hooks.

  mistake_2:
    name: "Platform-Agnostic Content"
    description: >
      Posting the exact same content with the exact same format across every
      platform. A LinkedIn article copy-pasted as a tweet. A TikTok video
      uploaded to YouTube without editing. Audiences can tell instantly when
      content was not made for their platform.
    source_quote:
      text: "You can't just repurpose old material created for one platform, throw it up on another one, and then be surprised when everyone yawns in your face. No one would ever think it was a good idea to use a print ad for a television commercial, or confuse a banner ad for a radio spot. Like their traditional media platform cousins, every social media platform has its own language."
      chapter: "Round 1: The Setup"
    fix: >
      Create platform-specific versions of every piece of content. Same core
      idea, but adapted to the culture, format, and user intent of each
      platform. One insight should become five different pieces of content,
      each native to its platform.

  mistake_3:
    name: "Ignoring the Platform's Current Culture"
    description: >
      Platforms evolve. What worked on Instagram in 2019 does not work in 2026.
      The format, algorithm, and audience expectations change continuously.
      Creators who stop paying attention to how platforms shift get left behind.
    fix: >
      Spend 15-30 minutes daily consuming content on each platform you use.
      Not as a creator, but as a user. Notice what stops your scroll. Notice
      what formats are getting traction. Reverse-engineer what is working now,
      not what worked six months ago.

  mistake_4:
    name: "Jabs That Are Actually Disguised Right Hooks"
    description: >
      Posting an educational tip and ending it with "Want to learn more?
      Check out my course." That is not a jab — it is a right hook with
      a jab costume. Audiences feel the bait-and-switch and trust erodes.
    source_quote:
      text: "The most effective jabs are actually the gentlest. They are thrown with 'native' content, which seamlessly blends in with the platform's offerings and tells stories that engage the consumer at an emotional level. From the outside, jabbing with this kind of content won't look or feel like the setup for that selling right hook, but it is, because the long-term financial worth of a person's smile, giggle, snort, and even her tears is invaluable."
      chapter: "Round 2: The Characteristics of Great Content and Compelling Stories"
    fix: >
      Commit to pure jabs. Deliver the full value without any mention of
      your offer. Let the quality of your free content do the selling.
      Your right hooks will land harder when your jabs are genuinely selfless.

  mistake_5:
    name: "Inconsistent Publishing Cadence"
    description: >
      Posting five times a day for a week, then disappearing for two weeks,
      then posting twice. The algorithm rewards consistency, not bursts.
      Your audience cannot build a habit around unpredictable content.
    source_quote:
      text: "The incredible brand awareness and bottom-line profits achievable through social media marketing require hustle, heart, sincerity, constant engagement, long-term commitment, and most of all, artful and strategic storytelling."
      chapter: "Introduction: Weigh-In"
    fix: >
      Set a sustainable daily minimum you can maintain for 12 months, even
      on your worst day. Better to post once daily for a year than five times
      daily for two months. Consistency compounds; bursts evaporate.

  mistake_6:
    name: "Right Hooks with No Clear CTA"
    description: >
      Posting conversion content but being vague about what you want the
      audience to do. Saying "check it out" instead of "tap the link in
      bio to download the free guide." Ambiguity kills conversion.
    fix: >
      Every right hook gets exactly one clear, specific CTA. State the action,
      state the benefit, and remove as much friction as possible. The audience
      should never have to guess what you want them to do.

  mistake_7:
    name: "Overthinking Instead of Publishing"
    description: >
      Spending three hours perfecting a single post that gets seen by 200
      people. The opportunity cost of perfectionism is massive. Volume and
      iteration beat perfection every time.
    fix: >
      Set a time limit per post (30-60 minutes maximum for most content).
      Publish, measure, learn, iterate. The market will tell you what is good.
      Your internal quality bar is not the same as your audience's.

# =============================================================================
# SECTION 8: THE JJJRH CONTENT CALENDAR SYSTEM
# =============================================================================

content_calendar_system:
  framework_name: "JJJRH Calendar Architecture"

  calendar_structure:
    daily_slots:
      slot_1:
        time: "Morning"
        type: "Jab (educational or inspirational)"
        purpose: "Start the day giving value"

      slot_2:
        time: "Midday"
        type: "Jab (entertaining or connecting)"
        purpose: "Stay visible during high-activity period"

      slot_3:
        time: "Evening"
        type: "Jab or Right Hook (rotate based on ratio)"
        purpose: "Close the day with engagement or conversion"

    weekly_pattern:
      monday: "Jab — Educational (teach something valuable)"
      tuesday: "Jab — Connective (share personal story or ask questions)"
      wednesday: "Jab — Educational (framework, how-to, or breakdown)"
      thursday: "Jab — Entertaining (industry humor, memes, relatable content)"
      friday: "Right Hook — Conversion (clear offer with CTA)"
      saturday: "Jab — Inspirational (transformation stories, vision-casting)"
      sunday: "Jab — Connective (community spotlight, behind-the-scenes)"

    monthly_right_hook_distribution:
      week_1_friday: "Soft ask (low-commitment CTA like newsletter signup)"
      week_2_friday: "Medium ask (free resource in exchange for email)"
      week_3_friday: "Direct ask (product or service promotion)"
      week_4_friday: "Testimonial-driven ask (social proof + CTA)"

  content_batching:
    principle: >
      Create content in batches to maintain consistency without burning
      out. One batch session per week can produce 5-7 days of content
      across platforms.

    batch_process:
      step_1: "Identify 3-5 core themes for the week"
      step_2: "Create 1 pillar piece of content"
      step_3: "Extract 7-14 micro-content pieces"
      step_4: "Adapt each piece to platform-native formats"
      step_5: "Schedule across the week using JJJRH rhythm"
      step_6: "Leave 2-3 slots open for real-time content"

# =============================================================================
# SECTION 9: APPLICATIONS TO ORGANIC MARKETING ENGINE
# =============================================================================

organic_marketing_applications:
  content_calendar_ratios:
    application: "Build JJJRH ratio into content calendar scheduling"
    implementation:
      - "Tag every piece of content as 'jab' or 'right hook' during planning"
      - "Enforce minimum 4:1 ratio at the weekly level"
      - "Track ratio over rolling 30-day window"
      - "Adjust ratio based on audience engagement signals"
      - "Allow launch-period exceptions with automatic reversion"

  give_to_ask_balance:
    application: "Calibrate audience trust before conversion attempts"
    implementation:
      - "Score audience trust level based on recent engagement metrics"
      - "Higher trust = right hooks land harder with less jab preparation"
      - "Lower trust = increase jab ratio to rebuild goodwill"
      - "New audiences always start at 6:1 ratio minimum"
      - "Graduated increase in hook frequency as trust metrics rise"

  platform_native_content:
    application: "Every content piece adapted to platform-specific context"
    implementation:
      - "Store platform requirements as constraints in content generation"
      - "One idea generates N platform-specific outputs (not copy-paste)"
      - "Format compliance checked before scheduling"
      - "Cultural tone adjusted per platform personality"
      - "Real-time trend integration window for each platform"

  micro_content_system:
    application: "Maximize content leverage through systematic extraction"
    implementation:
      - "Each pillar content piece mapped to extraction template"
      - "Minimum 10 micro-content pieces per pillar"
      - "Platform distribution plan generated with each extraction"
      - "Scheduling staggered to maximize fresh-content impression"
      - "Performance tracking per micro-piece to identify winning formats"

  real_time_responsiveness:
    application: "Capture attention spikes from cultural moments"
    implementation:
      - "Daily trend monitoring built into content workflow"
      - "Relevance filter applied before trend participation"
      - "Reserved scheduling slots for real-time content insertion"
      - "Post-trend performance analysis to calibrate future decisions"

# =============================================================================
# SECTION 10: KEY QUOTES AND PRINCIPLES
# =============================================================================

key_quotes:
  - quote: "Jab, jab, jab, jab, jab . . . right hook!"
    application: "The master formula for social media communication rhythm"
    source_quote:
      text: "Jab, jab, jab, jab, jab . . . right hook! Or . . . Give, give, give, give, give . . . ask. Get it?"
      chapter: "Round 2: The Characteristics of Great Content and Compelling Stories"

  - quote: "Content is king, but context is God."
    application: "Platform-native content always outperforms cross-posted content"
    source_quote:
      text: "Content is king, context is God, and then there's effort. Together, they are the holy trinity for winning on Facebook, Twitter, and any other platform, and even for winning in any business."
      chapter: "Round 9: Effort"

  - quote: "There is no sale without the story; no knockout without the setup."
    application: "Jabs (value content) create the conditions for right hooks (asks) to convert"
    source_quote:
      text: "It's just like when you're telling a good story—the punch line or climax has no power without the exposition and action that come before it. There is no sale without the story; no knockout without the setup."
      chapter: "Introduction: Weigh-In (How Storytelling Is Like Boxing)"

  - quote: "Today, getting people to hear your story on social media, and then act on it, requires using a platform's native language, paying attention to context, understanding the nuances and subtle differences that make each platform unique, and adapting your content to match."
    application: "One size fits none. Every platform needs its own content version."
    source_quote:
      text: "Today, getting people to hear your story on social media, and then act on it, requires using a platform's native language, paying attention to context, understanding the nuances and subtle differences that make each platform unique, and adapting your content to match."
      chapter: "Introduction: Weigh-In (The Sweet Science)"

  - quote: "Effort is the great equalizer."
    application: "Outwork the competition — budget and team size matter less than commitment"
    source_quote:
      text: "Effort is the great equalizer. It doesn't matter if your competitor is three times bigger than you and built like a Mack truck, or if it has a marketing budget that matches the GDP of a medium-size country, or if it has a staff of hundreds and you are alone in your broom closet with two laptops, an iPad, and a cell phone. What matters is the effort you put into your work."
      chapter: "Round 9: Effort"

  - quote: "Social media sells shit."
    application: "The bottom-line justification for social media investment"
    source_quote:
      text: "Ultimately, that's the real reason to do any of this—because social media sells shit."
      chapter: "Round 1: The Setup"

  - quote: "Forget Mad Men, and fuck Don Draper."
    application: "The old marketing playbook is dead. Adapt or get left behind."
    source_quote:
      text: "Forget Mad Men, and fuck Don Draper. He lived in an easy world where nothing changed for thirty years, where you could spend your whole career working to figure out how the print and television markets worked. This world, the one you and I live in, evolves every second, every day."
      chapter: "Round 12: Knockout"

  - quote: "We have to remember to give, give, give before we ask."
    application: "The foundation of authentic content is consistent value delivery"
    source_quote:
      text: "We have to remember to give, give, give before we ask. That will always be the real challenge. That, and moving fast enough to keep up."
      chapter: "Round 12: Knockout"

principles_summary:
  - "Give massively before you ever ask"
  - "Respect the platform you are on"
  - "Speed and volume beat perfection"
  - "Every piece of content earns or spends trust"
  - "Real-time relevance creates outsized returns"
  - "Consistency compounds; bursts evaporate"
  - "Your audience owes you nothing — earn their attention every day"
  - "The best content makes people feel, not just think"
  - "Context determines whether great content works or fails"
  - "Social media is a marathon disguised as a series of sprints"

