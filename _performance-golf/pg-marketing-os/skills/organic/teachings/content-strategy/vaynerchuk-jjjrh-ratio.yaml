# VAYNERCHUK JAB JAB JAB RIGHT HOOK TEACHING FILE
# Extracted from: "Jab, Jab, Jab, Right Hook: How to Tell Your Story in a Noisy Social World"
# Author: Gary Vaynerchuk
# Extraction Date: March 2026

meta:
  author: gary_vaynerchuk
  source_book: "Jab, Jab, Jab, Right Hook"
  publication_year: 2013
  core_thesis: >
    Social media marketing is a boxing match. Jabs are value-first content that
    builds relationships — entertaining, educating, inspiring, or connecting with
    your audience without asking for anything in return. Right hooks are the asks —
    the calls to action, the sales pitches, the conversion plays. Most brands fail
    because they throw nothing but right hooks. The winning formula is jab, jab,
    jab, right hook — give massive value repeatedly, earn the relationship, then
    and only then make your ask. Content is king, but context is god. Every piece
    of content must be native to the platform it lives on, respecting the culture,
    format, and user intent of that specific channel.
  extraction_purpose: "Organic content creation and marketing strategy"
  created_for: "OrganicMarketingEngine"
