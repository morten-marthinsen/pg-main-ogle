# =============================================================================
# SETH GODIN - THIS IS MARKETING
# Complete Framework Extraction for Organic Content Strategy
# =============================================================================
# Source: "This Is Marketing: You Can't Be Seen Until You Learn to See"
# Author: Seth Godin
# Published: 2018
# =============================================================================

meta:
  title: "This Is Marketing - Complete Framework Extraction"
  author: "Seth Godin"
  source_book: "This Is Marketing: You Can't Be Seen Until You Learn to See"
  year: 2018
  extracted_for: "Organic Marketing Engine"
  extraction_date: "2026-03-03"
  core_thesis: |
    Marketing is the generous act of helping someone solve a problem. It's about
    making change happen by understanding the irrational forces that drive people,
    telling stories that resonate, and serving the smallest viable audience with
    empathy and respect.

# =============================================================================
# 1. PERMISSION MARKETING
# =============================================================================
permission_marketing:
  core_definition: |
    The privilege of delivering anticipated, personal, and relevant messages to
    people who want to get them. Permission is earned, not taken. It's about
    respecting attention as a precious resource and building trust over time.

  key_principle: |
    "Pay attention" is a key phrase because when someone chooses to pay attention
    they actually are paying you with something valuable. And there's no way they
    can get their attention back if they change their mind.

  the_three_requirements:
    anticipated: "People look forward to hearing from you"
    personal: "Messages connect to the individual directly"
    relevant: "About something the recipient cares about"

  key_insights:
    - quote: "Real permission works like this: If you stop showing up, people are concerned. They ask where you went."
    - quote: "Permission is like dating. You don't start by asking for the sale at first impression. You earn the right, over time, bit by bit."
    - quote: "Just because you somehow get my email address doesn't mean you have permission to use it."
    - insight: "The promise is the promise until both sides agree to change it"
    - insight: "Subscriptions are an overt act of permission"
    - insight: "If Facebook cost three dollars a month, it would have attracted fewer than a million users - free spreads"

  earned_vs_interruption:
    interruption_marketing:
      description: "Spam, cold outreach, buying attention"
      problems:
        - "Steals attention without earning it"
        - "Creates distrust"
        - "Doesn't scale effectively"
        - "Makes people feel violated"
      examples:
        - "Cold email blasts"
        - "Unsolicited DMs"
        - "Pop-up ads"
        - "Robocalls"

    permission_marketing:
      description: "Earning the right to communicate through value delivery"
      benefits:
        - "Higher engagement rates (70%+ open rates possible)"
        - "Trust compounds over time"
        - "Creates genuine relationships"
        - "Sustainable long-term asset"
      examples:
        - "Email newsletters people subscribe to"
        - "Podcasts people actively seek out"
        - "Communities people choose to join"
        - "Content people actively search for"

  examples_from_book:
    yoyodyne:
      description: "Godin's company that pioneered permission email marketing"
      results: "70% open rates, 33% response rates - 1000x typical rates"

    daily_candy:
      description: "Email newsletter for young women about local sales and events"
      outcome: "Sold for over $100 million"
      lesson: "Permission asset has massive monetary value"

    rapcaviar:
      description: "Spotify playlist curated by Tuma Basa"
      growth: "From 0 to 9 million subscribers"
      impact: "Most important asset in the music business"

  anti_patterns:
    - pattern: "Spamming your list because you're desperate"
      why_fails: "Destroys the trust you've built"
    - pattern: "Renting or selling your permission list"
      why_fails: "Breaks the promise you made to earn permission"
    - pattern: "Expanding scope beyond what you promised"
      why_fails: "Permission is specific - stay within bounds"
    - pattern: "Building on rented platforms only"
      why_fails: "You don't own the relationship, they do"

  application_to_organic_content:
    strategy: |
      Treat every piece of content as an opportunity to earn permission for the
      next interaction. Don't ask for the sale immediately - build trust through
      consistent value delivery.

    tactics:
      content_creation:
        - "Create content worth seeking out, not content that interrupts"
        - "End each piece with an invitation to go deeper (not a hard sell)"
        - "Deliver more value than you promise"
        - "Be consistent in voice, quality, and timing"

      permission_ladder:
        step_1: "Free content that provides genuine value"
        step_2: "Invitation to subscribe/follow for more"
        step_3: "Regular delivery of promised content"
        step_4: "Deeper engagement opportunities"
        step_5: "Eventually, offers that serve their goals"

      metrics_that_matter:
        - "How many people would complain if you stopped posting?"
        - "What percentage actively engage vs passively scroll?"
        - "Are people sharing because they want to, not because you asked?"
        - "Do people remember what you said last week?"

    content_principles:
      - "Show up regularly, consistently, and generously, for years"
      - "Protect the permission asset - don't spam for short-term metrics"
      - "Own your permission list - don't rely solely on platforms"
      - "Make it easy for the right people to find you and subscribe"

# =============================================================================
# 2. SMALLEST VIABLE AUDIENCE
# =============================================================================
smallest_viable_audience:
  core_definition: |
    Instead of trying to reach everyone, focus all your energy on the minimum
    number of people you need to make your effort worthwhile. This constraint
    forces specificity, which leads to resonance, which creates evangelists.

  key_principle: |
    "The relentless pursuit of mass will make you boring, because mass means
    average, it means the center of the curve, it requires you to offend no one
    and satisfy everyone."

  key_insights:
    - quote: "If you could only change thirty people, or three thousand people, you'd want to be choosy about which people."
    - quote: "The smallest viable market is the focus that, ironically and delightfully, leads to your growth."
    - quote: "Everything gets easier when you walk away from the hubris of everyone."
    - quote: "What's the minimum number of people you would need to influence to make it worth the effort?"
    - insight: "Specific is a kind of bravery - it means accountable"
    - insight: "Your work is not for everyone. It's only for those who signed up for the journey."

  the_thousand_true_fans:
    concept: "Kevin Kelly's essay - 1000 true fans might be sufficient to live a better-than-decent life"
    definition: |
      "A true fan is defined as a fan that will buy anything you produce. These
      diehard fans will drive two hundred miles to see you sing; they will buy
      the hardback and paperback and Audible versions of your book."
    implication: |
      "The challenge for most people who seek to make an impact isn't winning over
      the mass market. It's the micro market."

  union_square_cafe_example:
    situation: "Danny Meyer knew he could only serve 600 people a day"
    insight: "If you can only delight 600 people, the best way to begin is by choosing which 600"
    selection_criteria:
      - "Choose the people who want what you're offering"
      - "Choose the people most open to hearing your message"
      - "Choose the people who will tell the right other people"
    result: "The magic was in the guts it took to carefully curate the customers"

  grateful_dead_example:
    facts:
      - "Only one top 40 Billboard hit ever"
      - "Grossed more than $350 million while Jerry Garcia was alive"
      - "Average ticket price just $23"
    strategy:
      - "Appealed to a relatively tiny audience and focused all energy on them"
      - "Relied on fans to spread the word by encouraging taping"
      - "Relied on a small number of true fans who supported them a lot"
      - "Gave fans plenty to talk about and stand for"
    requirements:
      - "Extraordinary talent"
      - "Significant patience"
      - "The guts to be quirky"

  open_heart_project_example:
    founder: "Susan Piver"
    result: "Largest meditation community in the world with 20,000+ members"
    method:
      - "Start with empathy to see a real need"
      - "Focus on the smallest viable market"
      - "Match the worldview of people being served"
      - "Make it easy to spread"
      - "Earn and keep attention and trust"
      - "Offer ways to go deeper"
      - "Create and relieve tension as people progress"
      - "Show up, often, with humility"

  simple_marketing_promise_template:
    format: |
      My product is for people who believe _________________.
      I will focus on people who want _________________.
      I promise that engaging with what I make will help you get _________________.

  anti_patterns:
    - pattern: "Trying to appeal to everyone"
      why_fails: "You end up appealing to no one deeply"
    - pattern: "Sanding off the edges to avoid criticism"
      why_fails: "The edges are what make you remarkable"
    - pattern: "Changing your message for every audience"
      why_fails: "Inconsistency destroys trust"
    - pattern: "Measuring success by total reach instead of depth"
      why_fails: "100 true fans > 10,000 passive followers"

  its_not_for_you:
    concept: |
      "It's not for you" shows the ability to respect someone enough that you're
      not going to waste their time, pander to them, or insist that they change
      their beliefs.
    power: |
      It's the freedom to ignore critics who don't get the joke, the privilege
      of polishing your story for those that most need to hear it.
    example: |
      Every best-selling book on Amazon has at least a few one-star reviews.
      It's impossible to create work that both matters and pleases everyone.

  application_to_organic_content:
    strategy: |
      Define your smallest viable audience with extreme specificity. Create content
      exclusively for them. Use "it's not for you" as a feature, not a bug.

    tactics:
      audience_definition:
        - "Define by psychographics (beliefs, desires, fears) not demographics"
        - "Ask: What do they dream of? What do they believe? What do they want?"
        - "Be specific enough that you could pick them out of a crowd"
        - "Consider: What worldview do they share?"

      content_focus:
        - "Create content that makes your SVA feel seen and understood"
        - "Use insider language that signals 'this is for people like us'"
        - "Ignore feedback from people outside your SVA"
        - "Double down on what resonates with your core audience"

      growth_model:
        principle: "The core of your market, enriched and connected, organically shares with the next layer"
        steps:
          - "Delight your smallest viable audience completely"
          - "Give them something worth talking about"
          - "Make sharing benefit THEM (status, connection)"
          - "Let them bring in the next layer of audience"

    metrics_that_matter:
      - "How many people would miss you if you were gone?"
      - "What percentage of your audience takes action?"
      - "Are your most engaged followers bringing in new people?"
      - "Can you name your best 100 followers?"

# =============================================================================
# 3. STATUS AND AFFILIATION
# =============================================================================
status_and_affiliation:
  core_definition: |
    The two fundamental drives that determine human behavior and purchasing
    decisions. Status is our position in the hierarchy (real or perceived).
    Affiliation vs. Dominance are the two primary ways we seek to measure
    and change our status.

  key_principle: |
    "At the heart of our culture is our belief in status, in our self-perceived
    understanding of our role in any interaction, in where we're going next."

  six_things_about_status:
    1_relative: "Status is always relative. It's about perception relative to others in the group."
    2_in_the_eye: "Status is in the eyes of the beholder. Different to different people."
    3_attended_to: "Status attended to is the status that matters. Only when someone cares."
    4_inertia: "Status has inertia. We work to maintain it more than change it."
    5_learned: "Status is learned. Our beliefs start early but cohorts influence perception."
    6_shame: "Shame is the status killer. If we accept shame, it undermines our narrative."

  two_types_of_status_seeking:
    affiliation:
      definition: "Status through connection, belonging, being in sync with others"
      questions_asked:
        - "Who knows you?"
        - "Who trusts you?"
        - "Have you made things better?"
        - "What is your circle like?"
        - "Where do you stand within the tribe?"
        - "Can't we all get along?"
      characteristics:
        - "Horizontal - who's standing next to me?"
        - "Welcomes abundance - more affiliation helps everyone"
        - "Values being part of something"
        - "Status from contribution and connection"

    dominance:
      definition: "Status through winning, control, power over others"
      questions_asked:
        - "This is mine, not yours"
        - "Who has more power?"
        - "I did this myself"
        - "My family needs more of what we already have"
        - "My side dominating means I don't have to be in charge"
      characteristics:
        - "Vertical - above or below"
        - "Zero-sum thinking"
        - "Values winning"
        - "Status from defeating others"

  key_insights:
    - quote: "The desire to change our status, or to protect it, drives almost everything we do."
    - quote: "Status is not the same as wealth. A Pulitzer-winning columnist might have more status than a wealthy surgeon."
    - quote: "It's a mistake to believe that everyone wants to make their status higher. In fact, few people do."
    - quote: "Some people want responsibility, while others seek to be recognized."
    - insight: "When the marketer shows up with her new idea, every time, it's a challenge to our status"
    - insight: "Before paying for ads, understand what status roles you're engaging with"

  godfather_example:
    scene: "Opening scene - undertaker visiting Don Corleone"
    dynamic: |
      The low-status Bonasera comes to visit the high-status Don Corleone.
      Through the scene, status is challenged, tension created, and ultimately
      restored when the undertaker bows and kisses the ring.
    lesson: "Status dynamics create tension, and relieving that tension requires action"

  lion_guardians_example:
    problem: "Maasai rite of passage involved killing lions"
    solution: "Created new rite of passage - saving lions instead"
    principle: |
      "None of these goals are directly related to killing a lion. That was
      simply a historical artifact." The underlying need was for status, bravery,
      community binding - not the specific action.
    result: "Protecting a lion became as much of a rite of passage as killing one"

  frank_sinatra_example:
    external: "High-status power broker, definition of suave and sophisticated"
    internal: "Saw a low-status skinny kid, disrespected, barely holding on"
    lesson: |
      "When we bring status into our marketing, we are walking on very thin ice.
      We don't know if the person appears to have high status but doesn't believe it."

  status_grids:
    external_vs_internal:
      top_right_high_high:
        description: "High external, high internal - rare, like Oprah"
        characteristic: "Chooses, doesn't wait to be chosen"
      top_left_high_external_low_internal:
        description: "High external, low internal - divas, impostor syndrome"
        example: "Frank Sinatra"
      bottom_right_low_external_high_internal:
        description: "Low external, high internal - artistic drive"
        risk: "Can lead to bitterness over time"
      bottom_left_low_low:
        description: "Undeserving and world agrees - consistent but sad"
        example: "Cinderella before the ball"

    movement_direction:
      quadrant_1: "Helps others up while moving up - philanthropist, committed teacher"
      quadrant_2: "Helps others up while moving down - lets others ahead, doesn't compete"
      quadrant_3: "Pushes others down while moving down - antisocial, narcissistic"
      quadrant_4: "Pushes others down while moving up - hard-charging, selfish competitor"

  anti_patterns:
    - pattern: "Assuming everyone wants higher status"
      why_fails: "Some people actively seek lower status for safety"
    - pattern: "Using only dominance messaging"
      why_fails: "Many people are affiliation-seekers"
    - pattern: "Ignoring status implications of your offer"
      why_fails: "Every purchase is a status decision"
    - pattern: "Shaming your audience"
      why_fails: "Shame is the status killer"

  application_to_organic_content:
    strategy: |
      Understand whether your audience seeks status through affiliation or
      dominance. Design content that helps them achieve the type of status
      they're seeking.

    tactics:
      for_affiliation_seekers:
        - "Create content that makes them feel part of something"
        - "Highlight community and connection"
        - "Show them they're not alone in their beliefs"
        - "Make sharing your content raise their status with peers"
        - "Use 'people like us' language"

      for_dominance_seekers:
        - "Create content that helps them win"
        - "Provide competitive advantages"
        - "Show them how to be ahead of others"
        - "Make sharing your content demonstrate their superior knowledge"
        - "Use 'get ahead' language"

      universal_tactics:
        - "Never make your audience feel stupid"
        - "Raise their status through association with you"
        - "Let them take credit for your insights"
        - "Make consuming your content a status-positive activity"

    key_question: "How will consuming/sharing this content change their status?"

# =============================================================================
# 4. TENSION AND RELEASE
# =============================================================================
tension_and_release:
  core_definition: |
    Tension is the productive discomfort that drives forward motion. It's the
    gap between where someone is and where they could be. Creating tension
    (without fear) and providing a clear path to release it is how marketers
    cause change to happen.

  key_principle: |
    "Marketers create tension, and forward motion relieves that tension."

  tension_vs_fear:
    tension:
      description: "The promise that we can get through to the other side"
      characteristics:
        - "Creates productive discomfort"
        - "Motivates forward motion"
        - "Can be resolved through action"
        - "Generates curiosity"
      example: "The tension of 'this might work' vs 'this might not work'"

    fear:
      description: "A dream killer that creates paralysis"
      characteristics:
        - "Puts people in suspended animation"
        - "Creates holding breath, paralysis"
        - "Unable to move forward"
        - "Shuts down possibility"
      quote: "Fear's a dream killer. It puts people into suspended animation."

  key_insights:
    - quote: "All effective education creates tension, because just before you learn something, you're aware you don't know it (yet)."
    - quote: "If you care enough about the change you seek to make, you will care enough to generously and respectfully create tension on behalf of that change."
    - quote: "The status quo doesn't shift because you're right. It shifts because the culture changes."
    - quote: "When you arrive on the scene with your story, with the solution you have in mind, do you also create tension? If you don't, the status quo is likely to survive."
    - insight: "Tension is what drives people to take action"
    - insight: "The tension of being left behind is one of the most powerful forces"

  pattern_match_vs_pattern_interrupt:
    pattern_match:
      description: "When your offering matches existing expectations"
      characteristics:
        - "Easy choice to add to the mix"
        - "Low tension"
        - "Comfortable for the audience"
        - "Hard to stand out"
      example: "A new cereal brand for families already buying cereals"

    pattern_interrupt:
      description: "When you're asking someone to change established behavior"
      characteristics:
        - "Requires tension to overcome inertia"
        - "Needs justification"
        - "Often rejected initially"
        - "Bigger potential impact"
      example: "Convincing someone who never hired a gardener to hire you"

  slack_example:
    initial_adoption: "Pattern match - new software for people who like new software"
    then_the_leap: "Gave early users a tool to create pattern interrupt peer-to-peer"
    tension_created: "Every day you're not on Slack, people at work are talking without you"
    release: "Sign in and the tension goes away"
    result: "Multi-billion dollar company"

  going_out_of_business_sale:
    paradox: "If the store was good, it wouldn't be going out of business"
    why_it_works: "Scarcity creates tension - 'What bargains did I miss?'"
    lesson: "The best way to relieve that tension is to go check it out"

  sources_of_tension:
    - "The tension of not knowing and needing to know more"
    - "The tension of being left behind"
    - "The tension that things might get better (or worse)"
    - "The tension of missing out on what people like us are doing"
    - "The tension of not being in sync with the tribe"

  anti_patterns:
    - pattern: "Creating fear instead of tension"
      why_fails: "Fear paralyzes, it doesn't motivate"
    - pattern: "No tension at all - just presenting information"
      why_fails: "No reason to act - status quo wins"
    - pattern: "Tension with no clear release"
      why_fails: "Frustration without direction"
    - pattern: "Coercion or manipulation"
      why_fails: "Destroys trust and relationships"

  application_to_organic_content:
    strategy: |
      Create productive tension in your content that can only be resolved by
      engaging more deeply. Make the gap between where they are and where
      they could be viscerally felt.

    tactics:
      creating_tension:
        - "Open a loop that can only be closed by taking action"
        - "Show the gap between current state and possible state"
        - "Demonstrate what 'people like us' are doing differently"
        - "Create FOMO that's genuine, not manufactured"
        - "Ask questions that highlight what they don't know"

      providing_release:
        - "Make the next step clear and achievable"
        - "Show that forward motion is possible"
        - "Provide a path, not just a destination"
        - "Let them resolve tension on their terms"
        - "Never leave them hanging with no path forward"

      content_structure:
        hook: "Create tension immediately"
        body: "Increase tension while showing path forward"
        call_to_action: "Offer release through specific action"

    key_question: "What tension am I creating, and how can my audience resolve it?"

# =============================================================================
# 5. THE STATUS QUO
# =============================================================================
the_status_quo:
  core_definition: |
    The existing state that resists change. The status quo is powerful because
    it's comfortable, validated by time, and defended by those who have adapted
    to it. Changing the status quo requires understanding why it exists and
    creating enough tension to overcome inertia.

  key_principle: |
    "The status quo doesn't shift because you're right. It shifts because the
    culture changes. And the engine of culture is status."

  why_status_quo_is_powerful:
    - "It's good at resisting efforts by insurgents"
    - "If all it took was truth, we would have changed long ago"
    - "If all we needed was a better idea, we would have shifted already"
    - "Inertia is a powerful force"
    - "Change is risky"
    - "We often want others to go first"

  key_insights:
    - quote: "The best ideas aren't instantly embraced. Even the ice cream sundae and the stoplight took years to catch on."
    - quote: "Your most generous and insightful work needs help finding the people it's meant to serve."
    - quote: "Everyone always acts in accordance with their internal narratives."
    - quote: "You can't get someone to do something that they don't want to do."
    - insight: "Most of the time, what people want is to take action that reinforces their internal narratives"
    - insight: "The status quo has defenders - those who have adapted to it"

  internal_narrative:
    definition: "The story we tell ourselves about who we are and how we act"
    power: "Everyone always acts in accordance with their internal narratives"
    implication: |
      "The real question is: where does the internal narrative come from, and
      how does it get changed? Or, how do we use the internal narrative to
      change the actions that people take?"
    drivers_of_narrative_change:
      - "Desire to fit in (people like us do things like this)"
      - "Perception of status"
      - "Tension that creates forward motion"

  changing_status_quo:
    it_requires:
      - "Understanding why the status quo exists"
      - "Creating sufficient tension"
      - "Showing a clear path to resolution"
      - "Making the change feel like 'people like us'"
      - "Patience and persistence"

    it_does_not_require:
      - "Being right"
      - "Having the best solution"
      - "Logical arguments alone"
      - "Proving others wrong"

  anti_patterns:
    - pattern: "Expecting logic to overcome inertia"
      why_fails: "The status quo isn't maintained by logic"
    - pattern: "Attacking what people currently believe"
      why_fails: "They defend their identity, not the belief"
    - pattern: "Trying to change everyone at once"
      why_fails: "Start with those ready for change"
    - pattern: "Giving up when initial resistance appears"
      why_fails: "Resistance is expected - persistence matters"

  application_to_organic_content:
    strategy: |
      Don't fight the status quo directly. Instead, create a new status quo
      for a small group, then let it spread. Make change feel like identity
      confirmation, not identity threat.

    tactics:
      - "Acknowledge where people are before showing where they could be"
      - "Frame change as evolution, not revolution"
      - "Use 'people like us' to make change feel safe"
      - "Start with the early adopters who want change"
      - "Let changed people change others"

    key_question: "What status quo am I asking them to leave, and why would they?"

# =============================================================================
# 6. ENROLLMENT
# =============================================================================
enrollment:
  core_definition: |
    Getting people to come along on a journey voluntarily. Enrollment is earned
    through trust and value, not demanded through authority or manipulation.
    It's the foundation of permission marketing and lasting change.

  key_principle: |
    "There's no such thing as mandatory education. It's almost impossible to
    teach people against their will. The alternative is voluntary education:
    gaining enrollment."

  what_enrollment_is:
    - "Hands raised, eyes on the board, notes being taken"
    - "Mutual, consensual, and leads to change"
    - "The first step on a journey of mutual learning"
    - "What you need to earn permission to engage"
    - "Students becoming teachers, spreading the word"

  key_insights:
    - quote: "Enrollment is what you need to earn permission to engage."
    - quote: "Lazy marketers try to buy enrollment with flashy ads. The best marketers earn enrollment by seeking people who want the change being offered."
    - quote: "Once you earn permission, you can educate. You have enrollment. You can take your time and tell a story."
    - insight: "Enrollment leads to permission leads to education leads to change"
    - insight: "The enrolled become evangelists"

  earning_enrollment:
    requirements:
      - "Seek people who want the change you're offering"
      - "Connect people to others who want the change"
      - "Demonstrate that you understand their worldview"
      - "Provide value before asking for commitment"
      - "Be consistent and trustworthy over time"

    process:
      step_1: "Show up with genuine value"
      step_2: "Earn attention through relevance"
      step_3: "Build trust through consistency"
      step_4: "Invite deeper engagement"
      step_5: "Deliver on promises made"
      step_6: "Repeat with increasing depth"

  story_framework_marshall_ganz:
    description: "Three-part narrative for creating enrollment and action"

    story_of_self:
      purpose: "Gives you standing, a platform from which to speak"
      content: "Your transition - from who you used to be to who you became"
      power: "Shows you are people like us"

    story_of_us:
      purpose: "The kernel of a tribe"
      questions: "Why are we alike? Why should we care?"
      power: "Creates empathy and connection"
      content: "About together, not apart"

    story_of_now:
      purpose: "Enlists the tribe on the journey"
      content: "The critical pivot to action"
      power: "Uses peer opportunity/pressure for forward motion"
      urgency: "If we hesitate or leave others behind, it won't work"

    example: |
      "I used to be fifty pounds overweight. My health was in tatters...
      Then I discovered competitive figure skating... The real win was the
      friendships I made... I'm so glad you were willing to come to the rink
      today. I called ahead and they've reserved some rental skates for you..."

  anti_patterns:
    - pattern: "Demanding enrollment without earning it"
      why_fails: "Creates resistance instead of engagement"
    - pattern: "Buying enrollment with flashy tactics"
      why_fails: "Shallow engagement that doesn't last"
    - pattern: "Skipping story of self and us, going straight to now"
      why_fails: "No foundation for trust"
    - pattern: "Enrollment without follow-through"
      why_fails: "Destroys trust for future attempts"

  application_to_organic_content:
    strategy: |
      Use the story of self, story of us, story of now framework in your
      content. Build enrollment gradually through consistent value delivery.

    tactics:
      story_of_self_in_content:
        - "Share your transformation journey authentically"
        - "Show the before and after of your own change"
        - "Be vulnerable about challenges faced"
        - "Demonstrate that you understand their struggle"

      story_of_us_in_content:
        - "Create content that builds community"
        - "Highlight what you share with your audience"
        - "Use 'we' language to create belonging"
        - "Show examples of others on the journey"

      story_of_now_in_content:
        - "Create urgency that's genuine"
        - "Make clear what action to take"
        - "Show what they'll miss if they don't act"
        - "Provide specific next steps"

    key_question: "Have I earned the right to ask for this action?"

# =============================================================================
# 7. EMPATHY AND SERVICE
# =============================================================================
empathy_and_service:
  core_definition: |
    Marketing as a generous act of helping others become who they seek to become.
    It requires empathy - understanding that others don't want what you want,
    don't believe what you believe, and don't care about what you care about.

  key_principle: |
    "Marketing is the generous act of helping someone solve a problem. Their
    problem. It's a chance to change the culture for the better."

  sonder:
    definition: "The moment when you realize that everyone around you has an internal life as rich and as conflicted as yours"
    implications:
      - "Everyone has noise in their heads"
      - "Everyone thinks they are right"
      - "Everyone is afraid and realizes they're lucky"
      - "Everyone has an impulse to make things better"
      - "Everyone wants something they can't possibly have"
      - "Everyone is lonely, insecure, and a bit of a fraud"

  key_insights:
    - quote: "Marketing isn't a race to add more features for less money. Marketing is our quest to make change on behalf of those we serve."
    - quote: "People don't believe what you believe. They don't know what you know. They don't want what you want."
    - quote: "My narrative about how to buy glasses isn't better or worse than the next villager's. If it's not working, it's arrogant to insist on it."
    - quote: "The way we make things better is by caring enough about those we serve to imagine the story that they need to hear."
    - insight: "You can make two mistakes: assume they're rational, or assume everyone is like you"
    - insight: "Dance with them instead of marketing to them"

  visionspring_example:
    situation: "Selling reading glasses to villagers who needed them"
    problem: "Only 35% of people who needed glasses and had money bought them"
    original_approach: "Shopping experience - choose from styles, try on, buy"
    insight: |
      "For villagers who grew up in poverty, shopping wasn't fun - it was
      risk. They didn't have the experience of shopping as pleasure."
    solution: "Changed to: 'Here are your glasses. Pay if you want to keep them.'"
    result: "Doubled sales"
    lesson: |
      "Desire for gain versus avoidance of loss. The story that worked for
      the marketer wasn't the story that worked for the customer."

  dog_food_example:
    observation: "Americans spend $24B on dog food. Dogs don't buy dog food."
    insight: "Dog food is for dog owners, not dogs"
    implication: |
      "The way it makes them feel, the satisfaction of taking care of an
      animal, the status of buying a luxury good, and the generosity of sharing."
    lesson: "Understand the real buyer and their real motivations"

  the_million_dollar_donor:
    scenario: "Fundraiser trying to raise $1 million"
    wrong_approach: "Thinking 'I'd never give a million dollars'"
    right_approach: "Understanding that for the donor, it's a bargain"
    donor_thinking: |
      "This million-dollar donation is a bargain. I'm going to get at least
      two million dollars' worth of joy, status, and satisfaction."
    lesson: |
      "If you're unwilling to have empathy for the narrative of the person
      you seek to serve, you're stealing."

  service_mindset:
    definition: "Doing what's best for those you serve, not what's easiest for you"
    requires:
      - "Emotional labor - doing what we don't feel like doing"
      - "Showing up with a smile when wincing inside"
      - "Professional consistency regardless of mood"
      - "Protecting yourself so you can serve tomorrow"
    quote: "Marketing acts are the generous actions of people who care"
    not_about_authenticity: |
      "If you need to be authentic to do your best work, you're not a
      professional, you're a fortunate amateur."

  anti_patterns:
    - pattern: "Assuming your worldview is correct"
      why_fails: "Your narrative is just your narrative"
    - pattern: "Marketing to yourself instead of your audience"
      why_fails: "They don't want what you want"
    - pattern: "Telling instead of listening"
      why_fails: "Empathy requires understanding first"
    - pattern: "Giving up when they don't respond"
      why_fails: "You may be using the wrong story"

  application_to_organic_content:
    strategy: |
      Create content from a place of genuine service. Understand your
      audience's internal narrative and create content that meets them where
      they are, not where you want them to be.

    tactics:
      building_empathy:
        - "Spend time in communities where your audience lives"
        - "Read what they write in their own words"
        - "Listen to their fears, dreams, and frustrations"
        - "Ask questions and actually listen to answers"
        - "Remember: sonder - their life is as rich and conflicted as yours"

      content_creation:
        - "Start from their problem, not your solution"
        - "Use their language, not your jargon"
        - "Anticipate their objections with empathy"
        - "Make them feel seen and understood"
        - "Help them become who they seek to become"

    key_question: "What story do they need to hear, and am I telling it?"

# =============================================================================
# 8. STORIES AND WORLDVIEWS
# =============================================================================
stories_and_worldviews:
  core_definition: |
    Worldview is the shortcut, the lens each of us uses when we see the world.
    Our assumptions, biases, and stereotypes. Stories are how we communicate
    with those worldviews - not to change them, but to match them and lead
    people to the change they already seek.

  key_principle: |
    "Human beings tell themselves stories. Those stories, as far as each of us
    is concerned, are completely and totally true, and it's foolish to try to
    persuade them (or us) otherwise."

  worldview_definition:
    components:
      - "Assumptions about how the world works"
      - "Biases formed through experience"
      - "Stereotypes used as shortcuts"
      - "Core beliefs about what's true"
    key_insight: |
      "We can group people based on the stories they tell themselves.
      Cognitive linguist George Lakoff calls these clumps worldviews."
    examples:
      - "Loyal Fox News viewers have a worldview"
      - "Fox hunters have a worldview"
      - "People who show up at Rocky Horror screenings have a worldview"

  story_characteristics:
    effective_stories:
      - "Connect us to our purpose and vision"
      - "Allow us to celebrate our strengths"
      - "Deepen understanding of unique value"
      - "Reinforce core values"
      - "Help us act in alignment"
      - "Encourage response rather than reaction"
      - "Attract customers who share our values"
      - "Build brand loyalty"
      - "Attract like-minded employees"
      - "Help us stay motivated"

    story_requirements:
      - "Must resonate with listener's existing worldview"
      - "Must invite them on a journey"
      - "Must be true (made true by your actions)"
      - "Must deliver on the promise"

  jcpenney_example:
    situation: "Ron Johnson became CEO in 2011"
    his_worldview: "Quality retailers don't do constant discounts"
    action: "Ended constant stream of discounts and sales"
    result: "Sales plummeted by more than 50%"
    lesson: |
      "He abandoned Penney's true fans: people who loved the sport of
      bargain hunting. Their worldview differed from his."
    insight: "Customers were playing a game that made them feel like winning"

  key_insights:
    - quote: "What you say isn't nearly as important as what others say about you."
    - quote: "Persistent, consistent, and frequent stories, delivered to an aligned audience, will earn attention, trust, and action."
    - quote: "We're not faking our points of view, our dreams, and our fears. And neither are the people we seek to serve."
    - quote: "If we can accept that people have embraced who they have become, it gets a lot easier to dance with them."
    - insight: "Don't try to transform them or get them to admit they were wrong"
    - insight: "Simply dance with them - have a chance to connect"

  people_like_us_do_things_like_this:
    definition: "The core mechanism of cultural change and marketing"
    power: |
      "For most of us, from the first day we are able to remember until the
      last day we breathe, our actions are primarily driven by one question:
      'Do people like me do things like this?'"
    examples:
      - "People like me don't cheat on their taxes"
      - "People like me own a car; we don't take the bus"
      - "People like me have a full-time job"
      - "People like me want to see the new James Bond movie"
    implication: |
      "Even when we adopt the behavior of an outlier, we're still aligning
      ourselves with the behavior of outliers."

  culture_and_normalization:
    process:
      - "Normalization creates culture"
      - "Culture drives our choices"
      - "Choices lead to more normalization"
    marketer_role: |
      "Marketers don't make average stuff for average people. Marketers make
      change. And they do it by normalizing new behaviors."

  blue_ribbons_example:
    situation: "School budget vote failed"
    action: "Tied blue ribbons to trees around town"
    message: "People like us, in this Blue Ribbon district, support our schools"
    result: "Budget passed two to one"
    lesson: "Changing what 'people like us' do changes behavior"

  anti_patterns:
    - pattern: "Trying to change someone's worldview directly"
      why_fails: "Worldviews are defended as identity"
    - pattern: "Telling stories that don't match their existing narrative"
      why_fails: "They won't hear it or believe it"
    - pattern: "Using logic to overcome story"
      why_fails: "Story always wins over facts"
    - pattern: "Assuming your story is their story"
      why_fails: "Different people tell themselves different stories"

  application_to_organic_content:
    strategy: |
      Identify the worldview of your smallest viable audience. Create
      content that matches and extends their existing narrative. Use
      "people like us" as the engine of change.

    tactics:
      worldview_matching:
        - "Identify what your audience already believes"
        - "Use language and symbols that signal 'people like us'"
        - "Confirm their existing narrative before extending it"
        - "Never attack their worldview - dance with it"

      story_structure:
        - "Start where they are, not where you want them to be"
        - "Show transformation that resonates with their desires"
        - "Make the change feel like what 'people like us' do"
        - "Provide social proof through 'people like us' examples"

      content_creation:
        - "Use their words, their references, their heroes"
        - "Tell stories of transformation they can see themselves in"
        - "Create content that's shareable because it confirms identity"
        - "Build tribe identity through consistent narrative"

    key_question: "What story are they already telling themselves, and how does my content extend it?"

# =============================================================================
# 9. DIRECT MARKETING VS. BRAND MARKETING
# =============================================================================
direct_vs_brand_marketing:
  core_definition: |
    Two fundamentally different approaches that require different mindsets.
    Direct marketing is action-oriented and measurable. Brand marketing is
    culture-oriented and can't be measured. Confusing them leads to failure.

  key_principle: |
    "Direct marketing is not the same as brand marketing, but they are both
    based on our decision to make the right thing for the right people."

  direct_marketing:
    definition: "Marketing that demands and measures specific action"
    characteristics:
      - "Action oriented"
      - "Measured precisely"
      - "Paid ads that pay for themselves"
      - "Click-to-conversion tracked"
      - "Scales when profitable"
    goal: "Make the phone ring, get the click, generate the sale"
    mantra: "If you can't measure it, it doesn't count"

    simple_guide:
      - "The ad exists to get a click"
      - "The click exists to make a sale or earn permission"
      - "The sale exists to lead to another sale or word of mouth"
      - "Permission exists to lead to education and a sale"
    rule: "Assign values to each step. If you can't, don't run any direct-response ads until you can."

  brand_marketing:
    definition: "Marketing that shapes culture and creates associations"
    characteristics:
      - "Culture oriented"
      - "Cannot be measured"
      - "Patient, consistent, long-term"
      - "Shapes how people feel"
      - "Creates the story before the sale"
    goal: "Be remembered, be associated with feelings, be part of culture"
    mantra: "Be patient. Refuse to measure. Engage with the culture."

    everything_is_brand:
      - "The way you answer the phone"
      - "The design of your packaging"
      - "Your location"
      - "The downstream effects of your work"
      - "The hold music"
      - "The behavior of your executives"
      - "The kind of packing peanuts you use"

  the_danger:
    quote: "The danger is in being confused."
    problem: |
      "The extraordinary growth of Google's and Facebook's revenue is due to
      only one thing: many of the ads that are run on these services pay for
      themselves."
    result: |
      "Google might make a hundred dollars per sale in profit, where you,
      the advertiser doing all the work, are making just ten dollars."

  key_insights:
    - quote: "If you're buying direct marketing ads, measure everything."
    - quote: "If you're buying brand marketing ads, be patient. Refuse to measure."
    - quote: "If you can't afford to be consistent and patient, don't pay for brand marketing ads."
    - insight: "The shift from TV brand ads to digital direct ads breaks many business models"
    - insight: "Most brands that matter are primed by advertising but built by good marketing"

  frequency_principle:
    observation: "We remember what we rehearse. We remember things we see again and again."
    implication: "Trust is associated with familiarity"
    warning: |
      "Don't change your ads when you're tired of them. Don't change them
      when your employees are tired of them. Don't even change them when
      your friends are tired of them. Change them when your accountant is
      tired of them." - Jay Levinson
    application: |
      "There's a very real dip - a gap between when we get bored and when
      people get the message."

  anti_patterns:
    - pattern: "Measuring brand marketing campaigns"
      why_fails: "Brand marketing can't be measured - you'll make wrong decisions"
    - pattern: "Being patient with direct marketing"
      why_fails: "Direct marketing must pay for itself - cut what doesn't work"
    - pattern: "Running brand marketing without patience"
      why_fails: "Takes years of consistency to work"
    - pattern: "Running direct marketing without measurement"
      why_fails: "You're just guessing and probably losing money"

  application_to_organic_content:
    insight: |
      Most organic content is brand marketing - it shapes culture, builds
      trust, and can't be directly attributed to sales. Treat it accordingly.

    strategy:
      brand_content_approach:
        - "Be patient - trust takes time"
        - "Be consistent - frequency builds familiarity"
        - "Don't expect immediate ROI"
        - "Focus on how content makes people feel"
        - "Build associations and memories"

      when_to_add_direct:
        - "Only when you can measure the full funnel"
        - "Only when you can afford to test and iterate"
        - "Only when you have clear conversion paths"
        - "Only when you can calculate lifetime value"

    key_question: "Am I trying to create action (direct) or shape perception (brand)?"

# =============================================================================
# 10. THE FUNNEL
# =============================================================================
the_funnel:
  core_definition: |
    The journey from stranger to loyal customer, with leaks at every stage.
    Most people pour attention in the top and expect magic. Success comes
    from optimizing every step and understanding the math.

  key_principle: |
    "Trust isn't static. As people work their way through the funnel, the
    status of their trust changes."

  funnel_stages:
    top: "Attention - strangers who notice you"
    middle: "Engagement - from stranger to friend to customer"
    bottom: "Committed loyal customers come out"
    leaks: |
      "Between the top and the bottom, most people leak out. They walk away,
      trust diminished, or leave due to a mismatch."

  why_people_leave:
    - "Trust diminished"
    - "Mismatch between what you offer and what they believe"
    - "Disconnect between what you say and what they hear"
    - "Not a good fit"
    - "They're distracted"
    - "Life got in the way"
    - "Saying yes is more stressful than walking away"

  fixing_your_funnel:
    six_ways:
      1: "Make sure the right people are attracted to it"
      2: "Make sure the promise that brought them in aligns with where you hope they will go"
      3: "Remove steps so that fewer decisions are required"
      4: "Support those you're engaging with, reinforcing dreams and ameliorating fears"
      5: "Use tension to create forward motion"
      6: "Hand successful engagers a megaphone to tell others"

  casey_neistat_example:
    video_views: "10 million views on YouTube video"
    click_to_twitch: "18,000 (1 in 50 clicked)"
    comments_on_twitch: "~1,000 (1 in 18 who viewed)"
    further_action: "~5 (1 in 200 who commented)"
    math: "1,000,000 to 18,000 to 1,000 to 5"
    lesson: "Everything gets better once you earn that trust"

  sustainable_funnel_math:
    example:
      spend: "$1,000 on online ads reaching 1 million people"
      clicks: "20 clicks = $50 per click"
      conversions: "1 in 10 becomes customer = $500 per customer"
      requirement: "Lifetime value must exceed $500"
      result: "If it does, buy more ads. Repeat."

    lifetime_value_example:
      business: "Supermarket"
      single_trip_profit: "$1-2"
      regular_shopper_calculation: |
        "Twice a week x $100 x 5 years = $50,000 in sales.
        At 2% margin = $1,000 profit per customer over time."
      plus_referrals: "Each customer might bring in others"
      implication: |
        "A supermarket should be eager to sponsor an event for new residents.
        It should quickly apologize and refund for a $4 melon not being ripe -
        not worth $1,000 in lost sales to have an argument."

  funnel_truth:
    quote: "It's not going to be a magical fountain of results."
    reality: |
      "The lifetime value of a new customer rarely exceeds the cost of
      running the ads necessary to get a new customer."
    why: |
      "People are so distrustful, and the web is so cluttered, that the
      ads rarely have enough power to pay for themselves."
    what_actually_works: |
      "Most brands that matter are primed by advertising but built by good
      marketing. They grow because users evangelize to their friends."

  long_tail_reality:
    concept: "Half of Amazon's sales are books not in the top 5000"
    problem: |
      "If you're a musician living on the long tail with your 12-24 songs,
      it's not going to pay any bills."
    false_promise: |
      "The internet can live on the long tail, Amazon and Netflix can live
      on it, but you can't."
    solution: |
      "By dividing the market into many curves, not just one, we end up with
      many short heads and many long tails."
    key: "Become the short head of a specific niche"

  anti_patterns:
    - pattern: "Expecting the funnel to work without optimization"
      why_fails: "Every step needs attention and improvement"
    - pattern: "Focusing only on top of funnel"
      why_fails: "Conversions happen in the middle and bottom"
    - pattern: "Ignoring funnel math"
      why_fails: "You're spending blind and probably losing money"
    - pattern: "Seeking perpetual motion machine of profit"
      why_fails: "Requires pushing too hard and fast - doesn't last"

  application_to_organic_content:
    strategy: |
      Understand your funnel and optimize each stage. Use organic content
      to fill the top, nurture the middle, and arm the bottom with tools
      to spread the word.

    tactics:
      top_of_funnel:
        - "Create content that reaches neophiliacs looking for you"
        - "Focus on being found for specific searches"
        - "Make it easy to take the next step"

      middle_of_funnel:
        - "Build trust with frequency"
        - "Remove unnecessary steps"
        - "Reinforce dreams, ameliorate fears"
        - "Use tension to create forward motion"

      bottom_of_funnel:
        - "Give loyal followers a megaphone"
        - "Make sharing benefit THEM"
        - "Build tools for word of mouth"

    key_question: "What's my funnel math, and where are people leaking out?"

# =============================================================================
# CROSSING THE CHASM
# =============================================================================
crossing_the_chasm:
  core_definition: |
    The gap between early adopters (who buy because it's new) and the mass
    market (who buy because it's proven). Most innovations die in this chasm.
    The bridge is built through network effects.

  key_principle: |
    "The early adopters have a huge incentive to bring your idea across the
    chasm to the masses; it will make their lives better if everyone in their
    network also uses this idea."

  why_the_chasm_exists:
    early_adopters:
      want: "New, interesting, a little bit risky"
      motivation: "Like things that are new, interesting, risky"
      tolerance: "Forgiving of missteps, then move on to next thing"

    mass_market:
      want: "Something that works. Something safe."
      motivation: "Pattern match, not pattern interrupt"
      behavior: "Take 'people like us do things like this' very seriously"

    the_collision: |
      "In order to satisfy the early adopters, you may just need to annoy the
      masses. The very thing your innovation did (break things) is the one
      thing that the mass market doesn't want to happen."

  gartner_hype_cycle:
    stages:
      technology_trigger: "Opens the door for your contribution, interrupts a pattern"
      peak_of_inflated_expectations: "Early adopters hype your work"
      trough_of_disillusionment: "Neophiliacs bored, mass market disdains - the chasm"
      slope_of_enlightenment: "With generous persistence, walk up to new plateau"
      plateau_of_productivity: "Indispensable to the masses - new pattern replacing old"

  building_the_bridge:
    key: "Network effects - ideas that work better when everyone knows them"
    two_questions:
      1: "What will I tell my friends?"
      2: "Why will I tell them?"
    truth: |
      "It is never the case that people will tell their friends because you
      want them to, or because you ask them to, or because you worked hard."
    solution: "Give them a why. Make things better by making better things."

  facebook_example:
    starting_point: "Harvard students with urgent status need"
    mechanism: |
      "The more friends you had on Facebook, the higher your status.
      The other people on Facebook had status you admired."
    spread: "Crossed local chasms school by school"
    final_leap: |
      "Once it spread through local tribes, it could jump to other colleges,
      then the public."
    billion_dollar_insight: |
      "Join in, or face your worst fear - be socially isolated."

  local_chasm:
    definition: "You don't need to cross a global chasm. A local one can change everything."
    yo_yo_example:
      wrong: "One kid brings in a yo-yo on the wrong day"
      right: |
        "Charismatic fifth-grader announces she's starting the Yo-yo Union,
        brings three extra yo-yos for her friends."
      spread: "Four leaders become thirty kids become whole school"
      keys:
        - "Low cost of entry"
        - "Quick payoff"
        - "Connection feels real"

  clean_water_example:
    situation: "Water Health International bringing clean water to villages"
    adoption: "Same curve as technology - early adopters first"
    catalyst: "Microscope showing kids what's in their water - they tell parents"
    ratchet: |
      "When you see respected members of village carrying distinctive Jerry
      cans, when you hesitate to host someone because you don't have clean
      water to offer them - status kicks in."
    result: "Within months, water crosses the local chasm"

  anti_patterns:
    - pattern: "Assuming early adopters will bring you to mass market"
      why_fails: "Different groups want different things"
    - pattern: "Giving up in the trough"
      why_fails: "This is where the bridge gets built"
    - pattern: "No network effect built in"
      why_fails: "No incentive for users to spread the word"
    - pattern: "Trying to please everyone at once"
      why_fails: "Annoy the mass market trying to please early adopters"

  application_to_organic_content:
    strategy: |
      Build network effects into your content. Create content that's more
      valuable when shared. Focus on crossing local chasms within niches.

    tactics:
      network_effects:
        - "Create content that's better when shared"
        - "Give followers tools to spread the word"
        - "Make sharing raise their status"
        - "Build community so followers have each other"

      local_chasm_focus:
        - "Identify specific niches where you can become the short head"
        - "Go deep in one community before broadening"
        - "Let success in one niche spread to adjacent niches"

      surviving_the_trough:
        - "Be patient - the dip is expected"
        - "Keep showing up with consistency"
        - "Build the bridge through persistent connection"
        - "Give the core audience reasons to bring others"

    key_question: "What's the network effect? Why will they tell others?"

# =============================================================================
# TRIBES
# =============================================================================
tribes:
  core_definition: |
    Groups of people connected by shared interests, goals, and language.
    You don't own the tribe - you have the opportunity to lead and serve it.
    The tribe's success is your success.

  key_principle: |
    "It's not your tribe. The tribe doesn't belong to you, so you don't get
    to tell the members what to do or to use them for your own aims."

  tribe_characteristics:
    shared_interests: "Common passions and concerns"
    shared_goals: "Direction they want to move"
    shared_language: "Code words, symbols, insider references"
    connection: "To each other, not just to you"

  your_role:
    not_owner: "You don't own the tribe"
    opportunity: "You have the chance to serve and lead"
    test: "Would they miss you if you were gone?"
    commitment: "Once you're part of a tribe, your success is their success"

  key_insights:
    - quote: "The tribe would probably survive if you went away. The goal is for them to miss you if you did."
    - quote: "The best marketers are farmers, not hunters. Plant, tend, plow, fertilize, weed, repeat."
    - quote: "If we want to make change, we begin with an exclusive cohort. That's where we can offer the most tension."
    - insight: "Most marketers are fly-by-night operators. Some hunker down and commit. In return, the tribe commits to them."

  manipulation_warning:
    alinsky_rules: "Saul Alinsky's Rules for Radicals - how to defeat enemies"
    problem: "Tears away at civil discourse"
    reversal:
      original: "Power is not only what you have but what the enemy thinks you have"
      reversed: "Put people to work. It's even more effective than money."
      original_2: "Ridicule is man's most potent weapon"
      reversed_2: "Treat the others the way you'd want to be treated"
      original_3: "Pick the target, freeze it, personalize it, and polarize it"
      reversed_3: "Celebrate your people, free them to do even more, invite everyone along"

  zig_ziglar_example:
    typical_approach: "Fill car with samples, hit the road, make easy sales, move to next town"
    zig_approach: "Take a room for weeks at a time. Show up and keep showing up."
    result: "Engaged with people 5-6-7 times before they decided"
    insight: "The easy sales aren't always the important ones"
    math: "Days with no sales, but crossing local chasm created volume"

  tribe_maintenance:
    warning: "There's a half-life at work"
    reality: |
      "For any tribal behavior that's not energetically maintained, half of
      the activity will disappear. Every day, every month, every year."
    alternative: "Reinvest. Sit with those you have instead of chasing next thing."

  cultural_artifacts:
    purpose: "Create connection and identity"
    examples:
      - "Costumes and uniforms"
      - "Code words and insider language"
      - "Secret handshakes"
      - "Easter eggs and unknown features"
      - "Symbols and flags"
    principle: |
      "Don't say it all, and don't make it obvious. It's fine that there are
      secrets. It's fine that commitment and longevity earn an extra edge."

  elite_vs_exclusive:
    elite:
      definition: "External measure - does the world respect this badge?"
      example: "Rhodes Scholarship"
      characteristic: "Respected by elite individuals and institutions"

    exclusive:
      definition: "Internal measure - us versus them, insiders versus outsiders"
      example: "Hell's Angels"
      characteristic: "Members wish to belong"

    both: "Harvard Business School, Navy Seals"
    key_insight: |
      "Exclusive organizations change things. We have no control over our
      elite status, but exclusive organizations thrive as long as their
      members wish to belong."

  anti_patterns:
    - pattern: "Treating the tribe as something you own"
      why_fails: "They'll leave when they realize they're being used"
    - pattern: "Spinning up a movement then getting out of the way"
      why_fails: "Without maintenance, it fades"
    - pattern: "Chasing new audiences instead of serving current ones"
      why_fails: "Hunter mentality doesn't build lasting tribes"
    - pattern: "Using manipulation tactics"
      why_fails: "Burns down everything eventually"

  application_to_organic_content:
    strategy: |
      Build and serve a tribe. Create content that connects members to each
      other, not just to you. Commit to showing up consistently.

    tactics:
      tribe_building:
        - "Create shared language and insider references"
        - "Connect members to each other"
        - "Give them something to stand for"
        - "Make them feel part of something exclusive"

      tribe_maintenance:
        - "Show up consistently - farmers, not hunters"
        - "Reinvest in the core community"
        - "Create cultural artifacts that build identity"
        - "Challenge the tribe to go further together"

      content_approach:
        - "Create content that signals 'people like us'"
        - "Celebrate member successes"
        - "Use insider language and references"
        - "Make sharing raise status within the tribe"

    key_question: "Would this tribe miss me if I were gone?"

# =============================================================================
# MARKETING WORKSHEET
# =============================================================================
simple_marketing_worksheet:
  description: "From the end of the book - the essential questions to answer"

  questions:
    1: "Who's it for?"
    2: "What's it for?"
    3: "What is the worldview of the audience you're seeking to reach?"
    4: "What are they afraid of?"
    5: "What story will you tell? Is it true?"
    6: "What change are you seeking to make?"
    7: "How will it change their status?"
    8: "How will you reach the early adopters and neophiliacs?"
    9: "Why will they tell their friends?"
    10: "What will they tell their friends?"
    11: "Where's the network effect that will propel this forward?"
    12: "What asset are you building?"
    13: "Are you proud of it?"

# =============================================================================
# MARKETING IN FIVE STEPS
# =============================================================================
marketing_in_five_steps:
  step_1: |
    Invent a thing worth making, with a story worth telling, and a
    contribution worth talking about.

  step_2: |
    Design and build it in a way that a few people will particularly
    benefit from and care about.

  step_3: |
    Tell a story that matches the built-in narrative and dreams of that
    tiny group of people, the smallest viable market.

  step_4: |
    Spread the word.

  step_5: |
    Show up - regularly, consistently, and generously, for years and years -
    to organize and lead and build confidence in the change you seek to make.
    To earn permission to follow up and to earn enrollment to teach.

# =============================================================================
# THE THIS IS MARKETING EXECUTIVE SUMMARY
# =============================================================================
executive_summary:
  core_thesis: "Ideas that spread, win."

  marketer_role: |
    Marketers make change happen: for the smallest viable market, and by
    delivering anticipated, personal, and relevant messages that people
    actually want to get.

  key_insights:
    empathy: |
      Marketers don't use consumers to solve their company's problem; they
      use marketing to solve other people's problems.

    status: |
      At the heart of our culture is our belief in status, in our self-perceived
      understanding of our role in any interaction, in where we're going next.

    stories: |
      Persistent, consistent, and frequent stories, delivered to an aligned
      audience, will earn attention, trust, and action.

    culture: |
      "People like us do things like this" is how each of us understands
      culture, and marketers engage with this idea every day.

    attention: |
      Attention is a precious resource since our brains are cluttered with noise.

    beginning_and_end: |
      Marketing begins (and often ends) with what we do and how we do it,
      not in all the stuff that comes after the thing is designed and shipped.

  final_truth: |
    "Culture beats strategy - so much that culture is strategy."

