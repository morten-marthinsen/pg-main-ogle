# ============================================================================
# EYAL HOOK MODEL - COMPLETE FRAMEWORK EXTRACTION
# Source: "Hooked: How to Build Habit-Forming Products" by Nir Eyal (2014)
# Application: Organic Content & Audience Habit Formation
# ============================================================================

metadata:
  title: "The Hook Model - Complete Framework"
  author: "Nir Eyal"
  source_book: "Hooked: How to Build Habit-Forming Products"
  publication_year: 2014
  publisher: "Penguin Group US"
  extraction_date: "2026-03-03"
  primary_application: "Organic Marketing & Audience Habit Formation"
  complementary_frameworks:
    - "Cialdini Influence Principles"
    - "Fogg Behavior Model"
    - "Kahneman System 1/System 2"
    - "Atomic Habits (James Clear)"
    - "Contagious (Jonah Berger)"

# ============================================================================
# CORE INSIGHT
# ============================================================================

core_insight:
  primary_thesis: |
    Most products (and content) fail not from lack of quality but from HABIT FAILURE -
    the inability to transform first-time users into automatic, daily users. The difference
    between content people try once and content people cannot live without is a four-step
    cycle called the Hook Model: Trigger, Action, Variable Reward, Investment.

  economic_truth: |
    Companies find that their economic value is a function of the strength of the habits
    they create. Habit-forming companies link their services to users' daily routines and
    emotions. They become "first-to-mind" solutions.

  neurological_basis: |
    The human brain forms habits through the basal ganglia, which chunks repeated behaviors
    into automatic routines to conserve cognitive energy. Once chunked, the prefrontal cortex
    (decision-making) disengages. Users no longer DECIDE to consume your content - they simply DO.
    This is the transition from System 2 (deliberate) thinking to System 1 (automatic) thinking.

  habit_formation_timeline: "Approximately 66 days of consistent cycling through the Hook"

  key_distinction: |
    - Addiction = self-destructive dependency
    - Habit = behavior that can have positive influence on life (healthy or unhealthy)

# ============================================================================
# THE HOOK MODEL - COMPLETE 4-PHASE CYCLE
# ============================================================================

hook_model:
  overview: |
    The Hook Model is a four-phase cycle that, when embedded in products (or content),
    subtly encourages customer behavior. Through successive Hook cycles, successful products
    reach their ultimate goal of unprompted user engagement, bringing users back repeatedly
    without expensive advertising or aggressive messaging.

  phase_1_trigger:
    definition: "The actuator of behavior - the spark plug in the engine"
    function: "Tells the user what to do next"

    external_triggers:
      definition: "Embedded with information that tells the user what to do next"
      design_principle: "Fewer choices increases likelihood of desired behavior occurring unconsciously"
      warning: "Multiple choices can cause hesitation, confusion, or abandonment"

      types:
        paid_triggers:
          description: "Advertising, search marketing, paid channels"
          examples:
            - "Facebook/Instagram ads"
            - "Google AdWords"
            - "Influencer sponsored posts"
            - "YouTube pre-roll ads"
          limitation: "Unsustainable for re-engagement - use to acquire, not retain"
          sustainability: "Low - companies must leverage other triggers to bring users back"

        earned_triggers:
          description: "Free media mentions, viral videos, featured app store placements"
          examples:
            - "Press coverage and PR"
            - "Viral content shares"
            - "App store features"
            - "Social media mentions"
          limitation: "Awareness generated is short-lived"
          sustainability: "Medium - requires perpetual effort to stay in limelight"

        relationship_triggers:
          description: "One person telling others about the product"
          examples:
            - "Word of mouth recommendations"
            - "Social shares from engaged users"
            - "Email forwards"
            - "Referral invitations"
          power: "Creates viral growth entrepreneurs and investors lust after"
          requirement: "Engaged user base enthusiastic about sharing"
          warning: "Dark patterns damage social currency, goodwill, and trust"

        owned_triggers:
          description: "Consistently show up in daily life with user opt-in"
          examples:
            - "Email newsletters"
            - "App icons on home screen"
            - "Push notifications"
            - "Browser bookmarks"
          power: "Prompt repeat engagement until habit is formed"
          key_insight: "User must opt into allowing these triggers to appear"

    internal_triggers:
      definition: "When a product becomes tightly coupled with a thought, emotion, or pre-existing routine"
      key_difference: "You cannot see, touch, or hear internal triggers"
      mechanism: "Information about what to do next is encoded as learned association in user's memory"

      primary_emotional_triggers:
        negative_emotions:
          - emotion: "Boredom"
            behavior: "Opens social media for stimulation"
          - emotion: "Loneliness"
            behavior: "Checks messages, seeks connection"
          - emotion: "Frustration"
            behavior: "Seeks distraction or venting outlet"
          - emotion: "Confusion"
            behavior: "Turns to trusted information sources"
          - emotion: "Indecisiveness"
            behavior: "Seeks external validation or guidance"
          - emotion: "Fear of missing out (FOMO)"
            behavior: "Checks feeds compulsively"
          - emotion: "Anxiety"
            behavior: "Seeks comfort or reassurance"

        mechanism: "Negative emotions instigate pain or irritation, prompting mindless action to quell the sensation"

      discovery_method:
        name: "The 5 Whys Method"
        origin: "Toyota Production System"
        process: "Ask 'why' repeatedly until reaching the emotion explaining product usage"
        typical_depth: "Usually by the fifth 'why'"
        warning: "Asking users directly is ineffective - users don't know which emotions motivate them"

        example:
          question_1: "Why does Julie use email?"
          answer_1: "To send and receive messages"
          question_2: "Why does she want to send and receive messages?"
          answer_2: "To share and receive information quickly"
          question_3: "Why does she want to do that?"
          answer_3: "To know what's going on in the lives of colleagues, friends, family"
          question_4: "Why does she need to know that?"
          answer_4: "To know if someone needs her"
          question_5: "Why would she care about that?"
          answer_5: "She fears being out of the loop"
          root_internal_trigger: "Fear (of being out of the loop)"

    trigger_migration:
      concept: "The critical transition from external to internal triggers"
      goal: "Users eventually associate your content with specific emotional states"
      measurement: "Percentage of sessions initiated by internal vs external triggers"
      success_indicator: "High internal trigger percentage = habit formed"

    organic_content_application:
      design_principles:
        - "Identify the specific negative emotion your content addresses"
        - "Reduce external triggers over time as internal triggers strengthen"
        - "Owned triggers (email, notifications) bridge gap to internal triggers"
        - "Each piece of content should remind users of the emotional relief you provide"

      trigger_examples:
        feeling_uninspired:
          internal_trigger: "Creative block or lack of motivation"
          content_solution: "Daily inspiration posts, creative prompts"
          owned_trigger: "Morning motivation email, app notification"

        feeling_behind:
          internal_trigger: "Fear of missing industry trends"
          content_solution: "Trend reports, news breakdowns"
          owned_trigger: "Weekly trend digest newsletter"

        feeling_stuck:
          internal_trigger: "Business problem without clear solution"
          content_solution: "How-to tutorials, problem-solving frameworks"
          owned_trigger: "Problem-of-the-week series"

        feeling_alone:
          internal_trigger: "Isolation in entrepreneurial journey"
          content_solution: "Community content, founder stories"
          owned_trigger: "Community posts, engagement prompts"

  phase_2_action:
    definition: "The simplest behavior done in anticipation of reward"
    formula:
      name: "Fogg Behavior Model"
      equation: "B = M x A x T (Behavior = Motivation x Ability x Trigger)"
      author: "Dr. BJ Fogg, Stanford University"
      key_insight: "For any behavior to occur, three elements must converge at the same moment"

    motivation:
      definition: "The energy for action - what gives users the push to act"
      core_motivators:
        seek_pleasure_avoid_pain:
          seek: "Entertainment, satisfaction, comfort"
          avoid: "Boredom, discomfort, stress"
        seek_hope_avoid_fear:
          seek: "Optimism, possibility, growth"
          avoid: "Loss, failure, missing out"
        seek_social_acceptance_avoid_rejection:
          seek: "Belonging, status, approval"
          avoid: "Isolation, embarrassment, criticism"

      warning: "An ad that motivates some will not motivate others - understand your specific audience"

    ability:
      definition: "The capacity to perform the behavior"
      principle: "Easier equals better"
      key_insight: "Any technology that significantly reduces steps enjoys high adoption rates"

      six_elements_of_simplicity:
        time:
          description: "How long it takes to complete the action"
          optimization: "Reduce time required to minimum"
          content_example: "60-second videos vs 30-minute videos for quick consumption"

        money:
          description: "Financial cost of taking the action"
          optimization: "Remove financial barriers initially"
          content_example: "Free content that provides value before asking for payment"

        physical_effort:
          description: "Amount of labor involved"
          optimization: "Minimize clicks, scrolling, typing"
          content_example: "One-tap likes, easy share buttons, swipe gestures"

        brain_cycles:
          description: "Level of mental effort and thought required"
          optimization: "Reduce cognitive load"
          content_example: "Clear headlines, scannable formats, obvious CTAs"

        social_deviance:
          description: "How outside the social norm the behavior is"
          optimization: "Normalize the desired behavior"
          content_example: "Show others doing it, social proof, community participation"

        non_routine:
          description: "How much it deviates from regular patterns"
          optimization: "Fit into existing behaviors"
          content_example: "Post when audience is already online, match platform expectations"

      design_rule: "Focus on simplicity as a function of user's scarcest resource at that moment"
      priority_insight: "Increasing ability has greater return than increasing motivation"

    psychological_principles_that_increase_action:
      scarcity_effect:
        description: "Limited availability increases perceived value"
        warning: "Product can decrease in value if starts scarce and becomes abundant"
        content_application: "Limited-time content, exclusive access, countdown timers"

      framing_effect:
        description: "Perception forms personal reality regardless of objective quality"
        content_application: "Position content as exclusive, premium, insider knowledge"

      anchoring_effect:
        description: "People anchor to one piece of information when deciding"
        content_application: "Lead with most impressive stat, result, or claim"

      endowed_progress_effect:
        description: "People more likely to complete if they feel they've already started"
        content_application: "Show progress bars, 'You're already here' messaging, chapter completion"

    organic_content_application:
      core_principle: "Make the desired action as simple as possible"

      simplification_tactics:
        reduce_friction:
          - "One-click actions (like, save, share)"
          - "Clear, single CTA per content piece"
          - "Mobile-optimized everything"
          - "Auto-play where appropriate"

        minimize_cognitive_load:
          - "Scannable formatting (bullets, headers, short paragraphs)"
          - "Clear value proposition in first 3 seconds"
          - "Familiar content structures"
          - "Pattern-based content that matches expectations"

        fit_existing_routines:
          - "Post at times when target audience is already scrolling"
          - "Match platform native content formats"
          - "Align with existing media consumption habits"
          - "Build on trending formats and sounds"

  phase_3_variable_reward:
    definition: "The reward phase that satisfies the user's needs while leaving them wanting more"

    neuroscience:
      key_discovery: "What draws us to act is not the sensation from the reward itself, but the need to alleviate the CRAVING for the reward"
      dopamine_mechanism: "Variability suppresses areas of brain associated with judgment and reason, activates parts associated with wanting and desire"
      research_basis: "Studies by B.F. Skinner on variable ratio reinforcement schedules"

    three_types_of_variable_rewards:
      rewards_of_the_tribe:
        category: "Social Rewards"
        driver: "Connectedness with other people"
        core_desires:
          - "Feel accepted"
          - "Feel attractive"
          - "Feel important"
          - "Feel included"

        platform_examples:
          facebook:
            mechanism: "News feed with unpredictable social validation"
            variable_element: "Which friends posted, who liked/commented on your content"
          instagram:
            mechanism: "Likes, comments, follower counts"
            variable_element: "How much engagement each post receives"
          stackoverflow:
            mechanism: "Points, badges, reputation scores"
            variable_element: "Recognition from peer community"
          linkedin:
            mechanism: "Profile views, post engagement, connection requests"
            variable_element: "Professional validation and opportunities"

        organic_content_design:
          - "Highlight community members and their wins"
          - "Create opportunities for audience recognition"
          - "Facilitate connections between community members"
          - "Show engagement metrics that validate participation"
          - "Respond unpredictably but warmly to comments"
          - "Feature user-generated content and testimonials"

      rewards_of_the_hunt:
        category: "Material Resources / Information"
        driver: "The determination that once kept us hunting for food now keeps us scrolling"
        core_desires:
          - "Find valuable information"
          - "Discover deals/opportunities"
          - "Acquire resources"
          - "Get the 'win'"

        platform_examples:
          twitter_x:
            mechanism: "Endless feed of information"
            variable_element: "What insight or news will appear next"
          pinterest:
            mechanism: "Visual discovery feed"
            variable_element: "What interesting image or idea will appear"
          slot_machines:
            mechanism: "Chance of jackpot"
            variable_element: "Could this be the winning pull?"
          email:
            mechanism: "Inbox checking"
            variable_element: "What valuable message might have arrived"

        organic_content_design:
          - "Tease valuable information in hooks"
          - "Vary the type and depth of value delivered"
          - "Create curiosity gaps that demand resolution"
          - "Mix content types so audience never knows what's next"
          - "Deliver unexpected bonuses and surprises"
          - "Use cliffhangers and series that reward continued attention"

      rewards_of_the_self:
        category: "Intrinsic Motivation / Mastery"
        driver: "The desire for competency, completion, and self-improvement"
        core_desires:
          - "Sense of competency"
          - "Feeling of mastery"
          - "Completion satisfaction"
          - "Personal growth"

        platform_examples:
          video_games:
            mechanism: "Leveling up, achievement unlocking"
            variable_element: "What skill will I master, what achievement next"
          codecademy:
            mechanism: "Skill progression, course completion"
            variable_element: "Mastery of new programming concepts"
          duolingo:
            mechanism: "Streaks, skill trees, level tests"
            variable_element: "Language proficiency improvement"
          email_inbox_zero:
            mechanism: "Clearing all emails"
            variable_element: "Satisfaction of completion"

        organic_content_design:
          - "Create content that helps audience level up skills"
          - "Provide frameworks they can master and apply"
          - "Show progress and growth over time"
          - "Celebrate audience wins and transformations"
          - "Offer challenges and milestones to achieve"
          - "Enable skill-building through content series"

    design_principles:
      variability_is_essential: "Fixed rewards become predictable and less engaging"
      finite_vs_infinite:
        finite_variability: "Eventually becomes predictable and less engaging (TV show seasons)"
        infinite_variability: "Maintains user interest by sustaining variability with use (social feeds)"
      alignment_requirement: "Rewards must fit the narrative of why the product is used and align with user's internal triggers"
      autonomy_preservation:
        concept: "Reactance"
        definition: "Human response to a threat to autonomy"
        solution: "Couple requests with affirmation of the right to choose"
        warning: "Don't make users feel forced - they'll resist"

    organic_content_application:
      core_insight: "Your content feed should feel like a slot machine of value - unpredictable in specifics but reliably valuable"

      variability_tactics:
        content_mix:
          - "Rotate between educational, entertaining, and inspiring content"
          - "Vary content length (long-form, short-form, micro-content)"
          - "Mix formats (video, carousel, text, audio)"
          - "Alternate between high-production and raw/authentic"

        reward_unpredictability:
          - "Sometimes drop massive value unexpectedly"
          - "Vary response times and engagement levels"
          - "Surprise with bonuses, gifts, exclusive access"
          - "Create anticipation for what comes next"

        tribe_rewards_in_content:
          - "Feature community members"
          - "Respond to comments with valuable additions"
          - "Create inside jokes and shared language"
          - "Celebrate collective wins"

        hunt_rewards_in_content:
          - "Tease valuable reveals"
          - "Hide 'easter eggs' in content"
          - "Create scavenger hunt dynamics"
          - "Reward consistent attention with exclusive insights"

        self_rewards_in_content:
          - "Provide actionable frameworks"
          - "Create skill-building progressions"
          - "Celebrate audience transformations"
          - "Enable before/after comparisons"

  phase_4_investment:
    definition: "Where the user puts something into the product that improves the service for their next go-around"

    key_characteristics:
      timing: "Comes after the reward, not before"
      nature: "Not about immediate gratification - about anticipation of longer-term rewards"
      friction: "Increases friction (unlike action phase) - it is not effortless"
      critical_timing: "Should come soon after the reward when user is satisfied"

    types_of_investment:
      time:
        description: "Hours spent using, learning, customizing"
        examples: "Time learning interface, building workflows, creating content"
        switching_cost: "Hours required to rebuild elsewhere"

      data:
        description: "Information stored in the system"
        examples: "Preferences, history, saved items, configurations"
        switching_cost: "Loss of personalization and accumulated data"

      effort:
        description: "Work put into the product"
        examples: "Content created, profiles built, customizations made"
        switching_cost: "Effort to recreate elsewhere"

      social_capital:
        description: "Relationships and reputation built within the system"
        examples: "Followers, connections, reputation scores, community standing"
        switching_cost: "Loss of social network and status"

      money:
        description: "Financial investment in the ecosystem"
        examples: "Purchases, subscriptions, upgrades"
        switching_cost: "Sunk cost and repurchase requirements"

      skill:
        description: "Competency developed using the product"
        examples: "Learned shortcuts, mastered features, developed expertise"
        switching_cost: "Learning curve for alternatives"

      followers_audience:
        description: "Audience built on the platform"
        examples: "Email subscribers, social followers, community members"
        switching_cost: "Cannot easily transfer audience to new platform"

      reputation:
        description: "Credibility and trust built over time"
        examples: "Reviews received, testimonials earned, track record"
        switching_cost: "Starting from zero credibility elsewhere"

    psychological_principles:
      ikea_effect:
        description: "Users value things more when they've put work into them"
        mechanism: "Labor leads to love"
        application: "Let users contribute and customize"

      consistency_principle:
        description: "We seek to be consistent with past behaviors"
        mechanism: "Small investments lead to larger ones"
        application: "Start with tiny asks, progressively increase"

      cognitive_dissonance:
        description: "We change preferences to reconcile conflicting ideas"
        mechanism: "If I invested, it must be good"
        application: "Each investment reinforces perceived value"

      rationalization:
        description: "We give reasons for behaviors, even if designed by others"
        mechanism: "Users justify their investment with logic"
        application: "Help users rationalize their continued engagement"

    investment_loading_trigger:
      concept: "Investment loads the next trigger"
      mechanism: "What the user invests creates the reason to return"
      examples:
        - "Posting content = waiting for responses (next trigger)"
        - "Following people = receiving their updates (next trigger)"
        - "Saving items = receiving recommendations (next trigger)"
        - "Completing profile = getting matched (next trigger)"

    progressive_staging:
      principle: "Stage investments into small chunks of work"
      progression: "Small, easy tasks building to harder tasks through successive Hook cycles"
      cycle_requirement: "User must go through multiple cycles for habit to form"

    organic_content_application:
      core_insight: "Every piece of content should ask for a micro-investment that loads the next trigger"

      investment_ladder:
        level_1_passive:
          actions: ["Watch/read to completion", "Pause to think"]
          switching_cost: "Minimal"
          next_trigger: "Algorithmic boost, more similar content"

        level_2_engagement:
          actions: ["Like", "Save/bookmark", "Share"]
          switching_cost: "Low - creates content preferences"
          next_trigger: "More relevant content, social validation"

        level_3_participation:
          actions: ["Comment", "Reply to others", "Tag friends"]
          switching_cost: "Medium - builds social presence"
          next_trigger: "Responses, community connections"

        level_4_creation:
          actions: ["Create response content", "Use template", "Apply framework"]
          switching_cost: "High - invested effort and reputation"
          next_trigger: "Results, feedback, desire to share outcomes"

        level_5_identity:
          actions: ["Join community", "Attend event", "Purchase"]
          switching_cost: "Very high - identity fusion"
          next_trigger: "Community belonging, ongoing value"

      content_investment_tactics:
        - "End videos with questions that invite comments"
        - "Create templates audience will save and use"
        - "Build series that reward sequential consumption"
        - "Encourage audience to implement and share results"
        - "Create challenges that require multi-day participation"
        - "Develop inside language that marks community membership"
        - "Offer exclusive content for highest investors"

# ============================================================================
# THE HABIT ZONE
# ============================================================================

habit_zone:
  definition: "The point at which behaviors become automatic - no conscious decision required"

  two_factors:
    frequency:
      description: "How often the behavior occurs"
      insight: "Frequent engagement, especially over short periods, increases habit likelihood"
      threshold: "Daily or multiple times per day ideal for rapid habit formation"

    perceived_utility:
      description: "The degree of value the behavior provides"
      insight: "High utility can compensate for lower frequency"
      spectrum: "Pain remedy (high utility) vs Vitamin (nice to have)"

  habit_zone_matrix:
    high_frequency_high_utility:
      position: "Deep in Habit Zone"
      examples: ["Social media", "Email", "Messaging apps"]
      organic_content_parallel: "Daily content that solves real problems"

    high_frequency_low_utility:
      position: "In Habit Zone"
      examples: ["Casual games", "Entertainment apps"]
      organic_content_parallel: "Daily entertainment content"

    low_frequency_high_utility:
      position: "In Habit Zone (edge)"
      examples: ["Tax software", "Travel booking"]
      organic_content_parallel: "Infrequent but high-value deep dives"

    low_frequency_low_utility:
      position: "Outside Habit Zone"
      examples: ["Rarely used utilities"]
      organic_content_parallel: "Forgettable, unfocused content"

  vitamin_to_painkiller:
    insight: "Habit-forming products seem at first to be vitamins (nice-to-have), but once habit established, they become pain remedies (must-have)"
    mechanism: "Missing the product creates discomfort"
    organic_content_goal: "Become the painkiller your audience cannot live without"

  habit_shelf_life:
    warning: "New behaviors have short shelf life"
    implication: "Recently acquired habits are most likely to go soonest"
    action: "Reinforce new habits quickly through repeated Hook cycles"

  non_transferable_value:
    concept: "Value created and stored inside a service that cannot be transferred"
    examples: ["Follower counts", "Saved content", "Reputation", "History"]
    effect: "Discourages user from leaving"
    organic_content_application: "Build value that exists only in your ecosystem"

# ============================================================================
# THE MANIPULATION MATRIX
# ============================================================================

manipulation_matrix:
  purpose: "Ethical framework for evaluating habit-forming products"

  two_axis_questions:
    axis_1: "Would I use the product myself?"
    axis_2: "Will the product help users materially improve their lives?"

  four_quadrants:
    facilitator:
      position: "YES - Would use / YES - Improves lives"
      description: "Creating something you would use AND that makes users' lives better"
      ethics: "Highest ethical ground - facilitating healthy habits"
      characteristics:
        - "Have experienced the problem firsthand"
        - "Building something you would use now"
        - "Or would have used if younger version of yourself"
      organic_content_application:
        - "Create content you would genuinely consume"
        - "Solve problems you have personally experienced"
        - "Share frameworks that transformed your own life"
        - "Build community you would want to belong to"

    peddler:
      position: "NO - Wouldn't use / YES - Improves lives"
      description: "Creating something useful that you don't personally use"
      challenge: "Lack empathy and insight of actual users"
      risk: "Designing successful product is difficult without personal experience"
      organic_content_application:
        - "Consulting in niches you don't belong to"
        - "Creating content for audiences you don't understand deeply"
        - "Risk: Missing nuances that resonate"

    entertainer:
      position: "YES - Would use / NO - Doesn't improve lives"
      description: "Creating something you enjoy but that's not particularly useful"
      nature: "Entertainment is ephemeral"
      challenge: "Building entertainment enterprise is tiring - constant content treadmill"
      organic_content_application:
        - "Pure entertainment content without transformation"
        - "Viral content without substance"
        - "Risk: Audience doesn't develop loyalty or habit"

    dealer:
      position: "NO - Wouldn't use / NO - Doesn't improve lives"
      description: "Creating something you wouldn't use AND that doesn't help"
      ethics: "Exploitative - only looking to make money"
      outcome: "Short-term gains, long-term failure"
      organic_content_application:
        - "Clickbait without value delivery"
        - "Manipulation for sales without genuine benefit"
        - "Risk: Reputation damage, audience exodus"

  addiction_context:
    statistic: "Estimates for pathological users of most habit-forming technologies (like slot machines) is just 1%"
    insight: "Addiction manifests in people with certain psychological profiles"
    implication: "Being a facilitator creates healthy habits for 99%, not addiction"

  meaning_over_money:
    quote: "If you build only for fame or fortune, you will likely find neither. Build for meaning and you can't fail."
    source: "Chapter 7 - The Bible App Case Study"

# ============================================================================
# HABIT TESTING FRAMEWORK
# ============================================================================

habit_testing:
  purpose: "Clarify who your devotees are, what parts of your product are habit forming, and why those aspects are changing user behavior"

  three_step_process:
    step_1_identify:
      name: "Define Engagement Targets"
      action: "Define what constitutes a devoted/habitual user"
      metrics_to_define:
        - "Frequency of engagement (daily, weekly)"
        - "Depth of engagement (time spent, actions taken)"
        - "Consistency of engagement (streak, regularity)"
      output: "Clear definition of a 'habitual user'"

    step_2_codify:
      name: "Analyze the Numbers"
      action: "Dig into data to identify how many and which users meet threshold"
      benchmark: "If less than 5% of users are habitual, either wrong users identified or product needs redesign"
      analysis_focus:
        - "Who are the habitual users (demographics, psychographics)"
        - "What percentage of total users are habitual"
        - "What distinguishes habitual from non-habitual users"
      output: "Quantified habitual user segment"

    step_3_modify:
      name: "Find the Habit Path"
      action: "Among habitual users, look for similarities of behavior"
      concept: "Habit Path - the actions critical for creating devoted users"
      implementation: "Modify experience to promote this behavior for all users"
      cohort_tracking: "Track users by cohort, compare to habitual users"
      output: "Identified and promoted Habit Path"

  organic_content_application:
    step_1_for_content:
      define_habitual_follower:
        - "Engages with 80%+ of content"
        - "Comments regularly"
        - "Shares content with others"
        - "Opens emails consistently"
        - "Returns without being prompted"

    step_2_for_content:
      analyze_habitual_followers:
        - "What content do they engage with most?"
        - "What time do they typically engage?"
        - "How did they discover you?"
        - "What content converted them to habitual?"

    step_3_for_content:
      optimize_content_for_habit_path:
        - "Double down on content that creates habituals"
        - "Front-load the content that hooks"
        - "Remove friction from the Habit Path"
        - "Create onboarding sequences that guide new followers to Habit Path"

