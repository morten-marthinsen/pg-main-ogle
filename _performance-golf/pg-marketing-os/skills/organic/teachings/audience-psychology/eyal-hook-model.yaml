# ============================================================================
# IMPLEMENTATION CHECKLIST
# ============================================================================

implementation_checklist:
  audit_current_content:
    trigger_audit:
      - "What external triggers bring people to my content?"
      - "What internal triggers am I associating my content with?"
      - "Am I building owned triggers (email, notifications)?"
      - "What percentage of engagement is triggered internally vs externally?"

    action_audit:
      - "How many steps to consume my content?"
      - "Is my content optimized for the user's scarcest resource?"
      - "What friction exists in the consumption path?"
      - "Is the desired action crystal clear?"

    reward_audit:
      - "What tribe rewards does my content provide?"
      - "What hunt rewards (information, value) do I deliver?"
      - "What self rewards (mastery, growth) are available?"
      - "Is there sufficient variability in my rewards?"

    investment_audit:
      - "What am I asking audience to invest?"
      - "Does investment load the next trigger?"
      - "Am I progressively increasing investment asks?"
      - "What switching costs have I created?"

  design_your_hook:
    step_1: "Identify the internal trigger (emotion) your content addresses"
    step_2: "Design external triggers that bridge to internal triggers"
    step_3: "Make the core action as simple as possible"
    step_4: "Design variable rewards across tribe, hunt, and self"
    step_5: "Create investments that load the next trigger"
    step_6: "Establish metrics to measure habit formation"

  ethical_check:
    question_1: "Would I consume this content myself?"
    question_2: "Does this content genuinely improve my audience's lives?"
    quadrant_goal: "Facilitator - YES to both questions"
    red_flags:
      - "Creating content you wouldn't consume"
      - "Manipulating without delivering value"
      - "Exploiting psychological vulnerabilities"
      - "Prioritizing engagement over transformation"

# ============================================================================
# SUMMARY FRAMEWORKS
# ============================================================================

quick_reference:
  hook_model_summary:
    trigger: "What prompts the user to act? (External → Internal migration)"
    action: "What is the simplest behavior in anticipation of reward?"
    variable_reward: "What unpredictable reward satisfies while leaving wanting more?"
    investment: "What does user put in that improves service and loads next trigger?"

  three_variable_rewards:
    tribe: "Social rewards - acceptance, connection, status"
    hunt: "Material/information rewards - resources, insights, deals"
    self: "Intrinsic rewards - mastery, completion, growth"

  fogg_behavior_model:
    formula: "B = M x A x T"
    components:
      M: "Motivation (pleasure/pain, hope/fear, acceptance/rejection)"
      A: "Ability (time, money, effort, brain cycles, deviance, non-routine)"
      T: "Trigger (must be present when M and A are sufficient)"

  manipulation_matrix_summary:
    facilitator: "Use it + Improves lives = Ethical, sustainable"
    peddler: "Don't use + Improves lives = Challenging, lacks insight"
    entertainer: "Use it + Doesn't improve = Ephemeral, tiring"
    dealer: "Don't use + Doesn't improve = Exploitative, avoid"

  habit_zone_requirements:
    frequency: "How often does behavior occur?"
    utility: "How valuable is the behavior to user?"
    insight: "High frequency OR high utility gets you in the zone"

  habit_testing_steps:
    step_1: "IDENTIFY - Define what habitual user looks like"
    step_2: "CODIFY - Find what % of users are habitual (need >5%)"
    step_3: "MODIFY - Discover and promote the Habit Path"

