# ============================================================================
# BRENDAN KANE - HOOK POINT
# The 3-Second Attention Capture System
# Source: "Hook Point: How to Stand Out in a 3-Second World" (2020)
# ============================================================================

metadata:
  title: "Hook Point - Complete Framework Extraction"
  author: "Brendan Kane"
  book: "Hook Point: How to Stand Out in a 3-Second World"
  publisher: "Waterside Productions"
  year: 2020
  isbn: "9781949001006"
  credentials:
    - "Built 60+ billion views for clients"
    - "Founder of Hook Point agency"
    - "Author: One Million Followers"
    - "Digital strategist for MTV, Paramount, Taylor Swift, Rihanna"
  core_thesis: "You have 3 seconds or less to capture attention - Hook Points are the system for doing so consistently"

# ============================================================================
# SECTION 1: THE 3-SECOND WORLD
# ============================================================================

three_second_reality:
  problem_statement:
    daily_messages: "60+ billion messages sent on digital platforms daily"
    daily_scroll: "Average person scrolls 300 feet of content daily"
    weekly_phone_checks: "Average person checks phone 1,500 times per week"
    facebook_view_metric: "Facebook counts video views at 3 seconds (indicating intent)"
    attention_window: "Less than 3 seconds to capture attention before scroll"

  hook_point_definition:
    what_it_is: "What captures attention and makes people want to know more"
    purpose: "Grab audience attention in shortest possible time to generate leads, followers, brand messaging, interviews, clients, and revenue"

  hook_point_components:
    text: "A phrase, title, or piece of copy"
    insight: "Statistics, professional POV, philosophy, or thought"
    concept: "An image or video format"
    personality: "Music, sports, acting, or cadence"
    product_service: "The offering itself"
    combination: "Multiple elements working together"

# ============================================================================
# SECTION 2: HOOK POINT CREATION FORMULA
# ============================================================================

hook_creation_formula:
  if_then_formula:
    structure: "If [prospect's problem/need], then [your product as solution]"
    examples:
      dating: "If you're looking to increase the amount of dates you get with attractive, high-quality, smart people, then this is going to be the most important thing you'll ever read."
      golf: "If you're looking to improve your golf game by five or ten strokes by the next time you set foot on the golf course, then pay close attention to the four secrets I'm about to share."
      business: "If you're tired of working 80-hour weeks with nothing to show for it, then this strategy will change everything."

  five_step_process:
    step_1_study_what_works:
      description: "Pull hooks from successful content"
      sources:
        - "Book titles"
        - "Social content (meme cards, headlines, concepts)"
        - "Launch campaigns"
        - "Article headlines"
        - "TV commercials"
        - "Social media ads (use Facebook Ad Library)"
        - "Print ads (billboards, magazine covers)"

    step_2_learn_from_failures:
      description: "Understand why hooks fail"
      failure_reasons:
        - "Too wordy"
        - "Confusing"
        - "Vague"
        - "Overused"
        - "Not relevant to specific audience"
        - "Outdated"
        - "Assume prior interest"
        - "Inauthentic"
        - "Not unique enough"
        - "Use unappealing language"

    step_3_create_your_own:
      description: "Generate Hook Points systematically"
      process:
        - "Imagine a magazine cover headline that would make someone stop and buy"
        - "Create as many Hook Points as possible"
        - "Push beyond your comfort zone"
        - "Narrow down to the 3 best choices"
        - "Repeat: create, narrow to three, repeat"

    step_4_compare:
      description: "Benchmark against successful hooks"
      process:
        - "Place your hooks alongside successful ones from Step 1"
        - "Rank them together objectively"
        - "Revise until yours outrank the benchmarks"

    step_5_test_and_iterate:
      description: "Validate through testing"
      methods:
        - "Show to friends and colleagues"
        - "A/B test on social media"
        - "Test on email lists"
        - "Use search advertising for validation"
        - "Continue to modify and improve"

# ============================================================================
# SECTION 3: TEN ELEMENTS OF A GREAT HOOK POINT
# ============================================================================

ten_elements:
  1_minimal_words:
    principle: "Envision a magazine-cover headline"
    example: "Zero to a Million Followers in 30 Days"
    test: "Can it fit on a magazine cover?"

  2_authentic:
    principle: "True to who you are and why you exist"
    key_insight: "Hook Points must support your underlying foundation"
    test: "Does this align with your brand's 'why'?"

  3_subverts_expectations:
    principle: "Makes people think differently"
    example: "WARNING!! Safety is Dangerous"
    test: "Does this challenge conventional thinking?"

  4_easy_to_understand:
    principle: "Doesn't make people think very hard"
    key_insight: "Confusion kills attention"
    test: "Can a stranger grasp this instantly?"

  5_sparks_thought:
    principle: "Doesn't make people think too little either"
    key_insight: "There must be depth to explore"
    test: "Does this create mental engagement?"

  6_creates_curiosity:
    principle: "Leaves audiences wanting to learn more"
    key_insight: "Curiosity is the bridge to engagement"
    test: "Would someone stop to learn more?"

  7_original:
    principle: "Stands out from everything else"
    key_insight: "If seen elsewhere, it won't work"
    test: "Is this truly unique?"

  8_relatable_plus_unique:
    principle: "Common element + something that draws in"
    example: "Suitcase with built-in phone charger"
    formula: "Familiar category + unexpected feature"

  9_grasped_quickly:
    principle: "Understood in 3 seconds max"
    key_insight: "This is the non-negotiable rule"
    test: "Time how long it takes to understand"

  10_offers_solution:
    principle: "Addresses audience's pain points"
    key_insight: "Value must be immediately apparent"
    test: "Does this promise to solve a problem?"

# ============================================================================
# SECTION 4: THE 3-SECOND VIDEO RULE
# ============================================================================

three_second_video_rule:
  first_three_seconds_must:
    make_promise: "Tell viewers what content is about and how message will be delivered"
    be_satisfying: "Hook audience to invest time watching"
    right_pace: "Viewers need to know they can follow"
    linear_delivery: "Don't make viewers work for you"

  perfect_promise_structure:
    purpose: "Use first 3 seconds to set expectations"
    show_pacing: "Demonstrate video has good pacing (not slow/boring)"
    visual_experience: "Communicate visual experience will be satisfying"
    delay_action: "Don't start main action until after 3 seconds - set stage first"

  key_metrics:
    watch_time:
      platform: "YouTube"
      target: "7-8 minutes of viewing"
      recommendation: "Videos should be 15+ minutes"
    click_through_rate:
      definition: "Total clicks on titles/thumbnails divided by impressions"
      targets:
        good: "10%+"
        great: "20%+"
        excellent: "30%+ = dramatic increase in views/impressions"

# ============================================================================
# SECTION 5: MEME CARDS FORMULA
# ============================================================================

meme_cards:
  definition: "Text caption boxes at top or bottom of Facebook/Instagram videos that communicate Hook Points quickly"

  three_tips:
    competitive_analysis:
      action: "Look at competitors' successful videos and their meme cards"
      purpose: "Understand what's working in your space"

    provide_value:
      avoid: "Vague phrases like 'Watch this till the end'"
      do: "Incorporate tangible value in the text"

    typography_design:
      steps:
        - "Identify key phrase/keywords"
        - "Highlight them visually"
        - "Separate lines strategically"

  balance_rules:
    complex_meme_card: "Requires simple visuals"
    simple_meme_card: "Can handle more complex visuals"
    warning: "Don't overwhelm viewers with both at once"

# ============================================================================
# SECTION 6: PROCESS COMMUNICATION MODEL (PCM)
# ============================================================================

pcm_personality_types:
  overview:
    purpose: "Speak to all personality types in your content"
    application: "Write copy that hits all six vocabularies"

  six_types:
    thinkers:
      perceives_world_through: "Thoughts"
      currency: "Logic"
      language_example: "This car gets 50 miles per gallon..."

    persisters:
      perceives_world_through: "Opinions"
      currency: "Values"
      language_example: "We believe this provides more value to customers..."

    harmonizers:
      perceives_world_through: "Emotions"
      currency: "Compassion"
      language_example: "It feels good, you'll be comfortable..."

    imaginers:
      perceives_world_through: "Inactions"
      currency: "Imagination"
      language_example: "Imagine if you could..."

    rebels:
      perceives_world_through: "Reactions"
      currency: "Humor"
      language_example: "All your friends will finally want to hang out with you..."

    promoters:
      perceives_world_through: "Actions"
      currency: "Charm"
      language_example: "Bottom line - it's the best on the market."

  north_america_breakdown:
    emotions: "30%"
    logic: "25%"
    humor: "20%"
    remaining: "Values, imagination, action"

  application:
    method: "Include elements for all types in your content"
    result: "Maximum resonance across all personality types"

# ============================================================================
# SECTION 7: IMPACT ARCS (A.R.C.S.) COPYWRITING FORMULA
# ============================================================================

arcs_formula:
  creator: "Craig Clemens"

  A_ask:
    description: "Ask a 'Yes' question"
    purpose: "Question your potential customer would answer yes to"
    example: "Do you want to make maximum return on your money?"

  R_reveal:
    description: "Reveal that you've been in their position"
    purpose: "Set stage showing you've learned critical information through experience"
    example: "I used to look for places to invest but didn't know where to start."

  C_call_out:
    description: "Call out the discovery"
    purpose: "Explain what you learned that helped you succeed"
    example: "I discovered a book by J Paul Getty, met with an art investor, started using principles, averaged 30% return annually."

  S_send:
    description: "Send them to do something"
    purpose: "Your call to action"
    example: "I put the strategies on a free web page you can check out here..."

# ============================================================================
# SECTION 8: "YOU KNOW HOW" FORMULA
# ============================================================================

you_know_how_formula:
  purpose: "Test hooks, stories, and business plans"

  structure:
    step_1: "You know how [common problem/situation]?"
    step_2: "Well, you know how [frustration with solutions]?"
    step_3: "Well, you know how [what matters most]?"
    step_4: "Well, you should try [your solution]. What makes it special? [Hook Point]"

  validation:
    success: "If majority nod yes = you're on track"
    failure: "If they don't resonate = revise"

# ============================================================================
# SECTION 9: PROCLAMATION LEAD FORMULA
# ============================================================================

proclamation_lead:
  structure:
    element_1: "Bold, emotionally compelling headline statement"
    element_2: "Promise about imagined benefit"
    element_3: "Relevant subject to prospect"
    element_4: "Prediction about future outcome that surprises"
    element_5: "Copy that proves validity of claim"
    element_6: "Don't reveal most important aspect until the end"

  example:
    headline: "Read This or Die"
    follow_up: "Today you have a 95% chance of eventually dying from a disease or condition for which there is already a known cure..."

# ============================================================================
# SECTION 10: FAIRY TALE BRAND STORY STRUCTURE
# ============================================================================

fairy_tale_structure:
  three_act_format:
    act_1: "Once upon a time - everything was fine"
    act_2: "Until a dragon showed up - the problem"
    act_3: "Then a hero came along - your product/solution"
    epilogue: "Everyone lived happily ever after in the new world"

  bmw_example:
    act_1: "Once upon a time, everyone aspired to drive a good domestic car"
    act_2: "Then along came a dragon called 'Too Much Choice'"
    act_3: "Then a knight showed up named BMW - the Ultimate Driving Machine"
    epilogue: "Everyone who drove that car lived happily ever after"

# ============================================================================
# SECTION 11: FIVE THEMES FOR VIRAL CONTENT
# ============================================================================

viral_themes:
  source: "Jay Shetty framework"
  principle: "Content goes viral when it makes people FEEL"

  five_themes:
    adventure: "Excitement, exploration"
    comedy: "Amusement, laughter"
    emotion: "Deep feelings, connection"
    inspiration: "Motivation to act"
    surprise: "Unexpected revelations"

  shettys_three_principles:
    real_experience: "Concepts from actual conversations/experiences"
    scientific_studies: "Credible, verifiable data"
    poetic_language: "Memorable like lyrics - simplistic yet profound"

# ============================================================================
# SECTION 12: VALUE-FIRST STRATEGY
# ============================================================================

value_first:
  core_principle: "People love to buy but hate to be sold to"

  application:
    kill_elevator_pitch: "Pitching = high-pressure advertising"
    replace_with: "Hook Points + storytelling"
    focus: "PROVIDING value, not SELLING"
    mindset: "'How can I be of service?' not 'Please give me a job'"

  give_away_strategy:
    principle: "Smartest companies give away their best stuff"
    why: "Proving value = letting people EXPERIENCE it"
    model: "IPSY - free samples drive commerce"
    result: "Give valuable information, receive trust and loyalty"

# ============================================================================
# SECTION 13: LISTENING FRAMEWORK
# ============================================================================

listening_framework:
  source: "FBI Method (Chris Voss)"

  active_listening_principles:
    - "Listen without interrupting, disagreeing, or evaluating"
    - "Make brief acknowledgments ('Yes,' 'Uh-huh,' nod)"
    - "Repeat back what the other person says"
    - "Ask questions showing attention and moving discussion forward"

  key_questions_for_meetings:
    1: "What are your most important goals and objectives?"
    2: "What obstacles are you running into while trying to achieve those goals?"
    3: "What are the pain points most frustrating for your organization?"
    4: "What are the biggest pain points in your specific position?"

  response_formula: "If I were able to solve [their problem], would it be helpful to [benefit they mentioned]?"

# ============================================================================
# SECTION 14: AUTHENTICITY ALIGNMENT
# ============================================================================

authenticity_alignment:
  sinek_foundation:
    principle: "People don't buy what you make, they buy what you believe"
    requirement: "Hook Points must support your underlying foundation"
    warning: "Random hooks that don't support your 'why' can backfire"

  case_study_comparison:
    nike_success:
      established: "Had 'why' around challenging status quo"
      action: "Kaepernick campaign aligned with values"
      result: "Success - authentic extension of brand"

    gillette_mixed:
      problem: "Never talked about social responsibility"
      action: "'Toxic masculinity' ad felt opportunistic"
      result: "Mixed reception - felt inauthentic"

  authenticity_checklist:
    - "Does this Hook Point support who we are and why we exist?"
    - "Can we deliver on the promise?"
    - "Is this aligned with our values?"
    - "Would our audience expect this from us?"

# ============================================================================
# SECTION 15: COLD OUTREACH EMAIL STRUCTURE
# ============================================================================

cold_outreach:
  four_email_sequence:
    email_1:
      day: 1
      content: "Top-line overview of how you solve a specific pain point"
    email_2:
      day: 3
      content: "Restate services, add example or relevant client names"
    email_3:
      day: 5
      content: "Apologize for following up, ask if goals align with services"
    email_4:
      day: 7
      content: "Simple email asking if they have time to connect"

  effective_template:
    structure: |
      Hi [Name],

      Congrats on your success at [company]. What you achieved with [specific project] is remarkable.

      Because you're an expert in [field], I wanted to let you know about [your product/service] that [specific benefit/data].

      We're currently using this with [client names]. Because you're always on the cutting edge of [industry], I thought this might be helpful.

      Would be happy to introduce you to [relevant person] if interested.

      Best,
      [Name]

  key_principle: "Focus on THEIR value and achievements, not your needs"

# ============================================================================
# SECTION 16: HOOK POINT VS. OTHER BRAND ELEMENTS
# ============================================================================

brand_element_distinctions:
  definitions:
    hook_point:
      definition: "What captures attention for specific campaigns"
      nike_example: "Athletes they sponsor (LeBron, Serena)"
      characteristic: "Evolves constantly"

    usp:
      definition: "Unique benefit that enables standing out"
      nike_example: "Their shoes"
      characteristic: "Remains stable"

    tagline:
      definition: "Memorable phrase conveying main sentiment"
      nike_example: "Just Do It"
      characteristic: "Remains stable"

    mission:
      definition: "Company values"
      nike_example: "Bring inspiration and innovation to every athlete"
      characteristic: "Remains stable"

    purpose:
      definition: "Reason brand exists"
      nike_example: "Unite the world through sport"
      characteristic: "Remains stable"

  key_insight: "Hook Points evolve constantly; USP, tagline, mission, and purpose remain stable"

# ============================================================================
# SECTION 17: ALGORITHM SUCCESS FORMULA
# ============================================================================

algorithm_success:
  how_algorithms_work:
    step_1: "Content posted to 500 followers"
    step_2: "Algorithm measures: views-to-reach ratio, share-to-views ratio, engagement-to-reach ratio"
    step_3: "If ratios match algorithm targets = extended to 500 more, then 1,000, then 2,000..."
    step_4: "If ratios poor = reach stops immediately"

  success_metrics:
    strong_share_ratio: "~1% for videos with millions of views"
    high_shares: "= organic reach"
    low_shares_high_views: "= paid advertising"

  research_tools:
    - "Google Trends"
    - "Reddit (active engagement platform, best content rises)"
    - "YouTube (search for underperforming videos with good ideas)"
    - "Tubular Labs (video tracking across platforms)"
    - "Facebook Ad Library"

# ============================================================================
# APPLICATION CHECKLISTS
# ============================================================================

application_checklists:
  before_creating_content:
    - "What is my audience's pain point?"
    - "What outcome are they seeking?"
    - "How does my solution address their specific need?"
    - "Can I explain this in 3 seconds?"
    - "Does this subvert expectations or offer something new?"
    - "Is this authentic to my brand's 'why'?"
    - "Does this make people FEEL something (adventure, comedy, emotion, inspiration, surprise)?"

  hook_point_quality_test:
    - "Would this make someone stop scrolling?"
    - "Is this specific, not generic?"
    - "Does it create curiosity?"
    - "Is it grasped immediately?"
    - "Does it promise value?"
    - "Can I deliver on this promise?"

# ============================================================================
# SKILL MAPPINGS
# ============================================================================

skill_mappings:
  S05_hook_library:
    - "Ten Elements of a Great Hook Point"
    - "If/Then Formula"
    - "Five-Step Creation Process"
    - "Meme Cards Formula"

  S06_virality_scoring:
    - "Algorithm Success Formula"
    - "Five Viral Themes"
    - "Hook Point Quality Test"

  S08_script_writing:
    - "3-Second Video Rule"
    - "Perfect Promise Structure"
    - "A.R.C.S. Copywriting Formula"

  S09_caption_writing:
    - "PCM Personality Types"
    - "Proclamation Lead Formula"
    - "You Know How Formula"

  S16_engagement_protocol:
    - "Listening Framework"
    - "Cold Outreach Structure"
    - "Value-First Strategy"

integration_principles:
  three_second_rule:
    insight: "Every piece of content must capture attention in 3 seconds or less"
    application: "Test all hooks with the 3-second standard"

  authenticity_requirement:
    insight: "Hooks must align with brand's 'why' or they will backfire"
    application: "Use authenticity checklist before launching campaigns"

  value_before_sale:
    insight: "People love to buy but hate to be sold to"
    application: "Lead with giving value, not requesting action"

  pcm_coverage:
    insight: "Hit all six personality types to maximize resonance"
    application: "Include logic, values, emotions, imagination, humor, and action in content"
