# =============================================================================
# SECTION 11: SOURCE QUOTES — EXACT TEXT WITH CHAPTER REFERENCES
# =============================================================================

source_quotes:

  quote_01_growth_hacker_definition:
    text: >
      A growth hacker is someone who has thrown out the playbook of traditional marketing
      and replaced it with only what is testable, trackable, and scalable. Their tools are
      e-mails, pay-per-click ads, blogs, and platform APIs instead of commercials, publicity,
      and money. While their marketing brethren chase vague notions like "branding" and
      "mind share," growth hackers relentlessly pursue users and growth—and when they do
      it right, those users beget more users, who beget more users. They are the inventors,
      operators, and mechanics of their own self-sustaining and self-propagating growth
      machine that can take a start-up from nothing to something.
    chapter: "An Introduction to Growth Hacking"
    page_context: "Holiday's core definition of the growth hacker, distinguishing the new role from traditional marketing"
    teaching_mapping: ["growth_hacking_paradigm.definition"]

  quote_02_mindset_not_toolkit:
    text: >
      Growth hacking is more of a mindset than a tool kit.
    chapter: "An Introduction to Growth Hacking"
    attribution: "Aaron Ginn, as quoted by Holiday"
    page_context: "Emphasizing that growth hacking is a way of thinking, not a set of specific tools"
    teaching_mapping: ["growth_hacking_paradigm.definition"]

  quote_03_self_perpetuating_machine:
    text: >
      The end goal of every growth hacker is to build a self-perpetuating marketing machine
      that reaches millions by itself.
    chapter: "An Introduction to Growth Hacking"
    attribution: "Aaron Ginn, as quoted by Holiday"
    page_context: "Opening epigraph-style quote defining the ultimate growth hacker objective"
    teaching_mapping: ["growth_hacking_paradigm.definition"]

  quote_04_marketing_built_into_product:
    text: >
      A growth hacker doesn't see marketing as something one does but rather as something
      one builds into the product itself. The product is then kick-started, shared, and
      optimized (with these steps repeated multiple times) on its way to massive and rapid growth.
    chapter: "An Introduction to Growth Hacking"
    page_context: "The fundamental paradigm shift — marketing is the product, not a bolt-on activity"
    teaching_mapping: ["growth_hacking_paradigm.the_paradigm_shift"]

  quote_05_worst_marketing_decision:
    text: >
      You know what the single worst marketing decision you can make is? Starting with
      a product nobody wants or nobody needs.
    chapter: "Step 1: It Begins with Product Market Fit"
    page_context: "Opening line of the PMF chapter — the prerequisite for all growth hacking"
    teaching_mapping: ["product_market_fit.core_principle"]

  quote_06_best_marketing_decision:
    text: >
      The best marketing decision you can make is to have a product or business that fulfills
      a real and compelling need for a real and defined group of people—no matter how much
      tweaking and refining this takes.
    chapter: "Step 1: It Begins with Product Market Fit"
    page_context: "Holiday's distillation of what PMF means in practice"
    teaching_mapping: ["product_market_fit.definition"]

  quote_07_pmf_spark_and_kerosene:
    text: >
      The race has changed. The prize and spoils no longer go to the person who makes it
      to market first. They go to the person who makes it to Product Market Fit first.
      Because once you get there, your marketing efforts become like a spark applied to a
      bed of kindling soaked in kerosene. The old way? It's striking a match . . . and hoping
      it starts a fire somewhere.
    chapter: "Step 1: It Begins with Product Market Fit"
    page_context: "Holiday's metaphor contrasting PMF-first marketing with traditional launch-and-pray"
    teaching_mapping: ["product_market_fit.why_pmf_comes_first"]

  quote_08_pmf_is_feeling_backed_by_data:
    text: >
      Product Market Fit is a feeling backed with data and information.
    chapter: "Step 1: It Begins with Product Market Fit"
    page_context: "Holiday's synthesis — PMF is not purely intuitive nor purely analytical"
    teaching_mapping: ["product_market_fit.definition"]

  quote_09_marketing_waste_without_pmf:
    text: >
      The point is: marketing as we know it is a waste of time without PMF.
    chapter: "Step 1: It Begins with Product Market Fit"
    page_context: "Blunt summation of the PMF prerequisite — no amount of marketing fixes a bad product"
    teaching_mapping: ["product_market_fit.core_principle"]

  quote_10_pull_them_in:
    text: >
      He had previously believed that if you came up with a great idea people would use it.
      But he realized now that you couldn't expect people to come to you; you had to pull
      them in.
    chapter: "Step 2: Finding Your Growth Hack"
    attribution: "Larissa MacFarquhar writing about Aaron Swartz, as quoted by Holiday"
    page_context: "The necessity of active user acquisition — even great products need a pull strategy"
    teaching_mapping: ["growth_hacking_funnel.stage_1_pull_not_push"]

  quote_11_right_people_not_all_people:
    text: >
      Growth hackers resist this temptation (or, more appropriate, this delusion). They opt,
      deliberately, to attract only the early adopters who make or break new tech services
      and seek to do it as cheaply as possible.
    chapter: "Step 2: Finding Your Growth Hack"
    page_context: "Targeting precision over mass reach — attract the right people, not everyone"
    teaching_mapping: ["growth_hacking_funnel.stage_1_pull_not_push"]

  quote_12_virality_is_engineered:
    text: >
      Virality is not an accident. It is engineered.
    chapter: "Step 3: Turn 1 into 2 and 2 into 4 — Going Viral"
    page_context: "Holiday's definitive statement on virality — it is designed, not lucky"
    teaching_mapping: ["growth_hacking_funnel.stage_2_virality"]

  quote_13_virality_social_capital:
    text: >
      Virality at its core is asking someone to spend their social capital recommending or
      linking or posting about you for free. You're saying: Post about me on Facebook. Tell
      your friends to watch my video. Invite your business contacts to use this service.
      The best way to get people to do this enormous favor for you? Make it seem like it
      isn't a favor. Make it the kind of thing that is worth spreading and, of course,
      conducive to spreading.
    chapter: "Step 3: Turn 1 into 2 and 2 into 4 — Going Viral"
    page_context: "Why virality requires designing around social capital — sharing must benefit the sharer"
    teaching_mapping: ["growth_hacking_funnel.stage_2_virality"]

  quote_14_baked_into_product:
    text: >
      All of which is to say a simple truth that we try to deny too often: if you want to go
      viral, it must be baked into your product. There must be a reason to share it and the
      means to do so.
    chapter: "Step 3: Turn 1 into 2 and 2 into 4 — Going Viral"
    page_context: "Virality as a product design decision, not a marketing afterthought"
    teaching_mapping: ["growth_hacking_funnel.stage_2_virality"]

  quote_15_behavioral_residue:
    text: >
      Making things more observable makes them easier to imitate, which makes them more
      likely to become popular. . . . We need to design products and initiatives that advertise
      themselves and create behavioral residue that sticks around even after people have
      bought the product or espoused the idea.
    chapter: "Step 3: Turn 1 into 2 and 2 into 4 — Going Viral"
    attribution: "Jonah Berger, from Contagious, as quoted by Holiday"
    page_context: "The publicness principle — products must create visible traces of usage"
    teaching_mapping: ["growth_hacking_funnel.stage_2_virality"]

  quote_16_retention_trumps_acquisition:
    text: >
      According to Bain & Company, a 5 percent increase in customer retention can mean a
      30 percent increase in profitability for the company. And according to Market Metrics,
      the probability of selling to an existing customer is 60 to 70 percent, while to a new
      prospect it's just 5 to 20 percent.
    chapter: "Step 4: Close the Loop — Retention and Optimization"
    page_context: "Hard data on why retention beats acquisition economically"
    teaching_mapping: ["growth_hacking_funnel.stage_3_retention_and_optimization"]

  quote_17_focus_on_retention:
    text: >
      The focus needs to be on improving customer retention.
    chapter: "Step 4: Close the Loop — Retention and Optimization"
    attribution: "Eric Ries, from The Lean Startup, as quoted by Holiday"
    page_context: "The growth hacker's antidote to the acquisition treadmill"
    teaching_mapping: ["growth_hacking_funnel.stage_3_retention_and_optimization"]

  quote_18_whatever_your_state:
    text: >
      Whatever your current state is, it can be better.
    chapter: "Step 4: Close the Loop — Retention and Optimization"
    attribution: "Sean Beausoleil, engineering lead at Mailbox, as quoted by Holiday"
    page_context: "The continuous improvement ethos — no product is ever finished"
    teaching_mapping: ["iterative_marketing.core_principle"]

  quote_19_anything_that_gets_customers:
    text: >
      Marketing, too many people forget, is not an end unto itself. It is simply getting
      customers. And by the transitive property, anything that gets customers is marketing.
    chapter: "My Conversion: Putting the Lessons into Practice"
    page_context: "Holiday's broadened definition of marketing — anything that grows the business counts"
    teaching_mapping: ["key_principles"]

  quote_20_perpetual_motion_machine:
    text: >
      I'd built those aspects into the product. I'd hacked marketing and product development
      and sales together into a perpetual motion machine. And there is nothing I did here that
      couldn't be applied to your own book, to your start-up, to that new project you're
      launching at the company you work for. It's infinitely malleable and applicable.
    chapter: "My Conversion: Putting the Lessons into Practice — Conclusion"
    page_context: "Holiday's final reflection after applying growth hacking to his own book launch"
    teaching_mapping: ["key_principles"]

  quote_21_hotmail_ps:
    text: >
      So put 'P.S.: I love you. Get your free e-mail at Hotmail' at the bottom.
    chapter: "An Introduction to Growth Hacking"
    attribution: "Tim Draper, as quoted by Holiday via Adam Penenberg's Viral Loop"
    page_context: "The original growth hack — Draper's suggestion that turned every email into an ad"
    teaching_mapping: ["case_studies.hotmail"]

  quote_22_dropbox_ad_cost:
    text: >
      Dropbox's founders, after pulling in their first set of users with their awesome demo
      video and social media strategy, had a choice. They could try to continue growing with
      the same tactics—more videos, more social media—or they could use advertising to boost
      their brand, because it was the conventional marketing wisdom. They tried the latter only
      to find that it cost between $233 and $388 in ad spend for every paying subscriber
      they brought in.
    chapter: "Step 3: Turn 1 into 2 and 2 into 4 — Going Viral"
    page_context: "The economics that drove Dropbox to referrals over paid advertising"
    teaching_mapping: ["case_studies.dropbox"]

  quote_23_pmf_crawl:
    text: >
      Product Market Fit is not some mythical status that happens accidentally. Companies
      work for it; they crawl toward it. They're ready to throw out weeks or months of work
      because the evidence supports that decision.
    chapter: "Step 1: It Begins with Product Market Fit"
    page_context: "PMF requires deliberate, iterative effort — not luck or divine intervention"
    teaching_mapping: ["product_market_fit.core_principle"]

  quote_24_focusing_on_acquisition_over_awareness:
    text: >
      Focusing on customer acquisition over 'awareness' takes discipline. . . . At a certain
      scale, awareness/brand building makes sense. But for the first year or two it's a
      total waste of money.
    chapter: "Step 2: Finding Your Growth Hack"
    attribution: "Sean Ellis, as quoted by Holiday"
    page_context: "The discipline of ignoring brand-building until acquisition fundamentals are proven"
    teaching_mapping: ["growth_hacking_funnel.stage_1_pull_not_push"]
