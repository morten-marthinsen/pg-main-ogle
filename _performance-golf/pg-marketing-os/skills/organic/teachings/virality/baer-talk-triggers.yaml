source_quotes:

  quote_01_talk_trigger_definition:
    text: "The menu at The Cheesecake Factory is a talk trigger: a built-in differentiator that creates customer conversations."
    chapter: "Chapter 1: Talk Is Cheap"
    page_context: "Opening case study on The Cheesecake Factory"
    relevance: "Core definition of talk trigger concept introduced via flagship example"

  quote_02_wom_economic_impact:
    text: "A very detailed examination of the impact of word of mouth by Engagement Labs in 2017 found that 19 percent of all consumer purchases in the United States were directly caused by offline or online word-of-mouth activity. That's approximately $10 trillion of economic impact."
    chapter: "Chapter 1: Talk Is Cheap"
    page_context: "Section on economic power of word of mouth"
    relevance: "Key statistic establishing WOM as measurable economic force, not soft metric"

  quote_03_one_percent_have_a_plan:
    text: "Jantsch figures that 1 percent or less of all businesses have a written plan for creating chatter. One hundred percent of businesses care about word of mouth, but less than 1 percent have a plan for achieving it."
    chapter: "Chapter 1: Talk Is Cheap"
    page_context: "Citing John Jantsch's research from The Referral Engine"
    relevance: "Establishes the massive gap between WOM importance and WOM strategy"

  quote_04_usp_vs_talk_trigger:
    text: "A USP is a feature, articulated with a bullet point, that is discussed in a conference room. A talk trigger is a benefit, articulated with a story, that is discussed at a cocktail party."
    chapter: "Chapter 1: Talk Is Cheap"
    page_context: "Answering a consulting client's question about the difference"
    relevance: "Foundational distinction between conventional marketing and talk trigger strategy"

  quote_05_trust_advantage:
    text: "Fundamentally, we trust businesses and organizations less than ever, and we trust people more than ever."
    chapter: "Chapter 1: Talk Is Cheap"
    page_context: "Section on why WOM is more effective now than ever"
    relevance: "Core thesis on why peer recommendation outperforms corporate messaging"

  quote_06_wom_vs_wom_marketing:
    text: "Word of mouth is just talking. Word-of-mouth marketing is the organizing of that talk and driving it in a particular way. It's doing something intentional."
    chapter: "Chapter 3: Same Is Lame"
    page_context: "Quoting Ted Wright, author of Fizz"
    relevance: "Critical distinction between passive WOM and engineered talk trigger strategy"

  quote_07_advertising_is_a_tax:
    text: "It's often been said that advertising is a tax paid by unremarkable businesses."
    chapter: "Chapter 3: Same Is Lame"
    page_context: "Section on why same is lame and differentiation matters"
    relevance: "Powerful framing of the cost of being undifferentiated"

  quote_08_same_is_lame:
    text: "The best way to create conversation is to have a selling proposition that is actually unique. After all, same is lame. We are physiologically conditioned to discuss what is different and to ignore average."
    chapter: "Chapter 3: Same Is Lame"
    page_context: "Core argument for differentiation as biological imperative"
    relevance: "Connects WOM strategy to human psychology — difference is hardwired to get noticed"

  quote_09_different_is_better_than_better:
    text: "A focus on improving customer experience makes it more difficult to create and propagate a truly differentiated talk trigger. This is because customer experience enhancements are about being better, not being different. And as author and motivational speaker Sally Hogshead says, when it comes to word of mouth, 'different is better than better.'"
    chapter: "Chapter 3: Same Is Lame"
    page_context: "Contrasting CX improvement with talk trigger creation"
    relevance: "Key insight — excellence is expected, difference is talkable"

  quote_10_remarkable_definition:
    text: "To be remarkable is the first criterion that a differentiator needs to meet to be a talk trigger candidate, and that means it's worthy of remark. It has to be a story worth telling."
    chapter: "Chapter 4: Be Remarkable"
    page_context: "Introducing the first of four talk trigger requirements"
    relevance: "Precise definition of 'remarkable' in the talk trigger framework"

  quote_11_skeptics_still_talk:
    text: "Being remarkable is so effective that it encourages people to talk about you even when those same people fervently believe being remarkable has no impact."
    chapter: "Chapter 4: Be Remarkable"
    page_context: "Research finding that skeptics recommend DoubleTree and Cheesecake Factory at same rate as non-skeptics"
    relevance: "Powerful proof that talk triggers work even on resistant audiences"

  quote_12_reasonable_goldilocks:
    text: "You're looking for the habitable 'Goldilocks Zone,' where the temperature is just right: a talk trigger that's remarkable enough to be a conversation catalyst but reasonable enough to be trusted."
    chapter: "Chapter 6: Be Reasonable"
    page_context: "Explaining the balance between remarkable and believable"
    relevance: "Calibration principle — too extreme kills believability, too subtle kills talkability"

  quote_13_surprise_and_delight_vs_trigger:
    text: "The problem with surprise and delight is that it's a surprise. It happens one time, to one person, in one scenario. That's not an operational choice that creates conversation day after day after day. Instead, it's one or more team members doing something special because they felt like it. A stuffed giraffe is a random act of kindness. A talk trigger is a strategic choice that you can implement every day."
    chapter: "Chapter 7: Be Repeatable"
    page_context: "Contrasting viral 'surprise and delight' stunts with repeatable talk triggers"
    relevance: "Critical distinction — talk triggers are operational systems, not one-time marketing moments"

  quote_14_consistency_trumps_delight:
    text: "Not only does consistency trump delight but inconsistency generates contempt among your customers."
    chapter: "Chapter 7: Be Repeatable"
    page_context: "Citing Gartner VP Jake Sorofman on consistency vs. delight"
    relevance: "Principle that repeatable triggers outperform random acts of brilliance"

  quote_15_repeatable_for_all:
    text: "To be a talk trigger, and to work for your business every day and not just one day, a differentiator has to be repeatable. It's not for randomly selected customers. Or your best customers. It's for all customers."
    chapter: "Chapter 7: Be Repeatable"
    page_context: "Defining the fourth requirement of talk triggers"
    relevance: "Non-negotiable principle — universality is what makes triggers talkable"

  quote_16_five_types:
    text: "The five types of talk triggers are: talkable empathy, talkable usefulness, talkable generosity, talkable speed, and talkable attitude."
    chapter: "Section 3 Introduction"
    page_context: "Introducing the 5 in the 4-5-6 system"
    relevance: "Definitive enumeration of the five talk trigger archetypes"

  quote_17_expectation_gap:
    text: "Word of mouth spreads when something occurs that customers do not reasonably expect. The gap between expectation and reality is the fuel for the stories that create word of mouth and in turn produce new customers."
    chapter: "Section 3 Introduction"
    page_context: "Explaining why talk triggers work psychologically"
    relevance: "Core mechanism — the expectation-reality gap drives all word of mouth"

  quote_18_purposeful_differentiator:
    text: "A talk trigger is a purposeful, operational differentiator that creates conversation among customers and recruits potential new customers in the process."
    chapter: "Appendix: Quick Reference Guide"
    page_context: "Summary definition from the appendix"
    relevance: "The most concise, official definition of a talk trigger in the book"

  quote_19_ridiculously_nice:
    text: "We collect more money by being nice. We actually collect more money by being 'ridiculously nice' because consumers aren't afraid to talk to us."
    chapter: "Chapter 8: Talkable Empathy"
    page_context: "Kenlyn Gretz, owner of Americollect, on empathy-driven collections"
    relevance: "Proof that empathy as operational strategy beats intimidation even in collections"

  quote_20_four_rs_summary:
    text: "The differentiator has to be: Remarkable and not just 'good'; Relevant and tied to your core business; Reasonable and not so grand as to cause distrust among customers; Repeatable and available to every customer, every time."
    chapter: "Chapter 7: Be Repeatable (closing summary)"
    page_context: "Summary of all four requirements at end of Section 2"
    relevance: "Complete four-requirements checklist in one passage"
