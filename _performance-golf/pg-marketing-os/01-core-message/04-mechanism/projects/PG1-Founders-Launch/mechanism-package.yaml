    medical outcome word (Diagnosis — the exact concept the campaign thesis
    demands). It occupies maximum whitespace (WZ-05, schema distance 9),
    avoids all saturated patterns, and connects to the deepest latent emotions
    (self-blame relief, search exhaustion). The mechanism is not a marketing
    invention — it IS what PG1 does. The name describes reality.

