    root_cause_connection: >
      Direct and total. The root cause is "treatment-without-diagnosis" — the
      entire golf improvement industry prescribes treatment without first
      identifying the golfer's specific root swing flaw. SwingScan Diagnosis
      IS the diagnosis. It introduces the missing step: identify the ONE root
      flaw before any treatment begins. The mechanism doesn't just solve the
      root cause — it is the root cause's answer. Mechanism alignment: 10.0/10.

    explanation:
      core_logic: >
        Golf improvement has always worked backward — prescribing fixes before
        identifying THE problem. Every instructor saw a different symptom.
        Every app showed data without identifying the cause. SwingScan Diagnosis
        reverses the sequence: diagnose first, then treat. The AI (trained on
        2M+ swings across 77 flaw patterns) identifies your ONE root swing
        flaw — the single movement causing all the compensations. Then it builds
        a plan specific to that diagnosis. One flaw. One plan. One clear path.

      analogy: >
        You wouldn't take medication without a blood test first. You wouldn't
        let a doctor prescribe treatment without running a diagnostic. But
        that's exactly what golf has done your whole life — every lesson was
        a prescription, nobody ever ran the test. SwingScan is the test golf
        never had. It sees what the human eye can't at full speed. It reads
        your swing the way an MRI reads your body — finding the ONE thing
        that's invisible on the surface but causing everything underneath.

      step_by_step:
        - "Step 1: Film your swing (phone camera, any angle, range or course)"
        - "Step 2: SwingScan AI analyzes against 77 root flaw patterns (trained on 2M+ swings)"
        - "Step 3: Your ONE root swing flaw is identified with 96% accuracy"
        - "Step 4: A personalized correction plan is built around YOUR specific diagnosis"
        - "Step 5: A matched PGA coach (one of 6 elite coaches specializing in your flaw type) guides your plan"
        - "Step 6: The system adapts as your flaw resolves — tracking progress BY diagnosis, not just scores"
        - "Step 7: As the root flaw resolves, compensations dissolve on their own — your entire swing improves"

      scientific_backing:
