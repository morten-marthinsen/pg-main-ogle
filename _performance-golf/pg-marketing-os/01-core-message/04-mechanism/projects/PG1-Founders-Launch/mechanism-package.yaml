      smart_step: >
        The one thing to work on right now. Your current priority — the single
        drill, focus, or correction that addresses your root swing flaw at
        this moment. Not a list of 12 things. One thing.
      smart_path: >
        Your sequenced improvement plan. The ordered series of Smart Steps that
        addresses your root swing flaw and then progresses to other areas of
        your game. Each step builds on the last.
      smart_match: >
        Your coach pairing. The system matches you with a coach based on your
        specific root swing flaw and flaw type. Not a marketplace gamble — a
        curated match based on your diagnosis.

    root_cause_connection: >
      Direct and total. The root cause is the root swing flaw — unidentified
      in every golfer, creating the Symptom Spiral. The PG1 Smart System IS
      the answer: it discovers the root swing flaw, gives the golfer a Smart
      Step (one thing to work on right now), pairs them with a coach (Smart
      Match), sequences their improvement plan (Smart Path), and adapts as
      the flaw resolves. The mechanism does not just solve the root cause —
      it is the root cause's complete answer. Mechanism alignment: 10.0/10.

    explanation:
      core_logic: >
        The PG1 Smart System discovers your root swing flaw, then gives you
        one thing to work on right now — your Smart Step. A matched coach
        (Smart Match) validates and guides you. The system adapts. When the
        root flaw resolves, it moves to your next biggest opportunity for
        improvement. Then the next. Each one builds on the last. The more
        you use it, the more it knows you.

      the_loop: >
        Discover → Diagnose root swing flaw → Give Smart Step → Coach
        validates and guides → System adapts → Move to next area of game.
        The root swing flaw varies by area of game (driver is not irons is
        not short game) — this is an ongoing system, not a one-time fix.

      locked_mechanism_paragraph: >
        LOCKED VERBATIM — do not modify:
        "When the Smart System finds your root swing flaw and you start
        working on your Smart Step, improvement becomes inevitable. The swing
        thought that's been haunting you for months quiets down. Shots you
        couldn't hit last week start landing. That breakthrough — the one
        where your game starts to feel like a different game — that's the
        moment everything changes. And it's just the beginning. Because once
        that root swing flaw is addressed, the Smart System identifies your
        next biggest opportunity for improvement. Then the next. Each one
        builds on the last. For as long as you want to play this game, the
        Smart System is finding the one thing that will make the biggest
        difference right now. That's not a 30-day program. That's a lifetime
        of good golf."

