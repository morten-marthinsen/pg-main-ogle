      do address your root swing flaw, you are guaranteed improvement in
      your golf game — even if you don't have a lot of time to practice,
      even if you don't have money to invest in equipment or lessons, or
      even if you have some other physical problem that you're dealing with.
      When you fix your root swing flaw, improvement is inevitable.

