    promise_alignment: 9.0
    promise_alignment_notes: >
      The offer delivers the promise directly. Promise: "Know your ONE
      root swing flaw and have a clear plan to fix it." Offer: SwingScan
      Diagnosis (identifies root flaw) + Personalized Correction Plan
