  # ============================================================
  # CORE OFFER
  # ============================================================
  core_offer:
    dream_outcome: >
      Know your ONE root swing flaw — the single movement causing everything
      else — identified for the first time in golf history. Have a personalized
      correction plan built around YOUR specific diagnosis. Work with a matched
      PGA coach who specializes in your flaw type. Watch your swing improve
      with directed effort instead of random guessing. Love your game again
      because the confusion is finally over.

    core_product: >
      PG1 Pulse Founders Club Membership — the first personalized golf
      improvement system built on diagnosis, not tips. Includes SwingScan
      Diagnosis (AI root flaw identification), personalized correction plan,
      matched PGA coach access, adaptive progress tracking, and full platform
      access (current + every future feature).

    positioning: "Coaching system — not an app. A diagnosis — not more tips."

    offer_frame: >
      "Get your diagnosis" — not "buy an app." The purchase is framed as
      getting diagnosed for the first time, joining the founding cohort of
      golfers who know their root flaw, and locking in permanent access at
      the lowest price this system will ever be offered.

    value_stack:
      - item: "SwingScan Diagnosis"
        description: >
          AI-powered root flaw identification trained on 2M+ swings across
          77+ documented flaw patterns. 96% accuracy. Identifies your ONE
          root swing flaw — the single movement causing all compensations.
        value_stated: "$500"
        value_justification: >
          A single diagnostic session with a biomechanics specialist runs
          $300-500. SwingScan provides continuous re-diagnosis as your flaw
          resolves, not a one-time snapshot.
        delivery: "In-app — upload swing video, receive diagnosis"

      - item: "Personalized Correction Plan"
        description: >
          A sequenced improvement plan built around YOUR specific diagnosis.
          Not generic drills — targeted corrections matched to your root flaw
          type. Adapts as your flaw resolves and compensations dissolve.
        value_stated: "$1,200"
        value_justification: >
          A 12-session lesson package with a PGA pro averages $1,200-2,400.
          The correction plan delivers structured, diagnosis-specific guidance
          equivalent to a full lesson series — and adapts continuously.
        delivery: "In-app — personalized drills, progression tracking"

      - item: "Matched PGA Coach Access"
        description: >
          Access to one of 6 elite PGA coaches matched to your specific flaw
          type via Coach Chat. Not a marketplace gamble — a curated match
          based on your diagnosis. Direct communication, swing reviews, and
          guided progression.
        value_stated: "$2,400"
        value_justification: >
          Private coaching with a PGA professional: $150-350/session. At one
          session per month, that is $1,800-4,200/year. Coach Chat provides
          ongoing access without per-session fees.
        delivery: "In-app Coach Chat — direct messaging + swing review"

      - item: "Adaptive Intelligence System"
        description: >
          The system gets smarter the more you use it. Tracks progress BY
          diagnosis (not just scores), identifies when compensations dissolve,
          adjusts your plan based on practice frequency, location, and goals.
          Netflix-level personalization for golf improvement.
        value_stated: "$600"
        value_justification: >
          Comparable adaptive platforms (Peloton, Whoop) run $300-500/year.
          PG1's adaptive layer is golf-specific and diagnosis-driven — a
          category that does not exist elsewhere.
        delivery: "In-app — continuous, automatic"

      - item: "Full Platform Access (Current + Future)"
        description: >
          Every feature PG1 builds — current and future. Assessment, SwingScan
          AI, real-time ball flight feedback, AI coaching swing-by-swing,
          post-round voice analysis, community, progress tracking. Founders
          get every new feature first.
        value_stated: "$1,000"
        value_justification: >
          Comparable multi-feature golf platforms (Arccos + coaching + tracking)
          cost $400-900/year combined. Full platform access at a locked rate
          with priority feature rollouts is worth $1,000+ annually.
        delivery: "Mobile app — iOS and Android"

    total_stated_value: "$5,700"

  # ============================================================
  # ENHANCEMENT STACK
  # ============================================================
  enhancement_stack:
    bonuses:
      - name: "The Root Flaw Report"
        description: >
          A detailed written analysis of your specific root swing flaw —
          what it is, why it developed, how it creates compensations in your
          swing, and exactly what the correction path looks like. Your
          diagnosis, explained in plain language you can reference anytime.
        value_stated: "$197"
        type: "report (generated per-user from SwingScan diagnosis)"
        objection_addressed: >
          "I won't understand my diagnosis" / "AI will just give me a number
          without explanation." The Root Flaw Report translates your diagnosis
          into a clear, written narrative.
        proof: >
          Based on the same diagnostic framework that identified 77+ flaw
          patterns across 2M+ swings. Each report is specific to YOUR
          diagnosis — not a template.

      - name: "The Flaw Chain Map"
        description: >
          A visual breakdown showing how your ONE root flaw cascades into
          the 3-5 compensations visible in your swing. See exactly which
          symptoms your instructors have been treating — and why fixing the
          root dissolves them on their own. Printable reference for the range.
        value_stated: "$97"
        type: "visual tool (generated per-user from diagnosis)"
        objection_addressed: >
          "How do I know this ONE flaw is really causing everything?" The
          Flaw Chain Map shows the cascade — root flaw to compensations —
          so you see the connections yourself.
        proof: >
          Every diagnosis identifies compensation patterns. The Flaw Chain
          Map makes the invisible chain visible. Based on motor learning
          research showing targeted practice outperforms random practice
          (DISC-09, peer-reviewed).

      - name: "Founders Priority Access"
        description: >
          Every new PG1 feature ships to Founders first. Before annual members.
          Before the public. Beta access to new AI models, new coaching tools,
          new analytics — Founders are the first to test and shape the platform.
          Direct line to the PG1 product team (not just coaches — the builders).
        value_stated: "$500"
        type: "access tier (permanent, exclusive to first 1,000)"
        objection_addressed: >
          "What if PG1 adds features I have to pay extra for?" / "Will my
          membership become outdated?" Founders Priority Access locks in
          everything — current and future — at the Founders rate. Permanently.
        proof: >
          SOC-03: 1,000-member cap is real and enforced. SOC-04: Numbered
          Founders badge visible on profile. RR-03: Founders rate locked
          permanently — confirmed in brief and keynote.

      - name: "The Diagnosis Comparison Guide"
        description: >
          A breakdown of what every major golf improvement approach actually
          does — and what it skips. See where lessons, apps, YouTube, launch
          monitors, and training aids fall on the diagnosis spectrum. Understand
          why nothing has worked and why SwingScan Diagnosis is structurally
          different. Not a competitive attack — a category education.
        value_stated: "$47"
        type: "guide (PDF/in-app)"
        objection_addressed: >
          "How is this different from Sportsbox / Arccos / my instructor?"
          The Diagnosis Comparison Guide shows the structural difference:
          those systems measure or treat. PG1 diagnoses first. No competitor
          names — positioned as category types.
        proof: >
          MECH-01: Zero of 9 competitors analyzed claim root flaw diagnosis.
          MECH-06: PG1 positioning map — alone in high-personalization +
          high-tech quadrant. Verifiable by checking any competitor.

    guarantee:
      type: "conditional + unconditional stacked"
      branded_name: "The Diagnosis Promise"
      duration: "60 days"
      language: >
        Try PG1 Pulse for 60 days. Get your SwingScan Diagnosis. Work through
        your personalized correction plan. Connect with your matched coach.
        If you don't agree that knowing your root flaw has changed how you
        think about your game — if the diagnosis doesn't deliver the clarity
        we promised — send one email and get every penny back. No hoops. No
        hassle. No hard feelings.
      conditions: >
        Complete your SwingScan Diagnosis and engage with the correction plan
        within the 60-day window. This is not a condition to make refunds
        harder — it is a condition to make the PRODUCT work. The diagnosis
        only delivers clarity if you actually receive it.
      unconditional_layer: >
        Within the first 7 days (free trial period), cancel anytime with
        zero charge. No questions asked. No credit card charged until Day 8.
      stacking_rationale: >
        Layer 1: 7-day free trial (unconditional — zero risk to try).
        Layer 2: 60-day Diagnosis Promise (conditional — get your diagnosis,
        experience the clarity, or get your money back). The stacking moves
        the prospect from "just maybe" (7-day trial) to "I have 60 days to
        prove this works" (Diagnosis Promise). The branded name ("The Diagnosis
        Promise") reinforces the core offer frame: you are buying a diagnosis,
        and we promise it delivers.
      business_model_check: >
        60-day guarantee on a $299 lifetime product is sustainable because:
        (1) the condition requires engagement, which correlates with retention,
        (2) the proof inventory shows 68/100 strength — moderate but sufficient
        for a warm audience, (3) the 7-day free trial filters non-serious
        buyers before any charge, (4) the diagnosis experience itself is
        high-value and immediate — most refund requests come from disengagement,
        not dissatisfaction with the product. Projected refund rate: <10%
        based on warm audience launch to PG's existing customer base.

    scarcity:
      type: "limited_supply"
      mechanism: >
        1,000 Founders Club memberships. First come, first served. When
        1,000 members are enrolled, the Founders Club closes permanently.
        Future members join at public pricing (confirmed significantly higher
        in brief and keynote). The numbered Founders badge on each member's
        profile is permanent proof of their position.
      justification: >
        The 1,000-member cap is REAL, not manufactured. From the brief:
        "Limited to 1,000 members. First come, first served." The cap exists
        for three reasons: (1) coach capacity — 6 PGA coaches serving the
        founding cohort with priority access, (2) product feedback quality —
        the first 1,000 members shape the platform through direct product
        team access, (3) pricing architecture — Founders rate is permanently
        locked and subsidized by the company's investment in building proof
        and community before public launch.
      language: >
        The Founders Club is limited to 1,000 members. When the 1,000th
        golfer joins, this offer closes — permanently. Your Founders number
        is locked to your profile. Public pricing will be significantly higher.
      enforcement: >
        Counter displayed on Founders page. Numbered badge assigned at
        enrollment. Founders Club closes when cap is reached.

    urgency:
      type: "pricing + exploding_opportunity"
      mechanism: >
        Founders pricing ($199/yr or $299 lifetime) is available only during
        the Founders launch window. Once 1,000 spots fill OR the launch
        window closes, pricing increases to public rates. The Founders rate
        is locked permanently for anyone who joins during this window —
        it never goes up, even as the platform adds features and the public
        price increases.
      deadline: >
        Structural — 1,000 spots filling creates natural urgency. No
        manufactured countdown timer. The urgency is real: each enrollment
        reduces remaining spots.
      justification: >
        From the brief: "Public launch pricing will be significantly higher."
        The Founders price is an early-adopter incentive — the company is
        trading revenue for proof (testimonials, data, community) that
        strengthens the public launch. This is a genuine business reason,
        not a marketing trick.
      language: >
        This is Founders pricing — the lowest price PG1 Pulse will ever be.
        When the 1,000 Founders spots are filled, this rate disappears.
        Your Founders rate is locked permanently. The public price will be
        significantly higher.

