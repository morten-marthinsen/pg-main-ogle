  # ============================================================
  # PRESENTATION SCRIPT (Todd Brown D-F-W-B-P)
  # ============================================================
  presentation_script:
    core_product_intro: >
      So here is what I built for you. It is called PG1 Pulse — and for the
      first 1,000 golfers who join as Founders, it is yours at a price we
      will never offer again.

    deliverable_presentations:
      deliverable_1:
        D: "The first thing you get is your SwingScan Diagnosis."
        F: >
          SwingScan AI — trained on over 2 million swings across 77 documented
          flaw patterns — analyzes your swing and identifies your ONE root
          swing flaw with 96% accuracy.
        W: >
          Because every instructor you have ever seen identified A flaw.
          Nobody identified THE flaw — the single movement causing all the
          compensations. SwingScan does what the human eye cannot do at full
          speed.
        B: >
          For the first time, you will know exactly what has been holding your
          game back. Not a guess. Not a hunch. A diagnosis. And once you know
          the root flaw, the compensations start to make sense — and start
          to dissolve.
        P: >
          Zero competitors claim root flaw diagnosis. We checked nine of the
          top golf apps and coaching platforms. Not one identifies a single
          root swing flaw. This is the step golf has always skipped.

      deliverable_2:
        D: "The second thing you get is a Personalized Correction Plan."
        F: >
          Based on your specific diagnosis, PG1 builds a sequenced correction
          plan — targeted drills and progressions matched to YOUR root flaw
          type, not generic instruction.
        W: >
          Because knowing your root flaw is only half the equation. You need
          a clear, structured path to fix it. Not 12 random drills — a
          sequenced plan that addresses the root and lets compensations
          dissolve on their own.
        B: >
          Every time you practice, you know exactly what to work on — and
          why. No more guessing at the range. No more trying one tip and
          then another. One plan. One clear path. Directed effort instead
          of random effort.
        P: >
          Motor learning research confirms: structured, diagnosis-specific
          practice produces 50%+ improvement rates versus 34% for generic
          instruction. Targeted practice outperforms random practice for
          retention.

      deliverable_3:
        D: "The third thing you get is a Matched PGA Coach."
        F: >
          One of six elite PGA coaches — matched to your flaw type, not
          randomly assigned — available through Coach Chat for swing reviews,
          guidance, and ongoing support.
        W: >
          Because AI provides the diagnosis with precision the human eye
          cannot match. But a coach provides the human understanding, the
          encouragement, and the ability to answer the question the AI
          cannot: "How does this feel for ME?" You need both.
        B: >
          You are not on your own. You have a coach who knows your diagnosis,
          understands your flaw type, and guides your correction plan. Not a
          marketplace gamble where you hope you get a good one. A curated
          match.
        P: >
          Multiple systematic reviews confirm: human-AI collaboration
          outperforms either alone in diagnostic and instructional tasks.
          PG1 combines AI precision with human coaching wisdom — a combination
          no competitor offers.

      deliverable_4:
        D: "The fourth thing you get is the Adaptive Intelligence System."
        F: >
          PG1 learns the more you use it. It tracks your progress BY diagnosis
          — not just scores. It identifies when compensations dissolve. It
          adjusts your plan based on your practice frequency, location, and
          goals.
        W: >
          Because a static plan is no different from a tip. You need a system
          that evolves with you — that recognizes when your root flaw resolves
          and surfaces the next priority. Netflix learned what you want to
          watch. PG1 learns what your swing needs next.
        B: >
          Your improvement path updates automatically. As your root flaw
          resolves, the system adapts — surfacing what matters now, not what
          mattered last month. You are always working on the right thing at
          the right time.
        P: >
          PG1 was built by the developer behind MyFitnessPal and The Weather
          Channel app — platforms that serve tens of millions with personalized,
          adaptive intelligence. The technology architecture is proven at scale.

      deliverable_5:
        D: "And the fifth thing you get is Full Platform Access — every feature, current and future."
        F: >
          Assessment, SwingScan AI, real-time ball flight feedback, AI coaching
          swing-by-swing, post-round voice analysis, community, progress
          tracking — everything PG1 builds, you get.
        W: >
          Because PG1 is not a finished product sitting on a shelf. It is a
          living system that gets better every month. And Founders get every
          new feature first — before annual members, before the public.
        B: >
          You never worry about missing a feature or paying extra for an
          upgrade. Everything PG1 builds is yours. Your Founders access is
          permanent and complete.
        P: >
          $5M+ invested in building PG1. 276 team members across 15 countries.
          This is not a side project — it is the most significant product
          launch in Performance Golf's history.

    product_summary: >
      With everything you are getting — your SwingScan Diagnosis, your
      Personalized Correction Plan, your Matched PGA Coach, the Adaptive
      Intelligence System, and Full Platform Access — you have everything
      you need to finally know your ONE root swing flaw and have a clear,
      directed path to fix it. For the first time, you are not guessing.
      You are diagnosed.

    bonus_presentations:
      bonus_1:
        D: "Bonus 1: The Root Flaw Report"
        F: >
          A detailed written analysis of your specific root flaw — what it is,
          why it developed, how it creates compensations, and your correction
          path. Plain language. Yours to keep and reference anytime.
        W: >
          Because a diagnosis is only as good as your understanding of it.
          The Root Flaw Report translates your SwingScan results into a
          narrative you can read, reread, and share with your playing partners.
        B: >
          You will understand your swing at a level no lesson has ever given
          you. Not swing thoughts. Not tip of the week. Your specific flaw,
