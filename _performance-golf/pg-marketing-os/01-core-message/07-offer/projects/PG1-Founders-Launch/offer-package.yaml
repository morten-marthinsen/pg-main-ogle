        B: >
          You see the gap. You understand why nothing has worked — not because
          you chose the wrong app or the wrong instructor, but because every
          option skipped the diagnosis. And you see exactly where PG1 fits in
          that landscape.
        P: >
          MECH-01: Zero of 9 competitors claim root flaw diagnosis. Verifiable
          by checking any competitor's marketing.

    value_demonstration:
      total_value_statement: >
        With everything you get today — SwingScan Diagnosis, Personalized
        Correction Plan, Matched PGA Coach, Adaptive Intelligence System,
        Full Platform Access, The Root Flaw Report, The Flaw Chain Map,
        Founders Priority Access, and The Diagnosis Comparison Guide — PG1
        Pulse Founders Club has a total value of over $6,500.

      if_all_it_did_rounds:
        round_1: >
          Think about it — if all PG1 did was identify your ONE root swing
          flaw — the single movement causing everything else in your swing —
          would it be worth $299? A single diagnostic session with a
          biomechanics specialist costs $300-500. And that is a one-time
