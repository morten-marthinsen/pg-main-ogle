        P: >
          Based on the same diagnostic framework that identifies 77+ flaw
          patterns. Each report is generated from YOUR diagnosis — not a
          template.

      bonus_2:
        D: "Bonus 2: The Flaw Chain Map"
        F: >
          A visual breakdown of how your ONE root flaw cascades into the 3-5
          compensations visible in your swing. Printable for the range.
        W: >
          Because seeing the cascade is believing. When you see that your
          slice, your early extension, and your inconsistent contact all
          trace back to one root flaw — you stop trying to fix three things
          and start fixing one.
        B: >
          The "aha" moment every golfer needs: ONE flaw, a chain of
          compensations, and a clear picture of why fixing the root fixes
          everything else.
        P: >
          Motor learning research (DISC-09, peer-reviewed): targeted practice
          produces superior retention compared to random practice. The Flaw
          Chain Map shows you exactly where to target.

      bonus_3:
        D: "Bonus 3: Founders Priority Access"
        F: >
          Every new PG1 feature ships to you first. Before other members.
          Before the public. Direct line to the PG1 product team.
        W: >
          Because Founders are not customers — they are the founding cohort
          who shape what PG1 becomes. Your feedback matters. Your experience
          matters. That is why Founders get first access and a direct line
          to the builders.
        B: >
          You are always first. First to test new AI models. First to try
          new coaching tools. First to access new analytics. And your
          Founders rate stays locked no matter what PG1 adds.
        P: >
          SOC-03: 1,000-member Founders cap. SOC-04: Numbered Founders badge.
          RR-03: Rate locked permanently. This is structural exclusivity,
          not marketing language.

      bonus_4:
        D: "Bonus 4: The Diagnosis Comparison Guide"
        F: >
          A clear breakdown of what every golf improvement approach — lessons,
          apps, data trackers, YouTube, training aids — actually does and
          what it skips. Category education, not competitive attack.
        W: >
          Because the question every golfer asks is: "How is this different
          from what I have already tried?" This guide answers it — structurally,
