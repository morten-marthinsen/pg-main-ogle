    anti_slop: "PASS"
    anti_slop_notes: >
      Checked all output against anti-slop lexicon. No vague qualifiers
      (many, often, most). No AI telltales (revolutionary, game-changing,
      unlock, harness, leverage, journey, empower). No corporate filler
