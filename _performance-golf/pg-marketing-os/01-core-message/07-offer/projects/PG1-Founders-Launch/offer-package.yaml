  # ============================================================
  # CORE OFFER
  # ============================================================
  core_offer:
    dream_outcome: >
      Your root swing flaw identified. One thing to work on right now. A
      system that adapts the more you use it. When you fix your root swing
      flaw, improvement becomes inevitable. Play the golf you know you are
      capable of.

    core_product: >
      PG1 Smart System Founders Club Membership — ONE system with 6
      components. Not a value stack of separate products. One integrated
      system that finds your root swing flaw, gives you a Smart Step,
      matches you with a coach, sequences your path, tracks your progress,
      and adapts as your game improves.

    positioning: "One system. Six components. The end of traditional instruction."

    offer_frame: >
      The offer is ONE system — not a bundle of products. The 6 components
      work together as a single system. Frame the purchase as joining the
      system that finds your root swing flaw and makes improvement inevitable.
      NOT "get all these separate things." ONE system that does everything.

    system_components:
      - component_number: 1
        name: "Personalized Assessment"
        description: >
          Your entry into the Smart System. A comprehensive evaluation that
          establishes your baseline, identifies your areas of focus, and
          begins the process of discovering your root swing flaw.
        role_in_system: "Entry point — gives the system its first understanding of who you are"

      - component_number: 2
        name: "SwingScan AI"
        description: >
          The diagnostic engine. Trained on 2M+ swings across 77+ documented
          flaw patterns. Analyzes your swing and identifies your root swing
          flaw — the one movement creating all the others.
        role_in_system: "Discovery — finds the root swing flaw"

      - component_number: 3
        name: "Your Smart Step"
        description: >
          The one thing to work on right now. Not 12 competing priorities.
          One clear focus — the single correction that addresses your root
          swing flaw at this moment. Updated as your flaw resolves.
        role_in_system: "Direction — tells you exactly what to do next"

      - component_number: 4
        name: "Progress Dashboard"
        description: >
          Adaptive progress tracking that follows your improvement BY root
          swing flaw — not just scores. Sees when compensations dissolve.
          Adjusts your Smart Path based on real progress, not generic timelines.
        role_in_system: "Tracking — the system adapts because it sees your progress"

      - component_number: 5
        name: "Dedicated Coach Access (Smart Match)"
        description: >
          A coach matched to your specific root swing flaw type. Not a
          marketplace gamble. Not a random assignment. A curated match —
          because the coach who is best for your flaw type is not necessarily
          the same coach who is best for someone else's.
        role_in_system: "Validation — a human who knows your diagnosis and guides your correction"

      - component_number: 6
        name: "Drill & Round Tracking"
        description: >
          Practice and play tracking that connects your work to your progress.
          Log drills, track rounds, see how your Smart Step work translates
          to real results on the course. The system learns from both.
        role_in_system: "Feedback loop — practice and play feed back into the system"

    system_integration_note: >
      These 6 components are NOT separate products. They are parts of ONE
      system. The assessment feeds SwingScan. SwingScan produces the Smart
      Step. The coach validates the Smart Step. The dashboard tracks progress.
      Drill & round tracking feeds back into the system. Remove any one and
      the system is incomplete. This is why it is presented as ONE system,
      not a value stack.

  # ============================================================
  # BONUSES
  # ============================================================
  bonuses:
    note: >
      Three bonuses. NOT the old 4-bonus structure. These are the locked
      bonuses from the human review session.

    bonus_1:
      name: "30% Off All PG Products"
      description: >
        Founders get 30% off every product in the Performance Golf catalog.
        Training aids, gear, accessories — 30% off, permanently, as long as
        your Founders membership is active.
      type: "discount (permanent for Founders)"
      objection_addressed: >
        "I already spend too much on golf stuff." This bonus turns PG into
        the cheapest place to buy everything else — and the discount pays
        for the membership quickly.

    bonus_2:
      name: "VIP New Release Access"
      description: >
        Every new PG product launches to Founders first. Before the public.
        Before the email list. Founders see it, try it, and buy it at the
        best price before anyone else knows it exists.
      type: "access tier (permanent for Founders)"
      objection_addressed: >
        "What if I miss the best deals?" Founders never miss — they are
        always first in line for everything PG releases.

    bonus_3:
      name: "$500 Transformation Academy Credit"
      description: >
        $500 credit toward the PG Transformation Academy — Performance Golf's
        premium coaching program. Apply it to any Transformation Academy
        enrollment. Founders-only benefit.
      type: "credit (one-time)"
      objection_addressed: >
        "What if I want even more personalized coaching?" The $500 credit
        gives Founders a path to the highest-tier PG coaching experience at
        a significant discount.

  # ============================================================
  # GUARANTEE
  # ============================================================
  guarantee:
    type: "365-day"
    duration: "365 days"
    language: >
      Try the PG1 Smart System for a full year. Get your root swing flaw
      identified. Work your Smart Step. Connect with your matched coach.
      If you are not satisfied — for any reason — contact us within 365
      days and get every penny back. No hoops. No hassle. No hard feelings.
    notes: >
      365-day guarantee — NOT the old 60-day Diagnosis Promise. This was
      locked in the human review session (Checkpoint 7).

  # ============================================================
  # SCARCITY
  # ============================================================
  scarcity:
    type: "limited_supply"
    mechanism: >
      1,000 Founders Club memberships. First come, first served. When
      1,000 members are enrolled, the Founders Club closes permanently.
    language: >
      The Founders Club is limited to 1,000 members. When the 1,000th
      golfer joins, this offer closes — permanently. Your Founders rate
      is locked for life. Public pricing will be significantly higher.
    enforcement: >
      Counter displayed on Founders page. Numbered badge assigned at
      enrollment. Founders Club closes when cap is reached.

  # ============================================================
  # PRICE ARCHITECTURE
  # ============================================================
  price_architecture:
    actual_price:
      option_1:
        name: "Annual Founders"
        price: "$199/year"
        description: "Full access to the complete PG1 Smart System. Rate locked permanently."
        best_for: "Golfers who want to try before committing long-term"
      option_2:
        name: "Lifetime Founders"
        price: "$399 one-time"
        description: "Full access forever. Never pay again. Every future feature included."
        best_for: "Golfers who want to end the search — one payment, permanent access"
        recommended: true
    payment_options:
      - "$199/year (rate locked, cancel anytime)"
      - "$399 one-time (lifetime, never pay again)"
    price_justification: >
      $399 is the cost of 2-3 lessons with a PGA professional. Those lessons
      treat symptoms without ever identifying the root swing flaw. The PG1
      Smart System gives you the root swing flaw identification, the Smart
      Step, the matched coach, the adaptive system, and every future feature
      — for the price of a few afternoons with an instructor who may not
      find the root cause. And unlike lessons, you never pay again.

  # ============================================================
  # OFFER FRAMING RULES
  # ============================================================
  offer_framing_rules:
    one_system_not_value_stack: >
      CRITICAL: The offer is ONE system with 6 components. It is NOT presented
      as a value stack with individual dollar values assigned to each component.
      Do not write "SwingScan AI ($500 value) + Correction Plan ($1,200 value)
      + Coach ($2,400 value)..." Instead: "One system. Six components. Everything
      you need to find your root swing flaw and make improvement inevitable."
    root_swing_flaw_framing: >
      The offer is framed through the root swing flaw. The golfer is not
      buying an app — they are joining the system that finds their root swing
      flaw and makes improvement inevitable. Every component serves that mission.
    smart_vocabulary: >
      Use Smart Step, Smart Path, and Smart Match consistently in offer copy.
      These branded terms reinforce the system's identity and vocabulary.

  # ============================================================
  # CTA LANGUAGE
  # ============================================================
  cta_language:
    primary: "Join the Founders Club"
    secondary: "Get Started"
    close: "One flaw. One plan. Improvement becomes inevitable."

  # ============================================================
  # PRESENTATION SCRIPT (D-F-W-B-P — ONE SYSTEM)
  # ============================================================
  presentation_script:
    core_product_intro: >
      So here is what we built. It is called the PG1 Smart System — and for
      the first 1,000 golfers who join as Founders, it is yours at a price
      we will never offer again.

    system_presentation: >
      The PG1 Smart System is one system with six components. They work
      together. Remove any one and the system is incomplete. Here is what
      each one does.

      Component 1: Personalized Assessment.
      Your entry into the system. It gives the Smart System its first
      understanding of who you are — your game, your goals, your history.

      Component 2: SwingScan AI.
      The diagnostic engine. Trained on over 2 million swings across 77+
      flaw patterns. It analyzes your swing and finds your root swing flaw.

      Component 3: Your Smart Step.
      The one thing to work on right now. Not 12 things. One. The single
      correction that addresses your root swing flaw at this moment.

      Component 4: Progress Dashboard.
      Adaptive tracking that follows your improvement by root swing flaw.
      It sees when compensations dissolve. It adjusts your path based on
      real progress.

      Component 5: Dedicated Coach Access — Smart Match.
      A coach matched to your specific flaw type. Not random. Not a
      marketplace gamble. A curated match based on your diagnosis.

      Component 6: Drill & Round Tracking.
      Practice and play tracking that connects your work to your progress.
      The system learns from both.

      That is the PG1 Smart System. One system. Six components. From knowing
      your name to knowing your game.

    bonus_presentation: >
      And as a Founder, you also get three bonuses.

      Bonus 1: 30% off every product in the Performance Golf catalog.
      Permanently. Training aids, gear, accessories — 30% off for life.

      Bonus 2: VIP new release access. Every new PG product launches to
      Founders first. Before the public. Before the email list. You are
      always first.

      Bonus 3: A $500 credit toward the PG Transformation Academy —
      our premium coaching program. Apply it to any enrollment. Founders only.

    price_reveal: >
      When you join the PG1 Smart System Founders Club today, you get the
      complete system — all six components, all three bonuses, every future
      feature — for $199 per year or $399 one time. Never pay again.

      Both options include a 365-day guarantee. Try the system for a full
      year. If you are not satisfied for any reason, every penny back.

    risk_reversal: >
      You do not have to say yes today. All you have to say is maybe. Because
      your entire investment is backed by a 365-day guarantee. Try the Smart
      System for a full year. Work your Smart Step. Connect with your coach.
      Watch the system learn your game. If you are not satisfied — for any
      reason — every penny back. No hoops. No hassle.

    final_close: >
      One flaw. One plan. Improvement becomes inevitable.

      That is not a tagline. That is what happens when the root swing flaw is
      finally addressed. The PG1 Smart System finds it. Your Smart Step
      addresses it. Your coach validates it. The system adapts.

      For the first 1,000 golfers who want to be part of this — the Founders
      Club is open.

      $199 per year. Or $399 once. Never pay again.

      365-day guarantee.

      Join the Founders Club.

