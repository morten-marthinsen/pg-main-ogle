    promise_connection: >
      "Improvement becomes inevitable" captures the primary promise — tied
      to the conditional that the root swing flaw must be addressed. The
      promise is MODERATE — lead with system/diagnosis, not specific results.
    root_cause_connection: >
      The root swing flaw is the STAR. The Symptom Spiral explains what
      happens when it goes unidentified. The binary argument establishes
      inevitability. The Smart System is the answer.
    big_idea_connection: >
      "The End of Traditional Instruction" is the before/after binary. Before:
      treatment without diagnosis, the Symptom Spiral. After: the PG1 Smart
      System, root swing flaw found, improvement inevitable.
