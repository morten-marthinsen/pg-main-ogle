          flaw — the single movement creating all the others. Nobody has identified
          yours. That is why you have been stuck. When you fix your root swing
          flaw, improvement becomes inevitable.
        claim_type: "reframed"
        specificity_score: 9
        defensibility_score: 8
      proof_elements:
        - proof_id: "BINARY-ARGUMENT"
          proof_type: "logic_flow"
          content_summary: "The Binary Argument (LOCKED VERBATIM) — establishes inevitability"
          proof_strength: 9
        - proof_id: "SOC-06"
