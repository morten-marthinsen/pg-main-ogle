          70% of golfers who take lessons do not improve — because every lesson
          treated symptoms while the root swing flaw sat underneath, unidentified.
          That is the Symptom Spiral: working on the wrong thing, watching symptoms
          multiply, compensating, spiraling deeper.
        claim_type: "factual"
        specificity_score: 9
        defensibility_score: 9
      proof_elements:
        - proof_id: "DISC-05"
          proof_type: "statistic"
          content_summary: "USGA 2025 Golf Scorecard: men's handicap unchanged 2020-2025"
          proof_strength: 9
        - proof_id: "DISC-08"
          proof_type: "authority"
          content_summary: "Bobby Clampett (GolfWRX): 70% of golfers who take lessons do not improve"
          proof_strength: 9
        - proof_id: "DATA-07"
