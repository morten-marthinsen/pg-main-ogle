    mechanism_connection: >
      The PG1 Smart System IS the mechanism — the first complete system in
      golf that identifies the root swing flaw, gives the golfer one thing
      to work on right now (Smart Step), matches them with a coach (Smart
      Match), sequences their path (Smart Path), and adapts as the game
