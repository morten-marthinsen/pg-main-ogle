        No hard-sell pressure (the binary is stated matter-of-factly).
        No generic app marketing (positioned as coaching system, not app).
        No clinical tech-speak (Smart System described through what it DOES).
        No pain exploitation (before side acknowledged with empathy, moves to
        hope side). No unsubstantiated hype (all claims traceable to proof).

