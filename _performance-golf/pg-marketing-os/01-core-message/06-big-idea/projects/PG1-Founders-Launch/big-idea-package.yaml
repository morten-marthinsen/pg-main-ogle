  primary:
    id: "BI-PG1-001"
    concept_id: "CONCEPT-A"
    big_idea_statement: >
      Every golfer has ONE root swing flaw causing everything else —
      and nobody has ever diagnosed yours. The entire golf improvement
      industry has been prescribing treatment without running the test.
      That's why 70% of golfers who take lessons don't improve. That's
      why your handicap hasn't budged. You weren't failing — you were
      never diagnosed. Now, for the first time, the diagnosis exists.
    big_idea_type: "discovery_reframe"
    creative_wrapper: "The Undiagnosed Golfer"

    components:
      root_cause_angle: >
        Treatment-without-diagnosis. The entire golf improvement industry
        prescribes fixes without first identifying the root flaw. Every
        instructor saw a different symptom. Every app showed data without
        identifying THE cause. The diagnostic step was always missing.
      mechanism_angle: >
        SwingScan Diagnosis introduces the missing step — identifies your
        ONE root swing flaw (trained on 2M+ swings, 96% accuracy, 77+
        flaw patterns) before anything else happens. Then builds a
        personalized plan around YOUR specific diagnosis.
      promise_angle: >
        Know your ONE root swing flaw — the single issue causing
        everything else — identified for the first time, with a clear
        plan built around it. Clarity, not more tips.
      fssit_anchor: >
        FSSIT-02: "You don't need more tips. You've needed a diagnosis
        this whole time." (Momentum-adjusted strength: 10/10, NR: 10/10)
      schema_violation: >
        Violates SC-01 (AI-powered), SC-02 (personalized), SC-03
        (data-driven) by reframing from TECHNOLOGY to MEDICINE. Occupies
        WZ-05 (diagnosis-first positioning, surprise potential 8) and
        WZ-01 (self-blame vindication, surprise potential 9). No golf
        brand has ever positioned as a diagnostic system.
      narrative_reorganization: >
        Explains the golfer's entire improvement history: "THAT'S why
        YouTube didn't work (treating symptoms), why lessons didn't stick
        (wrong diagnosis), why apps disappointed (data without diagnosis),
        why more practice made things worse (practicing the wrong thing).
        I wasn't failing — I was never diagnosed." Converts decades of
        'failure' into 'rational response to a missing step.'

    soul_md_alignment:
