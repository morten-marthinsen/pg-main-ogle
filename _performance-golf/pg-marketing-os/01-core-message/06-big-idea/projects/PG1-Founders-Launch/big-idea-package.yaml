    # ----------------------------------------------------------
    # LEADS (3)
    # ----------------------------------------------------------
    leads:
      - lead_id: "LEAD-01"
        lead_type: "revelation_vindication"
        strength: 9.0
        full_lead: >
          Let me ask you something nobody in golf has ever asked you.

          "What's YOUR root swing flaw?"

          Not a swing fault an instructor noticed last Tuesday. Not a
          number an app spit out. YOUR root swing flaw. The one movement
          causing everything else.

          You don't know. And that's not your fault.

          Because nobody has ever diagnosed it.

          Every instructor you've seen... they each saw something
          different. One said grip. Another said takeaway. Another said
          rotation. They were all looking at symptoms.

          The root flaw sat underneath. Invisible to the human eye at
          full speed.

          And here's the thing — 70% of golfers who take lessons don't
          improve. Not because the lessons were bad. Because the
          diagnostic step was missing.

          You've been prescribed treatment after treatment... without
          anyone ever running the test first.

          That changes now.

      - lead_id: "LEAD-02"
        lead_type: "data_revelation"
        strength: 8.5
        full_lead: >
          Here's a number that should stop you cold.

          The average American golfer's handicap in 2020 was 14.2. In
          2025? Still 14.2. Five years. 46% more golfers keeping
          handicaps. 82 million rounds posted. An explosion of YouTube
          instruction, AI apps, launch monitors, and training aids.

          And nobody got better.

          Not because golfers didn't try. They tried everything. Lessons,
          apps, range sessions, drills, videos at midnight on the couch.

          So what's missing?

          A diagnosis.

          Not more information. Not more data. Not another tip to try.
          The one step the entire golf improvement industry has always
          skipped: identifying YOUR specific root swing flaw before
          prescribing a single fix.

          Think about it. You wouldn't take medication without a blood
          test. You wouldn't let a doctor prescribe treatment without
          running a diagnostic.

          But that's exactly what golf has done your whole life. Every
          lesson was a prescription. Nobody ever ran the test.

          Until now.

      - lead_id: "LEAD-03"
        lead_type: "personal_story_bridge"
        strength: 8.5
        full_lead: >
          I was a +3 handicap. And I hit a wall.

          I'd done everything. Lessons with the best instructors I could
          find. Hours at the range. Every drill, every video, every
          training aid that promised to fix what was wrong.

          Nothing worked. And I started to wonder if the problem was me.

          Then one instructor did something different. Instead of telling
          me what to fix, he ran a diagnostic. He identified ONE root
          flaw — a single movement I couldn't see, buried underneath
          all the compensations my swing had built around it.

          We focused on that one thing. Just that one thing.

          Within weeks, I dropped 5 shots.

          Not because I practiced harder. Because for the first time,
          I was practicing the RIGHT thing.

          That moment changed everything for me. And it raised a question
          I couldn't shake: Why doesn't every golfer get this?

          The answer hit hard. Because the diagnostic didn't exist.
          Not in any app. Not in any lesson format. Not anywhere in
          golf.

          So we built it.

