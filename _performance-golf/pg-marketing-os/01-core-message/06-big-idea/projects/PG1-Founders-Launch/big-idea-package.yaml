    # ----------------------------------------------------------
    # LEADS
    # ----------------------------------------------------------
    leads:
      - lead_id: "LEAD-01"
        lead_type: "before_after_revelation"
        strength: 9.0
        full_lead: >
          There are two eras of golf instruction.

          The one you have been living in — where every instructor treated
          symptoms, every app showed data without finding the cause, and
          every tip addressed the wrong thing while the root swing flaw sat
          underneath, invisible.

          And the one that starts now.

          Every golfer has three to five swing flaws. But only one root
          swing flaw. The single movement creating all the others.

          Nobody has ever identified yours.

          That is the Symptom Spiral — working on the wrong thing, watching
          symptoms multiply, compensating, spiraling deeper. It is why nothing
          has worked. Not because you did not try. Because the root swing flaw
          was never found.

          The PG1 Smart System changes that. It finds your root swing flaw.
          Gives you one thing to work on right now — your Smart Step. Pairs
          you with a coach who knows your flaw. Adapts the more you use it.

          And when you address your root swing flaw... improvement becomes
          inevitable.

      - lead_id: "LEAD-02"
        lead_type: "binary_argument"
        strength: 9.0
        full_lead: >
          Every golfer has three to five swing flaws, but only one root swing
          flaw.

          No matter how much you practice. No matter how new your clubs are.
          No matter how many lessons you get. No matter how much golf you play.
          No matter how many videos you watch.

          If you do not address your root swing flaw, you will never
          consistently improve at the game of golf, and you will continue to
          be stuck in a cycle.

          However, when you do address your root swing flaw, you are guaranteed
          improvement in your golf game — even if you don't have a lot of time
          to practice, even if you don't have money to invest in equipment or
          lessons, or even if you have some other physical problem that you're
          dealing with.

          When you fix your root swing flaw, improvement is inevitable.

          The question is: has anyone ever identified yours?

          That is what the PG1 Smart System does. And it changes everything.

      - lead_id: "LEAD-03"
        lead_type: "personal_story_bridge"
        strength: 8.5
        full_lead: >
          I was a +3 handicap. And I hit a wall.

          I had done everything. Lessons with the best instructors I could
          find. Hours at the range. Every drill, every video, every training
          aid that promised to fix what was wrong.

          Nothing worked. And I started to wonder if the problem was me.

          Then one instructor did something different. Instead of telling me
          what to fix, he found my root swing flaw. The ONE movement buried
          underneath all the compensations my swing had built around it.

          We focused on that one thing. Just that one thing.

          Within weeks, I dropped 5 shots.

          Not because I practiced harder. Because for the first time, I was
          working on the root swing flaw — not the symptoms.

          That moment changed everything. And it raised a question I could
          not shake: Why does not every golfer get this?

          So we built a system that gives it to every golfer. We call it the
          PG1 Smart System. And it is the end of traditional instruction.

