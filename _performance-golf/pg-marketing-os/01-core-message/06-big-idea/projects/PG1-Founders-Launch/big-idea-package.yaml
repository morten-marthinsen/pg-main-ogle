  # ============================================================
  # PRIMARY BIG IDEA
  # ============================================================
  primary:
    id: "BI-PG1-001"
    big_idea_statement: >
      The End of Traditional Instruction. Every golfer has three to five
      swing flaws, but only one root swing flaw. Traditional instruction
      never identified it. Instructors treated symptoms. Apps showed data.
      Videos gave tips. And the root swing flaw sat underneath, creating the
      Symptom Spiral — working on the wrong thing, watching symptoms multiply,
      compensating, spiraling deeper. That is the before. The PG1 Smart System
      is the after. It finds your root swing flaw. Gives you one thing to work
      on right now. Adapts the more you use it. When you fix your root swing
      flaw, improvement becomes inevitable. That is not the end of instruction.
      That is the end of TRADITIONAL instruction — and the beginning of
      something new.
    big_idea_name: "The End of Traditional Instruction"
    big_idea_type: "before_after_binary"

    components:
      before_after_binary: >
        The Big Idea IS the before/after line PG1 draws through the industry.
        BEFORE: Traditional instruction — treatment without diagnosis, the
        Symptom Spiral, working on symptoms while the root swing flaw goes
        unidentified.
        AFTER: The PG1 Smart System — root swing flaw identified, Smart Step
        gives one thing to work on, coach validates, system adapts, improvement
        becomes inevitable.
      not_anti_instruction: >
        This is NOT anti-instruction. It is anti-TRADITIONAL-instruction.
        PG coaches still coach — but now they coach with a diagnosis. The
        distinction matters: PG1 does not reject coaching. It rejects coaching
        WITHOUT first identifying the root swing flaw.
      root_cause_angle: >
        The root swing flaw is the star. Every golfer has 3-5 swing flaws
        but only one root swing flaw. Nobody has identified it. The Symptom
        Spiral is what happens when it goes unidentified. The binary argument
        establishes inevitability: address the root swing flaw = improvement
        is inevitable. Ignore it = stuck in the cycle.
      mechanism_angle: >
        The PG1 Smart System introduces the complete answer: discover root
        swing flaw → Smart Step (one thing to work on right now) → Smart
        Match (coach pairing) → Smart Path (sequenced plan) → system adapts
        → moves to next area of game. The more you use it, the more it
        knows you. From knowing your name to knowing your game.
      promise_angle: >
        Improvement becomes inevitable. Supporting: play the golf you know
        you are capable of. The smartest path to your best golf. Stop the
        spiral. From knowing your name to knowing your game.
      subhead_direction: "TBD — to be determined in headline/creative development"

    soul_md_alignment:
      voice_match: >
        Insider-to-insider revelation — Brixton sharing what the team built
        and why. Not selling an app; revealing the end of one era and the
        beginning of another.
      energy_match: >
        Earned conviction — the Big Idea earns its authority through the
        before/after binary, the root swing flaw as star, and the competitive
        void (zero competitors identify root swing flaw first).
      anti_voice_clear: true
