# Ad Performance Contract v1
# Defines the output schema from the enriched pipeline.
# Canonical definitions will live in OpenMetadata (Phase 4).

name: ad_performance
version: 1
description: Ad-level performance metrics with Beast Mode calculations and classification
update_frequency: daily

fields:
  # Identity
  - name: ad_name
    type: string
    description: Full ad name (lowercase, normalized)
  - name: funnel
    type: string
    description: Product/offer code from 15-position name (357, sf1, clst, etc.)
  - name: script_id
    type: string
    description: Root Angle ID (position 2 of 15-position name)
  - name: variation_id
    type: string
    description: Variation ID (position 3)
  - name: platform
    type: string
    description: Ad platform (fb, yt, etc.)
  - name: ad_category
    type: string
    description: Ad category code (nn, exv, exh, nnmu, prm, evg)
  - name: expansion_type
    type: string
    description: Expansion type code
  - name: expansion_type_name
    type: string
    description: Human-readable expansion type
  - name: asset_type
    type: string
    description: Asset type code
  - name: asset_type_name
    type: string
    description: Human-readable asset type
  - name: talent_code
    type: string
    description: Talent code (4 char)
  - name: talent_name
    type: string
    description: Human-readable talent name
  - name: editor_initials
    type: string
    description: Editor initials (2-3 char)
  - name: editor_name
    type: string
    description: Human-readable editor name
  - name: copywriter_initials
    type: string
    description: Copywriter initials (2 char)
  - name: copywriter_name
    type: string
    description: Human-readable copywriter name
  - name: offer_name
    type: string
    description: Human-readable offer name

  # Aggregated metrics
  - name: spend
    type: float
    description: Total ad spend (USD)
  - name: clicks
    type: integer
    description: Total clicks
  - name: impressions
    type: integer
    description: Total impressions
  - name: gross_revenue
    type: float
    description: Sum of totalAmount from order rows
  - name: total_orders
    type: integer
    description: Count of orders attributed
  - name: total_customers
    type: integer
    description: COUNT(DISTINCT emailAddress)
  - name: new_customers
    type: integer
    description: COUNT(DISTINCT emailAddress WHERE New Customers != 0)
  - name: sc_trials
    type: float
    description: Sum of SC Trials Started

  # Beast Mode metrics
  - name: net_revenue
    type: float
    description: "totalAmount - COGS + Refunded Revenue (neg) - Agency Fees - CC Fees - Spend"
  - name: gross_roas
    type: float
    description: "gross_revenue / spend"
  - name: net_roas
    type: float
    description: "(net_revenue / spend) + 1 — 1.0 = breakeven = 100%"
  - name: gross_profit
    type: float
    description: "totalAmount - COGS - Refunded Revenue"
  - name: nc_net_roas
    type: float
    description: "Net ROAS computed on new customer revenue only, total spend"
  - name: cpa
    type: float
    description: "spend / total_customers"
  - name: nc_cpa
    type: float
    description: "spend / new_customers"
  - name: net_aov
    type: float
    description: "CPA * Net ROAS"
  - name: nlpt
    type: float
    description: "net_revenue / sc_trials"
  - name: nc_pct
    type: float
    description: "new_customers / total_customers"
  - name: cvr_pct
    type: float
    description: "total_customers / clicks"
  - name: nc_cvr_pct
    type: float
    description: "new_customers / clicks"
  - name: rc_cvr_pct
    type: float
    description: "(total_customers - new_customers) / clicks"
  - name: fixed_refund_net_revenue
    type: float
    description: "Net revenue using 8% flat refund instead of actual"

  # Classification
  - name: classification
    type: string
    description: "Winner (Net ROAS >= 100% AND spend >= $2500), Potential (80-99%), Underperformer (< 80%), Testing (spend < $2500)"
    enum: [Winner, Potential, Underperformer, Testing]
