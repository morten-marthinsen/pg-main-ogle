# Intake Auto-ID Generator Configuration
# Maps funnel codes to Creative Performance spreadsheets for next-ID lookup.

clickup:
  intake_list_id: "901413749270"
  workspace_id: "9014714949"
  # Custom field names as they appear on the ClickUp list (verified via API)
  fields:
    product_funnels: "Product Funnel(s)"    # labels type (multi-select UUIDs)
    ad_category: "Ad Category"              # dropdown
    expansion_ad_id: "Expansion AD ID"      # short_text
    ad_format: "Ad Format"                  # dropdown: Video, Static, HTML5
    full_ad_id: "Full Ad ID"               # does NOT exist yet — script skips if missing
    root_angle_name: "Ad Root Angle Name"   # text

# Tab names in CP spreadsheets (standardized across all sheets)
sheet_tabs:
  video: "Video Ads"
  static: "Static Image Ads"
  html5: "HTML5 Ads"

# Column layout in CP spreadsheets:
#   A = Full Variation ID (e.g., sf2-0001-v0001)
#   B = Root Angle ID (e.g., sf2-0001)
#   C = Root Angle Name
#   D = Ad Category
# Script reads Column B to find the max root angle ID per asset type.

# Root angle ID format rules:
#   Video:  {funnel}-{4-digit numeric}  e.g., sf2-0001
#   Static: {funnel}-i{3-digit numeric} e.g., sf2-i001
#   HTML5:  {funnel}-h{3-digit numeric} e.g., sf2-h001

# Polling interval (seconds) — launchd StartInterval controls this,
# but the script uses it for logging context.
poll_interval: 120

# Lock file to prevent overlapping runs
lock_file: "/tmp/intake-id-generator.lock"

# Funnel-to-CP-spreadsheet mapping
