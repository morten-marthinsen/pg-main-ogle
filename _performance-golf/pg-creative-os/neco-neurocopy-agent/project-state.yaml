#   LOCKED      — Final version approved. No further work needed.
#   DRAFTED     — Draft exists, awaiting human review.
#   IN_PROGRESS — Active work underway (specify next_step).
#   NOT_STARTED — ClickUp task exists but no Neco output yet.
#
